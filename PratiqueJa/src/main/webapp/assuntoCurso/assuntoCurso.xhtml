<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui" template="/template/template.xhtml">


	<h:form id="form" style="margin-bottom:0">
		<div class="p-d-flex">
			<div class="p-grid" style="margin: 0 15px; width: 100%;">

				<div class="p-col-12">
					<h2>Assunto</h2>
				</div>

				<h:panelGroup id="fomulario" style="width:100%;"
					rendered="#{!assuntoCursoBean.lista}">

					<ui:include src="/assuntoCurso/gerais.xhtml" />

				</h:panelGroup>

				<h:panelGroup id="filtro" rendered="#{assuntoCursoBean.lista}">

					<p:commandButton value="Adicionar" icon="pi pi-plus"
						styleClass="ui-button-raised ui-button-success ui-button-flat"
						action="#{assuntoCursoBean.cadastrar}" update="@form"
						process="@this" style="margin-bottom:1rem;" />

					<p:panel header="Filtro" toggleable="true" closable="true"
						toggleSpeed="500" closeSpeed="500" widgetVar="panel"
						style="margin-bottom:1rem;">

						<div class="ui-fluid formgrid grid">
							<div class="field col-12 lg:col-6 xl:col-4">
								<p:outputLabel for="@next" value="Nome" />
								<p:inputText placeholder="Nome"
									value="#{assuntoCursoBean.filtroAssuntoCurso.nomeAssuntoCurso}" />
							</div>

							<div class="field col-12 lg:col-6 xl:col-4">
								<p:outputLabel for="@next" value="Chave" />
								<p:inputText placeholder="Chave"
									value="#{assuntoCursoBean.filtroAssuntoCurso.chave}" />
							</div>

							<div class="field col-12 lg:col-6 xl:col-4">
								<p:outputLabel for="@next" value="Módulo" />
								<p:selectOneMenu value="#{assuntoCursoBean.filtroAssuntoCurso.modulo}"
									filter="true" filterMatchMode="contains">
									<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
									<f:selectItems value="#{moduloBean.opcoes}" var="opcao"
										itemLabel="#{opcao.nome}" itemValue="#{opcao}" />
								</p:selectOneMenu>
							</div>
							
							<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
								<p:outputLabel for="@next" value="Habilitado" />
								<p:selectOneMenu value="#{assuntoCursoBean.filtroAssuntoCurso.habilidado}">
									<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
									<f:selectItem itemLabel="Sim" itemValue="#{true}" />
									<f:selectItem itemLabel="Não" itemValue="#{false}" />
								</p:selectOneMenu>
							</div>
							
							<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
								<p:outputLabel for="@next" value="Mostrar Aulas" />
								<p:selectOneMenu value="#{assuntoCursoBean.filtroAssuntoCurso.showAula}">
									<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
									<f:selectItem itemLabel="Sim" itemValue="#{true}" />
									<f:selectItem itemLabel="Não" itemValue="#{false}" />
								</p:selectOneMenu>
							</div>

							<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
								<p:outputLabel for="@next" value="Mostrar Anotações" />
								<p:selectOneMenu value="#{assuntoCursoBean.filtroAssuntoCurso.showAnotacao}">
									<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
									<f:selectItem itemLabel="Sim" itemValue="#{true}" />
									<f:selectItem itemLabel="Não" itemValue="#{false}" />
								</p:selectOneMenu>
							</div>

							<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
								<p:outputLabel for="@next" value="Mostrar Exercícios" />
								<p:selectOneMenu value="#{assuntoCursoBean.filtroAssuntoCurso.showExercicio}">
									<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
									<f:selectItem itemLabel="Sim" itemValue="#{true}" />
									<f:selectItem itemLabel="Não" itemValue="#{false}" />
								</p:selectOneMenu>
							</div>

							<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
								<p:outputLabel for="@next" value="Mostrar Questões" />
								<p:selectOneMenu value="#{assuntoCursoBean.filtroAssuntoCurso.showQuestao}">
									<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
									<f:selectItem itemLabel="Sim" itemValue="#{true}" />
									<f:selectItem itemLabel="Não" itemValue="#{false}" />
								</p:selectOneMenu>
							</div>

							<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
								<label for="@next">Índice</label>
								<p:inputText value="#{assuntoCursoBean.filtroAssuntoCurso.indice}" />
							</div>
						</div>

						<p:divider />

						<div class="p-grid" style="margin-top: 1rem">

							<div class="p-col-12 p-text-right">

								<p:commandButton value="Filtrar"
									styleClass="ui-button-raised ui-button-flat"
									icon="pi pi-search" action="#{assuntoCursoBean.filtrar}"
									update="@form, :growl" process="@form" />
							</div>

						</div>

					</p:panel>

					<p:dataTable id="tabela" class="table table-striped"
						var="assuntoCurso" value="#{assuntoCursoBean.assuntosCurso}"
						selection="#{assuntoCursoBean.assuntoCurso}"
						selectionMode="single" rowKey="#{assuntoCurso.id}"
						paginator="true" paginatorAlwaysVisible="false" 
						rows="50" reflow="true"  draggableRows="true" >
						
						<p:ajax event="rowSelect" update="@form"
							listener="#{assuntoCursoBean.onSelected}" />
	
						<p:ajax event="rowReorder" listener="#{assuntoCursoBean.onRowReorder}" update="@form"/>
						
						<p:column headerText="Nome" responsivePriority="1">
							<h:outputText value="#{assuntoCurso.nome}" />
						</p:column>

						<p:column headerText="Chave" responsivePriority="2">
							<h:outputText value="#{assuntoCurso.chave}" />
						</p:column>

						<p:column headerText="Módulo" responsivePriority="1">
							<h:outputText value="#{assuntoCurso.modulo.nome}" >
							</h:outputText>
						</p:column>
						
						<p:column headerText="Teste Padrão" responsivePriority="1">
							<h:outputText value="#{assuntoCurso.testePadrao.nome}" >
							</h:outputText>
						</p:column>
						
						<p:column headerText="Habilitado" responsivePriority="3">
							<h:outputText value="#{assuntoCurso.habilidado}"
								converter="simNaoConverter">
							</h:outputText>
						</p:column>
						
						<p:column headerText="Mostrar Aulas" responsivePriority="5">
							<h:outputText value="#{assuntoCurso.showAula}"
								converter="simNaoConverter">
							</h:outputText>
						</p:column>

						<p:column headerText="Mostrar Anotações" responsivePriority="5">
							<h:outputText value="#{assuntoCurso.showAnotacao}"
								converter="simNaoConverter">
							</h:outputText>
						</p:column>

						<p:column headerText="Mostrar Exercícios" responsivePriority="5">
							<h:outputText value="#{assuntoCurso.showExercicio}"
								converter="simNaoConverter">
							</h:outputText>
						</p:column>

						<p:column headerText="Mostrar Questões" responsivePriority="5">
							<h:outputText value="#{assuntoCurso.showQuestao}"
								converter="simNaoConverter">
							</h:outputText>
						</p:column>

						<p:column headerText="Índice" responsivePriority="4">
							<h:outputText value="#{assuntoCurso.indice}">
							</h:outputText>
						</p:column>
						
						<p:column headerText="Hashtag" responsivePriority="4">
							<h:outputText value="#{assuntoCurso.hashtag}">
							</h:outputText>
						</p:column>

					</p:dataTable>

				</h:panelGroup>
			</div>
		</div>
	</h:form>


</ui:decorate>
