<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

<h:body>
	<ui:composition>

		<p:dialog id="dialog-editar-programacaoPost"
		class="col-12 md:col-12 lg:col-10 lg:col-offset-1 xl:col-8 xl:col-offset-2"
		header="Programação de Post" dynamic="true"
		showEffect="fade" hideEffect="fade" width="100%;" modal="true"  widgetVar="dialogEditarProgramacaoPost" responsive="true"
	    focus="formEditarProgramacaoPost:ordem"	>
			<h:form id="formEditarProgramacaoPost" class="form" enctype="multipart/form-data" >
				<div class="ui-fluid gride">

					<h:panelGroup styleClass="campo col-12 md:col-6 lg:col-6 xl:col-2" >
						<p:outputLabel for="@next" value="Ordem" />
						<p:inputNumber id="ordem" minValue="0" maxValue="100" decimalPlaces="0"
							value="#{programacaoPostBean.programacaoPost.ordem}"
							required="true" />
					</h:panelGroup>

					<h:panelGroup styleClass="campo col-12 md:col-6 lg:col-4 xl:col-2">
						<p:outputLabel for="@next" value="Alternativa no Reel" />
						<p:toggleSwitch class="toggleSwitch-form"
							value="#{programacaoPostBean.programacaoPost.alternativaReel}" />
					</h:panelGroup>

					<h:panelGroup styleClass="campo col-12 md:col-6 lg:col-4 xl:col-2"
						rendered="#{configPostBean.configPost.usuario.perfilCriador=='Basico'}">
						<p:outputLabel for="@next" value="Formato" />
						<p:selectOneButton value="#{programacaoPostBean.programacaoPost.formato}">
							<f:selectItem itemLabel="Feed" itemValue="Feed" />
							<f:selectItem itemLabel="Reel" itemValue="Reel" />
						</p:selectOneButton>
					</h:panelGroup>

					<h:panelGroup styleClass="campo col-12  xl:col-8">
						<p:outputLabel for="@next" value="Assunto" />
						<p:selectOneMenu
							value="#{programacaoPostBean.programacaoPost.assunto}"
							converter="generic" required="true" filter="true"
							filterMatchMode="contains">
							<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
							<f:selectItems value="#{assuntoBean.listaAtivas}"
										var="assunto" itemLabel="#{assunto.nome}"
										itemValue="#{assunto}" />
						</p:selectOneMenu>
					</h:panelGroup>

				</div>
				<div class="ui-fluid gride">

					<!-- Escolha e Origem do background: valem para Feed e Reel (sempre iguais) -->
					<h:panelGroup styleClass="campo col-12 md:col-6 lg:col-4 xl:col-2">
						<p:outputLabel for="@next" value="Escolha" />
						<p:selectBooleanButton
							value="#{programacaoPostBean.programacaoPost.backgroundAleatorio}"
							onLabel="Aleatória" offLabel="Específica"
							onIcon="fa fa-solid fa-shuffle" offIcon="fa fa-regular fa-circle-check"
							disabled="#{configPostBean.configPost.usuario.perfilCriador=='Basico'}"
							style="width-min:8rem;display:block;">
							<f:ajax event="change" process="@this" render="formEditarProgramacaoPost:backgroundFeed formEditarProgramacaoPost:backgroundReel" />
						</p:selectBooleanButton>
					</h:panelGroup>

					<h:panelGroup styleClass="campo col-12 md:col-6 lg:col-4 xl:col-2">
						<p:outputLabel for="@next" value="Base de Dados" />
						<p:selectBooleanButton disabled="#{imagemPostBean.imagemPost(true).size()==0 or imagemPostBean.imagemPost(false).size()==0 or configPostBean.configPost.usuario.perfilCriador=='Basico'}"
							value="#{programacaoPostBean.programacaoPost.basePadrao}"
							onLabel="Padrão" offLabel="Personalizada"
							onIcon="fa fa-solid fa-image" offIcon="fa fa-solid fa-circle-user"
							style="width-min:8rem;display:block;">
							<f:ajax event="change" process="@this" render="formEditarProgramacaoPost:backgroundFeed formEditarProgramacaoPost:backgroundReel" />
						</p:selectBooleanButton>
					</h:panelGroup>

					<div class="col-12 ">
						<p:fieldset legend="Background Feed" style="margin-bottom:1rem;width:100%;" >
							<div class="ui-fluid gride">
								<h:panelGroup styleClass="campo col-12">
									<h:panelGroup id="backgroundFeed" >
										<h:panelGroup
										rendered="#{!programacaoPostBean.programacaoPost.backgroundAleatorio and !programacaoPostBean.programacaoPost.basePadrao}">
											<p:outputLabel for="@next" value="Background" />
											<p:selectOneMenu
												value="#{programacaoPostBean.programacaoPost.background}"
												converter="generic" required="true" filter="true"
												filterMatchMode="contains" var="item" >
												<f:selectItems value="#{imagemPostBean.imagemPost(true)}"
															var="image" itemLabel="#{image.nome}"
															itemValue="#{image}" />
												<p:column >
													<p:graphicImage value="#{item.endImagem}" alt="#{image.endImagem}"
														style="width: 80px; cursor: pointer" cache="false" stream="false" />
												</p:column>
												<p:column >
													<f:facet name="header">
														<h:outputText value="Nome"/>
													</f:facet>
													<h:outputText value="#{item.nome}"/>
												</p:column>
											</p:selectOneMenu>
										</h:panelGroup>
										<h:panelGroup
										rendered="#{!programacaoPostBean.programacaoPost.backgroundAleatorio and programacaoPostBean.programacaoPost.basePadrao}">
											<p:outputLabel for="@next" value="Background" />
											<p:selectOneMenu
												value="#{programacaoPostBean.programacaoPost.padrao}"
												converter="generic" required="true" filter="true"
												filterMatchMode="contains" var="item">
												<f:selectItems value="#{imagemPostBean.imagensFeed}"
															var="image" itemLabel="#{image.nome}"
															itemValue="#{image}" />
												<p:column >
													<p:graphicImage value="#{item.endereco}" alt="#{item.nome}"
														style="width: 80px; cursor: pointer" cache="false" stream="false"  />
												</p:column>
												<p:column >
													<f:facet name="header">
														<h:outputText value="Nome"/>
													</f:facet>
													<h:outputText value="#{item.nome}"/>
												</p:column>
											</p:selectOneMenu>
										</h:panelGroup>
									</h:panelGroup>
								</h:panelGroup>
							</div>
						</p:fieldset>
					</div>
					<div class="col-12 ">
						<p:fieldset legend="Background Reel" style="margin-bottom:1rem;width:100%;" >
							<div class="ui-fluid gride">
								<h:panelGroup styleClass="campo col-12">
									<h:panelGroup id="backgroundReel" >
										<h:panelGroup
										rendered="#{!programacaoPostBean.programacaoPost.backgroundAleatorio and !programacaoPostBean.programacaoPost.basePadrao}">
											<p:outputLabel for="@next" value="Background" />
											<p:selectOneMenu
												value="#{programacaoPostBean.programacaoPost.background}"
												converter="generic" required="true" filter="true"
												filterMatchMode="contains" var="item" >
												<f:selectItems value="#{imagemPostBean.imagemPost(false)}"
															var="image" itemLabel="#{image.nome}"
															itemValue="#{image}" />
												<p:column >
													<p:graphicImage value="#{item.endImagem}" alt="#{image.endImagem}"
														style="width: 80px; cursor: pointer" cache="false" stream="false" />
												</p:column>
												<p:column >
													<f:facet name="header">
														<h:outputText value="Nome"/>
													</f:facet>
													<h:outputText value="#{item.nome}"/>
												</p:column>
											</p:selectOneMenu>
										</h:panelGroup>
										<h:panelGroup
										rendered="#{!programacaoPostBean.programacaoPost.backgroundAleatorio and programacaoPostBean.programacaoPost.basePadrao}">
											<p:outputLabel for="@next" value="Background" />
											<p:selectOneMenu
												value="#{programacaoPostBean.programacaoPost.padrao}"
												converter="generic" required="true" filter="true"
												filterMatchMode="contains" var="item">
												<f:selectItems value="#{imagemPostBean.imagensReel}"
															var="image" itemLabel="#{image.nome}"
															itemValue="#{image}" />
												<p:column >
													<p:graphicImage value="#{item.endereco}" alt="#{item.nome}"
														style="width: 80px; cursor: pointer" cache="false" stream="false"  />
												</p:column>
												<p:column >
													<f:facet name="header">
														<h:outputText value="Nome"/>
													</f:facet>
													<h:outputText value="#{item.nome}"/>
												</p:column>
											</p:selectOneMenu>
										</h:panelGroup>
									</h:panelGroup>
								</h:panelGroup>
							</div>
						</p:fieldset>
					</div>
				</div>

				<div class="content-button-right">

					<div class="divisor"></div>

					<p:commandButton id="salvarGeraisEdicao" value="Salvar"
						styleClass="ui-button-raised ui-button-primary" icon="pi pi-check"
						action="#{programacaoPostBean.salvar}" update="@form, form:tabela, :growl"
						process="@form" oncomplete="if (args &amp;&amp; !args.validationFailed) PF('dialogEditarProgramacaoPost').hide()">
						<p:defaultCommand target="salvarGeraisEdicao" />
					</p:commandButton>

				</div>

			</h:form>
		</p:dialog>
	</ui:composition>
</h:body>
</html>
