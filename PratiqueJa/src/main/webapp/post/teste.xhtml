<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

	<ui:define name="linkPage">
		<h:outputText class="linkPage" value="Teste" />
	</ui:define>

	<f:metadata>
	    <f:viewParam name="configPost" value="#{configPostBean.idConfigPost}" converter="jakarta.faces.Long"/>
	    <f:viewAction action="#{configPostBean.carregarConfigPost()}" />
	</f:metadata>

	<div class="post-tabmenu">
		<ui:include src="/post/tabMenu.xhtml" />
	</div>

	<h:form id="form" class="form">

		<div class="title-divisor-button">
			<h4 style="margin:0;padding:0;border:0;">Teste</h4>
			<h5 style="margin:0;color:#6b7280;">Usuário: #{configPostBean.configPost.usuario.nome}</h5>
		</div>

	    <div class="ui-fluid gride">

	    	<h:panelGroup styleClass="campo col-12 md:col-6 lg:col-4 xl:col-2">
				<p:outputLabel for="@next" value="Alternativa no Reel" />
				<p:toggleSwitch class="toggleSwitch-form"
					value="#{testeConfigPostBean.programacaoPost.alternativaReel}" />
			</h:panelGroup>

			<h:panelGroup styleClass="campo col-12  xl:col-8">
				<p:outputLabel for="@next" value="Assunto" />
				<p:selectOneMenu
					value="#{testeConfigPostBean.programacaoPost.assuntoCurso}"
					converter="generic" required="true" filter="true"
					filterMatchMode="contains">
					<f:selectItems value="#{assuntoCursoBean.listaAtivas}"
					var="assuntoCurso" itemLabel="#{assuntoCurso.nome}"
					itemValue="#{assuntoCurso}" />
				</p:selectOneMenu>
			</h:panelGroup>

	    	<h:panelGroup styleClass="campo col-12 md:col-6 lg:col-4 xl:col-2">
				<p:outputLabel for="@next" value="Nível" />
				<p:selectOneMenu value="#{testeConfigPostBean.nivel}"
				title="Nível do Exercício"
					required="true" filter="true" filterMatchMode="contains">
					<f:selectItems value="#{nivelBean.opcoes}" var="opcao"
						itemLabel="#{opcao.nome}" itemValue="#{opcao}" />
				</p:selectOneMenu>
			</h:panelGroup>

	    </div>

	    <ui:include src="/post/teste/resultado.xhtml" />

	</h:form>
</ui:decorate>
