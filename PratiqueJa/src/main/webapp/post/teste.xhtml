<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

	<ui:define name="OpenGraph">
		<link rel="stylesheet" href="/css/post-page.css" type="text/css" />
	</ui:define>

	<ui:define name="linkPage">
		<h:outputText class="linkPage" value="Teste" />
	</ui:define>

	<f:metadata>
	    <f:viewParam name="configPost" value="#{configPostBean.idConfigPost}" converter="jakarta.faces.Long"/>
	    <f:viewAction action="#{configPostBean.carregarConfigPost()}" />
	</f:metadata>

	<!-- HERO -->
	<div class="pc-hero">
		<div class="pc-hero-head">
			<span class="pc-hero-badge"><i class="pi pi-megaphone" /> Publicação no Instagram</span>
			<h1 class="pc-hero-title">Teste</h1>
			<p class="pc-hero-desc">
				Pré-visualize uma publicação de Feed e Reel escolhendo assunto e nível antes de programar de verdade.
			</p>
		</div>
		<div class="pc-hero-stats">
			<div class="pc-stat">
				<span class="pc-stat-label">Usuário</span>
				<strong class="pc-stat-value">#{configPostBean.configPost.usuario.nome}</strong>
			</div>
			<div class="pc-stat pc-stat--green">
				<span class="pc-stat-label">Perfil</span>
				<strong class="pc-stat-value">#{configPostBean.configPost.perfilCriador.nome}</strong>
			</div>
		</div>
	</div>

	<ui:include src="/post/navTabs.xhtml" />

	<h:form id="form">

		<div class="pc-panel">

		<div class="pc-section-sub"><i class="pi pi-sliders-h" /> Parâmetros do teste</div>

		<div class="pc-fields">

			<h:panelGroup styleClass="pc-field pc-field-wide" layout="block">
				<p:outputLabel styleClass="pc-label" for="@next" value="Assunto" />
				<p:selectOneMenu
					value="#{testeConfigPostBean.programacaoPost.assunto}"
					converter="generic" required="true" filter="true"
					filterMatchMode="contains">
					<f:selectItems value="#{assuntoBean.listaAtivas}"
					var="assunto" itemLabel="#{assunto.nome}"
					itemValue="#{assunto}" />
				</p:selectOneMenu>
			</h:panelGroup>

			<h:panelGroup styleClass="pc-field" layout="block">
				<p:outputLabel styleClass="pc-label" for="@next" value="Nível" />
				<p:selectOneMenu value="#{testeConfigPostBean.nivel}"
				title="Nível do Exercício"
					required="true" filter="true" filterMatchMode="contains">
					<f:selectItems value="#{nivelBean.opcoes}" var="opcao"
						itemLabel="#{opcao.nome}" itemValue="#{opcao}" />
				</p:selectOneMenu>
			</h:panelGroup>

			<h:panelGroup styleClass="pc-field" layout="block">
				<p:outputLabel styleClass="pc-label" for="@next" value="Alternativa no Reel" />
				<p:toggleSwitch class="toggleSwitch-form"
					value="#{testeConfigPostBean.programacaoPost.alternativaReel}" />
			</h:panelGroup>

		</div>

	    <ui:include src="/post/teste/resultado.xhtml" />

		</div>

	</h:form>
</ui:decorate>
