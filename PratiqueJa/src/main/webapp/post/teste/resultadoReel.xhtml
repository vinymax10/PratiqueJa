<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:body>
		<ui:composition>

			<h:panelGroup id="reel" layout="block">

				<div class="pc-section-sub"><i class="pi pi-video" /> Conteúdo Reel</div>

				<div class="pc-fields">

					<h:panelGroup styleClass="pc-field" layout="block">
						<p:outputLabel styleClass="pc-label" for="@next" value="Escolha" />
						<p:selectBooleanButton
							value="#{testeConfigPostBean.programacaoPost.backgroundAleatorioReel}"
							onLabel="Aleatória" offLabel="Específica"
							onIcon="fa fa-solid fa-shuffle" offIcon="fa fa-regular fa-circle-check"
							disabled="#{configPostBean.configPost.perfilCriador=='Basico'}"
							styleClass="pc-toggle-btn">
							<f:ajax event="change" process="@this" render="form:backgroundReel" />
						</p:selectBooleanButton>
					</h:panelGroup>

					<h:panelGroup styleClass="pc-field" layout="block">
						<p:outputLabel styleClass="pc-label" for="@next" value="Base de Dados" />
						<p:selectBooleanButton
							disabled="#{imagemPostBean.imagemPost(false).size()==0 or configPostBean.configPost.perfilCriador=='Basico'}"
							value="#{testeConfigPostBean.programacaoPost.basePadraoReel}"
							onLabel="Padrão" offLabel="Personalizada"
							onIcon="fa fa-solid fa-image" offIcon="fa fa-solid fa-circle-user"
							styleClass="pc-toggle-btn">
							<f:ajax event="change" process="@this" render="form:backgroundReel" />
						</p:selectBooleanButton>
					</h:panelGroup>

					<h:panelGroup id="backgroundReel" styleClass="pc-field-wide" layout="block">
						<h:panelGroup layout="block" styleClass="pc-field"
							rendered="#{!testeConfigPostBean.programacaoPost.backgroundAleatorioReel
							and !testeConfigPostBean.programacaoPost.basePadraoReel
							and imagemPostBean.imagemPost(false).size()>0}">
							<p:outputLabel styleClass="pc-label" for="@next" value="Background" />
							<p:selectOneMenu
								value="#{testeConfigPostBean.programacaoPost.backgroundReel}"
								converter="generic" required="true" filter="true"
								filterMatchMode="contains" var="item">
								<f:selectItems value="#{imagemPostBean.imagemPost(false)}"
									var="image" itemLabel="#{image.nome}"
									itemValue="#{image}" />

								<p:column>
									<p:graphicImage value="#{item.endImagem}" alt="#{image.nome}"
										style="width: 80px; cursor: pointer" cache="false" stream="false" />
								</p:column>

								<p:column>
									<f:facet name="header">
										<h:outputText value="Nome" />
									</f:facet>
									<h:outputText value="#{item.nome}" />
								</p:column>
							</p:selectOneMenu>
						</h:panelGroup>

						<h:panelGroup layout="block" styleClass="pc-field"
							rendered="#{!testeConfigPostBean.programacaoPost.backgroundAleatorioReel and testeConfigPostBean.programacaoPost.basePadraoReel}">
							<p:outputLabel styleClass="pc-label" for="@next" value="Background" />
							<p:selectOneMenu
								value="#{testeConfigPostBean.programacaoPost.padraoReel}"
								converter="generic" required="true" filter="true"
								filterMatchMode="contains" var="item">
								<f:selectItems value="#{imagemPostBean.imagensReel}"
									var="image" itemLabel="#{image.nome}"
									itemValue="#{image}" />

								<p:column>
									<p:graphicImage value="#{item.endereco}" alt="#{item.nome}"
										style="width: 80px;" cache="false" stream="false" />
								</p:column>

								<p:column>
									<f:facet name="header">
										<h:outputText value="Nome" />
									</f:facet>
									<h:outputText value="#{item.nome}" />
								</p:column>
							</p:selectOneMenu>
						</h:panelGroup>
					</h:panelGroup>

				</div>

				<div class="pc-actions" style="justify-content:flex-end">
					<p:commandButton value="Testar Reel" styleClass="ui-button-raised btn-primary" icon="pi pi-check"
						action="#{testeConfigPostBean.teste(false)}" update="@form, form:configPost:reel, :growl" process="@form" />
				</div>

				<h:panelGroup styleClass="pc-gallery mt-3" layout="block" rendered="#{configPostBean.configPost.listTesteReel.size()>0}">
					<p:galleria value="#{configPostBean.configPost.listTesteReel}" var="image" numVisible="4"
						showItemNavigators="true"
						circular="true" responsiveOptions="#{imagemPostBean.responsiveOptions}" style="width:100%">
						<p:graphicImage value="#{image.endImagem}" oncontextmenu="return false;"
							alt="#{image.nome}"
							style="width: 100%; display: block;" cache="false" />
						<f:facet name="caption">
							<h4 class="mb-2">#{image.nome}</h4>
						</f:facet>
						<f:facet name="thumbnail">
							<p:graphicImage value="#{image.endImagem}" oncontextmenu="return false;"
								alt="#{image.nome}"
								style="width: 54px; display: block;" cache="false" />
						</f:facet>
					</p:galleria>
				</h:panelGroup>

			</h:panelGroup>

		</ui:composition>
	</h:body>
</html>
