<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

<h:body >
	<ui:composition>
	
		<p:tabMenu id="tabMenu" activeIndex="#{param.tab}" style="overflow: hidden;width:100%;">
       
	        <p:menuitem value="Configurações" outcome="/post/configuracao?configPost=#{configPostBean.configPost.id}" 
	        icon="fa-solid fa-gear" >
	            <f:param name="tab" value="0"/>
	        </p:menuitem>
	        
	        <p:menuitem value="Programação" outcome="/post/programacao?configPost=#{configPostBean.configPost.id}" 
	        icon="fa-solid fa-list" >
	            <f:param name="tab" value="1"/>
	        </p:menuitem>
	        
	        <p:menuitem value="Background Padrão" outcome="/post/backgroundPadrao" 
	        icon="fa-solid fa-images" >
	            <f:param name="tab" value="2"/>
	        </p:menuitem>
	        
	        <p:menuitem value="Background Personalizado" outcome="/post/backgroundPersonalizado?configPost=#{configPostBean.configPost.id}" 
	        icon="fa-solid fa-file-image" >
	            <f:param name="tab" value="3"/>
	        </p:menuitem>
	        
	        <p:menuitem value="Teste" outcome="/post/teste?configPost=#{configPostBean.configPost.id}" 
	        icon="fa-solid fa-flask-vial" >
	            <f:param name="tab" value="4"/>
	        </p:menuitem>

	        <p:menuitem value="CTAs" rendered="#{autenticacaoBean.usuario.perfil=='Admin'}" 
	        outcome="/post/ctas?configPost=#{configPostBean.configPost.id}" 
	        icon="fa-solid fa-bullhorn" >
	            <f:param name="tab" value="5"/>
	        </p:menuitem>
	        
	    </p:tabMenu>
				
	</ui:composition>		
</h:body>
</html>
