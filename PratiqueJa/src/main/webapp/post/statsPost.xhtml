<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:ui="http://java.sun.com/jsf/facelets">

	<h:panelGroup layout="block" styleClass="pc-hero-stats" rendered="#{!pedidoPostBean.modoTrial}">
		<div class="pc-stat">
			<span class="pc-stat-label">Plano ativo</span>
			<strong class="pc-stat-value">#{pedidoPostBean.nomePlano}</strong>
		</div>
		<div class="pc-stat">
			<span class="pc-stat-label">Usados no mês</span>
			<strong class="pc-stat-value">#{pedidoPostBean.postsUsadosNoMes}</strong>
		</div>
		<div class="pc-stat pc-stat--green">
			<span class="pc-stat-label">Restantes</span>
			<strong class="pc-stat-value">#{pedidoPostBean.creditosRestantes()}</strong>
		</div>
	</h:panelGroup>

	<h:panelGroup layout="block" styleClass="pc-hero-stats" rendered="#{pedidoPostBean.modoTrial}">
		<div class="pc-stat">
			<span class="pc-stat-label">Teste grátis</span>
			<strong class="pc-stat-value">#{pedidoPostBean.limiteTrialGratis} posts</strong>
		</div>
		<div class="pc-stat">
			<span class="pc-stat-label">Usados no total</span>
			<strong class="pc-stat-value">#{pedidoPostBean.postsUsadosTotal}</strong>
		</div>
		<div class="pc-stat pc-stat--green">
			<span class="pc-stat-label">Restantes</span>
			<strong class="pc-stat-value">#{pedidoPostBean.trialRestante()}</strong>
		</div>
	</h:panelGroup>

</ui:composition>
