<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

	<f:metadata>
	    <f:viewParam name="configPost" value="#{configPostBean.idConfigPost}" converter="jakarta.faces.Long"/>
	    <f:viewAction action="#{configPostBean.carregarConfigPost()}" />
	</f:metadata>
			  
    <div class="grid" style="display: flex; align-items: flex-end; gap: 2rem;margin:0 30px;">
		<h2>CTAs</h2>
		<h5>Usuário: #{configPostBean.configPost.usuario.nome}</h5>
		<ui:include src="/post/tabMenu.xhtml" />
    </div>
    				    
     <h:form id="form" >
	    <div class="p-d-flex" style="margin:0 30px;">
			
	    	<div class="grid" style="margin:0; width:100%;">
				
				<div class="ui-fluid formgrid grid" style="width:100%;margin-top:1rem;">
					
					<div class="campoMsg col-12 md:col-6 lg:col-4 xl:col-3">
		                <p:outputLabel for="@next" value="Finalidade da Cta"/>
		                <p:selectOneMenu id="finalidadeCta" value="#{ctaBean.finalidadeCta}" 
		                filter="true" filterMatchMode="contains" required="true" 
		                requiredMessage="A finalidade da Cta é obrigatória" >
		                    <f:selectItems value="#{finalidadeCtaBean.opcoes}" var="finalidadeCta" 
		                    itemLabel="#{finalidadeCta.nome}" itemValue="#{finalidadeCta}"/>
		                </p:selectOneMenu>
		                <p:message for="finalidadeCta" display="text"/>
		            </div>
		            					
					<div class="campo p-col-12">
						<p:outputLabel for="@next" value="CTAs" />
						<p:inputTextarea rows="5" 
						placeholder="CTAs"
						value="#{ctaBean.ctas}" />
					</div>
					
					<p:divider />
				</div>
				<div class="p-grid" style="width:100%">
					<div class="p-col-6" >
					
						<p:commandButton value="Remover Todos" icon="pi pi-trash"
						title="Remove todas as configurações."
						styleClass="ui-button-raised ui-button-danger ui-button-flat "
						action="#{ctaBean.removerTodosCTAs(true)}" update="@form, :growl"
						process="@this" 
						style="margin-bottom:1rem;" />
					</div>
					
					<div class="p-col-6 comandRight" >
					 	
						<p:commandButton value="Adicionar" icon="pi pi-plus"
						styleClass="ui-button-raised ui-button-success ui-button-flat"
						action="#{ctaBean.adicionarCTAs(true)}" update="@form :growl"
						style="margin-bottom:1rem;" />
					</div>
				</div>
				
				<p:dataTable id="tabela" class="table mt-3" stripedRows="true" reflow="true"
				var="cta" value="#{configPostBean.configPost.ctas}"
				rowKey="#{cta.id}" editable="true"  editMode="cell"
				rows="30" paginator="true"	paginatorAlwaysVisible="false" draggableRows="true" >
				
   				<p:ajax event="cellEdit" listener="#{ctaBean.onCellEdit}" update="form:tabela, :growl"/>
				
		    	<p:column headerText="Nome" responsivePriority="1">
					<p:cellEditor>
	                    <f:facet name="output">
	                        <h:outputText value="#{cta.nome}"/>
	                    </f:facet>
	                    <f:facet name="input">
	                        <p:inputText id="modelInput" value="#{cta.nome}" style="width:100%"/>
	                    </f:facet>
	                </p:cellEditor>
				</p:column>
				
				<p:column headerText="Finalidade" width="12rem">
					<p:cellEditor>
	                    <f:facet name="output">
	                        <h:outputText value="#{cta.finalidadeCta.nome}"/>
	                    </f:facet>
	                    <f:facet name="input">
	                        <p:selectOneMenu value="#{cta.finalidadeCta}" 
			                filter="true" filterMatchMode="contains" required="true" 
			                requiredMessage="A finalidade da Cta é obrigatória" >
			                    <f:selectItems value="#{finalidadeCtaBean.opcoes}" var="finalidadeCta" 
			                    itemLabel="#{finalidadeCta.nome}" itemValue="#{finalidadeCta}"/>
			                </p:selectOneMenu>
	                    </f:facet>
	                </p:cellEditor>
				</p:column>
				
				<p:column headerText="Remover" responsivePriority="1" style="width:4rem">
					<p:commandLink title="Remover o(a) #{ctaBean.nome} #{cta.nome}"
						action="#{ctaBean.removerPost(cta)}" update="@form, :growl"
						process="@this">
						<div class="buttonIcon">
							<i class="pi pi-trash despesa"></i>
						</div>
					</p:commandLink>
		
	            </p:column>
				
			</p:dataTable>
							
			</div>
		</div>
		<br/>
		<br/>
	</h:form>
	
</ui:decorate>
