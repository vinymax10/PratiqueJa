<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

<h:body>
	<ui:composition>

		<p:dialog id="dialogItemPost"
			widgetVar="wDialogItemPost"
			styleClass="col-12 md:col-10 md:col-offset-1 lg:col-8 lg:col-offset-2 xl:col-6 xl:col-offset-3 av-dlg"
			showHeader="false"
			showEffect="fade" hideEffect="fade" width="100%;" modal="true"
			responsive="true">

			<h:form id="formItemPost">

				<h:panelGroup layout="block" styleClass="av-dlg-inner">

					<div class="av-dlg-hero">
						<button type="button" class="av-dlg-hero-close"
							onclick="PF('wDialogItemPost').hide()" title="Fechar">
							<i class="pi pi-times" />
						</button>
						<span class="av-dlg-hero-eyebrow">
							<i class="#{pedidoPostBean.cadastroItem ? 'pi pi-plus-circle' : 'pi pi-pencil'}" />
							<h:outputText value="#{pedidoPostBean.cadastroItem ? 'Novo assunto' : 'Edição'}" />
						</span>
						<h3 class="av-dlg-hero-title">
							<h:outputText value="#{pedidoPostBean.cadastroItem ? 'Adicionar assunto' : 'Editar assunto'}" />
						</h3>
						<span class="av-dlg-hero-sub">
							<i class="pi pi-info-circle" />
							Escolha o assunto, o nível e quantos exercícios gerar. Em "Feed e reel", cada exercício vira 2 posts.
						</span>
					</div>

					<div class="av-dlg-body">
						<div class="ui-fluid gride">

							<h:panelGroup styleClass="campo col-12">
								<p:outputLabel for="@next" value="Assunto" />
								<p:selectOneMenu value="#{pedidoPostBean.item.assunto}"
									converter="generic" filter="true" filterMatchMode="contains"
									required="true" requiredMessage="Selecione um assunto.">
									<f:selectItem itemLabel="Selecione..." itemValue="#{null}" noSelectionOption="true" />
									<f:selectItems value="#{pedidoPostBean.assuntos}"
										var="assunto" itemLabel="#{assunto.nome}" itemValue="#{assunto}" />
								</p:selectOneMenu>
								<p:message for="@previous" display="text" />
							</h:panelGroup>

							<h:panelGroup styleClass="campo col-12 md:col-4">
								<p:outputLabel for="@next" value="Nível" />
								<p:selectOneMenu value="#{pedidoPostBean.item.nivel}">
									<f:selectItems value="#{pedidoPostBean.niveis}"
										var="nv" itemLabel="#{nv.nome}" itemValue="#{nv}" />
								</p:selectOneMenu>
							</h:panelGroup>

							<h:panelGroup styleClass="campo col-12 md:col-4">
								<p:outputLabel for="@next" value="Formato" />
								<p:selectOneMenu value="#{pedidoPostBean.item.formato}"
									required="true" requiredMessage="Selecione o formato.">
									<f:selectItems value="#{pedidoPostBean.formatos}"
										var="fmt" itemLabel="#{fmt.nome}" itemValue="#{fmt}" />
								</p:selectOneMenu>
								<p:message for="@previous" display="text" />
							</h:panelGroup>

							<h:panelGroup styleClass="campo col-12 md:col-4">
								<p:outputLabel for="@next" value="Exercícios" />
								<p:inputNumber minValue="1" maxValue="50" decimalPlaces="0"
									value="#{pedidoPostBean.item.quantidade}"
									required="true" requiredMessage="Informe a quantidade de exercícios." />
								<p:message for="@previous" display="text" />
							</h:panelGroup>

						</div>
					</div>

					<div class="av-dlg-footer">
						<p:commandButton value="Cancelar" type="button"
							styleClass="ui-button-flat ui-button-plain" icon="pi pi-times"
							onclick="PF('wDialogItemPost').hide()" />

						<p:commandButton id="btnSalvarItemPost"
							value="#{pedidoPostBean.cadastroItem ? 'Adicionar' : 'Salvar'}"
							icon="pi pi-check"
							styleClass="ui-button-raised ui-button-success"
							action="#{pedidoPostBean.salvarItem}"
							update="@form :form:listaItens :form:totalizador :growl"
							process="@form"
							oncomplete="if (args &amp;&amp; !args.validationFailed) PF('wDialogItemPost').hide()">
							<p:defaultCommand target="btnSalvarItemPost" />
						</p:commandButton>
					</div>

				</h:panelGroup>

			</h:form>

		</p:dialog>

	</ui:composition>
</h:body>
</html>
