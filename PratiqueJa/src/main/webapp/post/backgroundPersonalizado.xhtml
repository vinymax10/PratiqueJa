<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

	<f:metadata>
	    <f:viewParam name="configPost" value="#{configPostBean.idConfigPost}" converter="jakarta.faces.Long"/>
	    <f:viewAction action="#{configPostBean.carregarConfigPost()}" />
	</f:metadata>
			   
    <div class="grid" style="display: flex; align-items: flex-end; gap: 2rem;margin:0 30px;">
		<h2>Background Personalizado</h2>
		<h5>Usuário: #{configPostBean.configPost.usuario.nome}</h5>
		<ui:include src="/post/tabMenu.xhtml" />
    </div>
    		    
    <h:form id="form" >
	    <div class="p-d-flex" style="margin:0 30px;">
			
	    	<div class="grid" style="margin:0; width:100%;">
				
			    <p:remoteCommand name="rcFeed" actionListener="#{imagemPostBean.changeActiveIndex}" 
		        update="form:galeriaFeed" oncomplete="PF('galleriaFeed').show()" />
			    
			    <p:remoteCommand name="rcReel" actionListener="#{imagemPostBean.changeActiveIndex}" 
		        update="form:galeriaReel" oncomplete="PF('galleriaReel').show()" />
			    
			    <div class="ui-fluid formgrid grid" style="width:100%;margin-top:1rem;">
					<div class="col-12 xl:col-6" style="padding: 1rem;">
			    		<p:fieldset legend="Background Feed" style="margin-bottom:1rem;width:100%;" >
							<p:staticMessage styleClass="mt-2" severity="info" summary="Detalhes do arquivo" display="text"
				       		detail="O background do Feed deve ter o formato png ou jpg e ter a resolução de 1080 x 1350 pixels. Se o upload for realizado em um tamanho diferente, o sistema fará o redimensionamento da imagem, o que pode causar distorções." 
				       		style="background: #ecf1ff !important;margin:15px 0 0 0;width: 100%"/>
				    		<div class="campo p-col-8 ">
								<p:fileUpload id="upload"  
								listener="#{imagemPostBean.uploadFeed}" 
					    		label="Escolha um arquivo."
						    	invalidFileMessage="São permitidos somente arquivos png."
								invalidSizeMessage="O tamanho máximo permitido é de 10MB."
						    	auto="true"
						    	disabled="#{!imagemPostBean.podeFazerUpload(true)}"
						    	update="form"
						    	>
						    		<p:validateFile  sizeLimit="5002400" virusScan="true" 
									allowTypes="/(\.|\/)(gif|jpe?g|png)$/"/>
								</p:fileUpload>
							</div>
							<p:galleria id="galeriaFeed" widgetVar="galleriaFeed" activeIndex="#{imagemPostBean.activeIndex}"
							value="#{imagemPostBean.imagemPost(true)}" var="image" 
							 numVisible="7" fullScreen="true"
			                    circular="true"  showItemNavigators="true" 
			                    showThumbnails="true" style="max-width: 400px">
						            <p:graphicImage value="#{image.endImagem}" alt="#{image.nome}" style="width: 80px; display: block;" />

					        </p:galleria>
					
					        <div class="grid" style="max-width: 100%">
					            <h:panelGroup id="imagesFeed" style="display: contents">
						            <ui:repeat value="#{imagemPostBean.imagemPost(true)}"
						            var="image" varStatus="status">
						            	<div id="card-saldo" class="card">
						                	<p:commandLink styleClass="ui-panel-titlebar-icon ui-corner-all ui-state-default"
								             action="#{imagemPostBean.remover(image)}" 
								             update="form, :growl"
								             style="text-align: right;color:#495057">
							                    <i class="pi pi-times" style="line-height: 1.4;"></i>
								            </p:commandLink>
           						            
           						            <p:graphicImage value="#{image.endImagem}" alt="#{image.nome}" style="width: 80px; display: block;" />
						                
						                </div>
						            </ui:repeat>
					            </h:panelGroup>
					        </div>
			    		</p:fieldset>
			    	</div>
			    	
					<div class="col-12 xl:col-6" style="padding: 1rem;">
			    		<p:fieldset legend="Background Reel" style="margin-bottom:1rem;width:100%;" >
				    		<p:staticMessage styleClass="mt-2" severity="info" summary="Detalhes do arquivo" display="text"
				       		detail="O background do Reel deve ter o formato png ou jpg e ter a resolução de 1080 x 1920 pixels. Se o upload for realizado em um tamanho diferente, o sistema fará o redimensionamento da imagem, o que pode causar distorções." 
				       		style="background: #ecf1ff !important;margin:15px 0 0 0;width: 100%"/>
				    		<div class="campo p-col-8 ">
								<p:fileUpload listener="#{imagemPostBean.uploadReel}" 
					    		label="Escolha um arquivo."
						    	invalidFileMessage="São permitidos somente arquivos png."
								invalidSizeMessage="O tamanho máximo permitido é de 10MB."
						    	auto="true"
						    	disabled="#{!imagemPostBean.podeFazerUpload(false)}"
						    	update="form"
						    	>
						    		<p:validateFile  sizeLimit="5002400" virusScan="true" 
									allowTypes="/(\.|\/)(gif|jpe?g|png)$/"/>
								</p:fileUpload>
							</div>
							<p:galleria id="galeriaReel" widgetVar="galleriaReel" activeIndex="#{imagemPostBean.activeIndex}"
							value="#{imagemPostBean.imagemPost(false)}" var="image" 
							numVisible="7" fullScreen="true"
		                    circular="true"  showItemNavigators="true" 
		                    showThumbnails="true" style="max-width: 400px">
						            
					            <p:graphicImage value="#{image.endImagem}" alt="#{image.nome}" style="width: 80px; display: block;" />

					        </p:galleria>
					
					        <div class="grid" style="max-width: 100%">
					            <h:panelGroup id="imagesReel" style="display: contents">
						            <ui:repeat value="#{imagemPostBean.imagemPost(false)}"
						            var="image" varStatus="status">
						            	<div id="card-saldo" class="card">
						                	<p:commandLink styleClass="ui-panel-titlebar-icon ui-corner-all ui-state-default"
								             action="#{imagemPostBean.remover(image)}" 
								             update="form, :growl"
								             style="text-align: right;color:#495057">
							                    <i class="pi pi-times" style="line-height: 1.4;"></i>
								            </p:commandLink>
         						            
         						            <p:graphicImage value="#{image.endImagem}" alt="#{image.nome}" style="width: 80px; display: block;" />
								            
						                </div>
						            </ui:repeat>
					            </h:panelGroup>
					        </div>
			    		</p:fieldset>
			    	</div>
		    	</div>
		            
			    				
			</div>
		</div>
		<br/>
		<br/>
	</h:form>
</ui:decorate>
