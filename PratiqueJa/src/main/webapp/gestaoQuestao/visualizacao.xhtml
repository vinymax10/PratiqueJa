<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

<h:body >
	<ui:composition>
		    
	    <p:tab  title="Visualização" rendered="#{!gestaoQuestaoBean.cadastro}">
		    <div class="ui-fluid p-formgrid p-grid">
			    <div class="p-field p-col-10 ">
				    <h:outputText class="titleQuestao"	value="Disciplina: " />
				    <h:outputText class="titleQuestaoText" value="#{gestaoQuestaoBean.questao.disciplina.nome}" />
				    
				    
					<h:outputText class="titleQuestao"	value="Assuntos: " />
					<ui:repeat value="#{gestaoQuestaoBean.questao.assuntos}" var="assunto" >
					    <h:outputText class="titleQuestaoText" value="#{assunto.nome}" />
					</ui:repeat>
					
					<h:outputText class="titleQuestao"	value="Dificuldade: " />
				    <h:outputText class="titleQuestaoText" value="#{gestaoQuestaoBean.questao.dificuldade.nome}" />
					
				    <h:outputText class="titleQuestao"	value="Chave: " />
				    <h:outputText class="titleQuestaoText" value="#{gestaoQuestaoBean.questao.chave}" />
				    
				    <h:outputText class="titleQuestao"	value="Ordem: " />
				    <h:outputText class="titleQuestaoText" value="#{gestaoQuestaoBean.questao.ordemInsercao}" />
				    
				    <h:outputText class="titleQuestao"	value="Revisada: " />
				    <h:outputText id="revisada" class="titleQuestaoText" value="#{gestaoQuestaoBean.questao.revisada}" converter="simNaoConverter"/>
				    
				    <h:outputText class="titleQuestao"	value="Assunto Curso: " />
  					    <h:outputText class="titleQuestaoText" value="#{gestaoQuestaoBean.questao.assuntoCurso.nome}" />
				    
				    <br/>
					<br/>
				    
					<h:outputText class="titleQuestao" value="Q#{gestaoQuestaoBean.questao.id}" style="margin-right:1rem;"/>
					
				    <h:outputText class="titleQuestao" value="Ano: " />
				    <h:outputText class="titleQuestaoText" value="#{gestaoQuestaoBean.questao.ano.nome}" />
				    
				    <h:outputText class="titleQuestao" value="Banca: " />
				    <h:outputText class="titleQuestaoText" value="#{gestaoQuestaoBean.questao.banca.sigla}" />
					
				    <h:outputText class="titleQuestao"	value="Orgão: " />
				    <h:outputText class="titleQuestaoText" value="#{gestaoQuestaoBean.questao.orgao.sigla}" />
				    
				     <h:outputText class="titleQuestao"	value="Prova: " />
				    <h:outputText class="titleQuestaoText" value="#{gestaoQuestaoBean.questao.prova}" />
				</div>

				<div class="p-field p-col-1 ">
					<p:commandButton  value="Inserir Ponto" styleClass="ui-button-raised ui-button-flat"  
					action="#{gestaoQuestaoBean.inserirPonto()}" update="@form, :growl"  process="@form"	/>
				</div>								
		    </div>
			<p:divider />
		
			<ui:repeat value="#{gestaoQuestaoBean.questao.paragrafos}" var="paragrafo" >
				
			    <h:outputText style="display:block;margin-bottom:1rem;" 
				value="#{paragrafo.texto}" rendered="#{!paragrafo.tipoImagem}" />
			
				<p:graphicImage  value="#{paragrafo.imagemFile.imagem()}" 
				cache="false" stream="false" rendered="#{paragrafo.tipoImagem}"
       			style="margin-bottom:1rem;">
				</p:graphicImage>
			</ui:repeat>
						
			<ui:repeat id="alt" value="#{gestaoQuestaoBean.questao.alternativas}" var="alternativa" varStatus="statusAlt" >
		        <h:panelGrid columns="3" cellpadding="5" style="color: #495057;">
				
					<h:outputLabel  value="#{alternativa.letra})"
					style="font-weight: bold;"/>
					<h:outputLabel  value="#{alternativa.texto}"	/>
				
		        </h:panelGrid>
			</ui:repeat>
			
			<h:outputLabel  value="Alternativa #{gestaoQuestaoBean.questao.correta().letra}" 
			style="margin:20px 0;color:var(--verde); font-weight: bold; display:block;"/>
			
			<p:divider />
			
			<div class="ui-fluid p-formgrid p-grid">
													
				 <div class="field col-6">
					<p:outputLabel for="@next" value="Resolução"/>
					<p:inputTextarea rows="10" value="#{gestaoQuestaoBean.questao.resolucao}"  />
				</div>
				<div class="field col-6">
					<p:outputLabel  for="@next" value="Resolução" style="display:block;margin-bottom:15px;"/>
					<p:outputLabel id="resolucao"  value="#{gestaoQuestaoBean.questao.resolucao}"/>
				</div>
				
			</div>
			
			<p:divider />
			
			<div class="p-grid" style="margin-top:1rem">
			
				<div class="p-col-12 p-text-right" >
				
					<p:commandButton id="salvarResolucao" value="Salvar" 
					styleClass="ui-button-raised ui-button-flat" icon="pi pi-check" 
					rendered="#{!gestaoQuestaoBean.cadastro}"	action="#{gestaoQuestaoBean.salvar}"
					update="@form, :growl"  process="@form" oncomplete="reloadMathJax();"	>
					</p:commandButton>
				</div>
			</div>
      	</p:tab>
	</ui:composition>		
</h:body>
</html>
