<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui" template="/template/template.xhtml">

	<f:metadata>
	    <f:viewParam name="questao" value="#{gestaoQuestaoBean.idQuestao}" converter="jakarta.faces.Integer"  />
	    <f:viewParam name="tab" value="#{gestaoQuestaoBean.activeIndex}" converter="jakarta.faces.Integer" />
	    <f:viewAction action="#{gestaoQuestaoBean.init()}"  />
	</f:metadata>

	<h:form id="form" style="margin-bottom:0">
		<div class="p-d-flex">
			<div class="p-grid" style="margin: 0 15px; width: 100%;">

				<div class="p-col-12">
					<h2>Questões</h2>
				</div>

				<p:tabView activeIndex="#{gestaoQuestaoBean.activeIndex}" id="questao"
				cache="false" dynamic="true" onTabShow="reloadMathJax();"
				style="width: 100%;">
				
					<ui:include src="/gestaoQuestao/gerais.xhtml" />
					
					<ui:include src="/gestaoQuestao/paragrafo.xhtml" />
					
					<ui:include src="/gestaoQuestao/alternativa.xhtml" />
					
					<ui:include src="/gestaoQuestao/visualizacao.xhtml" />
				
				</p:tabView>
			</div>
		</div>
	</h:form>


</ui:decorate>
