<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:body>
		<ui:composition>
			<div id="filtros" style="width: 100%;display:none;">

				<p:card class="newBorder mb-4" style="width: 100%;">
					<div class="ui-fluid gride" >
						<h4 class="title-card">Filtro</h4>

						<div class="campo col-12 md:col-6 lg:col-5 xl:col-3">
							<p:outputLabel for="@next" value="Sigla" />
							<p:inputText value="#{orgaoBean.filtro.sigla}"
							placeholder="Sigla" />
						</div>

						<div class="campo col-12 md:col-6 lg:col-5 xl:col-2">
							<p:outputLabel for="@next" value="Ativo" />
							<p:selectOneMenu value="#{orgaoBean.filtro.ativo}"
							filter="true" filterMatchMode="contains">
								<f:selectItem itemLabel="Selecione" itemValue="#{null}" noSelectionOption="true" />
								<f:selectItem itemLabel="Sim" itemValue="#{true}" />
								<f:selectItem itemLabel="Não" itemValue="#{false}" />
							</p:selectOneMenu>
						</div>

					</div>

					<div class="content-button-right" >

						<div class="divisor" ></div>

						<p:commandButton value="Limpar"
						styleClass="ui-button-flat ui-button-plain"
						icon="fa-solid fa-eraser" oncomplete="manterFiltroAberto('filtros');"
						action="#{orgaoBean.filtrarInit}" update="@form" >
						</p:commandButton>

						<p:commandButton id="filtrar" value="Filtrar"
						styleClass="ui-button-raised ui-button-primary"
						icon="pi pi-search" oncomplete="manterFiltroAberto('filtros');"
						action="#{orgaoBean.filtrar}" update="@form, :growl" process="@form" >
							<p:defaultCommand target="form:filtrar" />
						</p:commandButton>

					</div>

				</p:card>
			</div>
		</ui:composition>
	</h:body>
</html>
