<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui" template="/template/template.xhtml">

	<f:metadata>
	    <f:viewParam name="questao" value="#{gestaoQuestaoBean.idQuestao}" converter="jakarta.faces.Integer"  />
	    <f:viewParam name="tab" value="#{gestaoQuestaoBean.activeIndex}" converter="jakarta.faces.Integer" />
	    <f:viewAction action="#{gestaoQuestaoBean.init()}"  />
	</f:metadata>

	<h:form id="form" style="margin-bottom:0">
		<div class="p-d-flex">
			<div class="p-grid" style="margin: 0 15px; width: 100%;">

				<div class="p-col-12">
					<h2>Questões</h2>
				</div>

				<p:commandButton value="Adicionar" icon="pi pi-plus"
					styleClass="ui-button-raised ui-button-success ui-button-flat"
					action="#{gestaoQuestaoBean.cadastrar}" update="@form" process="@this"
					style="margin-bottom:1rem;" />

				<p:panel header="Filtro" toggleable="true" closable="true"
					toggleSpeed="500" closeSpeed="500" widgetVar="panel"
					style="margin-bottom:1rem;">

					<div class="ui-fluid formgrid grid">
						<div class="field col-12 xl:col-6">
							<p:outputLabel for="@next" value="Banca" />
							<p:selectOneMenu value="#{gestaoQuestaoBean.filtroQuestao.banca}"
								converter="generic" filter="true" filterMatchMode="contains">
								<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
								<f:selectItems value="#{bancaBean.lista}" var="banca"
									itemLabel="#{banca.nomeReduzido}" itemValue="#{banca}" />
							</p:selectOneMenu>
						</div>

						<div class="field col-12 xl:col-6">
							<p:outputLabel for="@next" value="Órgão" />
							<p:selectOneMenu value="#{gestaoQuestaoBean.filtroQuestao.orgao}"
								converter="generic" filter="true" filterMatchMode="contains">
								<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
								<f:selectItems value="#{orgaoBean.lista}" var="orgao"
									itemLabel="#{orgao.nomeReduzido}" itemValue="#{orgao}" />
							</p:selectOneMenu>
						</div>
						
						<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
							<p:outputLabel for="@next" value="Disciplina" />
							<p:selectOneMenu value="#{gestaoQuestaoBean.filtroQuestao.disciplina}"
								converter="generic">
								<f:ajax event="change" process="@this" render="assunto" />
								<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
								<f:selectItems value="#{disciplinaBean.disciplinas}"
									var="disciplina" itemLabel="#{disciplina.nome}"
									itemValue="#{disciplina}" />
							</p:selectOneMenu>
						</div>

						<div class="field col-12 xl:col-10">
							<h:panelGroup id="assunto">
								<p:outputLabel for="@next" value="Assunto" />
								<p:selectOneMenu value="#{gestaoQuestaoBean.filtroQuestao.assunto}"
								
									converter="generic" filter="true" filterMatchMode="contains"
									style="margin-top: .5rem;">
									<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
									<f:selectItems value="#{gestaoQuestaoBean.filtroQuestao.disciplina.assuntos}"
										var="assunto" itemLabel="#{assunto.nome}"
										itemValue="#{assunto}" />
								</p:selectOneMenu>

							</h:panelGroup>
						</div>

						<div class="field col-12 md:col-6 lg:col-4">
							<p:outputLabel for="@next" value="Assunto Curso" />
							<p:selectOneMenu value="#{gestaoQuestaoBean.filtroQuestao.assuntoCurso}"
								converter="generic" filter="true" filterMatchMode="contains">
								<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
								<f:selectItems value="#{assuntoCursoBean.listaAtivas}"
									var="assuntoCurso" itemLabel="#{assuntoCurso.nome}"
									itemValue="#{assuntoCurso}" />
							</p:selectOneMenu>
						</div>

						<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
							<p:outputLabel for="@next" value="Ano" />
							<p:selectOneMenu value="#{gestaoQuestaoBean.filtroQuestao.ano}" converter="generic">
								<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
								<f:selectItems value="#{anoBean.lista}" var="ano"
									itemLabel="#{ano.nome}" itemValue="#{ano}" />
							</p:selectOneMenu>
						</div>

						<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
							<p:outputLabel for="@next" value="Dificuldade" />
							<p:selectOneMenu value="#{gestaoQuestaoBean.filtroQuestao.dificuldade}">
								<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
								<f:selectItems value="#{dificuldadeBean.opcoes}" var="opcao"
									itemLabel="#{opcao.nome}" itemValue="#{opcao}" />
							</p:selectOneMenu>
						</div>

						<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
							<p:outputLabel for="@next" value="Revisada" />
							<p:selectOneMenu value="#{gestaoQuestaoBean.filtroQuestao.revisada}">
								<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
								<f:selectItem itemLabel="Sim" itemValue="#{true}" />
								<f:selectItem itemLabel="Não" itemValue="#{false}" />
							</p:selectOneMenu>
						</div>
						
						<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
							<p:outputLabel for="@next" value="Tem Resolução em Latex" />
							<p:selectOneMenu value="#{gestaoQuestaoBean.filtroQuestao.resolucaoLatex}">
								<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
								<f:selectItem itemLabel="Sim" itemValue="#{true}" />
								<f:selectItem itemLabel="Não" itemValue="#{false}" />
							</p:selectOneMenu>
						</div>
						
						<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
							<label for="@next">ID</label>
							<p:inputText value="#{gestaoQuestaoBean.filtroQuestao.id}" />
						</div>

						<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
							<label for="@next">Chave</label>
							<p:inputText value="#{gestaoQuestaoBean.filtroQuestao.chave}" />
						</div>

						<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
							<label for="@next">Ordem Inserção</label>
							<p:inputText value="#{gestaoQuestaoBean.filtroQuestao.ordemInsercao}" />
						</div>
						
						<div class="field col-12 xl:col-6">
							<p:outputLabel for="@next" value="Conteúdo" />
							<p:inputText
								value="#{gestaoQuestaoBean.filtroQuestao.conteudo}" />
						</div>

					</div>

					<p:divider />

					<div class="p-grid" style="margin-top: 1rem">

						<div class="p-col-12 p-text-right">

							<p:commandButton id="filtrar" value="Filtrar"
							styleClass="ui-button-raised ui-button-flat" oncomplete="reloadMathJax();"
							icon="pi pi-search" action="#{gestaoQuestaoBean.filtrar}"
							update="@form, :growl" process="@form" >
								<p:defaultCommand target="form:filtrar"/>
							</p:commandButton>
						</div>

					</div>

				</p:panel>

				<p:panel header="Carregamento" toggleable="true" closable="true"
					toggleSpeed="500" closeSpeed="500" widgetVar="panel"
					style="margin-bottom:1rem;">

					<div class="ui-fluid  p-grid">
						<div class="p-field p-col-3 ">
							<label for="@next">Início</label>
							<p:inputNumber value="#{gestaoQuestaoBean.inicioCarregamento}"
								required="true"
								requiredMessage="Por favor informe um início para o carregamento"
								decimalPlaces="0" />
						</div>

						<div class="p-field p-col-3 ">
							<label for="@next">Fim</label>
							<p:inputNumber value="#{gestaoQuestaoBean.fimCarregamento}"
								required="true"
								requiredMessage="Por favor informe um fim para o carregamento"
								decimalPlaces="0" />
						</div>

					</div>

					<p:divider />

					<div class="p-grid" style="margin-top: 1rem">

						<div class="p-col-12 p-text-right">

							<p:commandButton value="Carregar"
								styleClass="ui-button-raised ui-button-flat"
								icon="pi pi-upload"
								action="#{gestaoQuestaoBean.adicionarQuestoesSalvas}"
								update="@form, :growl" />
						</div>

					</div>

				</p:panel>
				
				<ui:include src="/questao/barraNavegacao.xhtml" />
			
				<ui:include src="/questao/listaQuestoes.xhtml" />
	
				<ui:include src="/questao/barraNavegacao.xhtml" />
					
			</div>
		</div>
	</h:form>


</ui:decorate>
