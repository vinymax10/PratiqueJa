<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">
	
	<h:body >
		<ui:composition>
	
			<p:panel id="assunto" rendered="#{!disciplinaBean.cadastro}" header="Assuntos" >

				<h:panelGroup id="fomularioAssunto" rendered="#{!assuntoBean.lista}">
					<div class="ui-fluid p-formgrid p-grid">
						<div class="p-field p-col-4 ">
							<label for="@next">Nome</label>
							 <p:inputText value="#{assuntoBean.assunto.nome}" required="true"
							 requiredMessage="Por favor informe um nome para o assunto."/>
						</div>

					</div>
					
					<p:divider />
					
					<div class="p-grid" style="margin-top:1rem">
					
						<div class="p-col-6" >
							
							<p:commandButton  value="Remover"    icon="pi pi-trash" 
							styleClass="ui-button-raised ui-button-danger ui-button-flat" 
							action="#{assuntoBean.remover}" update="@form, :growl"  process="@this" rendered="#{!assuntoBean.cadastro}"/>
							
						</div>
						<div class="p-col-6 p-text-right" >
					
							<p:commandButton value="Voltar"  action="#{assuntoBean.setLista(true)}" icon="pi pi-chevron-left" process="@this"
							update="@form" style="margin-right:15px;" styleClass="ui-button-raised ui-button-secondary ui-button-flat" />
							
							<p:commandButton  value="Adicionar"   class="p-text-right"  icon="pi pi-check" 
							styleClass="ui-button-raised ui-button-success ui-button-flat" 
							action="#{assuntoBean.adicionar}" update="@form, :growl"  process="@form" rendered="#{assuntoBean.cadastro}"/>
							
							<p:commandButton  value="Salvar" styleClass="ui-button-raised ui-button-flat" icon="pi pi-check" 
							rendered="#{!assuntoBean.cadastro}"	action="#{assuntoBean.salvar}" update="@form, :growl"  process="@form"	/>
						</div>
						
						<div class="p-col-12" >
							<p:messages redisplay="false" showDetail="false" closable="true"/>
						</div>
						
					</div>
					
				</h:panelGroup>
				
				<h:panelGroup id="filtroAssunto" rendered="#{assuntoBean.lista}">
						
					<p:commandButton  value="Adicionar"  icon="pi pi-plus" styleClass="ui-button-raised ui-button-success ui-button-flat" 
					action="#{assuntoBean.cadastrar}" update="@form"  process="@this" style="margin-bottom:1rem;"	/>
					
				    <p:dataTable  class="table table-striped" var="assunto" value="#{disciplinaBean.disciplina.assuntos}" 
				    selection="#{assuntoBean.assunto}" selectionMode="single" rowKey="#{assunto.id}">
				    	<p:ajax event="rowSelect" update="@form" listener="#{assuntoBean.onSelected}"/>
				    
						<p:column headerText="Nome">
							<h:outputText value="#{assunto.nome}" />
						</p:column>
					</p:dataTable>
					
				</h:panelGroup>
			
			</p:panel>
				
		</ui:composition>		
	</h:body>
</html>
