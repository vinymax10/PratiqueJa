<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">
	

	<div class="p-d-flex">
		<p:card style="width:100%;">
		
			<f:facet name="title" >
		        Disciplina
		    </f:facet>
		    
		    <h:form id="form" style="margin-bottom:0">
		    
				<h:panelGroup id="fomulario" rendered="#{!disciplinaBean.lista}">
					<div class="ui-fluid p-formgrid p-grid">
						<div class="p-field p-col-4 ">
							<label for="@next">Texto</label>
							 <p:inputText value="#{disciplinaBean.disciplina.nome}" required="true"
							 requiredMessage="Por favor informe um texto para a Questão."/>
						</div>

					</div>
					
					<ui:include src="/gestaoQuestao/configuracao/disciplina/assunto.xhtml" />
					
					
					<h:panelGroup rendered="#{assuntoBean.lista}">
						<div class="p-grid" style="margin-top:1rem">
						
							<div class="p-col-6" >
								
								<p:commandButton  value="Remover"    icon="pi pi-trash" 
								styleClass="ui-button-raised ui-button-danger ui-button-flat" 
								action="#{disciplinaBean.remover}" update="@form, :growl"  process="@this" rendered="#{!disciplinaBean.cadastro}"/>
								
							</div>
							<div class="p-col-6 p-text-right" >
							
								<p:commandButton value="Voltar"  action="#{disciplinaBean.setLista(true)}" 
								icon="pi pi-chevron-left" process="@this"
								update="@form" style="margin-right:15px;" styleClass="ui-button-raised ui-button-secondary ui-button-flat" />
								
								<p:commandButton  value="Adicionar"   icon="pi pi-check" 
								styleClass="ui-button-raised ui-button-success ui-button-flat" 
								action="#{disciplinaBean.adicionar}" update="@form, :growl"  process="@form" rendered="#{disciplinaBean.cadastro}"/>
								
								<p:commandButton  value="Salvar" styleClass="ui-button-raised ui-button-flat" icon="pi pi-check" 
								rendered="#{!disciplinaBean.cadastro}"	action="#{disciplinaBean.salvar}" update="@form, :growl"  process="@form"	/>
							</div>
							
							<div class="p-col-12" >
								<p:messages id="messages" redisplay="false" showDetail="false" closable="true"/>
							</div>
						</div>
					</h:panelGroup>
					
				</h:panelGroup>
				
				<h:panelGroup id="filtro" rendered="#{disciplinaBean.lista}">
						
					<p:commandButton  value="Adicionar"  icon="pi pi-plus" styleClass="ui-button-raised ui-button-success ui-button-flat" 
					action="#{disciplinaBean.cadastrar}" update="@form"  process="@this" style="margin-bottom:1rem;"	/>
					
				    <p:dataTable id="tabela" class="table table-striped" var="disciplina" value="#{disciplinaBean.disciplinas}" 
				    selection="#{disciplinaBean.disciplina}" selectionMode="single" rowKey="#{disciplina.id}">
				    	<p:ajax event="rowSelect" update="@form" listener="#{disciplinaBean.onSelected}"/>
				    
						<p:column headerText="Nome" >
							<f:facet name="header" >Nome</f:facet>
							<h:outputText value="#{disciplina.nome}" />
						</p:column>
					</p:dataTable>
					
				</h:panelGroup>
			
			</h:form>
					
		</p:card>
	</div>
	
	
</ui:decorate>
