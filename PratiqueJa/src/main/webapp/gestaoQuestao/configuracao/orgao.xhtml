<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui" template="/template/template.xhtml">


	<div class="p-d-flex">
		<p:card style="width:100%;">
			<f:facet name="title">
		        #{orgaoBean.nome}
		    </f:facet>
			<h:form style="margin-top:2rem ">
				<div class="ui-fluid formgrid grid">
					<div class="field col-12 xl:col-8">

						<p:inputText label="Nome" name="Nome"
							value="#{orgaoBean.entidadeNova.nome}" placeholder="Nome"
							required="true"
							requiredMessage="Por favor informe um nome para o #{orgaoBean.nome}.">
						</p:inputText>
					</div>

					<div class="field col-12 lg:col-6 xl:col-4">
						<p:inputText label="Sigla" name="Sigla"
							value="#{orgaoBean.entidadeNova.sigla}" placeholder="sigla"
							required="true"
							requiredMessage="Por favor informe um nome para o #{orgaoBean.nome}.">
						</p:inputText>
					</div>

				</div>
				<p:divider />

				<div class="p-grid " style="margin: 1rem 0">
					<div class="p-col-12 p-text-right">
						<p:commandButton value="Adicionar" icon="pi pi-plus"
							styleClass="ui-button-raised ui-button-success ui-button-flat"
							action="#{orgaoBean.adicionar}"
							update="@form, form:tabela, :growl" process="@form" />
					</div>
				</div>
				<p:messages id="messages" redisplay="false" showDetail="false"
					closable="true" />
			</h:form>

			<h:form id="form">

				<p:panel header="Filtro" toggleable="true" closable="true"
					toggleSpeed="500" closeSpeed="500" widgetVar="panel"
					style="margin-bottom:1rem;">

					<div class="ui-fluid formgrid grid">
						<div class="field col-12 xl:col-8">
							<p:outputLabel for="@next" value="Nome" />
							<p:inputText value="#{orgaoBean.nomeFiltro}" placeholder="Nome" />
						</div>

						<div class="field col-12 lg:col-6 xl:col-4">
							<p:outputLabel for="@next" value="Nome" />
							<p:inputText value="#{orgaoBean.siglaFiltro}" placeholder="Sigla" />
						</div>

					</div>

					<p:divider />

					<div class="p-grid" style="margin-top: 1rem">

						<div class="p-col-6 ">

							<p:commandButton value="Procurar Concomitância"
								styleClass="ui-button-raised ui-button-flat" icon="pi pi-search"
								action="#{orgaoBean.procurarConcomitancia}"
								update="@form, :growl" process="@form" />

						</div>
						<div class="p-col-6 p-text-right">

							<p:commandButton value="Filtrar"
								styleClass="ui-button-raised ui-button-flat" icon="pi pi-search"
								action="#{orgaoBean.filtrar}" update="@form, :growl"
								process="@form" />
						</div>

					</div>

				</p:panel>

				<p:dataTable id="tabela" class="table table-striped" var="entidade"
					value="#{orgaoBean.listaBusca}" paginator="true" rows="20">
					<p:column headerText="Nome">
						<div class="p-grid ui-fluid" style="margin: 0">
							<div class="p-col-12 " style="padding: 0">
								<h:outputText value="#{entidade.nome}"
									rendered="#{entidade.id!=orgaoBean.entidade.id}"
									style="margin-left:10px;" />

								<p:inputText value="#{orgaoBean.entidade.nome}"
									placeholder="Nome" required="true"
									requiredMessage="Por favor informe um nome para o #{orgaoBean.nome}."
									rendered="#{entidade.id==orgaoBean.entidade.id}">
								</p:inputText>
							</div>
						</div>
					</p:column>

					<p:column headerText="Sigla" width="30rem">
						<div class="p-grid ui-fluid" style="margin: 0">
							<div class="p-col-12 " style="padding: 0">
								<h:outputText value="#{entidade.sigla}"
									rendered="#{entidade.id!=orgaoBean.entidade.id}"
									style="margin-left:10px;" />

								<p:inputText value="#{orgaoBean.entidade.sigla}"
									placeholder="Sigla" required="true"
									requiredMessage="Por favor informe um nome para o #{orgaoBean.nome}."
									rendered="#{entidade.id==orgaoBean.entidade.id}">
								</p:inputText>
							</div>
						</div>
					</p:column>

					<p:column headerText="Ações" width="14rem">

						<p:commandButton value="Editar" update="@form, :growl"
							style="margin-right:1rem;"
							styleClass="ui-button-raised ui-button-flat"
							action="#{orgaoBean.editar(entidade)}" icon="pi pi-user-edit"
							rendered="#{entidade.id!=orgaoBean.entidade.id}" />

						<p:commandButton value="Salvar"
							styleClass="ui-button-raised ui-button-success ui-button-flat"
							icon="pi pi-check" action="#{orgaoBean.salvar}" process="@form"
							update="@form, :growl"
							rendered="#{entidade.id==orgaoBean.entidade.id}"
							style="margin-right:1rem;" />

						<p:commandButton look="danger" value="Remover"
							update="form:tabela, :growl"
							action="#{orgaoBean.remover(entidade)}" icon="pi pi-trash"
							styleClass="ui-button-raised ui-button-danger ui-button-flat"
							rendered="#{entidade.id!=orgaoBean.entidade.id}">
							<p:confirm header="Confirmação" icon="pi pi-info-circle"
								message="Você tem certeza que deseja remover o #{orgaoBean.nome} #{entidade.nome}?" />
						</p:commandButton>

						<p:commandButton value="Cancelar"
							styleClass="ui-button-raised ui-button-secondary ui-button-flat"
							icon="pi pi-times" action="#{orgaoBean.cancelar}" process="@this"
							update="@form, :growl"
							rendered="#{entidade.id==orgaoBean.entidade.id}" />

						<p:confirmDialog global="true" showEffect="fade" hideEffect="fade"
							responsive="true" >
							<p:commandButton value="Não" type="button"
								styleClass="ui-confirmdialog-no ui-button-flat" />
							<p:commandButton value="Sim" type="button"
								styleClass="ui-confirmdialog-yes" />
						</p:confirmDialog>

					</p:column>
				</p:dataTable>

				<p:messages id="messages" redisplay="false" showDetail="false"
					closable="true" />
			</h:form>
		</p:card>
	</div>


</ui:decorate>
