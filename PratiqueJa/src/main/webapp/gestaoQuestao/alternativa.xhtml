<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">
	
	<h:body >
		<ui:composition>
			
			<p:tab title="Alternativas" rendered="#{!gestaoQuestaoBean.cadastro}">
			
	
				<h:panelGroup id="fomularioAssunto" rendered="#{!alternativaBean.lista}">
					<div class="ui-fluid p-formgrid p-grid">
						<div class="p-field p-col-10 ">
							<label for="@next">Texto</label>
							 <p:inputText value="#{alternativaBean.alternativa.texto}" required="true"
							 requiredMessage="Por favor informe um nome para a alternativa."/>
						</div>
						
						<div class="p-field p-col-2 ">
							<label for="@next">Correta</label>
							<p:selectBooleanButton value="#{alternativaBean.alternativa.correta}" 
							onLabel="Sim" offLabel="Não" style="width:6rem;display:block;"/>
						</div>
					</div>
					
					<p:divider />
					
					<div class="p-grid" style="margin-top:1rem">
					
						<div class="p-col-6" >
							
							<p:commandButton  value="Remover"    icon="pi pi-trash" process="@this"
							styleClass="ui-button-raised ui-button-danger ui-button-flat" 
							action="#{alternativaBean.remover}" update="@form, :growl" rendered="#{!alternativaBean.cadastro}" />
							
						</div>
						<div class="p-col-6 p-text-right" >
					
							<p:commandButton value="Voltar"  action="#{alternativaBean.setLista(true)}" icon="pi pi-chevron-left" process="@this"
							update="@form" style="margin-right:15px;" styleClass="ui-button-raised ui-button-secondary ui-button-flat" />
							
							<p:commandButton id="adicionarAlternativa" value="Adicionar"   class="p-text-right"  icon="pi pi-check" 
							styleClass="ui-button-raised ui-button-success ui-button-flat" 
							action="#{alternativaBean.adicionar}" update="@form, :growl"  process="@form" rendered="#{alternativaBean.cadastro}">
								<p:defaultCommand target="form:questao:adicionarAlternativa"/>
							</p:commandButton>
							
							<p:commandButton id="salvarAlternativa" value="Salvar" styleClass="ui-button-raised ui-button-flat" icon="pi pi-check" 
							rendered="#{!alternativaBean.cadastro}"	action="#{alternativaBean.salvar}" update="@form, :growl"  process="@form"	>
								 <p:defaultCommand target="form:questao:salvarAlternativa"/>
							</p:commandButton>
							
						</div>
						
						<div class="p-col-12" >
							<p:messages redisplay="false" showDetail="false" closable="true"/>
						</div>
						
					</div>
					
				</h:panelGroup>
				
				<h:panelGroup id="filtroAssunto" rendered="#{alternativaBean.lista}">
						
					<p:commandButton  value="Adicionar"  icon="pi pi-plus" styleClass="ui-button-raised ui-button-success ui-button-flat" 
					action="#{alternativaBean.cadastrar}" update="@form"  process="@this" style="margin-bottom:1rem;"	/>
					
				    <p:dataTable  class="table table-striped" var="alternativa" value="#{gestaoQuestaoBean.questao.alternativas}" 
				    stripedRows="true" rowIndexVar="index" draggableRows="true"
				    selection="#{alternativaBean.alternativa}" selectionMode="single" rowKey="#{alternativa.id}">
				    	<p:ajax event="rowSelect" update="@form" listener="#{alternativaBean.onSelected}"/>
				    	
				    	<p:ajax event="rowReorder" listener="#{gestaoQuestaoBean.reorderAlternativa}" update="@form, :growl"/>
				    	
						<p:column headerText="Texto">
							<h:outputText value="#{alternativa.letra})  #{alternativa.texto}" />
						</p:column>
						
						<p:column headerText="Correta" width="14rem" >
							<h:outputText value="#{alternativa.correta}" converter="simNaoConverter" />
						</p:column>
						
					</p:dataTable>
					
				</h:panelGroup>
				
			</p:tab>
			
		</ui:composition>		
	</h:body>
</html>
