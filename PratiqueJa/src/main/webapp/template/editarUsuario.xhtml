<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

<h:body>
	<ui:composition>

		<p:dialog id="editarUsuario"
			class="p-col-12 p-md-10 p-md-offset-1 p-lg-8 p-lg-offset-2 "
			header="Cadastro de Usuário" showEffect="fade" hideEffect="fade"
			width="100%;" modal="true" widgetVar="editarUsuarioWidget"
			responsive="true">
			<h:form id="formEditarUsuario" enctype="multipart/form-data" style="margin:0;" >

				<div class="ui-fluid p-formgrid p-grid">
					<div id="image" class="p-field p-col-12"
						style="text-align: center; margin-bottom: 0">
						<p:graphicImage class="circle"
							value="#{usuarioBean.usuario.imagem.fotoStreamedContent}"
							rendered="#{not empty usuarioBean.usuario.imagem}" cache="false" />
					</div>
					<div class="campoMsg col-12 xl:col-6">
						<p:outputLabel for="nome" value="Nome" />
						<p:inputText id="nome" placeholder="Nome"
						value="#{usuarioBean.usuario.nome}" required="true" 
						requiredMessage="O nome é obrigatório"/>
						<p:message for="nome" display="text" />
					</div>
					
					<div class="campoMsg col-12 xl:col-6">
						<p:outputLabel for="email" value="Email" />
						<p:inputText id="email" placeholder="Email"
						value="#{usuarioBean.usuario.email}"
						validator="#{usuarioBean.validateEmail}" 
						required="true" requiredMessage="O e-mail é obrigatório" />
						<p:message for="email" display="text" />
					</div>

					<div class="campoMsg col-12 md:col-6 lg:col-4">
						<p:outputLabel for="nascimento" value="Nascimento" />
						<p:datePicker id="nascimento"
						value="#{usuarioBean.usuario.nascimento}" locale="pt"
						required="true"  requiredMessage="A data de nascimento é obrigatória"/>
						<p:message for="nascimento" display="text" />
					</div>
					
					<div class="campo col-12 md:col-6 lg:col-4 xl:col-2">
						<p:outputLabel for="@next" value="Quer receber exercícios?" 
						title="Se esta opção estiver ativa, você receberá automaticamente, a cada 3 dias, um PDF completo no seu e-mail - com uma lista de exercícios resolvidos e um resumo do conteúdo correspondente."/>
						<p:selectBooleanButton 
							value="#{usuarioBean.usuario.recebeSpam}"
							onLabel="Sim" offLabel="Não" 
							onIcon="fa fa-solid fa-thumbs-up" offIcon="fa fa-solid fa-thumbs-down"
							style="width-min:8rem;display:block;">
						</p:selectBooleanButton>
					</div>
					
					<div class="col-12">
						<p:staticMessage severity="info" summary="Envio de Exercícios: " display="text"
			       		detail="Se você marcar a opção para receber exercícios, você receberá automaticamente, a cada 3 dias, um PDF completo no seu e-mail com uma lista de exercícios resolvidos e o resumo do conteúdo correspondente." 
			       		style="background: #ecf1ff !important;margin:15px 0 0 0;width: 100%"/>
					</div>
					
					<div class="campoMsg col-12">
						<p:fileUpload listener="#{usuarioBean.uploadFile}"
							mode="advanced" skinSimple="true" auto="true"
							style="width: auto; margin-top:15px;" required="true"
							update="@form"
							invalidFileMessage="apenas gif | jpg | jpeg | png são permitidos"
							invalidSizeMessage="Tamanho máximo de arquivo permitido é 5 MB" >
								<p:validateFile  sizeLimit="5002400" virusScan="true" 
								allowTypes="/(\.|\/)(gif|jpe?g|png)$/"/>
							</p:fileUpload>
					</div>
				</div>
	
				<p:divider />
		
				<div class="p-grid" >
		
					<div class="p-col-12 comandRight" >
						<p:commandButton value="Cancelar"
							styleClass="ui-button-raised ui-button-secondary ui-button-flat"
							onclick="PF('editarUsuarioWidget').hide()" style="width: auto;margin-right:15px;"
							icon="pi pi-times" />
		
						<p:commandButton id="salvarUsuario" value="Salvar"
							styleClass="ui-button-raised ui-button-flat" icon="pi pi-check"
							action="#{usuarioBean.salvar}" update="@form, :formPrincipal :growl"
							oncomplete="if (args &amp;&amp; !args.validationFailed) PF('editarUsuarioWidget').hide()"
							process="@form" >
							<p:defaultCommand target="formEditarUsuario:salvarUsuario" />
						</p:commandButton>
	
					</div>
				</div>
	
			</h:form>
		</p:dialog>

	</ui:composition>
</h:body>
</html>
