<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

<h:body >
	<ui:composition>
<!-- 		<p:card id="status" style="width: 100%; margin:1rem 0;"> -->
			
			 <p:panelGrid columns="3" 
			 columnClasses="col-12 xl:col-6, 
			 				col-12 xl:col-6">
			 
			 	<h:panelGroup >
					<h:outputText class="title" value="Plano atual:" />
					<h:outputText class="status" value="#{autenticacaoBean.usuario.perfil.nome}" >
					</h:outputText>
			 	</h:panelGroup>
			 	
			 	<h:panelGroup >
					<h:outputText class="title" value="Validade:" />
					<h:outputText class="status" value="#{autenticacaoBean.usuario.validadePlano}" >
						<f:convertDateTime pattern="dd/MM/yyyy" type="localDate" />
					</h:outputText>
			 	</h:panelGroup>
				
			 </p:panelGrid>
		
<!-- 		</p:card> -->
				
	</ui:composition>		
</h:body>
</html>
