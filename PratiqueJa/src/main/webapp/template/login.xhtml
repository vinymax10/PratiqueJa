<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

<h:body>
	<ui:composition>

		<p:dialog id="dialogLogin"
			class="p-col-12 p-md-10 p-md-offset-1 p-lg-8 p-lg-offset-2 p-xl-4 p-xl-offset-4"
			header="Login" showEffect="fade" hideEffect="fade" width="100%;"
			modal="true" widgetVar="loginWidget" responsive="true">
			<h:form id="formLogin" enctype="multipart/form-data" >
				<div style="text-align: center;">
					<img alt="user header" src="/image/logo.png" style="width: 300px;" />
				</div>
				<div class="ui-fluid formgrid grid">
	
					<div class="campoMsg col-12">
						<p:outputLabel for="email" value="Email" />
						<p:inputText id="email" value="#{autenticacaoBean.email}" 
						validator="#{autenticacaoBean.validateEmail}" 
							required="true" requiredMessage="O e-mail é obrigatório"/>
						<p:message id="msgEmail" for="email" display="text" />
							
					</div>
					
					<div class="campoMsg col-12">
						<p:outputLabel for="senha" value="Senha" />
						<p:password id="senha" value="#{autenticacaoBean.senha}"
							required="true" requiredMessage="A senha é obrigatória"/>
						<p:message id="msgSenha" for="senha" display="text" />
					</div>
					
					<div class="campoMsg col-6" >
						<p:commandLink action="#{usuarioBean.cadastrar(true)}"
							 resetValues="true" update="cadastroUsuario" process="@this" value="Cadastre-se" />
					</div>
					
					<div class="campoMsg col-6" style="text-align: right;">
						<p:commandLink value="Esqueci minha senha"
							onclick="PF('resetSenhaWidget').show()" />
					</div>
					
					<div class="campoMsg col-12">
						<p:commandButton id="login" value="Login" update="@form :formPrincipal :growl"
							process="@form" ajax="true" 
							oncomplete="if (args &amp;&amp; !args.validationFailed) PF('loginWidget').hide()"
							style="width: auto" icon="pi pi-sign-in" iconPos="right"
							action="#{autenticacaoBean.login}" >
								<p:defaultCommand target="formLogin:login"/>
							</p:commandButton>
					</div>
	
				</div>
				
			</h:form>
			
			<div class="col-12">
				<div id="buttonDiv" ></div>
			</div>
			
		</p:dialog>

	</ui:composition>
</h:body>
</html>
