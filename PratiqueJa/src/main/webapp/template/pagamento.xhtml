<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

<h:body>
	<ui:composition>

		<p:dialog id="dialogUpgrade" class="p-col-12 p-xl-10 p-xl-offset-1" 
		header=" Faça Upgrade de sua conta" 
		showEffect="fade" hideEffect="fade" width="100%;" modal="true"  
		widgetVar="upgradeWidget" responsive="true" >
			
			<h:form id="formUpgrade" enctype="multipart/form-data" >
				<div class="formgrid grid">
					
					<h:outputText value="#{controleAcessoBean.mensagem}"
					style="margin:15px" />
					
					<div  class="p-col-12" style="padding:0;">
						
						<ui:include src="/produtos/acesso/descricaoPlanos.xhtml" />
						
		    		</div>
	    		</div>
				<p:divider />
		
				<div class="p-grid" >
		
					<div class="p-col-12 comandRight" >
					
						<p:commandButton  value="Cancelar" 
						styleClass="ui-button-raised ui-button-secondary ui-button-flat"
						onclick="PF('upgradeWidget').hide()"  icon="pi pi-times" />
						
						<p:button value="Upgrade" ajax="true" style="margin-left:15px;"
						icon="pi pi-check"   href="/produtos/acesso/acesso"
						styleClass="ui-button-raised ui-button-flat ui-button-success">
						</p:button>
					</div>
				</div>
			</h:form>
		</p:dialog>
		
	</ui:composition>
</h:body>
</html>
