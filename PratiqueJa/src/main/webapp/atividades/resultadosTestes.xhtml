<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui" template="/template/template.xhtml">


	<h:form id="form" style="margin-bottom:0">
		<div class="p-d-flex">
			<div class="p-grid" style="margin: 0 15px; width: 100%;">

				<div class="p-col-12">
					<h2>Resultado dos Testes</h2>
				</div>

				<p:dataTable id="tabela" class="table table-striped" reflow="true"
					var="resultadoTeste"  rowKey="#{resultado.id}" widgetVar="resultadosTable"
					filteredValue="#{resultadoTesteBean.resultadosTestesFiltrados}"
             		filterBy="#{resultadoTesteBean.filterBy}"
					value="#{resultadoTesteBean.resultadosTestesUsuario}"
					paginator="true" rows="20" paginatorAlwaysVisible="false">

					<p:column field="testePadrao.assuntoCurso.nome" headerText="Assunto" filterMatchMode="exact"
                    sortBy="#{resultadoTeste.testePadrao.assuntoCurso.nome}">
		                <f:facet name="filter">
		                    <p:selectOneMenu  onchange="PF('resultadosTable').filter()" styleClass="custom-filter">
		                        <f:attribute name="collectionType" value="java.util.ArrayList" />	
		                        <f:selectItem itemLabel="All" itemValue="#{null}" noSelectionOption="true"/>
		                        <f:selectItems value="#{assuntoCursoBean.todosAssuntoCursos}" var="opcao" 
		                        itemLabel="#{opcao.nome}" itemValue="#{opcao.nome}"/>
		                    </p:selectOneMenu >
		                </f:facet>
					</p:column>
					
					<p:column field="testePadrao.assuntoCurso.modulo.nome" headerText="Módulo" filterMatchMode="exact"
                    sortBy="#{resultadoTeste.testePadrao.assuntoCurso.modulo.nome}">
		                <f:facet name="filter">
		                    <p:selectOneMenu  onchange="PF('resultadosTable').filter()" styleClass="custom-filter">
		                        <f:attribute name="collectionType" value="java.util.ArrayList" />	
		                        <f:selectItem itemLabel="All" itemValue="#{null}" noSelectionOption="true"/>
		                        <f:selectItems value="#{moduloBean.opcoes}" var="opcao" itemLabel="#{opcao.nome}" itemValue="#{opcao.nome}"/>
		                    </p:selectOneMenu >
		                </f:facet>
					</p:column>

					<p:column field="realizacao" headerText="Realização" filterMatchMode="between">
						<h:outputText value="#{resultadoTeste.realizacao}">
							<f:convertDateTime pattern="dd/MM/yyyy" type="localDate"/>
						</h:outputText>
						<f:facet name="filter">
							<p:datePicker selectionMode="range" onchange="PF('resultadosTable').filter()"/>
						</f:facet>
					</p:column>

					<p:column field="nota" headerText="Nota" responsivePriority="1" sortBy="#{resultadoTeste.nota}">
						<h:outputText value="#{resultadoTeste.nota}">
							<f:convertNumber pattern="#,##0.00" />
						</h:outputText>
						<h:outputText value=" \%" />
						<p:progressBar value="#{resultadoTeste.nota}"
							displayOnly="true" style="height: .5rem" />
					</p:column>

				</p:dataTable>

			</div>
		</div>
	</h:form>


</ui:decorate>
