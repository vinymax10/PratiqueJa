<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">
	

	<div class="p-d-flex">
			
	    <h:form id="form" style="margin-bottom:0; width:100%;">
			
			<div class="p-grid">
				<div class="p-col-12" style="margin: 0 10px;">
					<h2>Meus Testes</h2>						
				</div>
				
	   		 	<ui:repeat id="repeat" value="#{testeBean.getMeusTestes(false)}" var="teste" >
				
		        	<div class="p-col-12 p-lg-6 p-xl-4">
		        		<p:card class="newBorder" style="margin:10px;width: auto;">
						    <f:facet name="header">
						        <img alt="user header" src="/image/matematica/#{teste.testePadrao.assuntoCurso.getModuloImage()}/#{teste.testePadrao.assuntoCurso.getChaveImage()}/nivel1.png"/>
						    </f:facet>
						    <f:facet name="title" >
						        #{teste.testePadrao.assuntoCurso.nome}
						    </f:facet>
						    <f:facet name="subtitle" style="text-align:right!important;">
						        #{teste.testePadrao.nome} 
						    </f:facet>
						    
						    <h:outputText value="Melhor resultado: " />
						    <div style="display:flex;">
							    <div style="width:87%;">
				      				<p:progressBar value="#{assuntoCursoBean.porcentagemConcluida(assunto)}" 
				      				style="margin-top:20px;width:100%;height:0.5rem!important;" />
							    </div>
							    <h:outputText class="porcentagemProgresso" value="#{assuntoCursoBean.porcentagemConcluida(assunto)/100}" >
									<f:convertNumber type = "percent" />
								</h:outputText>
						    </div>
						
						    <f:facet name="footer" >
						    	
						        <p:button icon="pi pi-table" value="Fazer"
						        href="/teste/teste/verTeste.xhtml?id=#{teste.id}"
						        styleClass="ui-button-raised ui-button-flat ui-button-success" />
						        
						    </f:facet>
						</p:card>
		        	</div>	
	
			    </ui:repeat>
			    
	   		</div>
		   		
				
		</h:form>
	</div>
	
	
</ui:decorate>
