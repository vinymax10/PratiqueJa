<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

	<ui:define name="OpenGraph">
		<link rel="stylesheet" href="/css/avaliacao-page.css" type="text/css" />
		<style>
			/* Cabeçalho da tabela: azul sólido, combinando com os botões (escopado só nesta tela). */
			.av-historico-table.ui-datatable thead tr th {
				background: #2563eb !important;
				color: #fff !important; border-color: rgba(255, 255, 255, .18) !important;
			}
			.av-historico-table.ui-datatable thead tr th .ui-column-title,
			.av-historico-table.ui-datatable thead tr th .ui-sortable-column-icon { color: #fff !important; }
			.av-historico-table.ui-datatable thead tr th:first-child { border-top-left-radius: 10px; }
			.av-historico-table.ui-datatable thead tr th:last-child { border-top-right-radius: 10px; }

			/* Botão "Ações" (azul sólido, mesmo padrão da tela de posts). */
			.pc-hero-btn .ui-button {
				background: #2563eb !important; border-color: #2563eb !important; color: #fff !important;
			}
			.pc-hero-btn .ui-button:hover, .pc-hero-btn .ui-button:focus {
				background: #1d4ed8 !important; border-color: #1d4ed8 !important; color: #fff !important;
			}
			.pc-hero-btn .ui-button .ui-icon,
			.pc-hero-btn .ui-button .ui-button-text,
			.pc-hero-btn .ui-button .ui-menubutton-text { color: #fff !important; }
		</style>
	</ui:define>

	<ui:define name="linkPage">
		<h:outputText class="linkPage" value="Confecção de Avaliações" />
	</ui:define>

	<!-- ═══════ HERO + Histórico unidos num card único ═══════ -->
	<div class="av-joined">

	<!-- ═══════════════════════════════════════════════════════ HERO -->
	<ui:include src="/avaliacao/hero.xhtml">
		<ui:param name="ajudaTela" value="avaliacao-list" />
		<ui:param name="ajudaTitulo" value="Confecção de Avaliações" />
	</ui:include>

	<!-- ══════════════════════════════════════════════ HISTÓRICO -->
	<h:form id="painelHistorico">

		<p:poll interval="2"
			listener="#{pedidoAvaliacaoBean.atualizarProgresso}"
			update="@form"
			rendered="#{pedidoAvaliacaoBean.temGerandoEmProgresso()}" />

		<div class="av-panel">

			<div class="av-list-actions">
				<p:button value="Nova avaliação"
					icon="pi pi-plus"
					outcome="/avaliacao/form"
					styleClass="ui-button-raised ui-button-success" />
			</div>

			<p:dataTable
				value="#{pedidoAvaliacaoBean.historico}"
				var="pedido"
				emptyMessage="Nenhuma solicitação encontrada."
				rows="30" paginator="true" paginatorAlwaysVisible="false"
				reflow="true" stripedRows="true"
				rowStyleClass="#{pedido.codigoBatch == pedidoAvaliacaoBean.codigoDestaque ? 'av-row-novo' : null}"
				styleClass="av-historico-table">

				<p:column headerText="Código" style="width:100px">
					<h:outputText value="#{pedido.codigoBatch}"
						style="font-family:monospace;font-weight:700;color:#2563eb;font-size:15px" />
				</p:column>

				<p:column headerText="Título">
					<h:outputText value="#{pedido.titulo}" />
				</p:column>

				<p:column headerText="Qtd." style="width:55px">
					<h:outputText value="#{pedido.quantidade}" />
				</p:column>

				<p:column headerText="Solicitado" style="width:130px">
					<h:outputText value="#{pedido.dataSolicitacao}">
						<f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy HH:mm" />
					</h:outputText>
				</p:column>

				<p:column headerText="Expira" style="width:95px">
					<h:outputText value="#{pedido.dataExpiracao}">
						<f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy" />
					</h:outputText>
				</p:column>

				<p:column headerText="Status" style="width:155px">
					<h:panelGroup rendered="#{pedido.status.name() == 'GERANDO'}">
						<p:progressBar value="#{pedido.progresso}" style="height:10px;border-radius:999px" />
						<div style="font-size:11px;text-align:center;margin-top:4px;color:#6b7280">
							<h:outputText value="#{pedido.progresso}">
								<f:convertNumber maxFractionDigits="0" />
							</h:outputText>%
						</div>
					</h:panelGroup>
					<h:panelGroup rendered="#{pedido.status.name() != 'GERANDO'}">
						<ui:include src="/status/status.xhtml">
							<ui:param name="status" value="#{pedido.status}" />
						</ui:include>
					</h:panelGroup>
				</p:column>

				<p:column headerText="Ações" style="width:140px;text-align:center">
					<p:menuButton value="Ações" styleClass="pc-hero-btn"
						rendered="#{pedido.status.name() == 'CONCLUIDO'}">
						<p:menuitem value="Ver" icon="pi pi-eye"
							action="#{pedidoAvaliacaoBean.verPedido(pedido)}"
							update=":formDetalhe" oncomplete="PF('wDialogDetalhe').show()" />
						<p:menuitem value="Baixar" icon="pi pi-download" ajax="false"
							rendered="#{pedido.caminhoArquivo != null and !pedidoAvaliacaoBean.estaExpirado(pedido)}">
							<p:fileDownload value="#{pedidoAvaliacaoBean.download(pedido)}" />
						</p:menuitem>
						<p:menuitem value="Enviar por e-mail" icon="pi pi-envelope"
							rendered="#{pedido.caminhoArquivo != null and !pedidoAvaliacaoBean.estaExpirado(pedido)}"
							action="#{pedidoAvaliacaoBean.enviarEmail(pedido)}"
							process="@this" update=":growl" />
					</p:menuButton>
					<p:menuButton value="Ações" styleClass="pc-hero-btn"
						rendered="#{pedido.status.name() == 'RASCUNHO'}">
						<p:menuitem value="Gerar" icon="pi pi-send"
							action="#{pedidoAvaliacaoBean.gerarRascunho(pedido)}"
							process="@this" update="@form :growl" />
						<p:menuitem value="Editar" icon="pi pi-pencil"
							outcome="/avaliacao/form">
							<f:param name="rascunho" value="#{pedido.id}" />
						</p:menuitem>
					</p:menuButton>
				</p:column>

			</p:dataTable>

		</div>

	</h:form>

	</div>

	<!-- ═══════════════════════════════ DIALOG: DETALHES DA SOLICITAÇÃO -->
	<ui:include src="/avaliacao/dialog-detalhe.xhtml" />

</ui:decorate>
