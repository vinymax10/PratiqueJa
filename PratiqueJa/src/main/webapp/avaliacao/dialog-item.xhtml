<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

<h:body>
	<ui:composition>

		<!-- ═══════════════════════════ DIALOG: ADICIONAR/EDITAR ASSUNTO -->
		<p:dialog id="dialogItem"
			widgetVar="wDialogItem"
			styleClass="col-12 md:col-10 md:col-offset-1 lg:col-8 lg:col-offset-2 xl:col-6 xl:col-offset-3 av-dlg"
			showHeader="false"
			showEffect="fade" hideEffect="fade" width="100%;" modal="true"
			responsive="true">

			<h:form id="formItem" >

				<h:panelGroup layout="block" styleClass="av-dlg-inner">

					<!-- ─────────────────────────────────────── HERO -->
					<div class="av-dlg-hero">

						<button type="button" class="av-dlg-hero-close"
							onclick="PF('wDialogItem').hide()" title="Fechar">
							<i class="pi pi-times" />
						</button>

						<span class="av-dlg-hero-eyebrow">
							<i class="#{itemPedidoAvaliacaoBean.cadastro ? 'pi pi-plus-circle' : 'pi pi-pencil'}" />
							<h:outputText value="#{itemPedidoAvaliacaoBean.cadastro ? 'Novo assunto' : 'Edição'}" />
						</span>

						<h3 class="av-dlg-hero-title">
							<h:outputText value="#{itemPedidoAvaliacaoBean.cadastro ? 'Adicionar assunto à avaliação' : 'Editar assunto'}" />
						</h3>

						<span class="av-dlg-hero-sub">
							<i class="pi pi-info-circle" />
							Escolha o assunto, o nível e quantos exercícios entram na avaliação.
						</span>
					</div>

					<!-- ─────────────────────────────────────── CORPO -->
					<div class="av-dlg-body">

						<div class="ui-fluid gride">

							<h:panelGroup styleClass="campo col-12">
								<p:outputLabel for="@next" value="Assunto" />
								<p:selectOneMenu value="#{itemPedidoAvaliacaoBean.entidade.assunto}"
									converter="generic" filter="true" filterMatchMode="contains"
									required="true" requiredMessage="Selecione um assunto.">
									<f:selectItem itemLabel="Selecione..." itemValue="#{null}" noSelectionOption="true" />
									<f:selectItems value="#{pedidoAvaliacaoBean.assuntos}"
										var="assunto" itemLabel="#{assunto.nome}" itemValue="#{assunto}" />
								</p:selectOneMenu>
								<p:message for="@previous" display="text" />
							</h:panelGroup>

							<h:panelGroup styleClass="campo col-12 md:col-4">
								<p:outputLabel for="@next" value="Nível" />
								<p:selectOneMenu value="#{itemPedidoAvaliacaoBean.entidade.nivel}"
									required="true" requiredMessage="Selecione o nível.">
									<f:selectItem itemLabel="Selecione..." itemValue="#{null}" noSelectionOption="true" />
									<f:selectItems value="#{pedidoAvaliacaoBean.niveis}"
										var="nivel" itemLabel="#{nivel.nome}" itemValue="#{nivel}" />
								</p:selectOneMenu>
								<p:message for="@previous" display="text" />
							</h:panelGroup>

							<h:panelGroup styleClass="campo col-12 md:col-4">
								<p:outputLabel for="@next" value="Tipo de questão" />
								<p:selectOneMenu value="#{itemPedidoAvaliacaoBean.entidade.formato}"
									required="true" requiredMessage="Selecione o tipo de questão.">
									<f:selectItems value="#{pedidoAvaliacaoBean.formatosAvaliacao}"
										var="formatoAvaliacao" itemLabel="#{formatoAvaliacao.nome}" itemValue="#{formatoAvaliacao}" />
								</p:selectOneMenu>
								<p:message for="@previous" display="text" />
							</h:panelGroup>

							<h:panelGroup styleClass="campo col-12 md:col-4">
								<p:outputLabel for="@next" value="Quantidade" />
								<p:inputNumber minValue="1" maxValue="100" decimalPlaces="0"
									value="#{itemPedidoAvaliacaoBean.entidade.quantidade}"
									required="true" requiredMessage="Informe a quantidade." />
								<p:message for="@previous" display="text" />
							</h:panelGroup>

						</div>
					</div>

					<!-- ─────────────────────────────────────── RODAPÉ -->
					<div class="av-dlg-footer">
						<p:commandButton value="Cancelar"
							type="button"
							styleClass="ui-button-flat ui-button-plain"
							icon="pi pi-times"
							onclick="PF('wDialogItem').hide()" />

						<h:panelGroup styleClass="flex align-items-center gap-3">
							<p:commandButton id="btnAdicionarItem"
								value="Adicionar"
								rendered="#{itemPedidoAvaliacaoBean.cadastro}"
								icon="pi pi-check"
								styleClass="ui-button-raised ui-button-success"
								action="#{itemPedidoAvaliacaoBean.adicionar}"
								update="@form :form:listaItens :form:totalizador :growl"
								process="@form"
								oncomplete="if (args &amp;&amp; !args.validationFailed) PF('wDialogItem').hide()">
								<p:defaultCommand target="btnAdicionarItem" />
							</p:commandButton>
							<p:commandButton id="btnSalvarItem"
								value="Salvar"
								rendered="#{!itemPedidoAvaliacaoBean.cadastro}"
								icon="pi pi-check"
								styleClass="ui-button-raised ui-button-success"
								action="#{itemPedidoAvaliacaoBean.salvar}"
								update="@form :form:listaItens :form:totalizador :growl"
								process="@form"
								oncomplete="if (args &amp;&amp; !args.validationFailed) PF('wDialogItem').hide()">
								<p:defaultCommand target="btnSalvarItem" />
							</p:commandButton>
						</h:panelGroup>
					</div>

				</h:panelGroup>

			</h:form>

		</p:dialog>

	</ui:composition>
</h:body>
</html>
