<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

<h:body>
	<ui:composition>

		<p:dialog id="dialog-conteudo-teste" 
		class="col-12 md:col-12 lg:col-10 lg:col-offset-1 xl:col-8 xl:col-offset-2" 
		header="Conteúdo" 
		showEffect="fade" hideEffect="fade" width="100%;" modal="true"  widgetVar="dialogConteudo" responsive="true" 
		focus="formConteudoTeste:nome"	>
			<h:form id="formConteudoTeste" class="form" enctype="multipart/form-data" >
				<div class="ui-fluid gride" >
					
					<h:panelGroup styleClass="campo col-12 xl:col-5">
		                <p:outputLabel for="@next" value="Exercício"/>
		                <p:selectOneMenu value="#{conteudoTesteBean.entidade.exercicioPadrao}" converter="generic"
		                required="true" 
		                filter="true" filterMatchMode="contains">
		                	 <f:selectItem itemLabel="Selecione uma opção" itemValue=""/>
		                    <f:selectItems value="#{exercicioPadraoBean.listaTudo}" var="exercicio" 
		                    itemLabel="#{exercicio.assuntoCurso.modulo.nome} - #{exercicio.assuntoCurso.nome} - #{exercicio.nivel.nome}" itemValue="#{exercicio}"/>
		                </p:selectOneMenu>
		            </h:panelGroup>
		            
		            <h:panelGroup styleClass="campo col-12 md:col-6 lg:col-4 xl:col-2">
						<p:outputLabel for="@next" value="Quantidade" />
						<p:inputNumber minValue="1" maxValue="10000" decimalPlaces="0"
							value="#{conteudoTesteBean.entidade.quantidade}" required="true" />
					</h:panelGroup>
				</div>
				
				<div class="content-button" >
						
					<div class="divisor" ></div>
				
				    <div class="flex gap-3 flex-wrap">	
	
						<p:commandButton value="Remover" icon="pi pi-trash"
							styleClass="ui-button-danger ui-button-flat"
							action="#{conteudoTesteBean.remover}" update="@form form:conteudoTesteTabela :growl"
							process="@this" oncomplete="PF('dialogConteudo').hide()"
							rendered="#{!conteudoTesteBean.cadastro}">
							<p:confirm header="Confirmação" icon="pi pi-info-circle"
								message="Você tem certeza que deseja remover esse conteudoTeste?" />
						</p:commandButton>
		
					</div>
	
					<div class="flex gap-3 flex-wrap">	
	
						<p:commandButton value="Auditoria" rendered="#{sessaoBean.podeVerAuditoria and !conteudoTesteBean.cadastro}"
							styleClass="ui-button-flat ui-button-plain" 
							icon="fa-regular fa-eye"
							action="#{auditoriaBean.carregar(conteudoTesteBean.entidade,conteudoTesteBean.nome)}"
							update="dialog-auditoria"
							process="@this" oncomplete="PF('dialogAuditoria').show()">
						</p:commandButton>
				
						<p:commandButton id="salvar" value="Salvar"
							rendered="#{!conteudoTesteBean.cadastro}"
							styleClass="ui-button-raised ui-button-primary" 
							icon="pi pi-check"
							action="#{conteudoTesteBean.salvar}" update="@form form:conteudoTesteTabela :growl"
							process="@form" oncomplete="if (args &amp;&amp; !args.validationFailed) PF('dialogConteudo').hide()">
							<p:defaultCommand target="salvar" />
						</p:commandButton>
						
						<p:commandButton id="adicionar" value="Adicionar" 
							rendered="#{conteudoTesteBean.cadastro}"
							styleClass="ui-button-raised ui-button-success" 
							icon="pi pi-check"
							action="#{conteudoTesteBean.adicionar}" update="@form form:conteudoTesteTabela :growl "
							process="@form" oncomplete="if (args &amp;&amp; !args.validationFailed) PF('dialogConteudo').hide()">
							<p:defaultCommand target="adicionar" />
						</p:commandButton>
					</div>
				</div>
		
			</h:form>
		</p:dialog>
		
	</ui:composition>
</h:body>
</html>
