<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:body >
		<ui:composition>
		
			<h:panelGroup id="conteudo" class="gride">
			
				<div class="title-divisor-button" >
				
					<h4 class="m-0" >Conteúdos</h4>
					<div class="flex justify-content-end">
						<p:commandButton value="Conteúdo" class="text-right"  icon="pi pi-plus" 
							styleClass="ui-button-raised ui-button-success" 
							action="#{conteudoTesteBean.cadastrar()}" update="dialog-conteudo-teste"  process="@this"
							oncomplete="PF('dialogConteudo').show()"  resetValues="true" >
						</p:commandButton>
					</div>
				</div>
			
				<p:dataTable id="conteudoTesteTabela" class="tableStatus ml-3 mr-3" stripedRows="true" 
				var="entidade" value="#{testePadraoBean.entidade.conteudosTeste}"
				selection="#{conteudoTesteBean.entidadeOriginal}" reflow="true"
				selectionMode="single" rowKey="#{entidade.ordem}"
				rows="30" paginator="true"	paginatorAlwaysVisible="false" 
				rowSelector="td:not(.coluna-ativo)">
	
	    		<p:ajax event="rowSelect" update="dialog-conteudo-teste" 
	    		listener="#{conteudoTesteBean.onRowSelect}"
				oncomplete="PF('dialogConteudo').show()"	 resetValues="true"/>
				
				<p:column headerText="Assunto Curso" responsivePriority="1">
					<h:outputText value="#{entidade.exercicioPadrao.assuntoCurso.nome}" />
				</p:column>

				<p:column headerText="Módulo" responsivePriority="1">
					<h:outputText value="#{entidade.exercicioPadrao.assuntoCurso.modulo.nome}" />
				</p:column>

				<p:column headerText="Nível" responsivePriority="1">
					<h:outputText value="#{entidade.exercicioPadrao.nivel.nome}" />
				</p:column>

				<p:column headerText="Quantidade" responsivePriority="2">
					<h:outputText value="#{entidade.quantidade}" />
				</p:column>
				
			</p:dataTable>
		</h:panelGroup>		
				
	</ui:composition>		
</h:body>
</html>
