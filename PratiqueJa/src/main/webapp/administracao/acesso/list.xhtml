<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

	<ui:define name="linkPage">
		<h:outputText class="linkPage" value="Acessos" />
	</ui:define>

	<f:metadata>
		<f:viewAction action="#{acessoBean.filtrar()}" />
	</f:metadata>

	<h:form id="form" class="form">

		<div class="content-button flex-column lg:flex-row xl:flex-row">

			<div class="flex gap-3 align-items-center w-full md:w-full lg:w-6 xl:w-6">

				<div class="w-full">
					<span class="ui-input-icon-left" style="width:100%">
						<i class="pi pi-search" />
						<p:inputText id="globalFilter" value="#{acessoBean.filtro.nomeUsuario}"
						placeholder="Nome do usuário" styleClass="w-full">
							<p:ajax event="keyup" delay="500" update="tabela" listener="#{acessoBean.filtrar}" />
						</p:inputText>
					</span>
				</div>

				<p:button value="Filtros" icon="fa-solid fa-filter"
				onclick="slideToggle('filtros'); return false;"
				styleClass="ui-button-outlined ui-button-secondary" />

			</div>

			<div class="flex gap-3 align-items-center justify-content-end">

				<ui:include src="/exportar/exportar.xhtml">
					<ui:param name="id" value="form:tabela" />
					<ui:param name="nome" value="Acessos" />
				</ui:include>

			</div>
		</div>

		<ui:include src="/administracao/acesso/filtro.xhtml" />

		<p:dataTable id="tabela"  stripedRows="true"
			var="acesso" value="#{acessoBean.acessos}"
			reflow="true" rows="30" paginator="true" paginatorAlwaysVisible="false">

			<p:column headerText="Usuário" responsivePriority="1">
				<h:outputText value="#{acesso.usuario.nome}" />
			</p:column>

			<p:column headerText="Início" responsivePriority="2">
				<h:outputText value="#{acesso.inicio}">
					<f:convertDateTime pattern="dd/MM/yyyy HH:mm" type="localDateTime" />
				</h:outputText>
			</p:column>

			<p:column headerText="Término" responsivePriority="3">
				<h:outputText value="#{acesso.termino}">
					<f:convertDateTime pattern="dd/MM/yyyy HH:mm" type="localDateTime" />
				</h:outputText>
			</p:column>

			<p:column headerText="Duração (min)" responsivePriority="4">
				<h:outputText value="#{acesso.duracao / 60}">
					<f:convertNumber maxFractionDigits="0" />
				</h:outputText>
			</p:column>

			<p:column headerText="ID da Sessão" responsivePriority="5">
				<h:outputText value="#{acesso.idSessao}" class="col-observacao" />
			</p:column>

			<p:column headerText="Status" responsivePriority="6">
				<h:outputText value="#{acesso.status.nome}" />
			</p:column>

		</p:dataTable>

	</h:form>

</ui:decorate>
