<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

	<ui:define name="linkPage">
		<h:outputText class="linkPage" value="#{pagamentoBean.nome}" />
	</ui:define>

	<f:metadata>
		<f:viewAction action="#{pagamentoBean.filtrar()}" />
	</f:metadata>

	<h:form id="form" class="form">

		<div class="content-button flex-column lg:flex-row xl:flex-row">

			<div class="flex gap-3 align-items-center w-full md:w-full lg:w-6 xl:w-6">

				<div class="w-full">
					<span class="ui-input-icon-left" style="width:100%">
						<i class="pi pi-search" />
						<p:inputText value="#{pagamentoBean.filtro.nomeUsuario}"
						placeholder="Nome do Usuário" styleClass="w-full">
							<p:ajax event="keyup" delay="500" update="tabela" listener="#{pagamentoBean.filtrar}" />
						</p:inputText>
					</span>
				</div>

				<p:button value="Filtros" icon="fa-solid fa-filter"
				onclick="slideToggle('filtros'); return false;"
				styleClass="ui-button-outlined ui-button-secondary" />

			</div>

			<div class="flex gap-3 align-items-center justify-content-end">

				<ui:include src="/exportar/exportar.xhtml">
					<ui:param name="id" value="form:tabela" />
					<ui:param name="nome" value="Pagamentos" />
				</ui:include>

				<p:button value="Adicionar" icon="pi pi-plus"
				styleClass="ui-button-raised ui-button-success"
				href="/administracao/usuarios/pagamento/form.xhtml?cadastro=true" />

			</div>
		</div>

		<ui:include src="/administracao/usuarios/pagamento/filtro.xhtml" />

		<p:dataTable id="tabela" class="tableStatus" stripedRows="true"
			var="entidade" value="#{pagamentoBean.lista}" reflow="true"
			selection="#{pagamentoBean.entidade}" selectionMode="single"
			rowKey="#{entidade.id}" rows="30" paginator="true" paginatorAlwaysVisible="false"
			rowSelector="td:not(.coluna-ativo)">

			<p:ajax event="rowSelect" update="@form" listener="#{pagamentoBean.onSelected}"
			resetValues="true"/>

			<p:column headerText="Foto" width="4rem" responsivePriority="6">
				<p:graphicImage class="circleTable" value="#{entidade.usuario.imagem.getFotoStreamedContent()}"
				rendered="#{not empty entidade.usuario.imagem}" stream="false" />
			</p:column>

			<p:column headerText="ID" responsivePriority="5" width="5rem">
				<h:outputText value="#{entidade.id}" />
			</p:column>

			<p:column headerText="Nome" responsivePriority="1">
				<h:outputText value="#{entidade.usuario.nome}" />
			</p:column>

			<p:column headerText="Data" responsivePriority="2">
				<h:outputText value="#{entidade.data}">
					<f:convertDateTime pattern="dd/MM/yyyy" type="localDate"/>
				</h:outputText>
			</p:column>

			<p:column headerText="Valor" responsivePriority="2">
				<h:outputText value="R$ " />
				<h:outputText value="#{entidade.valor}">
					<f:convertNumber pattern="#,##0.00" />
				</h:outputText>
			</p:column>

			<p:column headerText="Tipo" responsivePriority="3">
				<h:outputText value="#{entidade.tipoPagamento.nome}" />
			</p:column>

			<p:column headerText="Plano" responsivePriority="3">
				<h:outputText value="#{entidade.plano.nome}" />
			</p:column>

			<p:column headerText="Pago" responsivePriority="1" 
			width="4rem" exportable="false" styleClass="coluna-ativo">
				<p:toggleSwitch class="toggleSwitch-form"
					value="#{entidade.pago}" >
					<p:ajax event="change" process="@this"
					listener="#{pagamentoBean.salvar(entidade)}" update="growl" />
				</p:toggleSwitch>
			</p:column>

		</p:dataTable>

	</h:form>

</ui:decorate>
