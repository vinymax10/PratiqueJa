<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:body>
		<ui:composition>
			<div id="filtros" style="width: 100%;display:none;">

				<p:card class="newBorder mb-3" style="width: 100%;">
					<div class="ui-fluid gride">
						<h4 class="title-card">Filtro</h4>

						<div class="campo col-12 md:col-6 lg:col-6 xl:col-3">
							<p:outputLabel for="preset" value="Períodos Comuns"/>
							<p:selectOneMenu id="preset"
							value="#{pagamentoBean.filtro.preset}"
							filter="true" filterMatchMode="contains">
								<f:selectItem itemLabel="Todos" itemValue="#{null}" noSelectionOption="true"/>
								<f:selectItems value="#{periodoPresetBean.opcoes}"
								var="opcao" itemLabel="#{opcao.nome}" itemValue="#{opcao}"/>
								<p:ajax event="change"
								listener="#{pagamentoBean.filtro.aplicarPreset}"
								update="form:periodo"/>
							</p:selectOneMenu>
						</div>

						<div class="campo col-12 md:col-6 lg:col-6 xl:col-3">
							<p:outputLabel for="periodo" value="Período"/>
							<p:datePicker id="periodo"
							value="#{pagamentoBean.filtro.periodo}"
							selectionMode="range"
							placeholder="Período"
							locale="pt"
							monthNavigator="true"
							yearNavigator="select"
							readonlyInput="true"
							hideOnRangeSelection="true">
								<p:ajax event="change"
								listener="#{pagamentoBean.filtro.resetPreset}"
								update="form:preset"/>
							</p:datePicker>
						</div>

						<div class="campo col-12 md:col-6 lg:col-4 xl:col-3">
							<p:outputLabel for="@next" value="Produto"/>
							<p:selectOneMenu value="#{pagamentoBean.filtro.produto}" converter="generic"
							filter="true" filterMatchMode="contains">
								<f:selectItem itemLabel="Todos" itemValue="#{null}" noSelectionOption="true"/>
								<f:selectItems value="#{produtoBean.listaTudo}" var="produto"
								itemLabel="#{produto.nome}" itemValue="#{produto}"/>
							</p:selectOneMenu>
						</div>

						<div class="campo col-12 md:col-6 lg:col-4 xl:col-2">
							<p:outputLabel for="@next" value="Pago"/>
							<p:selectOneMenu value="#{pagamentoBean.filtro.pago}">
								<f:selectItem itemLabel="Todos" itemValue="#{null}" noSelectionOption="true"/>
								<f:selectItem itemLabel="Sim" itemValue="#{true}"/>
								<f:selectItem itemLabel="Não" itemValue="#{false}"/>
							</p:selectOneMenu>
						</div>

						<div class="campo col-12 md:col-6 lg:col-4 xl:col-2">
							<p:outputLabel for="@next" value="ID"/>
							<p:inputText value="#{pagamentoBean.filtro.id}" />
						</div>

					</div>

					<div class="content-button-right">

						<div class="divisor"></div>

						<p:commandButton value="Limpar"
						styleClass="ui-button-flat ui-button-plain"
						icon="fa-solid fa-eraser" oncomplete="manterFiltroAberto('filtros');"
						action="#{pagamentoBean.filtrarInit}" update="@form">
						</p:commandButton>

						<p:commandButton id="filtrar" value="Filtrar"
						styleClass="ui-button-raised ui-button-primary"
						icon="pi pi-search" oncomplete="manterFiltroAberto('filtros');"
						action="#{pagamentoBean.filtrar}" update="@form, :growl" process="@form">
							<p:defaultCommand target="form:filtrar"/>
						</p:commandButton>

					</div>

				</p:card>
			</div>
		</ui:composition>
	</h:body>
</html>
