<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

	<ui:define name="linkPage">
		<h:outputText class="linkPage" value="#{usuarioBean.nome}" />
	</ui:define>

	<f:metadata>
	    <f:viewParam name="chave" value="#{usuarioBean.chave}" />
	    <f:viewParam name="cadastro" value="#{usuarioBean.cadastro}" converter="jakarta.faces.Boolean"/>
	    <f:viewAction action="#{usuarioBean.carregar()}" />
	</f:metadata>

	<h:form id="form" class="form" >

		<h4 class="title-divisor" >Usuário</h4>
		
		 <div class="formgrid grid">
	    	
			<div  class="campo col-12 xl:col-6" style="text-align:center;margin-bottom:0">
				<h:panelGroup id="image" rendered="#{!usuarioBean.lista}">
			
		    		<h:graphicImage class="circle" value="#{usuarioBean.entidade.foto.endereco}"
		    		rendered="#{not empty usuarioBean.entidade.foto}" />
				</h:panelGroup>
			</div>
			
           	<div class="col-12 xl:col-6 p-text-right" >
				<p:button  value="ConfogPost" styleClass="ui-button-raised ui-button-flat"
				icon="pi pi-instagram"
				href="/post/configuracao.xhtml?configPost=#{usuarioBean.entidade.configPost.id}"
				style="margin-left:15px;" target="_blank">
				</p:button>
			</div>
		</div>
				
		<div class="ui-fluid gride" >

			<h:panelGroup styleClass="campoMsg col-12 md:col-6 lg:col-6 xl:col-4">
				<p:outputLabel for="@next" value="Nome" />
				<p:inputText value="#{usuarioBean.entidade.nome}"
				required="true" requiredMessage="O nome é obrigatório" maxlength="255" />
				<p:message for="@previous" display="text"/>
			</h:panelGroup>

			<h:panelGroup styleClass="campoMsg col-12 md:col-6 lg:col-6 xl:col-4">
				<p:outputLabel for="@next" value="Email" />
				<p:inputText value="#{usuarioBean.entidade.email}"
				required="true" requiredMessage="O email é obrigatório" maxlength="255"
				validator="#{usuarioBean.validateEmail}" />
				<p:message for="@previous" display="text"/>
			</h:panelGroup>

			<h:panelGroup styleClass="campoMsg col-12 md:col-6 lg:col-6 xl:col-4">
				<p:outputLabel for="@next" value="Perfil" />
				<p:selectOneMenu value="#{usuarioBean.entidade.perfil}"
				required="true" requiredMessage="O perfil é obrigatório">
					<f:selectItem itemLabel="Selecione" itemValue="#{null}" noSelectionOption="true"/>
					<f:selectItems value="#{usuarioBean.perfis}" var="p"
					itemLabel="#{p.nome}" itemValue="#{p}" />
				</p:selectOneMenu>
				<p:message for="@previous" display="text"/>
			</h:panelGroup>

			<h:panelGroup styleClass="campo col-12 md:col-6 lg:col-6 xl:col-4">
				<p:outputLabel for="@next" value="Turma" />
				<p:selectOneMenu value="#{usuarioBean.entidade.turma}"
				converter="generic" filter="true" filterMatchMode="contains">
					<f:selectItem itemLabel="Nenhuma" itemValue="#{null}" noSelectionOption="true"/>
					<f:selectItems value="#{turmaBean.todasTurmas}" var="turma"
					itemLabel="#{turma.nome}" itemValue="#{turma}" />
				</p:selectOneMenu>
			</h:panelGroup>

			<h:panelGroup styleClass="campo col-12 md:col-6 lg:col-6 xl:col-4">
				<p:outputLabel for="@next" value="Nascimento" />
				<p:datePicker value="#{usuarioBean.entidade.nascimento}"
				pattern="dd/MM/yyyy"  />
			</h:panelGroup>

			<h:panelGroup styleClass="campo col-12 md:col-6 lg:col-6 xl:col-4">
				<p:outputLabel for="@next" value="Validade do Plano — Premium" />
				<p:datePicker value="#{usuarioBean.entidade.validadePlano}"
				pattern="dd/MM/yyyy" />
			</h:panelGroup>

			<h:panelGroup styleClass="campo col-12 md:col-6 lg:col-6 xl:col-4">
				<p:outputLabel for="@next" value="Validade do Plano — Criador" />
				<p:datePicker value="#{usuarioBean.entidade.validadePlanoCriador}"
				pattern="dd/MM/yyyy" />
			</h:panelGroup>

			<h:panelGroup styleClass="campo col-12 md:col-6 lg:col-6 xl:col-4">
				<p:outputLabel for="@next" value="Validade do Plano — Avaliação" />
				<p:datePicker value="#{usuarioBean.entidade.validadePlanoAvaliacao}"
				pattern="dd/MM/yyyy" />
			</h:panelGroup>

			<h:panelGroup styleClass="campoMsg col-12 md:col-6 lg:col-4 xl:col-3"
			rendered="#{usuarioBean.cadastro}">
				<p:outputLabel for="@next" value="Senha" />
				<p:password value="#{usuarioBean.senha}" feedback="true"
				required="#{usuarioBean.cadastro}" requiredMessage="A senha é obrigatória"
				match="confirmaSenha" maxlength="255" />
				<p:message for="@previous" display="text"/>
			</h:panelGroup>

			<h:panelGroup styleClass="campoMsg col-12 md:col-6 lg:col-4 xl:col-3"
			rendered="#{usuarioBean.cadastro}">
				<p:outputLabel for="@next" value="Confirmar Senha" />
				<p:password id="confirmaSenha" value="#{usuarioBean.confirmaSenha}"
				required="#{usuarioBean.cadastro}" requiredMessage="Confirme a senha" maxlength="255" />
				<p:message for="@previous" display="text"/>
			</h:panelGroup>

			<h:panelGroup styleClass="campo col-12 md:col-4 lg:col-2 xl:col-2">
				<p:outputLabel for="@next" value="Admin" />
				<p:toggleSwitch class="toggleSwitch-form"
				value="#{usuarioBean.entidade.admin}" />
			</h:panelGroup>

			<h:panelGroup styleClass="campo col-12 md:col-4 lg:col-2 xl:col-2">
				<p:outputLabel for="@next" value="Ativo" />
				<p:toggleSwitch class="toggleSwitch-form"
				value="#{usuarioBean.entidade.ativo}" />
			</h:panelGroup>

		</div>

		<div class="content-button" >

			<div class="divisor" ></div>

		    <div class="flex gap-3 flex-wrap">

				<p:commandButton value="Remover" icon="pi pi-trash"
					rendered="#{!usuarioBean.cadastro}"
					styleClass="ui-button-danger ui-button-flat"
					action="#{usuarioBean.remover}" update="@form, :growl"
					process="@this">
					<p:confirm header="Confirmação" icon="pi pi-info-circle"
					message="Você tem certeza que deseja remover este Usuário?" />
				</p:commandButton>

			</div>

			<div class="flex gap-3 flex-wrap">

				<p:commandButton id="auditoria" value="Auditoria"
					rendered="#{sessaoBean.podeVerAuditoria and !usuarioBean.cadastro}"
					styleClass="ui-button-flat ui-button-plain"
					icon="fa-regular fa-eye"
					action="#{auditoriaBean.carregar(usuarioBean.entidade, usuarioBean.nome)}"
					update="dialog-auditoria"
					process="@this" oncomplete="PF('dialogAuditoria').show()">
				</p:commandButton>

				<p:button value="Voltar"
				styleClass="ui-button-outlined"
				icon="pi pi-chevron-left" href="/administracao/usuarios/usuario/list.xhtml" />

				<p:commandButton id="adicionarCadastro" value="Adicionar"
					rendered="#{usuarioBean.cadastro}"
					styleClass="ui-button-raised ui-button-success"
					icon="pi pi-plus"
					action="#{usuarioBean.adicionar(false)}" update="@form, :growl"
					process="@form">
						<p:defaultCommand target="adicionarCadastro" />
				</p:commandButton>

				<p:commandButton id="salvarCadastro" value="Salvar"
					rendered="#{!usuarioBean.cadastro}"
					styleClass="ui-button-raised ui-button-primary"
					icon="pi pi-check"
					action="#{usuarioBean.salvar(false)}" update="@form, :growl"
					process="@form">
						<p:defaultCommand target="salvarCadastro" />
				</p:commandButton>

			</div>
		</div>

	</h:form>

</ui:decorate>
