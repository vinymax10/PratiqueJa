<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

	<ui:define name="linkPage">
		<h:outputText class="linkPage" value="#{usuarioBean.nome}" />
	</ui:define>

	<f:metadata>
	    <f:viewAction action="#{usuarioBean.filtrar()}" />
	</f:metadata>

	<h:form id="form" class="form" >

		<div class="content-button flex-column lg:flex-row xl:flex-row" >

			<div class="flex gap-3 align-items-center w-full md:w-full lg:w-6 xl:w-6">

				<div class="w-full">
					<span class="ui-input-icon-left" style="width:100%">
						<i class="pi pi-search" />
						<p:inputText id="globalFilter" value="#{usuarioBean.filtro.nome}"
						placeholder="Nome" styleClass="w-full" >
							<p:ajax event="keyup" delay="500" update="tabela" listener="#{usuarioBean.filtrar}" />
						</p:inputText>
					</span>
				</div>

				<p:button value="Filtros" icon="fa-solid fa-filter"
				onclick="slideToggle('filtros'); return false;"
				styleClass="ui-button-outlined ui-button-secondary" />

			</div>

			<div class="flex gap-3 align-items-center justify-content-end">

				<ui:include src="/exportar/exportar.xhtml" >
					<ui:param name="id" value="form:tabela" />
					<ui:param name="nome" value="Usuarios" />
				</ui:include>

				<p:button value="Adicionar" icon="pi pi-plus"
				styleClass="ui-button-raised ui-button-success"
				href="/administracao/usuarios/usuario/form.xhtml?cadastro=true" />

			</div>
		</div>

		<ui:include src="/administracao/usuarios/usuario/filtro.xhtml" />

		<p:dataTable id="tabela" class="tableStatus" stripedRows="true"
			var="entidade" value="#{usuarioBean.lista}" reflow="true"
			selection="#{usuarioBean.entidade}" selectionMode="single"
			rowKey="#{entidade.id}" rows="30" paginator="true" paginatorAlwaysVisible="false">

			<p:ajax event="rowSelect" update="@form" listener="#{usuarioBean.onSelected}"
			resetValues="true"/>

			<p:column headerText="Nome" responsivePriority="1" width="25%">
				<h:outputText value="#{entidade.nome}" />
			</p:column>

			<p:column headerText="Email" responsivePriority="2" width="30%">
				<h:outputText value="#{entidade.email}" />
			</p:column>

			<p:column headerText="Perfil" responsivePriority="3" width="15%">
				<h:outputText value="#{entidade.perfil.nome}" />
			</p:column>

			<p:column headerText="Turma" responsivePriority="4" width="15%">
				<h:outputText value="#{entidade.turma.nome}" />
			</p:column>

			<p:column headerText="Criador" responsivePriority="5" width="8%">
				<p:toggleSwitch value="#{entidade.criador}" disabled="true" />
			</p:column>

			<p:column headerText="Ativo" responsivePriority="6" width="7%">
				<p:toggleSwitch value="#{entidade.ativo}" disabled="true" />
			</p:column>

		</p:dataTable>

	</h:form>

</ui:decorate>
