<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

	<ui:define name="linkPage">
		<h:outputText class="linkPage" value="#{assinaturaBean.nome}" />
	</ui:define>

	<f:metadata>
		<f:viewAction action="#{assinaturaBean.filtrar()}" />
	</f:metadata>

	<h:form id="form" class="form">

		<div class="content-button flex-column lg:flex-row xl:flex-row">

			<div class="flex gap-3 align-items-center w-full md:w-full lg:w-6 xl:w-6">

				<div class="w-full">
					<span class="ui-input-icon-left" style="width:100%">
						<i class="pi pi-search" />
						<p:inputText value="#{assinaturaBean.filtro.nomeUsuario}"
						placeholder="Nome do Usuário" styleClass="w-full">
							<p:ajax event="keyup" delay="500" update="tabela" listener="#{assinaturaBean.filtrar}" />
						</p:inputText>
					</span>
				</div>

				<p:button value="Filtros" icon="fa-solid fa-filter"
				onclick="slideToggle('filtros'); return false;"
				styleClass="ui-button-outlined ui-button-secondary" />

			</div>

			<div class="flex gap-3 align-items-center justify-content-end">

				<ui:include src="/exportar/exportar.xhtml">
					<ui:param name="id" value="form:tabela" />
					<ui:param name="nome" value="Assinaturas" />
				</ui:include>

			</div>
		</div>

		<ui:include src="/administracao/usuarios/assinatura/filtro.xhtml" />

		<p:dataTable id="tabela" class="tableStatus" stripedRows="true"
			var="entidade" value="#{assinaturaBean.lista}" reflow="true"
			selection="#{assinaturaBean.entidade}" selectionMode="single"
			rowKey="#{entidade.id}" rows="30" paginator="true" paginatorAlwaysVisible="false">

			<p:ajax event="rowSelect" update="@form" listener="#{assinaturaBean.onSelected}"
			resetValues="true"/>

			<p:column headerText="Foto" width="4rem" responsivePriority="6">
				<h:graphicImage class="circleTable" value="#{entidade.usuario.foto.endereco}"
				rendered="#{not empty entidade.usuario.foto}" />
			</p:column>

			<p:column headerText="ID" responsivePriority="5" width="5rem">
				<h:outputText value="#{entidade.id}" />
			</p:column>

			<p:column headerText="Nome" responsivePriority="1">
				<h:outputText value="#{entidade.usuario.nome}" />
			</p:column>

			<p:column headerText="Produto" responsivePriority="2">
				<h:outputText value="#{entidade.produto.nome}" rendered="#{entidade.produto != null}" />
			</p:column>

			<p:column headerText="Início" responsivePriority="3">
				<h:outputText value="#{entidade.dataInicio}">
					<f:convertDateTime pattern="dd/MM/yyyy" type="localDate"/>
				</h:outputText>
			</p:column>

			<p:column headerText="Validade" responsivePriority="2">
				<h:outputText value="#{entidade.dataValidade}">
					<f:convertDateTime pattern="dd/MM/yyyy" type="localDate"/>
				</h:outputText>
			</p:column>

			<p:column headerText="Status" responsivePriority="1">
				<ui:include src="/status/status.xhtml">
					<ui:param name="status" value="#{entidade.status}" />
				</ui:include>
			</p:column>

		</p:dataTable>

	</h:form>

</ui:decorate>
