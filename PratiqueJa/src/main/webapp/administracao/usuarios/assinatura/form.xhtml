<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

	<ui:define name="linkPage">
		<h:outputText class="linkPage" value="#{assinaturaBean.nome}" />
	</ui:define>

	<ui:define name="OpenGraph">
		<link rel="stylesheet" href="/css/admin-form.css" type="text/css" />
		<!-- Breadcrumb igual ao da list (form sem item próprio no menu). -->
		<script>window.t2Bread = { main: 'Usuários', sub: 'Assinaturas' };</script>
	</ui:define>


	<f:metadata>
		<f:viewParam name="chave" value="#{assinaturaBean.chave}" />
		<f:viewParam name="cadastro" value="#{assinaturaBean.cadastro}" converter="jakarta.faces.Boolean"/>
		<f:viewAction action="#{assinaturaBean.carregar()}" />
	</f:metadata>

	<h:form id="form" class="form uf-form">

		<h4 class="title-divisor">Assinatura</h4>

		<div class="ui-fluid gride">

			<h:panelGroup styleClass="campoMsg col-12 md:col-12 lg:col-6 xl:col-4">
				<p:outputLabel for="@next" value="Usuário"/>
				<p:selectOneMenu value="#{assinaturaBean.entidade.usuario}" converter="generic"
				filter="true" filterMatchMode="contains"
				required="true" requiredMessage="Selecione um usuário">
					<f:selectItem itemLabel="Selecione" itemValue="#{null}" noSelectionOption="true"/>
					<f:selectItems value="#{usuarioBean.listaTudo}" var="usuario"
					itemLabel="#{usuario.nome}" itemValue="#{usuario}"/>
				</p:selectOneMenu>
				<p:message for="@previous" display="text"/>
			</h:panelGroup>

			<h:panelGroup styleClass="campoMsg col-12 md:col-12 lg:col-6 xl:col-4">
				<p:outputLabel for="@next" value="Produto"/>
				<p:selectOneMenu value="#{assinaturaBean.entidade.produto}" converter="generic"
				filter="true" filterMatchMode="contains"
				required="true" requiredMessage="Selecione um produto">
					<f:selectItem itemLabel="Selecione" itemValue="#{null}" noSelectionOption="true"/>
					<f:selectItems value="#{produtoBean.listaTudo}" var="produto"
					itemLabel="#{produto.nome} (R$ #{produto.valor})" itemValue="#{produto}"/>
				</p:selectOneMenu>
				<p:message for="@previous" display="text"/>
			</h:panelGroup>

			<h:panelGroup styleClass="campoMsg col-12 md:col-6 lg:col-4 xl:col-4">
				<p:outputLabel for="@next" value="Código do Assinante Hotmart"/>
				<p:inputText value="#{assinaturaBean.entidade.subscriberCodeHotmart}" />
				<p:message for="@previous" display="text"/>
			</h:panelGroup>

			<h:panelGroup styleClass="campoMsg col-12 md:col-6 lg:col-3 xl:col-2">
				<p:outputLabel for="@next" value="Início"/>
				<p:datePicker value="#{assinaturaBean.entidade.dataInicio}" locale="pt"
				required="true" requiredMessage="A data de início é obrigatória" pattern="dd/MM/yyyy"/>
				<p:message for="@previous" display="text"/>
			</h:panelGroup>

			<h:panelGroup styleClass="campoMsg col-12 md:col-6 lg:col-3 xl:col-2">
				<p:outputLabel for="@next" value="Validade"/>
				<p:datePicker value="#{assinaturaBean.entidade.dataValidade}" locale="pt" pattern="dd/MM/yyyy"/>
				<p:message for="@previous" display="text"/>
			</h:panelGroup>

			<h:panelGroup styleClass="campoMsg col-12 md:col-6 lg:col-3 xl:col-2">
				<p:outputLabel for="@next" value="Status"/>
				<p:selectOneMenu value="#{assinaturaBean.entidade.status}" required="true">
					<f:selectItems value="#{assinaturaBean.opcoesStatus}"/>
				</p:selectOneMenu>
				<p:message for="@previous" display="text"/>
			</h:panelGroup>

			<h:panelGroup styleClass="campoMsg col-12 md:col-6 lg:col-3 xl:col-2">
				<p:outputLabel for="@next" value="Cancelamento"/>
				<p:datePicker value="#{assinaturaBean.entidade.dataCancelamento}" locale="pt" pattern="dd/MM/yyyy"/>
				<p:message for="@previous" display="text"/>
			</h:panelGroup>

		</div>

		<div class="content-button">

			<div class="divisor"></div>

			<div class="flex gap-3 flex-wrap">

				<p:commandButton value="Remover" icon="pi pi-trash"
					rendered="#{!assinaturaBean.cadastro}"
					styleClass="ui-button-danger ui-button-flat"
					action="#{assinaturaBean.remover}" update="@form, :growl"
					process="@this">
					<p:confirm header="Confirmação" icon="pi pi-info-circle"
					message="Você tem certeza que deseja remover esta Assinatura?" />
				</p:commandButton>

				<p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true">
					<p:commandButton value="Não" type="button" styleClass="ui-confirmdialog-no ui-button-flat" />
					<p:commandButton value="Sim" type="button" styleClass="ui-confirmdialog-yes" />
				</p:confirmDialog>

			</div>

			<div class="flex gap-3 flex-wrap">

				<p:commandButton value="Auditoria"
					rendered="#{sessaoBean.podeVerAuditoria and !assinaturaBean.cadastro}"
					styleClass="ui-button-flat ui-button-plain"
					icon="fa-regular fa-eye"
					action="#{auditoriaBean.carregar(assinaturaBean.entidade, assinaturaBean.nome)}"
					update="dialog-auditoria"
					process="@this" oncomplete="PF('dialogAuditoria').show()">
				</p:commandButton>

				<p:button value="Voltar"
				styleClass="ui-button-outlined"
				icon="pi pi-chevron-left" href="/administracao/usuarios/assinatura/list.xhtml" />

				<p:commandButton id="adicionarCadastro" value="Adicionar"
					rendered="#{assinaturaBean.cadastro}"
					styleClass="ui-button-raised ui-button-success"
					icon="pi pi-plus"
					action="#{assinaturaBean.adicionar(false)}" update="@form, :growl"
					process="@form">
						<p:defaultCommand target="adicionarCadastro" />
				</p:commandButton>

				<p:commandButton id="salvarCadastro" value="Salvar"
					rendered="#{!assinaturaBean.cadastro}"
					styleClass="ui-button-raised ui-button-primary"
					icon="pi pi-check"
					action="#{assinaturaBean.salvar(false)}" update="@form, :growl"
					process="@form">
						<p:defaultCommand target="salvarCadastro" />
				</p:commandButton>

			</div>
		</div>

	</h:form>

</ui:decorate>
