<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

	<ui:define name="linkPage">
		<h:outputText class="linkPage" value="Controle de Acesso" />
	</ui:define>

	<f:metadata>
		<f:viewAction action="#{controleAcessoBean.filtrar()}" />
	</f:metadata>

	<h:form id="form" class="form">

		<div class="content-button flex-column lg:flex-row xl:flex-row">

			<div class="flex gap-3 align-items-center w-full md:w-full lg:w-6 xl:w-6">

				<div class="w-full">
					<span class="ui-input-icon-left" style="width:100%">
						<i class="pi pi-search" />
						<p:inputText id="globalFilter" value="#{controleAcessoBean.filtro.nomeUsuario}"
						placeholder="Nome do usuário" styleClass="w-full">
							<p:ajax event="keyup" delay="500" update="tabela" listener="#{controleAcessoBean.filtrar}" />
						</p:inputText>
					</span>
				</div>

				<p:button value="Filtros" icon="fa-solid fa-filter"
				onclick="slideToggle('filtros'); return false;"
				styleClass="ui-button-outlined ui-button-secondary" />

			</div>

			<div class="flex gap-3 align-items-center justify-content-end">

				<ui:include src="/exportar/exportar.xhtml">
					<ui:param name="id" value="form:tabela" />
					<ui:param name="nome" value="ControleAcesso" />
				</ui:include>

			</div>
		</div>

		<ui:include src="/administracao/controle-acesso/filtro.xhtml" />

		<p:dataTable id="tabela" stripedRows="true"
			var="controleAcesso" value="#{controleAcessoBean.controlesAcessos}"
			reflow="true" rows="30" paginator="true" paginatorAlwaysVisible="false">

			<p:columnGroup type="header">
				<p:row>
					<p:column colspan="1" headerText="Usuário"/>
					<p:column colspan="1" headerText="Mês"/>
					<p:column colspan="1" headerText="Páginas Baixadas"/>
					<p:column colspan="1" headerText="Exercício"/>
					<p:column colspan="2" headerText="Questão"/>
				</p:row>
				<p:row>
					<p:column colspan="3" headerText=""/>
					<p:column colspan="1" headerText="Nº Resolução"/>
					<p:column colspan="1" headerText="Nº Feita"/>
					<p:column colspan="1" headerText="Nº Resolução"/>
				</p:row>
			</p:columnGroup>

			<p:column headerText="Usuário" responsivePriority="1">
				<h:outputText value="#{controleAcesso.usuario.nome}" />
			</p:column>

			<p:column headerText="Mês" responsivePriority="2">
				<h:outputText value="#{controleAcesso.data}">
					<f:convertDateTime pattern="MM/yyyy" type="localDate" />
				</h:outputText>
			</p:column>

			<p:column headerText="Páginas Baixadas" responsivePriority="3">
				<h:outputText value="#{controleAcesso.numPaginasBaixadas}" />
			</p:column>

			<p:column headerText="Nº Resolução" responsivePriority="4">
				<h:outputText value="#{controleAcesso.numResolucaoExercicio}" />
			</p:column>

			<p:column headerText="Nº Feita" responsivePriority="4">
				<h:outputText value="#{controleAcesso.numQuestaoFeita}" />
			</p:column>

			<p:column headerText="Nº Resolução" responsivePriority="4">
				<h:outputText value="#{controleAcesso.numResolucaoQuestao}" />
			</p:column>

		</p:dataTable>

	</h:form>

</ui:decorate>
