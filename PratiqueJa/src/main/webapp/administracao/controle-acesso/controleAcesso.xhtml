<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">
	

    <h:form id="form" style="margin-bottom:0">
		<div class="p-d-flex">
	    	<div class="p-grid" style="margin:0 15px;width:100%;">
		
				<div class="p-col-12" >	
					<h2>Controle de Acesso</h2>	
				</div>
				
				<p:panel header="Filtro" toggleable="true" closable="true" toggleSpeed="500"
             		closeSpeed="500" widgetVar="panel" style="margin-bottom:1rem;width:100%;">
					
					<div class="ui-fluid formgrid grid">
						
						<div class="field col-12 lg:col-6 xl:col-4">
							<p:outputLabel for="@next" value="Nome do usuário"/>
							<p:inputText value="#{controleAcessoBean.filtroControleAcesso.nomeUsuario}" />
						</div>
						
						<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
		                    <p:outputLabel for="@next" value="Início"/>
							<p:datePicker value="#{controleAcessoBean.filtroControleAcesso.inicio}" />		
						</div>
						
						<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
		                    <p:outputLabel for="@next" value="Término"/>
							<p:datePicker value="#{controleAcessoBean.filtroControleAcesso.termino}" />		
						</div>
			            
					</div>
					
					<p:divider />
			
					<div class="p-grid" style="margin-top:1rem">
						
						<div class="p-col-12 p-text-right" >
						
							<p:commandButton  value="Filtrar" styleClass="ui-button-raised ui-button-flat" 
							icon="pi pi-search" action="#{controleAcessoBean.filtrar}" 
							update="@form, :growl"  process="@form"	/>
						</div>
						
					</div>
		       
		   		</p:panel>
		   		
			    <p:dataTable id="tabela" class="table table-striped" 
			    var="controleAcesso" value="#{controleAcessoBean.controlesAcessos}" reflow="true" 
			    paginator="true" rows="20">
			    	
			    	<p:columnGroup type="header">
		                <p:row>
		                    <p:column colspan="1" headerText="Usuário"/>
		              		<p:column colspan="1" headerText="Data"/>
		                    <p:column colspan="1" headerText="Download Massa"/>
		                    
		                    <p:column colspan="2" headerText="Exercício"/>
		                    <p:column colspan="4" headerText="Questão"/>
		                </p:row>
		                <p:row>
		                	<p:column colspan="3" headerText=""/>
		                	<p:column colspan="1" headerText="Download"/>
		                    <p:column colspan="1" headerText="Nª Resolucao"/>
		                    <p:column colspan="1" headerText="Nª Download Massa"/>
		                    <p:column colspan="1" headerText="Nª Feita"/>
		                    <p:column colspan="1" headerText="Nª Download"/>
		                    <p:column colspan="1" headerText="Nª Resolução"/>
		                </p:row>
		            </p:columnGroup>
			    	
			    	<p:column  headerText="Usuário" responsivePriority="1">
						<h:outputText value="#{controleAcesso.usuario.nome}"/>
					</p:column>
					
					<p:column headerText="Data" responsivePriority="2">
						<h:outputText value="#{controleAcesso.data}">
							<f:convertDateTime pattern="dd/MM/yyyy" type="localDate"/>
						</h:outputText>
					</p:column>
					
					<p:column  headerText="Download Massa" responsivePriority="5">
						<h:outputText value="#{controleAcesso.numDownloadMassa}"/>
					</p:column>
					
					<p:column  headerText="Download" responsivePriority="3">
						<h:outputText value="#{controleAcesso.numDownloadExercicio}"/>
					</p:column>
					
					<p:column  headerText="Nª Resolucao" responsivePriority="4">
						<h:outputText value="#{controleAcesso.numResolucaoExercicio}"/>
					</p:column>
					
					
					
					<p:column  headerText="Nª Download Massa" responsivePriority="4">
						<h:outputText value="#{controleAcesso.numDownloadQuestaoMassa}"/>
					</p:column>
					
					<p:column  headerText="Nª Feita" responsivePriority="4">
						<h:outputText value="#{controleAcesso.numQuestaoFeita}"/>
					</p:column>
					
					<p:column  headerText="Nª Download" responsivePriority="4">
						<h:outputText value="#{controleAcesso.numDownloadQuestao}"/>
					</p:column>
					
					<p:column  headerText="Nª Resolução" responsivePriority="4">
						<h:outputText value="#{controleAcesso.numResolucaoQuestao}"/>
					</p:column>
					
				</p:dataTable>
					
			</div>
		</div>
	</h:form>
	
</ui:decorate>
