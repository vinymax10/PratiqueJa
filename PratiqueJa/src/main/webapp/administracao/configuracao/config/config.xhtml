<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

    <ui:define name="linkPage">
		<h:outputText class="linkPage" value="Configuração" />
	</ui:define>

	<h:form id="form" class="form">

		<h4 class="title-divisor">Configuração</h4>

		<div class="ui-fluid gride">

			<h:panelGroup styleClass="campo col-12 md:col-6 xl:col-6">
				<p:outputLabel for="@next" value="Endereço (raiz)" />
				<p:inputText
					placeholder="Ex.: C:\Users\maximovrm\Documents"
					value="#{configBean.config.endereco}" />
				<small class="status" style="color:#64748b">
					Os demais caminhos derivam daqui: latex/, images/, pdf/, ebook/, avaliacoes/
				</small>
			</h:panelGroup>

			<h:panelGroup styleClass="campoMsg col-12 md:col-6 lg:col-3 xl:col-3">
				<p:outputLabel for="@next" value="Sistema Operacional" />

				<p:selectOneMenu
					value="#{configBean.config.sistemaOperacional}"
					required="true"
					requiredMessage="O sistema operacional é obrigatório"
					filter="true"
					filterMatchMode="contains">

					<f:selectItem itemLabel="Selecione"
						itemValue="#{null}" noSelectionOption="true" />

					<f:selectItems
						value="#{sistemaOperacionalBean.opcoes}"
						var="opcao"
						itemLabel="#{opcao.nome}"
						itemValue="#{opcao}" />

				</p:selectOneMenu>

				<p:message for="@previous" display="text" />
			</h:panelGroup>

			<h:panelGroup styleClass="campo col-12 md:col-6 lg:col-3 xl:col-3">
				<p:outputLabel for="@next" value="Remove Diretórios" />

				<p:toggleSwitch
					class="toggleSwitch-form"
					value="#{configBean.config.removeDiretorios}" />
			</h:panelGroup>

		</div>

		<div class="content-button">

			<div class="divisor"></div>

			<div></div>

			<div class="flex gap-3 flex-wrap">

				<p:commandButton
					id="salvarGerais"
					value="Salvar"
					styleClass="ui-button-raised ui-button-primary"
					icon="pi pi-check"
					action="#{configBean.salvar}"
					update="@form, :growl"
					process="@form">

					<p:defaultCommand target="salvarGerais" />

				</p:commandButton>

			</div>

		</div>

	</h:form>

</ui:decorate>
