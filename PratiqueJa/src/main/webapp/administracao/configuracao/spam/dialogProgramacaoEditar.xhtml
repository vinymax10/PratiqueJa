<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

<h:body>
	<ui:composition>

		<p:dialog id="dialog-editar-programacaoSpam"
		class="col-12 md:col-12 lg:col-10 lg:col-offset-1 xl:col-8 xl:col-offset-2"
		header="Editar Programação de Spam"
		showEffect="fade" hideEffect="fade" width="100%;" modal="true"
		widgetVar="dialogEditarProgramacaoSpam" responsive="true">
			<h:form id="formEditarProgramacaoSpam" class="form">
				<div class="ui-fluid gride">

					<h:panelGroup styleClass="campo col-12 md:col-4 lg:col-3 xl:col-2">
						<p:outputLabel for="@next" value="Ordem" />
						<p:inputNumber minValue="0" maxValue="1000" decimalPlaces="0"
							value="#{programacaoSpamBean.programacaoSpam.ordem}" required="true"
							requiredMessage="A ordem é obrigatória" />
					</h:panelGroup>

					<h:panelGroup styleClass="campoMsg col-12 lg:col-9 xl:col-10">
						<p:outputLabel for="@next" value="Assunto" />
						<p:selectOneMenu
							value="#{programacaoSpamBean.programacaoSpam.assunto}"
							converter="generic" required="true"
							requiredMessage="O assunto é obrigatório"
							filter="true" filterMatchMode="contains">
							<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
							<f:selectItems value="#{assuntoBean.listaAtivas}"
								var="assunto" itemLabel="#{assunto.nome}"
								itemValue="#{assunto}" />
						</p:selectOneMenu>
						<p:message for="@previous" display="text" />
					</h:panelGroup>

				</div>

				<div class="content-button-right">
					<div class="divisor"></div>
					<p:commandButton id="salvarEdicao" value="Salvar"
						styleClass="ui-button-raised ui-button-primary"
						icon="pi pi-check"
						action="#{programacaoSpamBean.salvar}"
						update="@form, :form:tabela, :growl" process="@form"
						oncomplete="if (args &amp;&amp; !args.validationFailed) PF('dialogEditarProgramacaoSpam').hide()">
						<p:defaultCommand target="salvarEdicao" />
					</p:commandButton>
				</div>
			</h:form>
		</p:dialog>

	</ui:composition>
</h:body>
</html>
