<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

	<ui:define name="linkPage">
		<h:outputText class="linkPage" value="Config Cleanup" />
	</ui:define>
	
	<h:form id="form" class="form">
	
		<h4 class="title-divisor">Config Cleanup</h4>
	
		<div class="ui-fluid gride">
	
			<h:panelGroup styleClass="campoMsg col-12 md:col-6 lg:col-3 xl:col-3">
	
				<p:outputLabel for="@next"
					value="Dias remover exercício realizado" />
	
				<p:inputText
					id="diasRemoverExercicioRealizado"
					placeholder="Dias remover exercício realizado"
					value="#{configCleanupBean.configCleanup.diasRemoverExercicioRealizado}"
					required="true"
					requiredMessage="Os dias para remover um exercício realizado é obrigatório" />
	
				<p:message for="diasRemoverExercicioRealizado"
					display="text" />
	
			</h:panelGroup>
	
			<h:panelGroup styleClass="campoMsg col-12 md:col-6 lg:col-3 xl:col-3">
	
				<p:outputLabel for="@next"
					value="Dias remover exercício não realizado" />
	
				<p:inputText
					id="diasRemoverExercicioNaoRealizado"
					placeholder="Dias remover exercício não realizado"
					value="#{configCleanupBean.configCleanup.diasRemoverExercicioNaoRealizado}"
					required="true"
					requiredMessage="Os dias para remover um exercício não realizado é obrigatório" />
	
				<p:message for="diasRemoverExercicioNaoRealizado"
					display="text" />
	
			</h:panelGroup>

		</div>
	
		<div class="content-button">
	
			<div class="divisor"></div>
	
			<div></div>
	
			<div class="flex gap-3 flex-wrap">
	
				<p:commandButton
					id="salvarGerais"
					value="Salvar"
					styleClass="ui-button-raised ui-button-primary"
					icon="pi pi-check"
					action="#{configCleanupBean.salvar}"
					update="@form, :growl"
					process="@form">
	
					<p:defaultCommand target="salvarGerais" />
	
				</p:commandButton>
	
			</div>
	
		</div>
	
	</h:form>
	
	
</ui:decorate>
