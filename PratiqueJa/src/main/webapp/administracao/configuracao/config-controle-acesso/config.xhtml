<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

	<ui:define name="linkPage">
		<h:outputText class="linkPage" value="Config Controle de Acesso" />
	</ui:define>

	<h:form id="form" class="form">

		<h4 class="title-divisor">Limites Mensais — Perfil Básico</h4>

		<div class="ui-fluid gride">

			<h:panelGroup styleClass="campoMsg col-12 md:col-6 lg:col-3 xl:col-3">

				<p:outputLabel for="@next" value="Páginas baixadas (todos os downloads)" />

				<p:inputText
					id="limitePaginasBaixadas"
					placeholder="Páginas baixadas"
					value="#{configControleAcessoBean.configControleAcesso.limitePaginasBaixadas}"
					required="true"
					requiredMessage="O limite de páginas baixadas é obrigatório" />

				<p:message for="limitePaginasBaixadas" display="text" />

			</h:panelGroup>

			<h:panelGroup styleClass="campoMsg col-12 md:col-6 lg:col-3 xl:col-3">

				<p:outputLabel for="@next" value="Resoluções de exercício" />

				<p:inputText
					id="limiteResolucaoExercicio"
					placeholder="Resoluções de exercício"
					value="#{configControleAcessoBean.configControleAcesso.limiteResolucaoExercicio}"
					required="true"
					requiredMessage="O limite de resoluções de exercício é obrigatório" />

				<p:message for="limiteResolucaoExercicio" display="text" />

			</h:panelGroup>

			<h:panelGroup styleClass="campoMsg col-12 md:col-6 lg:col-3 xl:col-3">

				<p:outputLabel for="@next" value="Resoluções de questão" />

				<p:inputText
					id="limiteResolucaoQuestao"
					placeholder="Resoluções de questão"
					value="#{configControleAcessoBean.configControleAcesso.limiteResolucaoQuestao}"
					required="true"
					requiredMessage="O limite de resoluções de questão é obrigatório" />

				<p:message for="limiteResolucaoQuestao" display="text" />

			</h:panelGroup>

			<h:panelGroup styleClass="campoMsg col-12 md:col-6 lg:col-3 xl:col-3">

				<p:outputLabel for="@next" value="Questões feitas" />

				<p:inputText
					id="limiteQuestaoFeita"
					placeholder="Questões feitas"
					value="#{configControleAcessoBean.configControleAcesso.limiteQuestaoFeita}"
					required="true"
					requiredMessage="O limite de questões feitas é obrigatório" />

				<p:message for="limiteQuestaoFeita" display="text" />

			</h:panelGroup>

		</div>

		<div class="content-button">

			<div class="divisor"></div>

			<div></div>

			<div class="flex gap-3 flex-wrap">

				<p:commandButton
					id="salvar"
					value="Salvar"
					styleClass="ui-button-raised ui-button-primary"
					icon="pi pi-check"
					action="#{configControleAcessoBean.salvar}"
					update="@form, :growl"
					process="@form">

					<p:defaultCommand target="salvar" />

				</p:commandButton>

			</div>

		</div>

	</h:form>

</ui:decorate>
