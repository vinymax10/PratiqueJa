<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:body >
		<ui:composition>
			<p:menuButton value="Exportar" icon="fa-solid fa-download"
			buttonStyleClass="ui-button-outlined ui-button-secondary"
			>
				
				<p:menuitem value="Excel" title="Baixar auditoria em Excel" 
					styleClass="ui-button-raised ui-button-flat ui-button-help"
					icon="fa-regular fa-file-excel" ajax="false">
				    <p:fileDownload value="#{auditoriaBean.excel()}" />
				</p:menuitem>
				
				<p:menuitem value="CSV" title="Baixar auditoria em CSV"
					styleClass="ui-button-raised ui-button-flat ui-button-help"
					 icon="fa-solid fa-file-csv" ajax="false">
				    <p:fileDownload value="#{auditoriaBean.csv()}" />
				</p:menuitem>
				
				<p:menuitem value="PDF" title="Baixar auditoria em PDF"
					styleClass="ui-button-raised ui-button-flat ui-button-help"
					icon="fa-regular fa-file-pdf" ajax="false">
				    <p:fileDownload value="#{auditoriaBean.pdf()}" />
				</p:menuitem>
			</p:menuButton>				
		</ui:composition>		
	</h:body>
</html>
