<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:body >
		<ui:composition>
		
			<div class="title-divisor-button" >
				
				<h4 class="m-0" > Filtro</h4>
				<div class="flex justify-content-end">
					<ui:include src="/configuracao/auditoria/exportar.xhtml" />
				</div>
			</div>
			<div class="ui-fluid gride" >
				
				<div class="campo col-12 md:col-6 lg:col-4 xl:col-3">
					<p:outputLabel for="@next" value="Entidade" />
					<p:selectOneMenu value="#{auditoriaBean.filtro.entidade}"
					 filter="true"	filterMatchMode="contains" >
	                	<f:selectItem itemLabel="Selecione" itemValue="#{null}" noSelectionOption="true"/>
						<f:selectItems value="#{auditoriaBean.entidadesAuditavel}" var="opcao"
							itemLabel="#{opcao.nome}" itemValue="#{opcao.classeNome}" />
					</p:selectOneMenu>
				</div>
				
				<div class="campo col-12 md:col-12 lg:col-7 xl:col-3">
					<p:outputLabel for="@next" value="ID" />
					<p:inputText value="#{auditoriaBean.filtro.entidadeId}" 
					placeholder="ID da entidade"  keyFilter="num"/>
				</div>
				
				<div class="campo col-12 md:col-12 lg:col-7 xl:col-6">
					<p:outputLabel for="@next" value="Resumo" />
					<p:inputText value="#{auditoriaBean.filtro.resumo}" 
					placeholder="Resumo"  />
				</div>
				
				<div class="campo col-12 md:col-6 lg:col-6 xl:col-3">
					<p:outputLabel for="@next" value="Loja" />
					<p:selectOneMenu value="#{auditoriaBean.filtro.loja}"
					 filter="true"	filterMatchMode="contains" converter="generic">
	                	<f:selectItem itemLabel="Selecione" itemValue="#{null}" noSelectionOption="true"/>
						<f:selectItems value="#{lojaBean.listaAtivas}" var="opcao"
							itemLabel="#{opcao.nomeFantasia}" itemValue="#{opcao}" />
					</p:selectOneMenu>
				</div>
				
				<div class="campo col-12 md:col-12 lg:col-7 xl:col-3">
					<p:outputLabel for="@next" value="IP" />
					<p:inputText value="#{auditoriaBean.filtro.ip}" 
					placeholder="Ex.: 172.0.0.1"  />
				</div>
				
				<div class="campo col-12 md:col-12 lg:col-7 xl:col-3">
					<p:outputLabel for="@next" value="Navegador" />
					<p:inputText value="#{auditoriaBean.filtro.userAgent}" 
					placeholder="Ex.: Mozilla"  />
				</div>
				
				<div class="campo col-12 md:col-6 lg:col-4 xl:col-3">
					<p:outputLabel for="@next" value="Tipo" />
					<p:selectOneMenu value="#{auditoriaBean.filtro.tipo}"
					 filter="true"	filterMatchMode="contains" >
	                	<f:selectItem itemLabel="Selecione" itemValue="#{null}" noSelectionOption="true"/>
						<f:selectItems value="#{auditoriaBean.tiposEvento}" var="opcao"
							itemLabel="#{opcao.nome}" itemValue="#{opcao}" />
					</p:selectOneMenu>
				</div>
				
				<div class="campo col-12 md:col-6 lg:col-6 xl:col-3">
					<p:outputLabel for="@next" value="Usuário" />
					<p:selectOneMenu value="#{auditoriaBean.filtro.usuario}"
					 filter="true"	filterMatchMode="contains" converter="generic">
	                	<f:selectItem itemLabel="Selecione" itemValue="#{null}" noSelectionOption="true"/>
						<f:selectItems value="#{usuarioBean.usuariosLoja()}" var="opcao"
							itemLabel="#{opcao.nome}" itemValue="#{opcao}" />
					</p:selectOneMenu>
				</div>
				
				<div class="campo col-12 md:col-6 lg:col-6 xl:col-3">
	                <p:outputLabel for="@next" value="Períodos Comuns"/>
	                <p:selectOneMenu id="preset" value="#{auditoriaBean.filtro.preset}"
	                filter="true"	filterMatchMode="contains"  >
	                	<f:selectItem itemLabel="Todos" itemValue="#{null}" noSelectionOption="true"/>
	                    <f:selectItems value="#{periodoPresetBean.opcoes}" var="opcao" 
	                    itemLabel="#{opcao.nome}" itemValue="#{opcao}"/>
	                	
	                	<p:ajax event="change" listener="#{auditoriaBean.filtro.aplicarPreset}" 
	                	update="form:periodo" />
	                	
	                </p:selectOneMenu>
	            </div>
	            
				<div class="campo col-12 md:col-6 lg:col-6 xl:col-3">
					<p:outputLabel for="@next" value="Período" />
					<p:datePicker id="periodo" value="#{auditoriaBean.filtro.periodo}"
		              selectionMode="range"
		              placeholder="Período"
		              locale="pt" 
		              monthNavigator="true" 
		              yearNavigator="select"
		              readonlyInput="true" 
		              hideOnRangeSelection="true" >
		              
			              <p:ajax event="change" listener="#{auditoriaBean.filtro.resetPreset}" 
		                	update="form:preset" />
		              </p:datePicker>
				</div>
				
			</div>
		
			<div class="content-button-right" >
					
				<div class="divisor" ></div>
					
				<p:commandButton value="Limpar"
				styleClass="ui-button-flat ui-button-plain" 
				icon="fa-solid fa-eraser" 
				action="#{auditoriaBean.filtrarInitEmpresa}" update="@form"  >
				</p:commandButton>
				
				<p:commandButton id="filtrar" value="Filtrar"
				styleClass="ui-button-raised ui-button-primary" 
				icon="pi pi-search" 
				action="#{auditoriaBean.filtrarEmpresa}" update="@form, :growl"  process="@form"	>
					<p:defaultCommand target="form-auditoria:filtrar"/>
				</p:commandButton>
					
			</div>
       
		</ui:composition>		
	</h:body>
</html>
