<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

<h:body>
	<ui:composition>

		<p:dialog id="dialog-adicionar-programacaoSpam"
		class="col-12 md:col-12 lg:col-10 lg:col-offset-1 xl:col-8 xl:col-offset-2"
		header="Adicionar Programação de Spam"
		showEffect="fade" hideEffect="fade" width="100%;" modal="true"
		widgetVar="dialogAdicionarProgramacaoSpam" responsive="true"
		focus="formAdicionarProgramacaoSpam:ordem">
			<h:form id="formAdicionarProgramacaoSpam" class="form">
				<div class="ui-fluid gride">

					<h:panelGroup styleClass="campo col-12 md:col-4 lg:col-3 xl:col-2">
						<p:outputLabel for="ordem" value="Ordem" />
						<p:inputNumber id="ordem" minValue="0" maxValue="1000" decimalPlaces="0"
							value="#{programacaoSpamBean.ordem}" required="true"
							requiredMessage="A ordem é obrigatória" />
						<p:message for="ordem" display="text" />
					</h:panelGroup>

					<h:panelGroup styleClass="campo col-12 md:col-4 lg:col-3 xl:col-2">
						<p:outputLabel for="@next" value="Quantidade" />
						<p:inputNumber minValue="1" maxValue="100" decimalPlaces="0"
							value="#{programacaoSpamBean.quantidade}" required="true"
							requiredMessage="A quantidade é obrigatória" />
					</h:panelGroup>

					<h:panelGroup styleClass="campoMsg col-12 lg:col-6 xl:col-8">
						<p:outputLabel for="assuntoCurso" value="Assunto" />
						<p:selectOneMenu id="assuntoCurso"
							value="#{programacaoSpamBean.programacaoSpam.assuntoCurso}"
							converter="generic" required="true"
							requiredMessage="O assunto é obrigatório"
							filter="true" filterMatchMode="contains">
							<f:selectItems value="#{assuntoCursoBean.listaAtivas}"
								var="assuntoCurso" itemLabel="#{assuntoCurso.nome}"
								itemValue="#{assuntoCurso}" />
						</p:selectOneMenu>
						<p:message for="assuntoCurso" display="text" />
					</h:panelGroup>

				</div>

				<div class="content-button-right">
					<div class="divisor"></div>
					<p:commandButton id="salvarAdicionar" value="Adicionar"
						styleClass="ui-button-raised ui-button-success"
						icon="pi pi-plus"
						action="#{programacaoSpamBean.adicionar()}"
						update="@form, :form:tabela, :growl" process="@form"
						oncomplete="if (args &amp;&amp; !args.validationFailed) PF('dialogAdicionarProgramacaoSpam').hide()">
						<p:defaultCommand target="salvarAdicionar" />
					</p:commandButton>
				</div>
			</h:form>
		</p:dialog>

	</ui:composition>
</h:body>
</html>
