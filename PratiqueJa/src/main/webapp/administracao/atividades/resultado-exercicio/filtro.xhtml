<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:body >
		<ui:composition>
			<div id="filtros" style="width: 100%;display:none;">

				<p:card class="newBorder mb-3" style="width: 100%;">
					<div class="ui-fluid gride" >
						<h4 class="title-card" >Filtro</h4>

						<h:panelGroup styleClass="campo col-12 md:col-6 lg:col-6 xl:col-3">
							<p:outputLabel for="@next" value="Assunto Curso"/>
							<p:selectOneMenu value="#{resultadoExercicioBean.filtro.assunto}"
							converter="generic" filter="true" filterMatchMode="contains">
								<f:selectItem itemLabel="Todos" itemValue="#{null}" noSelectionOption="true"/>
								<f:selectItems value="#{assuntoBean.listaAtivas}"
								var="assunto" itemLabel="#{assunto.nome}"
								itemValue="#{assunto}" />
							</p:selectOneMenu>
						</h:panelGroup>

						<h:panelGroup styleClass="campo col-12 md:col-6 lg:col-6 xl:col-3">
							<p:outputLabel for="@next" value="Módulo"/>
							<p:selectOneMenu value="#{resultadoExercicioBean.filtro.modulo}"
							filter="true" filterMatchMode="contains">
								<f:selectItem itemLabel="Todos" itemValue="#{null}" noSelectionOption="true"/>
								<f:selectItems value="#{moduloBean.opcoes}" var="opcao"
								itemLabel="#{opcao.nome}" itemValue="#{opcao}"/>
							</p:selectOneMenu>
						</h:panelGroup>

						<h:panelGroup styleClass="campo col-12 md:col-6 lg:col-6 xl:col-3">
							<p:outputLabel for="@next" value="Nível"/>
							<p:selectOneMenu value="#{resultadoExercicioBean.filtro.nivel}"
							filter="true" filterMatchMode="contains">
								<f:selectItem itemLabel="Todos" itemValue="#{null}" noSelectionOption="true"/>
								<f:selectItems value="#{nivelBean.opcoes}" var="opcao"
								itemLabel="#{opcao.nome}" itemValue="#{opcao}"/>
							</p:selectOneMenu>
						</h:panelGroup>

						<h:panelGroup styleClass="campo col-12 md:col-6 lg:col-6 xl:col-3">
							<p:outputLabel for="@next" value="Tipo de Exercício"/>
							<p:selectOneMenu value="#{resultadoExercicioBean.filtro.tipoExercicio}"
							filter="true" filterMatchMode="contains">
								<f:selectItem itemLabel="Todos" itemValue="#{null}" noSelectionOption="true"/>
								<f:selectItems value="#{tipoExercicioBean.opcoes}" var="opcao"
								itemLabel="#{opcao.nome}" itemValue="#{opcao}"/>
							</p:selectOneMenu>
						</h:panelGroup>

						<h:panelGroup styleClass="campo col-12 md:col-6 lg:col-6 xl:col-6">
							<p:outputLabel for="@next" value="Nome / Enunciado / Descrição"/>
							<p:inputText value="#{resultadoExercicioBean.filtro.nomeEnunciadoDescricao}"
							placeholder="Busca por nome, enunciado ou descrição" />
						</h:panelGroup>

						<h:panelGroup styleClass="campo col-12 md:col-6 lg:col-6 xl:col-3">
							<p:outputLabel for="preset" value="Períodos Comuns"/>
							<p:selectOneMenu id="preset"
							value="#{resultadoExercicioBean.filtro.preset}"
							filter="true" filterMatchMode="contains">
								<f:selectItem itemLabel="Todos" itemValue="#{null}" noSelectionOption="true"/>
								<f:selectItems value="#{periodoPresetBean.opcoes}"
								var="opcao" itemLabel="#{opcao.nome}" itemValue="#{opcao}"/>
								<p:ajax event="change"
								listener="#{resultadoExercicioBean.filtro.aplicarPreset}"
								update="form:periodo"/>
							</p:selectOneMenu>
						</h:panelGroup>

						<h:panelGroup styleClass="campo col-12 md:col-6 lg:col-6 xl:col-3">
							<p:outputLabel for="periodo" value="Período"/>
							<p:datePicker id="periodo"
							value="#{resultadoExercicioBean.filtro.periodo}"
							selectionMode="range"
							placeholder="Período"
							locale="pt"
							monthNavigator="true"
							yearNavigator="select"
							readonlyInput="true"
							hideOnRangeSelection="true">
								<p:ajax event="change"
								listener="#{resultadoExercicioBean.filtro.resetPreset}"
								update="form:preset"/>
							</p:datePicker>
						</h:panelGroup>

					</div>

					<div class="content-button-right" >

						<div class="divisor" ></div>

						<p:commandButton value="Limpar"
						styleClass="ui-button-flat ui-button-plain"
						icon="fa-solid fa-eraser" oncomplete="manterFiltroAberto('filtros');"
						action="#{resultadoExercicioBean.filtrarInit}" update="@form" >
						</p:commandButton>

						<p:commandButton id="filtrar" value="Filtrar"
						styleClass="ui-button-raised ui-button-primary"
						icon="pi pi-search" oncomplete="manterFiltroAberto('filtros');"
						action="#{resultadoExercicioBean.filtrar}" update="@form, :growl" process="@form" >
							<p:defaultCommand target="form:filtrar"/>
						</p:commandButton>

					</div>

				</p:card>
			</div>
		</ui:composition>

	</h:body>
</html>
