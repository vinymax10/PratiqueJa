<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">
	

    <h:form id="form" style="margin-bottom:0">
		<div class="p-d-flex">
	    	<div class="p-grid" style="margin:0 15px;width:100%;">
		
			    <div class="p-col-12" >	
					<h2>Pagamento</h2>	
				</div>
		    
			    <h:panelGroup id="fomulario" style="width:100%;" rendered="#{!pagamentoBean.lista}">
								
	            	<ui:include src="/usuario/pagamento/cadastro.xhtml" />
		            	
			    </h:panelGroup>
				
				<h:panelGroup id="filtro" rendered="#{pagamentoBean.lista}">
								
					<p:commandButton  value="Adicionar"  icon="pi pi-plus" 
					styleClass="ui-button-raised ui-button-success ui-button-flat" 
					action="#{pagamentoBean.cadastrar}" update="@form"  process="@this" 
					style="margin-bottom:1rem;"	/>
					
					<p:panel header="Filtro" toggleable="true" closable="true" toggleSpeed="500"
	             		closeSpeed="500" widgetVar="panel" style="margin-bottom:1rem;">
						
						<div class="ui-fluid formgrid grid">
							<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
					       		<p:outputLabel for="@next" value="ID"/>
				                <p:inputText placeholder="ID" value="#{pagamentoBean.filtroPagamento.id}" />
							</div>
							
							<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
					       		<p:outputLabel for="@next" value="Nome do Usuário"/>
				                <p:inputText placeholder="Nome do Usuário" value="#{pagamentoBean.filtroPagamento.nomeUsuario}" />
							</div>
							
							<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
			                    <p:outputLabel for="@next" value="Plano" />
								<p:selectOneMenu value="#{pagamentoBean.filtroPagamento.plano}"  >
									<f:selectItem itemLabel="Selecione uma opção" itemValue=""/>
									<f:selectItems value="#{perfilUsuarioBean.opcoes}" var="opcao" 
				                    itemLabel="#{opcao.nome}" itemValue="#{opcao}"/>
								</p:selectOneMenu>
							</div>
							
							<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
					       		<p:outputLabel for="@next" value="Data Inicial"/>
				                <p:datePicker placeholder="Data Inicial" value="#{pagamentoBean.filtroPagamento.dataInicio}" />
							</div>
							
							<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
					       		<p:outputLabel for="@next" value="Data Fim"/>
				                <p:datePicker placeholder="Data Fim" value="#{pagamentoBean.filtroPagamento.dataFim}" />
							</div>
							
							<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
			                    <p:outputLabel for="@next" value="Tipo de Pagamento" />
								<p:selectOneMenu  value="#{pagamentoBean.filtroPagamento.tipoPagamento}"  >
									<f:selectItem itemLabel="Selecione uma opção" itemValue=""/>
									<f:selectItems value="#{tipoPagamentoBean.opcoes}" var="opcao" 
				                    itemLabel="#{opcao.nome}" itemValue="#{opcao}"/>
								</p:selectOneMenu>		
							</div>	
							
							<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
			                    <p:outputLabel for="@next" value="Pago" />
								<p:selectOneMenu  value="#{pagamentoBean.filtroPagamento.pago}"  >
									<f:selectItem itemLabel="Selecione uma opção" itemValue=""/>
									<f:selectItem itemLabel="Sim" itemValue="#{true}"/>
									<f:selectItem itemLabel="Não" itemValue="#{false}"/>
								</p:selectOneMenu>		
							</div>	
					
						</div>
						
						<p:divider />
				
						<div class="p-grid" style="margin-top:1rem">
							
							<div class="p-col-12 p-text-right" >
							
								<p:commandButton id="filtrar" value="Filtrar" styleClass="ui-button-raised ui-button-flat" icon="pi pi-search" 
								action="#{pagamentoBean.filtrar}" update="@form, :growl"  process="@form"	>
									<p:defaultCommand target="form:filtrar"/>
								</p:commandButton>
								
							</div>
						</div>
			       
			   		</p:panel>
			   		
				    <p:dataTable id="tabela" class="table table-striped" 
				    var="pagamento" value="#{pagamentoBean.pagamentos}" reflow="true" 
				    selection="#{pagamentoBean.pagamento}" selectionMode="single" rowKey="#{pagamento.id}"
				    paginator="true" rows="20">
				    	<p:ajax event="rowSelect" update="@form" listener="#{pagamentoBean.onSelected}"/>
				    
				    	<p:column headerText="Foto" width="4rem" responsivePriority="2">
				    		<p:graphicImage class="circleTable" value="#{pagamento.usuario.imagem.getFotoStreamedContent()}" 
				    		rendered="#{not empty pagamento.usuario.imagem}" stream="false" />
				    	</p:column>
				    	
				    	<p:column headerText="ID" responsivePriority="3" >
							<h:outputText value="#{pagamento.id}"  />
						</p:column>
				    	
				    	<p:column headerText="Nome" responsivePriority="1" >
							<h:outputText value="#{pagamento.usuario.nome}"  />
						</p:column>
						
						<p:column headerText="Data" responsivePriority="2">
							<h:outputText value="#{pagamento.data}" >
								<f:convertDateTime pattern="dd/MM/yyyy" type="localDate"/>
							</h:outputText>
						</p:column>
						
						<p:column headerText="Valor"  responsivePriority="1">
						
							<h:outputText value="R$ " />
							<h:outputText value="#{pagamento.valor}" >
								<f:convertNumber pattern="#,##0.00" />
							</h:outputText>
							
						</p:column>
						
						<p:column headerText="Tipo Pagamento" responsivePriority="1">
							<h:outputText value="#{pagamento.tipoPagamento.nome}" />
						</p:column>
						
						<p:column headerText="Plano" responsivePriority="1">
							<h:outputText value="#{pagamento.plano.nome}" />
						</p:column>
						
						<p:column headerText="Pago" responsivePriority="1" width="3rem" 
						exportable="false">
							
							<p:commandLink
								styleClass="rounded-button ui-button-flat "
								action="#{pagamentoBean.pagoToggle(pagamento)}"
								update="@this" process="@this"	>
								
								<div class="buttonIcon">
									<h:outputText rendered="#{!pagamento.pago}" 	 >
										<i class="fa-regular fa-square despesa" title="Click para pagar" ></i>
									</h:outputText>
									
									<h:outputText rendered="#{pagamento.pago}"	 >
										<i class="fa-regular fa-square-check receita" title="Click para deixar pendente" ></i>
									</h:outputText>
								</div>
								
							</p:commandLink> 
							
						</p:column>
					</p:dataTable>
					
				</h:panelGroup>
			</div>
		</div>
	</h:form>
	
	
</ui:decorate>
