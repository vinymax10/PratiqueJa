<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

	<ui:define name="linkPage">
		<h:outputText class="linkPage" value="Resultado dos Exercícios" />
	</ui:define>

	<f:metadata>
	    <f:viewAction action="#{resultadoExercicioBean.filtrar()}" />
	</f:metadata>

	<h:form id="form" class="form" >

		<div class="content-button flex-column lg:flex-row xl:flex-row" >

			<div class="flex gap-3 align-items-center w-full md:w-full lg:w-6 xl:w-6">

				<div class="w-full">
					<span class="ui-input-icon-left" style="width:100%">
						<i class="pi pi-search" />
						<p:inputText id="globalFilter" value="#{resultadoExercicioBean.filtro.nomeUsuario}"
						placeholder="Nome do usuário" styleClass="w-full" >
							<p:ajax event="keyup" delay="500" update="tabela" listener="#{resultadoExercicioBean.filtrar}" />
						</p:inputText>
					</span>
				</div>

				<p:button value="Filtros" icon="fa-solid fa-filter"
				onclick="slideToggle('filtros'); return false;"
				styleClass="ui-button-outlined ui-button-secondary" />

			</div>

			<div class="flex gap-3 align-items-center justify-content-end">

				<ui:include src="/exportar/exportar.xhtml" >
					<ui:param name="id" value="form:tabela" />
					<ui:param name="nome" value="ResultadosExercicios" />
				</ui:include>

			</div>
		</div>

		<ui:include src="/administracao/resultado-exercicio/filtro.xhtml" />

		<p:dataTable id="tabela" class="tableStatus" stripedRows="true"
			var="resultado" value="#{resultadoExercicioBean.resultadosExercicios}"
			reflow="true" rows="30" paginator="true" paginatorAlwaysVisible="false">

			<p:column headerText="Usuário" responsivePriority="1">
				<h:outputText value="#{resultado.usuario.nome}" />
			</p:column>

			<p:column headerText="Assunto Curso" responsivePriority="2">
				<h:outputText value="#{resultado.exercicioPadrao.assuntoCurso.nome}" />
			</p:column>

			<p:column headerText="Módulo" responsivePriority="3">
				<h:outputText value="#{resultado.exercicioPadrao.assuntoCurso.modulo.nome}" />
			</p:column>

			<p:column headerText="Nível" responsivePriority="4">
				<h:outputText value="#{resultado.exercicioPadrao.nivel.nome}" />
			</p:column>

			<p:column headerText="Realização" responsivePriority="5">
				<h:outputText value="#{resultado.realizacao}">
					<f:convertDateTime pattern="dd/MM/yyyy" type="localDate" />
				</h:outputText>
			</p:column>

			<p:column headerText="Nota" responsivePriority="6">
				<h:outputText value="#{resultado.notaPorcentagem}">
					<f:convertNumber pattern="#,##0.00" />
				</h:outputText>
				<h:outputText value=" %" />
				<p:progressBar value="#{resultado.notaPorcentagem}"
				displayOnly="true" style="height:.5rem" />
			</p:column>

		</p:dataTable>

	</h:form>

</ui:decorate>
