<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

	<ui:define name="linkPage">
		<h:outputText class="linkPage" value="#{exercicioBean.nome}" />
	</ui:define>

	<f:metadata>
		<f:viewAction action="#{exercicioBean.filtrar()}" />
	</f:metadata>

	<h:form id="form" class="form">

		<div class="content-button flex-column lg:flex-row xl:flex-row" >

			<div class="flex gap-3 align-items-center w-full md:w-full lg:w-6 xl:w-6">

				<div class="w-full">
					<span class="ui-input-icon-left" style="width:100%">
						<i class="pi pi-search" />
						<p:inputText id="globalFilter" value="#{exercicioBean.filtro.nome}"
						placeholder="Nome / Enunciado / Descrição" styleClass="w-full" >
							<p:ajax event="keyup" delay="500" update="tabela" listener="#{exercicioBean.filtrar}" />
						</p:inputText>
					</span>
				</div>

				<p:button value="Filtros" icon="fa-solid fa-filter"
				onclick="slideToggle('filtros'); return false;"
				styleClass="ui-button-outlined ui-button-secondary" />

			</div>

			<div class="flex gap-3 align-items-center justify-content-end">

				<ui:include src="/exportar/exportar.xhtml" >
					<ui:param name="id" value="form:tabela" />
					<ui:param name="nome" value="Exercícios" />
				</ui:include>

				<p:button value="Adicionar" icon="pi pi-plus"
				styleClass="ui-button-raised ui-button-success"
				href="/administracao/conteudo/exercicio/form.xhtml?cadastro=true" />

			</div>
		</div>

		<ui:include src="/administracao/conteudo/exercicio/filtro.xhtml" />

		<p:dataTable id="tabela" class="tableStatus" stripedRows="true"
			var="entidade" value="#{exercicioBean.lista}" reflow="true"
			selection="#{exercicioBean.entidade}" selectionMode="single"
			rowKey="#{entidade.id}" rows="30" paginator="true" paginatorAlwaysVisible="false">

			<p:ajax event="rowSelect" update="@form" listener="#{exercicioBean.onSelected}"
			resetValues="true"/>

			<p:column headerText="Usuário" responsivePriority="1">
				<h:outputText value="#{entidade.usuario.nome}" />
			</p:column>

			<p:column headerText="Assunto" responsivePriority="1">
				<h:outputText value="#{entidade.exercicioPadrao.assunto.nome}" />
			</p:column>

			<p:column headerText="Nível" responsivePriority="2">
				<h:outputText value="#{entidade.exercicioPadrao.nivel.nome}" />
			</p:column>

			<p:column headerText="Prazo" responsivePriority="3">
				<h:outputText value="#{entidade.prazo}">
					<f:convertDateTime pattern="dd/MM/yyyy" type="localDate"/>
				</h:outputText>
			</p:column>

			<p:column headerText="Realização" responsivePriority="3">
				<h:outputText value="#{entidade.realizacao}" rendered="#{entidade.realizado}">
					<f:convertDateTime pattern="dd/MM/yyyy" type="localDate"/>
				</h:outputText>
			</p:column>

			<p:column headerText="Nota" responsivePriority="2">
				<h:outputText value="#{entidade.nota}" rendered="#{entidade.realizado}">
					<f:convertNumber pattern="#,##0.00" />
				</h:outputText>
			</p:column>

			<p:column headerText="Realizado" responsivePriority="4">
				<h:outputText value="#{entidade.realizado}" converter="simNaoConverter"/>
			</p:column>
			
			<p:column headerText="Visializar" responsivePriority="3">
							
				<p:button styleClass="ui-button-raised ui-button-flat ui-button-success" value="Visializar"
				icon="pi pi-caret-right" href="/administracao/conteudo/exercicio/verExercicio.xhtml?id=#{entidade.id}" 
				update="@form, :growl" 
				oncomplete="reloadMathJax();" style="width: auto" >
				</p:button>
				
			</p:column>

		</p:dataTable>

	</h:form>

</ui:decorate>
