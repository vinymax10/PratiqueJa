<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

	<ui:define name="linkPage">
		<h:outputText class="linkPage" value="Novo Exercício" />
	</ui:define>

	<h:form id="form" class="form">

		<h4 class="title-divisor">Novo Exercício</h4>

		<div class="ui-fluid gride">

			<h:panelGroup styleClass="campoMsg col-12 md:col-8 lg:col-6 xl:col-6">
				<p:outputLabel for="@next" value="Exercícios Padrão" />
				<p:selectCheckboxMenu value="#{exercicioBean.exerciciosPadrao}"
				converter="generic" filter="true" filterMatchMode="contains"
				label="Selecione" multiple="true" scrollHeight="320"
				required="true" requiredMessage="Selecione ao menos um exercício padrão">
					<f:attribute name="collectionType" value="java.util.ArrayList" />
					<f:selectItems value="#{exercicioPadraoBean.listaTudo}" var="ep"
					itemLabel="#{ep.assunto.modulo.nome} - #{ep.assunto.nome} - #{ep.nivel.nome}"
					itemValue="#{ep}"/>
				</p:selectCheckboxMenu>
				<p:message for="@previous" display="text"/>
			</h:panelGroup>

			<h:panelGroup styleClass="campoMsg col-12 md:col-4 lg:col-3 xl:col-2">
				<p:outputLabel for="@next" value="Quantidade" />
				<p:inputNumber value="#{exercicioBean.quantidade}"
				minValue="1" maxValue="100" decimalPlaces="0"
				required="true" requiredMessage="A quantidade é obrigatória" />
				<p:message for="@previous" display="text"/>
			</h:panelGroup>

			<h:panelGroup styleClass="campo col-12 md:col-4 lg:col-3 xl:col-3">
				<p:outputLabel for="@next" value="Global" />
				<p:toggleSwitch class="toggleSwitch-form"
					value="#{exercicioBean.global}" />
			</h:panelGroup>

		</div>

		<div class="content-button">

			<div class="divisor"></div>

			<div class="flex gap-3 flex-wrap">

				<p:button value="Voltar"
				styleClass="ui-button-outlined"
				icon="pi pi-chevron-left" href="/administracao/conteudo/exercicio/list.xhtml" />

				<p:commandButton id="adicionar" value="Adicionar"
					styleClass="ui-button-raised ui-button-success"
					icon="pi pi-plus"
					action="#{exercicioBean.adicionarDoPadrao}" update="@form, :growl"
					process="@form">
						<p:defaultCommand target="adicionar" />
				</p:commandButton>

			</div>
		</div>

	</h:form>

</ui:decorate>
