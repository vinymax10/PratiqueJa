<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

<h:body>
	<ui:composition>

		<h:panelGroup id="alternativas" class="gride mt-3 mb-3">

			<div class="title-divisor-button">
				<h4 class="m-0">Alternativas</h4>
				<div class="flex justify-content-end">
					<p:commandButton value="Alternativa" icon="pi pi-plus"
						styleClass="ui-button-raised ui-button-success"
						action="#{exercicioAlternativaBean.cadastrar()}"
						update="dialog-ex-alternativa" process="@this"
						oncomplete="PF('dialogExAlternativa').show()" resetValues="true" />
				</div>
			</div>

			<p:dataTable id="alternativasTabela" class="tableStatus ml-3 mr-3" stripedRows="true"
			var="entidade" value="#{exercicioBean.entidade.alternativas}"
			selection="#{exercicioAlternativaBean.entidadeOriginal}" reflow="true"
			selectionMode="single" rowKey="#{entidade.id}"
			rows="30" paginator="true" paginatorAlwaysVisible="false">

				<p:ajax event="rowSelect" update="dialog-ex-alternativa"
				listener="#{exercicioAlternativaBean.onRowSelect}"
				oncomplete="PF('dialogExAlternativa').show()" resetValues="true"/>

				<p:column headerText="Letra" responsivePriority="1" width="8%">
					<h:outputText value="#{entidade.letra}" />
				</p:column>

				<p:column headerText="Texto" responsivePriority="2">
					<h:outputText value="#{entidade.texto}" style="white-space:pre-wrap;" />
				</p:column>

				<p:column headerText="Correta" responsivePriority="3" width="10%">
					<h:outputText rendered="#{entidade.correta}">
						<i class="pi pi-check" style="color:var(--green-500);" />
					</h:outputText>
				</p:column>

				<p:column headerText="Qtd Escolhida" responsivePriority="4" width="12%">
					<h:outputText value="#{entidade.qtnEscolhida}" />
				</p:column>

			</p:dataTable>

		</h:panelGroup>

	</ui:composition>
</h:body>
</html>
