<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

	<ui:define name="linkPage">
		<h:outputText class="linkPage" value="Exercício" />
	</ui:define>

	<f:metadata>
		<f:viewParam name="id" value="#{exercicioBean.id}" converter="jakarta.faces.Long" />
		<f:viewAction action="#{exercicioBean.init()}" />
	</f:metadata>

	<h:form id="form" class="form" style="width:100%;">

		<div class="grid" style="margin:0 15px;">
			<div class="p-col-12">
				<h:outputText style="color: var(--iris);" rendered="#{not empty exercicioBean.exercicio.assunto}"
				value="Módulo #{exercicioBean.exercicio.assunto.modulo.nome}" />
				<h:outputText rendered="#{not empty exercicioBean.exercicio.assunto}" value=" - " />
				<h:outputText style="color: var(--verde);" rendered="#{not empty exercicioBean.exercicio.assunto}"
				value="Assunto #{exercicioBean.exercicio.assunto.nome}" />
				<h:outputText rendered="#{not empty exercicioBean.exercicio.assunto}" value=" - " />
				<h:outputText style="color: var(--cinza);"
				value="#{exercicioBean.exercicio.nivel.nome}" />
			</div>
		</div>

		<h4 class="title-divisor">Enunciado</h4>

		<div class="grid ui-fluid" style="margin:0 15px;">
			<ui:repeat value="#{exercicioBean.exercicio.paragrafos}" var="paragrafo">
				<div class="col-12" style="margin-bottom:8px;">
					<h:outputText rendered="#{!paragrafo.tipoImagem}" value="#{paragrafo.texto}" escape="false" />
					<p:graphicImage rendered="#{paragrafo.tipoImagem}"
					value="#{paragrafo.imagemFile.imagem()}" style="max-width:100%;" />
				</div>
			</ui:repeat>
		</div>

		<h4 class="title-divisor">Alternativas</h4>

		<div class="grid ui-fluid" style="margin:0 15px;">
			<ui:repeat value="#{exercicioBean.exercicio.alternativas}" var="alternativa">
				<div class="col-12" style="margin-bottom:6px;">
					<h:outputText styleClass="font-bold" style="color:var(--iris);"
					value="#{alternativa.letra}) " />
					<h:outputText value="#{alternativa.texto}" escape="false" />
					<i class="pi pi-check ml-2" style="color:var(--green-500);"
					rendered="#{alternativa.correta}" />
				</div>
			</ui:repeat>
		</div>

		<h:panelGroup rendered="#{not empty exercicioBean.exercicio.resolucaoLinhas}">
			<h4 class="title-divisor">Resolução</h4>
			<div class="grid ui-fluid" style="margin:0 15px;">
				<div class="col-12">
					<!-- Um bloco por passo (getResolucaoLinhas), em vez do resolucaoHtml colado com
					     <br/>: com <br/> o respiro depende do line-height, e um \dfrac é mais alto
					     que a linha — ela cresce pra caber a fração e o espaço entre os passos zera.
					     Estilo inline porque esta tela não carrega o exercicio-page.css. -->
					<ui:repeat value="#{exercicioBean.exercicio.resolucaoLinhas}" var="linhaResolucao">
						<h:outputText value="#{linhaResolucao}" escape="false"
							style="display:block;margin-bottom:0.55rem" />
					</ui:repeat>
				</div>
			</div>
		</h:panelGroup>

		<div class="content-button">
			<div class="divisor"></div>
			<div class="flex gap-3 flex-wrap">
				<p:button value="Voltar" styleClass="ui-button-outlined" icon="pi pi-chevron-left"
				href="/administracao/conteudo/exercicio/list.xhtml" />
				<p:button value="Editar" styleClass="ui-button-raised ui-button-primary" icon="pi pi-pencil"
				href="#{exercicioBean.getUrlEdicao(exercicioBean.exercicio)}"
				rendered="#{not empty exercicioBean.exercicio.id}" />
			</div>
		</div>

	</h:form>

	<h:outputScript target="body">if (typeof reloadMathJax === 'function') reloadMathJax();</h:outputScript>

</ui:decorate>
