<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

	<ui:define name="linkPage">
		<h:outputText class="linkPage" value="#{exercicioBean.nome}" />
	</ui:define>

	<f:metadata>
		<f:viewParam name="chave" value="#{exercicioBean.chave}" />
		<f:viewParam name="cadastro" value="#{exercicioBean.cadastro}" converter="jakarta.faces.Boolean"/>
		<f:viewAction action="#{exercicioBean.carregar()}" />
	</f:metadata>

	<h:form id="form" class="form">

		<h4 class="title-divisor">Exercício</h4>

		<div class="ui-fluid gride">

			<h:panelGroup styleClass="campoMsg col-12 md:col-12 lg:col-6 xl:col-6">
				<p:outputLabel for="@next" value="Assunto" />
				<p:selectOneMenu value="#{exercicioBean.entidade.assunto}"
				converter="generic" filter="true" filterMatchMode="contains"
				required="true" requiredMessage="O assunto é obrigatório">
					<f:selectItem itemLabel="Selecione" itemValue="#{null}" noSelectionOption="true"/>
					<f:selectItems value="#{assuntoBean.listaAtivas}"
					var="assunto" itemLabel="#{assunto.nome}" itemValue="#{assunto}" />
				</p:selectOneMenu>
				<p:message for="@previous" display="text"/>
			</h:panelGroup>

			<h:panelGroup styleClass="campoMsg col-12 md:col-6 lg:col-3 xl:col-3">
				<p:outputLabel for="@next" value="Nível" />
				<p:selectOneMenu value="#{exercicioBean.entidade.nivel}"
				filter="true" filterMatchMode="contains"
				required="true" requiredMessage="O nível é obrigatório">
					<f:selectItem itemLabel="Selecione" itemValue="#{null}" noSelectionOption="true"/>
					<f:selectItems value="#{nivelBean.opcoes}" var="opcao"
					itemLabel="#{opcao.nome}" itemValue="#{opcao}" />
				</p:selectOneMenu>
				<p:message for="@previous" display="text"/>
			</h:panelGroup>

			<h:panelGroup styleClass="campo col-12 md:col-6 lg:col-3 xl:col-3">
				<p:outputLabel for="@next" value="Global" />
				<p:toggleSwitch class="toggleSwitch-form"
					value="#{exercicioBean.entidade.global}" />
			</h:panelGroup>

			<h:panelGroup styleClass="campoMsg col-12 md:col-6 lg:col-3 xl:col-3">
				<p:outputLabel for="@next" value="Visibilidade" />
				<p:selectOneMenu value="#{exercicioBean.entidade.visibilidade}">
					<f:selectItem itemLabel="Selecione" itemValue="#{null}" noSelectionOption="true"/>
					<f:selectItems value="#{visibilidadePdfBean.opcoes}" var="opcao"
					itemLabel="#{opcao.nome}" itemValue="#{opcao}" />
				</p:selectOneMenu>
				<p:message for="@previous" display="text"/>
			</h:panelGroup>

		</div>

		<ui:include rendered="#{!exercicioBean.cadastro}"
		src="/administracao/conteudo/exercicio/paragrafo/paragrafo.xhtml" />

		<ui:include rendered="#{!exercicioBean.cadastro}"
		src="/administracao/conteudo/exercicio/alternativa/alternativa.xhtml" />

		<h4 class="title-divisor">Resolução</h4>

		<div class="ui-fluid gride">
			<div class="gride col-12 p-0">
				<div class="campo col-6">
					<p:outputLabel for="@next" value="Resolução" />
					<p:inputTextarea rows="10" value="#{exercicioBean.entidade.resolucao}" styleClass="w-full" />
				</div>
				<div class="campo col-6">
					<p:outputLabel value="Preview" style="display:block;margin-bottom:15px;" />
					<p:outputLabel value="#{exercicioBean.entidade.resolucao}" />
				</div>
			</div>
		</div>

		<div class="content-button">

			<div class="divisor"></div>

			<div class="flex gap-3 flex-wrap">

				<p:commandButton value="Remover" icon="pi pi-trash"
					rendered="#{!exercicioBean.cadastro}"
					styleClass="ui-button-danger ui-button-flat"
					action="#{exercicioBean.remover}" update="@form, :growl"
					process="@this">
					<p:confirm header="Confirmação" icon="pi pi-info-circle"
					message="Você tem certeza que deseja remover este Exercício?" />
				</p:commandButton>

				<p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true">
					<p:commandButton value="Não" type="button" styleClass="ui-confirmdialog-no ui-button-flat" />
					<p:commandButton value="Sim" type="button" styleClass="ui-confirmdialog-yes" />
				</p:confirmDialog>

			</div>

			<div class="flex gap-3 flex-wrap">

				<p:commandButton id="auditoria" value="Auditoria"
					rendered="#{sessaoBean.podeVerAuditoria and !exercicioBean.cadastro}"
					styleClass="ui-button-flat ui-button-plain"
					icon="fa-regular fa-eye"
					action="#{auditoriaBean.carregar(exercicioBean.entidade, exercicioBean.nome)}"
					update="dialog-auditoria"
					process="@this" oncomplete="PF('dialogAuditoria').show()">
				</p:commandButton>

				<p:button value="Voltar"
				styleClass="ui-button-outlined"
				icon="pi pi-chevron-left" href="/administracao/conteudo/exercicio/list.xhtml" />

				<p:commandButton id="adicionarCadastro" value="Adicionar"
					rendered="#{exercicioBean.cadastro}"
					styleClass="ui-button-raised ui-button-success"
					icon="pi pi-plus"
					action="#{exercicioBean.adicionar(true)}" update="@form, :growl"
					process="@form">
						<p:defaultCommand target="adicionarCadastro" />
				</p:commandButton>

				<p:commandButton id="salvarCadastro" value="Salvar"
					rendered="#{!exercicioBean.cadastro}"
					styleClass="ui-button-raised ui-button-primary"
					icon="pi pi-check"
					action="#{exercicioBean.salvar(false)}" update="@form, :growl"
					process="@form">
						<p:defaultCommand target="salvarCadastro" />
				</p:commandButton>

			</div>
		</div>

	</h:form>

	<ui:include src="/administracao/conteudo/exercicio/paragrafo/dialog-cadastro.xhtml" />
	<ui:include src="/administracao/conteudo/exercicio/alternativa/dialog-cadastro.xhtml" />

</ui:decorate>
