<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:body>
		<ui:composition>

			<h:panelGroup id="exParagrafos" class="gride">

				<div class="title-divisor-button">
					<h4 class="m-0">Enunciado (parágrafos)</h4>
					<div class="flex justify-content-end">
						<p:commandButton value="Parágrafo" icon="pi pi-plus"
							styleClass="ui-button-raised ui-button-success"
							action="#{exercicioParagrafoBean.cadastrar()}"
							update="dialog-ex-paragrafo" process="@this"
							oncomplete="PF('dialogExParagrafo').show()" resetValues="true">
						</p:commandButton>
					</div>
				</div>

				<p:dataTable id="exParagrafosTabela" class="tableStatus ml-3 mr-3" stripedRows="true"
				var="entidade" value="#{exercicioBean.entidade.paragrafos}"
				selection="#{exercicioParagrafoBean.entidadeOriginal}" reflow="true"
				selectionMode="single" rowKey="#{entidade.id}"
				rows="30" paginator="true" paginatorAlwaysVisible="false"
				draggableRows="true">

					<p:ajax event="rowSelect" update="dialog-ex-paragrafo"
					listener="#{exercicioParagrafoBean.onRowSelect}"
					oncomplete="PF('dialogExParagrafo').show()" resetValues="true"/>

					<p:ajax event="rowReorder"
					listener="#{exercicioParagrafoBean.onRowReorder(exercicioBean.entidade.paragrafos)}"
					update="form:exParagrafosTabela, :growl" oncomplete="reloadMathJax();" />

					<p:column headerText="Ordem" responsivePriority="1" width="10%">
						<h:outputText value="#{entidade.ordem}" />
					</p:column>

					<p:column headerText="Tipo" responsivePriority="2" width="15%">
						<h:outputText value="#{entidade.tipoImagem ? 'Imagem' : 'Texto'}" />
					</p:column>

					<p:column headerText="Conteúdo" responsivePriority="3">
						<h:outputText rendered="#{!entidade.tipoImagem}"
						value="#{entidade.texto}" style="white-space:pre-wrap;" />
						<h:outputText rendered="#{entidade.tipoImagem}"
						value="#{entidade.imagemFile.endImagem}" />
					</p:column>

				</p:dataTable>

			</h:panelGroup>

		</ui:composition>
	</h:body>
</html>
