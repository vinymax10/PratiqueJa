<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

	<ui:define name="linkPage">
		<h:outputText class="linkPage" value="#{configPdfExercicioBean.nome}" />
	</ui:define>

	<f:metadata>
		<f:viewAction action="#{configPdfExercicioBean.filtrar()}" />
	</f:metadata>

	<h:form id="form" class="form">

		<div class="content-button flex-column lg:flex-row xl:flex-row">

			<div class="flex gap-3 align-items-center w-full md:w-full lg:w-6 xl:w-6">

				<p:button value="Filtros" icon="fa-solid fa-filter"
				onclick="slideToggle('filtros'); return false;"
				styleClass="ui-button-outlined ui-button-secondary" />

			</div>

			<div class="flex gap-3 align-items-center justify-content-end">

				<ui:include src="/exportar/exportar.xhtml">
					<ui:param name="id" value="form:tabela" />
					<ui:param name="nome" value="Config Exercícios" />
				</ui:include>

				<p:button value="Adicionar" icon="pi pi-plus"
				styleClass="ui-button-raised ui-button-success"
				href="/administracao/conteudo/pdf/exercicio/config-exercicio/form.xhtml?cadastro=true" />

			</div>
		</div>

		<ui:include src="/administracao/conteudo/pdf/exercicio/config-exercicio/filtro.xhtml" />

		<p:dataTable id="tabela" class="tableStatus" stripedRows="true"
			var="entidade" value="#{configPdfExercicioBean.lista}" reflow="true"
			selection="#{configPdfExercicioBean.entidade}" selectionMode="single"
			rowKey="#{entidade.id}" rows="30" paginator="true" paginatorAlwaysVisible="false">

			<p:ajax event="rowSelect" update="@form" listener="#{configPdfExercicioBean.onSelected}" resetValues="true" />

			<p:column headerText="Nível" responsivePriority="1" width="15%">
				<h:outputText value="#{entidade.nivel.nome}" />
			</p:column>

			<p:column headerText="Visibilidade" responsivePriority="2" width="15%">
				<h:outputText value="#{entidade.visibilidade.nome}" />
			</p:column>

			<p:column headerText="Com Alternativas" responsivePriority="3" width="15%">
				<h:outputText value="#{entidade.comAlternativas ? 'Sim' : 'Não'}" />
			</p:column>

			<p:column headerText="Com Resolução" responsivePriority="4" width="15%">
				<h:outputText value="#{entidade.comResolucao ? 'Sim' : 'Não'}" />
			</p:column>

			<p:column headerText="Qtd Padrão" responsivePriority="5" width="15%">
				<h:outputText value="#{entidade.quantidadePadrao}" />
			</p:column>

			<p:column headerText="Qtd Espaçoso" responsivePriority="6" width="15%">
				<h:outputText value="#{entidade.quantidadeEspacoso}" />
			</p:column>

		</p:dataTable>

	</h:form>

</ui:decorate>
