<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

	<ui:define name="linkPage">
		<h:outputText class="linkPage" value="#{configPdfExercicioBean.nome}" />
	</ui:define>

	<ui:define name="OpenGraph">
		<link rel="stylesheet" href="/css/admin-form.css" type="text/css" />
		<!-- Breadcrumb igual ao da list (form sem item próprio no menu). -->
		<script>window.t2Bread = { main: 'PDFs', sub: 'Config PDF Exercício' };</script>
	</ui:define>


	<f:metadata>
		<f:viewParam name="chave" value="#{configPdfExercicioBean.chave}" />
		<f:viewParam name="cadastro" value="#{configPdfExercicioBean.cadastro}" converter="jakarta.faces.Boolean" />
		<f:viewAction action="#{configPdfExercicioBean.carregar()}" />
	</f:metadata>

	<h:form id="form" class="form uf-form">

		<h4 class="title-divisor">Config Exercício</h4>

		<div class="ui-fluid gride">

			<h:panelGroup styleClass="campoMsg col-12 md:col-6 lg:col-6 xl:col-3">
				<p:outputLabel for="@next" value="Nível" />
				<p:selectOneMenu value="#{configPdfExercicioBean.entidade.nivel}"
				required="true" requiredMessage="O nível é obrigatório">
					<f:selectItem itemLabel="Selecione" itemValue="#{null}" noSelectionOption="true" />
					<f:selectItems value="#{nivelBean.opcoes}"
					var="opcao" itemLabel="#{opcao.nome}" itemValue="#{opcao}" />
				</p:selectOneMenu>
				<p:message for="@previous" display="text" />
			</h:panelGroup>

			<h:panelGroup styleClass="campoMsg col-12 md:col-6 lg:col-6 xl:col-3">
				<p:outputLabel for="@next" value="Visibilidade" />
				<p:selectOneMenu value="#{configPdfExercicioBean.entidade.visibilidade}"
				required="true" requiredMessage="A visibilidade é obrigatória">
					<f:selectItem itemLabel="Selecione" itemValue="#{null}" noSelectionOption="true" />
					<f:selectItems value="#{visibilidadePdfBean.opcoes}"
					var="opcao" itemLabel="#{opcao.nome}" itemValue="#{opcao}" />
				</p:selectOneMenu>
				<p:message for="@previous" display="text" />
			</h:panelGroup>

			<h:panelGroup styleClass="campoMsg col-12 md:col-6 lg:col-6 xl:col-3">
				<p:outputLabel for="@next" value="Quantidade Padrão" />
				<p:inputNumber value="#{configPdfExercicioBean.entidade.quantidadePadrao}"
				decimalPlaces="0" minValue="0"
				required="true" requiredMessage="A quantidade padrão é obrigatória" />
				<p:message for="@previous" display="text" />
			</h:panelGroup>

			<h:panelGroup styleClass="campoMsg col-12 md:col-6 lg:col-6 xl:col-3">
				<p:outputLabel for="@next" value="Quantidade Espaçoso" />
				<p:inputNumber value="#{configPdfExercicioBean.entidade.quantidadeEspacoso}"
				decimalPlaces="0" minValue="0"
				required="true" requiredMessage="A quantidade espaçoso é obrigatória" />
				<p:message for="@previous" display="text" />
			</h:panelGroup>

			<h:panelGroup styleClass="campo col-12 md:col-6 lg:col-6 xl:col-3">
				<p:outputLabel for="@next" value="Com Alternativas" />
				<p:toggleSwitch class="toggleSwitch-form"
				value="#{configPdfExercicioBean.entidade.comAlternativas}" />
			</h:panelGroup>

			<h:panelGroup styleClass="campo col-12 md:col-6 lg:col-6 xl:col-3">
				<p:outputLabel for="@next" value="Com Resolução" />
				<p:toggleSwitch class="toggleSwitch-form"
				value="#{configPdfExercicioBean.entidade.comResolucao}" />
			</h:panelGroup>

		</div>

		<div class="content-button">

			<div class="divisor"></div>

			<div class="flex gap-3 flex-wrap">

				<p:commandButton value="Remover" icon="pi pi-trash"
					rendered="#{!configPdfExercicioBean.cadastro}"
					styleClass="ui-button-danger ui-button-flat"
					action="#{configPdfExercicioBean.remover}" update="@form, :growl"
					process="@this">
					<p:confirm header="Confirmação" icon="pi pi-info-circle"
					message="Você tem certeza que deseja remover esta Config Exercício?" />
				</p:commandButton>

			</div>

			<div class="flex gap-3 flex-wrap">

				<p:commandButton id="auditoria" value="Auditoria"
					rendered="#{sessaoBean.podeVerAuditoria and !configPdfExercicioBean.cadastro}"
					styleClass="ui-button-flat ui-button-plain"
					icon="fa-regular fa-eye"
					action="#{auditoriaBean.carregar(configPdfExercicioBean.entidade, configPdfExercicioBean.nome)}"
					update="dialog-auditoria"
					process="@this" oncomplete="PF('dialogAuditoria').show()">
				</p:commandButton>

				<p:button value="Voltar"
				styleClass="ui-button-outlined"
				icon="pi pi-chevron-left"
				href="/administracao/conteudo/pdf/exercicio/config-exercicio/list.xhtml" />

				<p:commandButton id="adicionarCadastro" value="Adicionar"
					rendered="#{configPdfExercicioBean.cadastro}"
					styleClass="ui-button-raised ui-button-success"
					icon="pi pi-plus"
					action="#{configPdfExercicioBean.adicionar(false)}" update="@form, :growl"
					process="@form">
						<p:defaultCommand target="adicionarCadastro" />
				</p:commandButton>

				<p:commandButton id="salvarCadastro" value="Salvar"
					rendered="#{!configPdfExercicioBean.cadastro}"
					styleClass="ui-button-raised ui-button-primary"
					icon="pi pi-check"
					action="#{configPdfExercicioBean.salvar(false)}" update="@form, :growl"
					process="@form">
						<p:defaultCommand target="salvarCadastro" />
				</p:commandButton>

			</div>
		</div>

		<p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true">
			<p:commandButton value="Não" type="button"
			styleClass="ui-confirmdialog-no ui-button-flat" />
			<p:commandButton value="Sim" type="button"
			styleClass="ui-confirmdialog-yes" />
		</p:confirmDialog>

	</h:form>

</ui:decorate>
