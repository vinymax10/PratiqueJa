<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

	<ui:define name="linkPage">
		<h:outputText class="linkPage" value="Gerar Lista de Questões PDF" />
	</ui:define>

	<h:form id="form" class="form">

		<h4 class="title-divisor">Gerar Lista de Questões em PDF</h4>

		<div class="ui-fluid gride">

			<h:panelGroup styleClass="campoMsg col-12 md:col-12 lg:col-6 xl:col-6">
				<p:outputLabel for="@next" value="Assunto" />
				<p:selectOneMenu value="#{gerarListaQuestoesBean.assunto}"
				converter="generic" filter="true" filterMatchMode="contains"
				required="true" requiredMessage="O assunto é obrigatório">
					<f:selectItem itemLabel="Selecione" itemValue="#{null}" noSelectionOption="true" />
					<f:selectItems value="#{assuntoBean.listaAtivas}"
					var="assunto" itemLabel="#{assunto.nome}" itemValue="#{assunto}" />
				</p:selectOneMenu>
				<p:message for="@previous" display="text" />
			</h:panelGroup>

			<h:panelGroup styleClass="campoMsg col-12 md:col-6 lg:col-3 xl:col-3">
				<p:outputLabel for="@next" value="Dificuldade" />
				<p:selectOneMenu value="#{gerarListaQuestoesBean.dificuldade}">
					<f:selectItem itemLabel="Todas" itemValue="#{null}" noSelectionOption="true" />
					<f:selectItems value="#{dificuldadeBean.opcoes}"
					var="opcao" itemLabel="#{opcao.nome}" itemValue="#{opcao}" />
				</p:selectOneMenu>
			</h:panelGroup>

			<h:panelGroup styleClass="campoMsg col-12 md:col-6 lg:col-3 xl:col-3">
				<p:outputLabel for="@next" value="Visibilidade" />
				<p:selectOneMenu value="#{gerarListaQuestoesBean.visibilidade}"
				required="true" requiredMessage="A visibilidade é obrigatória">
					<f:selectItem itemLabel="Selecione" itemValue="#{null}" noSelectionOption="true" />
					<f:selectItems value="#{visibilidadePdfBean.opcoes}"
					var="opcao" itemLabel="#{opcao.nome}" itemValue="#{opcao}" />
				</p:selectOneMenu>
				<p:message for="@previous" display="text" />
			</h:panelGroup>

			<h:panelGroup styleClass="campoMsg col-12 md:col-6 lg:col-6 xl:col-6">
				<p:outputLabel for="@next" value="Gabarito" />
				<p:selectOneMenu value="#{gerarListaQuestoesBean.tipoGabarito}"
				required="true" requiredMessage="O tipo de gabarito é obrigatório">
					<f:selectItems value="#{tipoGabaritoBean.opcoes}"
					var="opcao" itemLabel="#{opcao.nome}" itemValue="#{opcao}" />
				</p:selectOneMenu>
				<p:message for="@previous" display="text" />
			</h:panelGroup>

		</div>

		<div class="content-button">

			<div class="divisor"></div>

			<div class="flex gap-3 flex-wrap justify-content-end">

				<p:button value="Voltar"
				styleClass="ui-button-outlined"
				icon="pi pi-chevron-left" href="/administracao/conteudo/pdf/questao/list.xhtml" />

				<p:commandButton id="gerarBtn" value="Gerar"
					styleClass="ui-button-raised ui-button-primary"
					icon="pi pi-file-pdf"
					action="#{gerarListaQuestoesBean.gerar()}" update="@form, :growl"
					process="@form">
						<p:defaultCommand target="gerarBtn" />
				</p:commandButton>

			</div>
		</div>

		<p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true">
			<p:commandButton value="Não" type="button"
			styleClass="ui-confirmdialog-no ui-button-flat" />
			<p:commandButton value="Sim" type="button"
			styleClass="ui-confirmdialog-yes" />
		</p:confirmDialog>

	</h:form>

</ui:decorate>
