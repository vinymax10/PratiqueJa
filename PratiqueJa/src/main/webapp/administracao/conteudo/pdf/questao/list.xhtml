<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

	<ui:define name="linkPage">
		<h:outputText class="linkPage" value="#{pdfQuestaoBean.nome}" />
	</ui:define>

	<f:metadata>
		<f:viewAction action="#{pdfQuestaoBean.filtrar()}" />
	</f:metadata>

	<h:form id="form" class="form">

		<div class="content-button flex-column lg:flex-row xl:flex-row">

			<div class="flex gap-3 align-items-center w-full md:w-full lg:w-6 xl:w-6">

				<div class="w-full">
					<span class="ui-input-icon-left" style="width:100%">
						<i class="pi pi-search" />
						<p:inputText id="globalFilter" value="#{pdfQuestaoBean.filtro.descricao}"
						placeholder="Descrição" styleClass="w-full">
							<p:ajax event="keyup" delay="500" update="tabela" listener="#{pdfQuestaoBean.filtrar}" />
						</p:inputText>
					</span>
				</div>

				<p:button value="Filtros" icon="fa-solid fa-filter"
				onclick="slideToggle('filtros'); return false;"
				styleClass="ui-button-outlined ui-button-secondary" />

			</div>

			<div class="flex gap-3 align-items-center justify-content-end">

				<p:commandButton value="Remover Todos" icon="pi pi-trash"
				styleClass="ui-button-danger ui-button-flat"
				action="#{pdfQuestaoBean.removerTodos}" update="@form, :growl"
				process="@this">
					<p:confirm header="Confirmação" icon="pi pi-info-circle"
					message="Você tem certeza que deseja remover todos os PDFs listados?" />
				</p:commandButton>


				<ui:include src="/exportar/exportar.xhtml">
					<ui:param name="id" value="form:tabela" />
					<ui:param name="nome" value="PDFs" />
				</ui:include>

				<p:button value="Adicionar" icon="pi pi-plus"
				styleClass="ui-button-raised ui-button-success"
				href="/administracao/conteudo/pdf/questao/gerar.xhtml" />

			</div>
		</div>

		<ui:include src="/administracao/conteudo/pdf/questao/filtro.xhtml" />

		<p:dataTable id="tabela" class="tableStatus" stripedRows="true"
			var="entidade" value="#{pdfQuestaoBean.lista}" reflow="true"
			selection="#{pdfQuestaoBean.entidade}" selectionMode="single"
			rowKey="#{entidade.id}" rows="30" paginator="true" paginatorAlwaysVisible="false">

			<p:ajax event="rowSelect" update="@form" listener="#{pdfQuestaoBean.onSelected}" resetValues="true" />

			<p:column headerText="Assunto" responsivePriority="1" width="30%">
				<h:outputText value="#{entidade.assunto.nome}" />
			</p:column>

			<p:column headerText="Descrição" responsivePriority="2" width="40%">
				<h:outputText value="#{entidade.descricao}" />
			</p:column>

			<p:column headerText="Visibilidade" responsivePriority="3" width="15%">
				<h:outputText value="#{entidade.visibilidade.nome}" />
			</p:column>

			<p:column headerText="Caminho" responsivePriority="4" width="15%">
				<h:outputText value="#{entidade.caminho}" />
			</p:column>

			<p:column headerText="" responsivePriority="1" width="5%" style="text-align:center">
				<p:commandButton ajax="false" icon="pi pi-download"
					styleClass="ui-button-flat ui-button-plain"
					title="Baixar PDF"
					rendered="#{not empty entidade.caminho}">
					<p:fileDownload value="#{pdfQuestaoBean.download(entidade)}" />
				</p:commandButton>
			</p:column>

		</p:dataTable>

		<p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true">
			<p:commandButton value="Não" type="button"
			styleClass="ui-confirmdialog-no ui-button-flat" />
			<p:commandButton value="Sim" type="button"
			styleClass="ui-confirmdialog-yes" />
		</p:confirmDialog>

	</h:form>

</ui:decorate>
