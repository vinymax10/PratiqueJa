<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

	<ui:define name="linkPage">
		<h:outputText class="linkPage" value="#{configPdfQuestaoBean.nome}" />
	</ui:define>

	<f:metadata>
		<f:viewParam name="chave" value="#{configPdfQuestaoBean.chave}" />
		<f:viewParam name="cadastro" value="#{configPdfQuestaoBean.cadastro}" converter="jakarta.faces.Boolean" />
		<f:viewAction action="#{configPdfQuestaoBean.carregar()}" />
	</f:metadata>

	<h:form id="form" class="form">

		<h4 class="title-divisor">Config Questão</h4>

		<div class="ui-fluid gride">

			<h:panelGroup styleClass="campoMsg col-12 md:col-6 lg:col-6 xl:col-3">
				<p:outputLabel for="@next" value="Dificuldade" />
				<p:selectOneMenu value="#{configPdfQuestaoBean.entidade.dificuldade}"
				required="true" requiredMessage="A dificuldade é obrigatória">
					<f:selectItem itemLabel="Selecione" itemValue="#{null}" noSelectionOption="true" />
					<f:selectItems value="#{dificuldadeBean.opcoes}"
					var="opcao" itemLabel="#{opcao.nome}" itemValue="#{opcao}" />
				</p:selectOneMenu>
				<p:message for="@previous" display="text" />
			</h:panelGroup>

			<h:panelGroup styleClass="campoMsg col-12 md:col-6 lg:col-6 xl:col-3">
				<p:outputLabel for="@next" value="Visibilidade" />
				<p:selectOneMenu value="#{configPdfQuestaoBean.entidade.visibilidade}"
				required="true" requiredMessage="A visibilidade é obrigatória">
					<f:selectItem itemLabel="Selecione" itemValue="#{null}" noSelectionOption="true" />
					<f:selectItems value="#{visibilidadePdfBean.opcoes}"
					var="opcao" itemLabel="#{opcao.nome}" itemValue="#{opcao}" />
				</p:selectOneMenu>
				<p:message for="@previous" display="text" />
			</h:panelGroup>

			<h:panelGroup styleClass="campoMsg col-12 md:col-6 lg:col-6 xl:col-3">
				<p:outputLabel for="@next" value="Quantidade" />
				<p:inputNumber value="#{configPdfQuestaoBean.entidade.quantidade}"
				decimalPlaces="0" minValue="0"
				required="true" requiredMessage="A quantidade é obrigatória" />
				<p:message for="@previous" display="text" />
			</h:panelGroup>

			<h:panelGroup styleClass="campo col-12 md:col-6 lg:col-6 xl:col-3">
				<p:outputLabel for="@next" value="Todos" />
				<p:toggleSwitch class="toggleSwitch-form"
				value="#{configPdfQuestaoBean.entidade.todos}" />
			</h:panelGroup>

			<h:panelGroup styleClass="campo col-12 md:col-6 lg:col-6 xl:col-3">
				<p:outputLabel for="@next" value="Com Resolução" />
				<p:toggleSwitch class="toggleSwitch-form"
				value="#{configPdfQuestaoBean.entidade.comResolucao}" />
			</h:panelGroup>

		</div>

		<div class="content-button">

			<div class="divisor"></div>

			<div class="flex gap-3 flex-wrap">

				<p:commandButton value="Remover" icon="pi pi-trash"
					rendered="#{!configPdfQuestaoBean.cadastro}"
					styleClass="ui-button-danger ui-button-flat"
					action="#{configPdfQuestaoBean.remover}" update="@form, :growl"
					process="@this">
					<p:confirm header="Confirmação" icon="pi pi-info-circle"
					message="Você tem certeza que deseja remover esta Config Questão?" />
				</p:commandButton>

			</div>

			<div class="flex gap-3 flex-wrap">

				<p:commandButton id="auditoria" value="Auditoria"
					rendered="#{sessaoBean.podeVerAuditoria and !configPdfQuestaoBean.cadastro}"
					styleClass="ui-button-flat ui-button-plain"
					icon="fa-regular fa-eye"
					action="#{auditoriaBean.carregar(configPdfQuestaoBean.entidade, configPdfQuestaoBean.nome)}"
					update="dialog-auditoria"
					process="@this" oncomplete="PF('dialogAuditoria').show()">
				</p:commandButton>

				<p:button value="Voltar"
				styleClass="ui-button-outlined"
				icon="pi pi-chevron-left"
				href="/administracao/conteudo/pdf/questao/config-questao/list.xhtml" />

				<p:commandButton id="adicionarCadastro" value="Adicionar"
					rendered="#{configPdfQuestaoBean.cadastro}"
					styleClass="ui-button-raised ui-button-success"
					icon="pi pi-plus"
					action="#{configPdfQuestaoBean.adicionar(false)}" update="@form, :growl"
					process="@form">
						<p:defaultCommand target="adicionarCadastro" />
				</p:commandButton>

				<p:commandButton id="salvarCadastro" value="Salvar"
					rendered="#{!configPdfQuestaoBean.cadastro}"
					styleClass="ui-button-raised ui-button-primary"
					icon="pi pi-check"
					action="#{configPdfQuestaoBean.salvar(false)}" update="@form, :growl"
					process="@form">
						<p:defaultCommand target="salvarCadastro" />
				</p:commandButton>

			</div>
		</div>

		<p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true">
			<p:commandButton value="Não" type="button"
			styleClass="ui-confirmdialog-no ui-button-flat" />
			<p:commandButton value="Sim" type="button"
			styleClass="ui-confirmdialog-yes" />
		</p:confirmDialog>

	</h:form>

</ui:decorate>
