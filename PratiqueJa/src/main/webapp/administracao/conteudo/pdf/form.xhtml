<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

	<ui:define name="linkPage">
		<h:outputText class="linkPage" value="#{pdfBean.nome}" />
	</ui:define>

	<f:metadata>
		<f:viewParam name="chave" value="#{pdfBean.chave}" />
		<f:viewParam name="cadastro" value="#{pdfBean.cadastro}" converter="jakarta.faces.Boolean" />
		<f:viewAction action="#{pdfBean.carregar()}" />
	</f:metadata>

	<h:form id="form" class="form">

		<h4 class="title-divisor">PDF</h4>

		<div class="ui-fluid gride">

			<h:panelGroup styleClass="campoMsg col-12 md:col-12 lg:col-6 xl:col-6">
				<p:outputLabel for="@next" value="Assunto" />
				<p:selectOneMenu value="#{pdfBean.entidade.assunto}"
				converter="generic" filter="true" filterMatchMode="contains"
				required="true" requiredMessage="O assunto é obrigatório">
					<f:selectItem itemLabel="Selecione" itemValue="#{null}" noSelectionOption="true" />
					<f:selectItems value="#{assuntoBean.listaAtivas}"
					var="assunto" itemLabel="#{assunto.nome}" itemValue="#{assunto}" />
				</p:selectOneMenu>
				<p:message for="@previous" display="text" />
			</h:panelGroup>

			<h:panelGroup styleClass="campoMsg col-12 md:col-6 lg:col-3 xl:col-3">
				<p:outputLabel for="@next" value="Visibilidade" />
				<p:selectOneMenu value="#{pdfBean.entidade.visibilidade}"
				required="true" requiredMessage="A visibilidade é obrigatória">
					<f:selectItem itemLabel="Selecione" itemValue="#{null}" noSelectionOption="true" />
					<f:selectItems value="#{visibilidadePdfBean.opcoes}"
					var="opcao" itemLabel="#{opcao.nome}" itemValue="#{opcao}" />
				</p:selectOneMenu>
				<p:message for="@previous" display="text" />
			</h:panelGroup>

			<h:panelGroup styleClass="campoMsg col-12">
				<p:outputLabel for="@next" value="Caminho" />
				<p:inputText value="#{pdfBean.entidade.caminho}" maxlength="511"
				required="true" requiredMessage="O caminho é obrigatório" />
				<p:message for="@previous" display="text" />
			</h:panelGroup>

			<h:panelGroup styleClass="campo col-12">
				<p:outputLabel for="@next" value="Descrição" />
				<p:inputText value="#{pdfBean.entidade.descricao}" maxlength="511" />
			</h:panelGroup>

		</div>

		<div class="content-button">

			<div class="divisor"></div>

			<div class="flex gap-3 flex-wrap">

				<p:commandButton value="Remover" icon="pi pi-trash"
					rendered="#{!pdfBean.cadastro}"
					styleClass="ui-button-danger ui-button-flat"
					action="#{pdfBean.remover}" update="@form, :growl"
					process="@this">
					<p:confirm header="Confirmação" icon="pi pi-info-circle"
					message="Você tem certeza que deseja remover este PDF?" />
				</p:commandButton>

			</div>

			<div class="flex gap-3 flex-wrap">

				<p:commandButton id="auditoria" value="Auditoria"
					rendered="#{sessaoBean.podeVerAuditoria and !pdfBean.cadastro}"
					styleClass="ui-button-flat ui-button-plain"
					icon="fa-regular fa-eye"
					action="#{auditoriaBean.carregar(pdfBean.entidade, pdfBean.nome)}"
					update="dialog-auditoria"
					process="@this" oncomplete="PF('dialogAuditoria').show()">
				</p:commandButton>

				<p:commandButton ajax="false" value="Baixar"
					icon="pi pi-download"
					styleClass="ui-button-outlined"
					rendered="#{!pdfBean.cadastro and not empty pdfBean.entidade.caminho}">
					<p:fileDownload value="#{pdfBean.download(pdfBean.entidade)}" />
				</p:commandButton>

				<p:button value="Voltar"
				styleClass="ui-button-outlined"
				icon="pi pi-chevron-left" href="/administracao/conteudo/pdf/list.xhtml" />

				<p:commandButton id="adicionarCadastro" value="Adicionar"
					rendered="#{pdfBean.cadastro}"
					styleClass="ui-button-raised ui-button-success"
					icon="pi pi-plus"
					action="#{pdfBean.adicionar(false)}" update="@form, :growl"
					process="@form">
						<p:defaultCommand target="adicionarCadastro" />
				</p:commandButton>

				<p:commandButton id="salvarCadastro" value="Salvar"
					rendered="#{!pdfBean.cadastro}"
					styleClass="ui-button-raised ui-button-primary"
					icon="pi pi-check"
					action="#{pdfBean.salvar(false)}" update="@form, :growl"
					process="@form">
						<p:defaultCommand target="salvarCadastro" />
				</p:commandButton>

			</div>
		</div>

	</h:form>

</ui:decorate>
