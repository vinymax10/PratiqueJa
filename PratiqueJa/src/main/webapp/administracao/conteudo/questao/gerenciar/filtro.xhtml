<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:body >
		<ui:composition>
			<div id="filtros" style="width: 100%;display:none;">

				<p:card class="newBorder mb-3" style="width: 100%;">
					<div class="ui-fluid gride" >
						<h4 class="title-card" >Filtro</h4>

						<div class="campo col-12 md:col-6 lg:col-4 xl:col-2">
							<p:outputLabel for="@next" value="ID"/>
							<p:inputText value="#{questaoBean.filtro.id}"
							placeholder="ID da questão" />
						</div>

						<div class="campo col-12 md:col-6 lg:col-4 xl:col-2">
							<p:outputLabel for="@next" value="Chave"/>
							<p:inputText value="#{questaoBean.filtro.chave}"
							placeholder="Chave" />
						</div>

						<div class="campo col-12 md:col-6 lg:col-4 xl:col-2">
							<p:outputLabel for="@next" value="Ano"/>
							<p:selectOneMenu value="#{questaoBean.filtro.ano}"
							converter="generic" filter="true" filterMatchMode="contains">
								<f:selectItem itemLabel="Todos" itemValue="#{null}" noSelectionOption="true"/>
								<f:selectItems value="#{anoBean.opcoes}"
								var="ano" itemLabel="#{ano.nome}"
								itemValue="#{ano}" />
							</p:selectOneMenu>
						</div>

						<div class="campo col-12 md:col-6 lg:col-4 xl:col-2">
							<p:outputLabel for="@next" value="Revisada"/>
							<p:selectOneMenu value="#{questaoBean.filtro.revisada}">
								<f:selectItem itemLabel="Todos" itemValue="#{null}" noSelectionOption="true"/>
								<f:selectItem itemLabel="Sim" itemValue="#{true}"/>
								<f:selectItem itemLabel="Não" itemValue="#{false}"/>
							</p:selectOneMenu>
						</div>
						
						<div class="campo col-12 md:col-6 lg:col-4 xl:col-2">
							<p:outputLabel for="@next" value="Resolução"/>
							<p:selectOneMenu value="#{questaoBean.filtro.resolucaoLatex}">
								<f:selectItem itemLabel="Todos" itemValue="#{null}" noSelectionOption="true"/>
								<f:selectItem itemLabel="Sim" itemValue="#{true}"/>
								<f:selectItem itemLabel="Não" itemValue="#{false}"/>
							</p:selectOneMenu>
						</div>

						<div class="campo col-12 md:col-6 lg:col-4 xl:col-2">
							<p:outputLabel for="@next" value="Mal Formulada"/>
							<p:selectOneMenu value="#{questaoBean.filtro.malFormulada}">
								<f:selectItem itemLabel="Todos" itemValue="#{null}" noSelectionOption="true"/>
								<f:selectItem itemLabel="Sim" itemValue="#{true}"/>
								<f:selectItem itemLabel="Não" itemValue="#{false}"/>
							</p:selectOneMenu>
						</div>

						<div class="campo col-12 md:col-6 lg:col-6 xl:col-4">
							<p:outputLabel for="@next" value="Assunto Curso"/>
							<p:selectOneMenu value="#{questaoBean.filtro.assunto}"
							converter="generic" filter="true" filterMatchMode="contains">
								<f:selectItem itemLabel="Todos" itemValue="#{null}" noSelectionOption="true"/>
								<f:selectItems value="#{assuntoBean.listaAtivas}"
								var="assunto" itemLabel="#{assunto.nome}"
								itemValue="#{assunto}" />
							</p:selectOneMenu>
						</div>

						<div class="campo col-12 md:col-6 lg:col-6 xl:col-4">
							<p:outputLabel for="@next" value="Banca"/>
							<p:selectOneMenu value="#{questaoBean.filtro.banca}"
							converter="generic" filter="true" filterMatchMode="contains">
								<f:selectItem itemLabel="Todos" itemValue="#{null}" noSelectionOption="true"/>
								<f:selectItems value="#{bancaBean.opcoes}" var="banca"
								itemLabel="#{banca.nome}" itemValue="#{banca}" />
							</p:selectOneMenu>
						</div>

						<div class="campo col-12 md:col-6 lg:col-6 xl:col-4">
							<p:outputLabel for="@next" value="Órgão"/>
							<p:selectOneMenu value="#{questaoBean.filtro.orgao}"
							converter="generic" filter="true" filterMatchMode="contains">
								<f:selectItem itemLabel="Todos" itemValue="#{null}" noSelectionOption="true"/>
								<f:selectItems value="#{orgaoBean.opcoes}" var="orgao"
								itemLabel="#{orgao.nome}" itemValue="#{orgao}" />
							</p:selectOneMenu>
						</div>

						<div class="campo col-12 md:col-6 lg:col-4 xl:col-2">
							<p:outputLabel for="@next" value="Disciplina"/>
							<p:selectOneMenu value="#{questaoBean.filtro.disciplina}"
							converter="generic" filter="true" filterMatchMode="contains">
								<f:selectItem itemLabel="Todos" itemValue="#{null}" noSelectionOption="true"/>
								<f:selectItems value="#{disciplinaBean.opcoes}" var="disciplina"
								itemLabel="#{disciplina.nome}" itemValue="#{disciplina}" />
							</p:selectOneMenu>
						</div>

						<div class="campo col-12 md:col-6 lg:col-4 xl:col-2">
							<p:outputLabel for="@next" value="Dificuldade"/>
							<p:selectOneMenu value="#{questaoBean.filtro.dificuldade}">
								<f:selectItem itemLabel="Todos" itemValue="#{null}" noSelectionOption="true"/>
								<f:selectItems value="#{questaoBean.dificuldadeValues}" var="d"
								itemLabel="#{d.nome}" itemValue="#{d}" />
							</p:selectOneMenu>
						</div>

						
					</div>

					<div class="content-button-right" >

						<div class="divisor" ></div>

						<p:commandButton value="Limpar"
						styleClass="ui-button-flat ui-button-plain"
						icon="fa-solid fa-eraser" oncomplete="manterFiltroAberto('filtros'); reloadMathJax();"
						action="#{questaoBean.filtrarInit}" update="@form" >
						</p:commandButton>

						<p:commandButton id="filtrar" value="Filtrar"
						styleClass="ui-button-raised ui-button-primary"
						icon="pi pi-search" oncomplete="manterFiltroAberto('filtros'); reloadMathJax();"
						action="#{questaoBean.filtrar}" update="@form, :growl" process="@form" >
							<p:defaultCommand target="form:filtrar"/>
						</p:commandButton>

					</div>

				</p:card>
			</div>
		</ui:composition>

	</h:body>
</html>
