<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

	<ui:define name="linkPage">
		<h:outputText class="linkPage" value="#{questaoBean.nome}" />
	</ui:define>

	<f:metadata>
	    <f:viewAction action="#{questaoBean.filtrar()}" />
	</f:metadata>

	<h:form id="form" class="form" >

		<div class="content-button flex-column lg:flex-row xl:flex-row" >

			<div class="flex gap-3 align-items-center w-full md:w-full lg:w-6 xl:w-6">

				<div class="w-full">
					<span class="ui-input-icon-left" style="width:100%">
						<i class="pi pi-search" />
						<p:inputText id="globalFilter" value="#{questaoBean.filtro.conteudo}"
						placeholder="Conteúdo" styleClass="w-full" >
							<p:ajax event="keyup" delay="500" update="tabela" listener="#{questaoBean.filtrar}" oncomplete="reloadMathJax();" />
						</p:inputText>
					</span>
				</div>

				<p:button value="Filtros" icon="fa-solid fa-filter"
				onclick="slideToggle('filtros'); return false;"
				styleClass="ui-button-outlined ui-button-secondary" />

			</div>

			<div class="flex gap-3 align-items-center justify-content-end">

				<p:button value="Adicionar" icon="pi pi-plus"
				styleClass="ui-button-raised ui-button-success"
				href="/administracao/conteudo/questao/gerenciar/form.xhtml?cadastro=true" />

			</div>
		</div>

		<ui:include src="/administracao/conteudo/questao/gerenciar/filtro.xhtml" />

		<p:dataView id="tabela" value="#{questaoBean.lista}" var="entidade" style="width:100%"
		paginator="true" rows="10" paginatorAlwaysVisible="false" emptyMessage="">

			<p:dataViewListItem>

				<p:card class="newBorder qg-card mt-3 mb-3 p-2" style="width:100%">

					<!-- Cabeçalho: ID, Chave e badges de status -->
					<div class="qg-header">
						<h:outputText styleClass="qg-id" value="Q#{entidade.id}" />
						<h:outputText styleClass="qg-chave" value="#{entidade.chave}" rendered="#{not empty entidade.chave}" />

						<div class="qg-badges">
							<p:tag value="#{entidade.dificuldade.nome}" rendered="#{entidade.dificuldade != null}"
							severity="#{entidade.dificuldade == 'Facil' ? 'success' : entidade.dificuldade == 'Medio' ? 'warning' : 'danger'}" />

							<p:tag value="#{entidade.visibilidade.nome}" rendered="#{entidade.visibilidade != null}"
							severity="#{entidade.visibilidade == 'Basico' ? 'success' : 'warning'}" />

							<p:tag value="Revisada" severity="success" rendered="#{entidade.revisada}" />
							<p:tag value="Não Revisada" severity="secondary" rendered="#{!entidade.revisada}" />

							<p:tag value="Mal Formulada" severity="danger" rendered="#{entidade.malFormulada}" />
						</div>
					</div>

					<!-- Chips de metadados -->
					<div class="qg-chips">
						<h:outputText styleClass="qg-chip" value="Assunto: #{entidade.assuntosNomes}" rendered="#{not empty entidade.assuntosNomes}" />
						<h:outputText styleClass="qg-chip" value="Disciplina: #{entidade.disciplina.nome}" rendered="#{entidade.disciplina != null}" />
						<h:outputText styleClass="qg-chip" value="Ano: #{entidade.ano.nome}" rendered="#{entidade.ano != null}" />
						<h:outputText styleClass="qg-chip" value="Banca: #{entidade.banca.nome}" rendered="#{entidade.banca != null}" />
						<h:outputText styleClass="qg-chip" value="Órgão: #{entidade.orgao.nome}" rendered="#{entidade.orgao != null}" />
						<h:outputText styleClass="qg-chip" value="Prova: #{entidade.prova}" rendered="#{not empty entidade.prova}" />
						<h:outputText styleClass="qg-chip" value="Ordem: #{entidade.ordemInsercao}" />
						<h:outputText styleClass="qg-chip" value="Qualid. Formulação: #{entidade.qualidadeFormulacao}" />
						<h:outputText styleClass="qg-chip" value="Qualid. Resolução: #{entidade.qualidadeResolucao}" />
					</div>

					<!-- Enunciado -->
					<h:panelGroup rendered="#{not empty entidade.paragrafos}" layout="block">
						<h:outputText styleClass="qg-section-title" value="Enunciado" />
						<div class="qg-enunciado">
							<ui:repeat value="#{entidade.paragrafos}" var="paragrafo">
								<h:outputText style="display:block;margin-bottom:.5rem"
								value="#{paragrafo.texto}" rendered="#{!paragrafo.tipoImagem}" />
								<p:graphicImage value="#{paragrafo.imagemFile.imagem()}"
								cache="false" stream="false" rendered="#{paragrafo.tipoImagem}"
								style="max-width:300px;height:auto;margin:.25rem 0;display:block" />
							</ui:repeat>
						</div>
					</h:panelGroup>

					<div class="grid m-0">

						<!-- Alternativas -->
						<h:panelGroup rendered="#{not empty entidade.alternativas}"
						styleClass="col-12 md:col-12 lg:col-6 xl:col-6 flex flex-column">
							<h:outputText styleClass="qg-section-title" value="Alternativas" />
							<div style="margin:0 1rem">
								<ui:repeat value="#{entidade.alternativas}" var="alt">
									<div class="qg-alt #{alt.correta ? 'qg-alt-correta' : ''}">
										<h:outputText value="#{alt.letra}) #{alt.texto}" />
										<i class="pi pi-check" style="margin-left:auto;#{alt.correta ? '' : 'display:none'}" />
									</div>
								</ui:repeat>
							</div>
						</h:panelGroup>

						<!-- Resolução -->
						<h:panelGroup rendered="#{not empty entidade.resolucaoParagrafos}"
						styleClass="col-12 md:col-12 lg:col-6 xl:col-6 flex flex-column">
							<h:outputText styleClass="qg-section-title" value="Resolução" />
							<div class="qg-resolucao">
								<ui:repeat value="#{entidade.resolucaoParagrafos}" var="paragrafo">
									<h:outputText style="display:block;margin-bottom:.5rem"
									value="#{paragrafo.texto}" rendered="#{!paragrafo.tipoImagem}" />
									<p:graphicImage value="#{paragrafo.imagemFile.imagem()}"
									cache="false" stream="false" rendered="#{paragrafo.tipoImagem}"
									style="max-width:300px;height:auto;margin:.25rem 0;display:block" />
								</ui:repeat>
							</div>
						</h:panelGroup>

					</div>

				<div class="content-button" >

			<div class="divisor" ></div>

		    <div class="flex gap-3 flex-wrap">

				<p:commandButton value="Remover" icon="pi pi-trash"
					styleClass="ui-button-danger ui-button-flat"
					action="#{questaoBean.remover(entidade)}" update="@form, :growl"
					process="@this">
					<p:confirm header="Confirmação" icon="pi pi-info-circle"
					message="Você tem certeza que deseja remover esta Questão?" />
				</p:commandButton>

				<p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true">
					<p:commandButton value="Não" type="button" styleClass="ui-confirmdialog-no ui-button-flat" />
					<p:commandButton value="Sim" type="button" styleClass="ui-confirmdialog-yes" />
				</p:confirmDialog>

			</div>

			<div class="flex gap-3 flex-wrap">

				<p:button value="Editar" icon="pi pi-pencil"
					styleClass="ui-button-raised ui-button-primary" target="_blank"
							href="#{questaoBean.getUrlEdicao(entidade)}" />

			</div>
		</div>
					
				</p:card>

			</p:dataViewListItem>

		</p:dataView>

	</h:form>

</ui:decorate>
