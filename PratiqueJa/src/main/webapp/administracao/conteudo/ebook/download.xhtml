<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

	<ui:define name="linkPage">
		<h:outputText class="linkPage" value="Download Ebook" />
	</ui:define>

	<h:form id="form" class="form">

		<h4 class="title-divisor">Configuração</h4>

		<div class="ui-fluid gride">

			<h:panelGroup styleClass="campo col-6 md:col-4 lg:col-2 xl:col-2">
				<p:outputLabel for="@next" value="Número Exercicios" />
				<p:inputNumber minValue="0" maxValue="1000" decimalPlaces="0"
					value="#{downloadEbookBean.numListas}" required="true" />
			</h:panelGroup>

			<h:panelGroup styleClass="campo col-6 md:col-4 lg:col-2 xl:col-2">
				<p:outputLabel for="@next" value="Número E-Book" />
				<p:inputNumber minValue="0" maxValue="1000" decimalPlaces="0"
					value="#{downloadEbookBean.numEBook}" required="true" />
			</h:panelGroup>

			<h:panelGroup styleClass="campo col-6 md:col-4 lg:col-2 xl:col-2">
				<p:outputLabel for="@next" value="Edição Básico" />
				<p:inputNumber minValue="0" maxValue="1000" decimalPlaces="0"
					value="#{edicaoBean.edicao.edicaoBasico}" />
			</h:panelGroup>

			<h:panelGroup styleClass="campo col-6 md:col-4 lg:col-2 xl:col-2">
				<p:outputLabel for="@next" value="Edição Intermediário" />
				<p:inputNumber minValue="0" maxValue="1000" decimalPlaces="0"
					value="#{edicaoBean.edicao.edicaoIntermediario}" />
			</h:panelGroup>

			<h:panelGroup styleClass="campo col-6 md:col-4 lg:col-2 xl:col-2">
				<p:outputLabel for="@next" value="Edição Avançado" />
				<p:inputNumber minValue="0" maxValue="1000" decimalPlaces="0"
					value="#{edicaoBean.edicao.edicaoAvancado}" />
			</h:panelGroup>
			
			<h:panelGroup styleClass="campo col-12 md:col-6 lg:col-4 xl:col-2">
				<p:outputLabel for="@next" value="Capa" />
				<p:toggleSwitch class="toggleSwitch-form"
					value="#{downloadEbookBean.capa}" />
			</h:panelGroup>
			
			<h:panelGroup styleClass="campo col-12 xl:col-7">
				<p:outputLabel for="@next" value="Módulo" />
				<p:selectOneButton value="#{downloadEbookBean.modulo}">
					<f:selectItems value="#{moduloBean.opcoes}"
					var="modulo" itemLabel="#{modulo.nome}" itemValue="#{modulo}" />
				</p:selectOneButton>
			</h:panelGroup>

		</div>

		<div class="content-button">

			<div class="divisor"></div>

			<div></div>

			<div class="flex gap-3 flex-wrap">

				<p:commandButton value="Download E-Book" ajax="false"
				icon="pi pi-download" process="@form" update="@form, :growl"
				onclick="PrimeFaces.monitorDownload('','');"
				styleClass="ui-button-raised ui-button-primary">
					<p:fileDownload value="#{downloadEbookBean.download()}" />
				</p:commandButton>

				<p:commandButton value="Gravar E-Book"
				icon="fa-solid fa-floppy-disk" process="@form" update="@form, :growl"
				styleClass="ui-button-raised ui-button-secondary"
				action="#{downloadEbookBean.gerarEBook()}" />

				<p:commandButton value="Gravar Exercicios"
				icon="fa-solid fa-list-ol" process="@form" update="@form, :growl"
				styleClass="ui-button-raised ui-button-success"
				action="#{downloadEbookBean.gerarListasExercicios()}" />

			</div>

		</div>

		<f:websocket channel="push">
			<f:ajax event="update" render="form:progressBar form:mensagem" />
		</f:websocket>

		<p:progressBar id="progressBar" value="#{downloadEbookBean.porcentagem*100}"
			style="margin-top:20px;width:100%;height:0.5rem!important;" />

		<p:staticMessage id="mensagem" severity="info" summary="Conteúdo baixado"
			display="text"
			detail="#{downloadEbookBean.numExercicios} exercícios, #{downloadEbookBean.numQuestoes} questões,
			#{downloadEbookBean.numPaginas} páginas, #{downloadEbookBean.numEBookAtual}º E-Books, porcentagem concluída: #{downloadEbookBean.getPorcentagemInteiro()} \%"
			style="background: #ecf1ff !important;margin:15px 0 0 0;width: 100%" />

	</h:form>

</ui:decorate>
