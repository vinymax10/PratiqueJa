<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

	<ui:define name="linkPage">
		<h:outputText class="linkPage" value="#{assuntoBean.nome}" />
	</ui:define>

	<f:metadata>
	    <f:viewParam name="chave" value="#{assuntoBean.chave}" />
	    <f:viewParam name="cadastro" value="#{assuntoBean.cadastro}" converter="jakarta.faces.Boolean"/>
	    <f:viewAction action="#{assuntoBean.carregar()}" />
	</f:metadata>

	<h:form id="form" class="form" >

		<h4 class="title-divisor" >Assunto</h4>

		<div class="ui-fluid gride" >

			<h:panelGroup styleClass="campoMsg col-12 md:col-12 lg:col-6 xl:col-4">
				<p:outputLabel for="@next" value="Nome" />
				<p:inputText value="#{assuntoBean.entidade.nome}"
				placeholder="Ex.: Matemática Básica" required="true"
				requiredMessage="O nome é obrigatório" maxlength="255" />
				<p:message for="@previous" display="text"/>
			</h:panelGroup>

			<h:panelGroup styleClass="campoMsg col-12 md:col-6 lg:col-6 xl:col-4">
				<p:outputLabel for="@next" value="Chave" />
				<p:inputText value="#{assuntoBean.entidade.chave}"
				placeholder="Ex.: matematica-basica" required="true"
				requiredMessage="A chave é obrigatória" maxlength="255" />
				<p:message for="@previous" display="text"/>
			</h:panelGroup>

			<h:panelGroup styleClass="campoMsg col-12 md:col-6 lg:col-6 xl:col-4">
				<p:outputLabel for="@next" value="Módulo" />
				<p:selectOneMenu value="#{assuntoBean.entidade.modulo}"
				filter="true" filterMatchMode="contains"
				required="true" requiredMessage="O módulo é obrigatório">
	            	<f:selectItem itemLabel="Selecione" itemValue="#{null}" noSelectionOption="true"/>
					<f:selectItems value="#{moduloBean.opcoes}" var="opcao"
						itemLabel="#{opcao.nome}" itemValue="#{opcao}" />
				</p:selectOneMenu>
				<p:message for="@previous" display="text"/>
			</h:panelGroup>

			<h:panelGroup styleClass="campo col-12 md:col-6 lg:col-4 xl:col-4">
				<p:outputLabel for="@next" value="Hashtag" />
				<p:inputText value="#{assuntoBean.entidade.hashtag}"
				placeholder="Hashtag" maxlength="255" />
			</h:panelGroup>

			<h:panelGroup styleClass="campo col-12 md:col-4 lg:col-4 xl:col-4">
				<p:outputLabel for="@next" value="Mostrar no Teste de Conteúdo" />
				<p:toggleSwitch class="toggleSwitch-form"
					value="#{assuntoBean.entidade.mostrarTesteConteudo}" />
			</h:panelGroup>

			<h:panelGroup styleClass="campo col-12">
				<p:outputLabel for="@next" value="Descrição" />
				<p:inputTextarea rows="5" value="#{assuntoBean.entidade.descricao}"
				placeholder="Descrição do assunto." maxlength="4095" />
			</h:panelGroup>
			
			<div class="title-divisor-button" >
				
				<h4 class="m-0" >Contadores</h4>
				<div class="flex gap-2 justify-content-end">
					<p:commandButton value="Atualizar" icon="fa-solid fa-arrows-rotate"
						styleClass="ui-button-raised ui-button-success"
						action="#{assuntoBean.atualziar()}" update="@form :growl" process="@this" />
				</div>
			</div>
			
			<h:panelGroup styleClass="campo col-12 md:col-6 lg:col-3 xl:col-3">
				<p:outputLabel for="@next" value="Qtd. Exercícios" />
				<p:inputNumber value="#{assuntoBean.entidade.qtdExercicios}"
				minValue="0" decimalPlaces="0" />
			</h:panelGroup>

			<h:panelGroup styleClass="campo col-12 md:col-6 lg:col-3 xl:col-3">
				<p:outputLabel for="@next" value="Qtd. Questões" />
				<p:inputNumber value="#{assuntoBean.entidade.qtdQuestoes}"
				minValue="0" decimalPlaces="0" />
			</h:panelGroup>

			<h:panelGroup styleClass="campo col-12 md:col-6 lg:col-3 xl:col-3">
				<p:outputLabel for="@next" value="Qtd. Videoaulas" />
				<p:inputNumber value="#{assuntoBean.entidade.qtdVideosAula}"
				minValue="0" decimalPlaces="0" />
			</h:panelGroup>

			<h:panelGroup styleClass="campo col-12 md:col-6 lg:col-3 xl:col-3">
				<p:outputLabel for="@next" value="Qtd. PDFs" />
				<p:inputNumber value="#{assuntoBean.entidade.qtdPdf}"
				minValue="0" decimalPlaces="0" />
			</h:panelGroup>

		</div>

		<div class="content-button" >

			<div class="divisor" ></div>

		    <div class="flex gap-3 flex-wrap">

				<p:commandButton value="Remover" icon="pi pi-trash"
					rendered="#{!assuntoBean.cadastro}"
					styleClass="ui-button-danger ui-button-flat"
					action="#{assuntoBean.remover}" update="@form, :growl"
					process="@this">
					<p:confirm header="Confirmação" icon="pi pi-info-circle"
					message="Você tem certeza que deseja remover este Assunto?" />
				</p:commandButton>

			</div>

   			<div class="flex gap-3 flex-wrap">

				<p:commandButton id="auditoria" value="Auditoria"
					rendered="#{sessaoBean.podeVerAuditoria and !assuntoBean.cadastro}"
					styleClass="ui-button-flat ui-button-plain"
					icon="fa-regular fa-eye"
					action="#{auditoriaBean.carregar(assuntoBean.entidade, assuntoBean.nome)}"
					update="dialog-auditoria"
					process="@this" oncomplete="PF('dialogAuditoria').show()">
				</p:commandButton>

				<p:button value="Voltar"
				styleClass="ui-button-outlined"
				icon="pi pi-chevron-left" href="/administracao/conteudo/assunto/list.xhtml" />

				<p:commandButton id="adicionarCadastro" value="Adicionar"
					rendered="#{assuntoBean.cadastro}"
					styleClass="ui-button-raised ui-button-success"
					icon="pi pi-plus"
					action="#{assuntoBean.adicionar(false)}" update="@form, :growl"
					process="@form">
						<p:defaultCommand target="adicionarCadastro" />
				</p:commandButton>

				<p:commandButton id="salvarCadastro" value="Salvar"
					rendered="#{!assuntoBean.cadastro}"
					styleClass="ui-button-raised ui-button-primary"
					icon="pi pi-check"
					action="#{assuntoBean.salvar(false)}" update="@form, :growl"
					process="@form">
						<p:defaultCommand target="salvarCadastro" />
				</p:commandButton>

			</div>
		</div>

	</h:form>

</ui:decorate>
