<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

	<ui:define name="linkPage">
		<h:outputText class="linkPage" value="#{assuntoBean.nome}" />
	</ui:define>

	<f:metadata>
	    <f:viewAction action="#{assuntoBean.filtrar()}" />
	</f:metadata>

	<h:form id="form" class="form" >

		<div class="content-button flex-column lg:flex-row xl:flex-row" >

			<div class="flex gap-3 align-items-center w-full md:w-full lg:w-6 xl:w-6">

				<div class="w-full">
					<span class="ui-input-icon-left" style="width:100%">
						<i class="pi pi-search" />
						<p:inputText id="globalFilter" value="#{assuntoBean.filtro.nomeAssunto}"
						placeholder="Nome" styleClass="w-full" >
							<p:ajax event="keyup" delay="500" update="tabela" listener="#{assuntoBean.filtrar}" />
						</p:inputText>
					</span>
				</div>

				<p:button value="Filtros" icon="fa-solid fa-filter"
				onclick="slideToggle('filtros'); return false;"
				styleClass="ui-button-outlined ui-button-secondary" />

			</div>

			<div class="flex gap-3 align-items-center justify-content-end">
				
				<ui:include src="/exportar/exportar.xhtml" >
					<ui:param name="id" value="form:tabela" />
					<ui:param name="nome" value="Assuntos" />
				</ui:include>
				
				<p:button value="Adicionar" icon="pi pi-plus"
				styleClass="ui-button-raised ui-button-success"
				href="/administracao/conteudo/assunto/form.xhtml?cadastro=true" />

			</div>
		</div>

		<ui:include src="/administracao/conteudo/assunto/filtro.xhtml" />

		<p:dataTable id="tabela" class="tableStatus" stripedRows="true"
			var="entidade" value="#{assuntoBean.lista}" reflow="true"
			selection="#{assuntoBean.entidade}" selectionMode="single" rowKey="#{entidade.id}"
			draggableRows="true" rows="30" paginator="true" paginatorAlwaysVisible="false"
			rowSelector="td:not(.coluna-ativo)">

			<p:ajax event="rowSelect" update="@form" listener="#{assuntoBean.onSelected}"
			resetValues="true"/>

			<p:ajax event="rowReorder" listener="#{assuntoBean.onRowReorder}" update="@form"/>

			<p:column headerText="Nome" responsivePriority="1" width="30%">
				<h:outputText value="#{entidade.nome}"/>
			</p:column>

			<p:column headerText="Módulo" responsivePriority="2" width="15%">
				<h:outputText value="#{entidade.modulo.nome}"/>
			</p:column>
			
			<p:column headerText="Chave" responsivePriority="6" width="25%">
				<h:outputText value="#{entidade.chave}"/>
			</p:column>

			<p:column headerText="Habilitado" responsivePriority="3" width="10%"
			styleClass="coluna-ativo">
				<p:toggleSwitch class="toggleSwitch-form" value="#{entidade.habilidado}" >
					<p:ajax event="change" process="@this"
					listener="#{assuntoBean.salvar(entidade)}" />
				</p:toggleSwitch>
			</p:column>

			<p:column headerText="Exercícios" responsivePriority="4" width="10%"
			styleClass="coluna-ativo">
				<p:toggleSwitch class="toggleSwitch-form" value="#{entidade.showExercicio}" >
					<p:ajax event="change" process="@this"
					listener="#{assuntoBean.salvar(entidade)}" />
				</p:toggleSwitch>
			</p:column>

			<p:column headerText="Questões" responsivePriority="5" width="10%"
			styleClass="coluna-ativo">
				<p:toggleSwitch class="toggleSwitch-form" value="#{entidade.showQuestao}" >
					<p:ajax event="change" process="@this"
					listener="#{assuntoBean.salvar(entidade)}" />
				</p:toggleSwitch>
			</p:column>

		</p:dataTable>

	</h:form>

</ui:decorate>
