<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

	<ui:define name="linkPage">
		<h:outputText class="linkPage" value="Email" />
	</ui:define>

	<f:metadata>
		<f:viewAction action="#{emailBean.filtrar()}" />
	</f:metadata>

	<h:form id="form" class="form">

		<f:websocket channel="email">
			<f:ajax event="updateEmail" render="form:tabela" />
		</f:websocket>

		<div class="content-button flex-column lg:flex-row xl:flex-row">

			<div class="flex gap-3 align-items-center w-full md:w-full lg:w-6 xl:w-6">

				<div class="w-full">
					<span class="ui-input-icon-left" style="width:100%">
						<i class="pi pi-search" />
						<p:inputText id="globalFilter" value="#{emailBean.filtro.destinatario}"
						placeholder="Destinatário" styleClass="w-full">
							<p:ajax event="keyup" delay="500" update="tabela" listener="#{emailBean.filtrar}" />
						</p:inputText>
					</span>
				</div>

				<p:button value="Filtros" icon="fa-solid fa-filter"
				onclick="slideToggle('filtros'); return false;"
				styleClass="ui-button-outlined ui-button-secondary" />

			</div>

			<div class="flex gap-3 align-items-center justify-content-end">

				<ui:include src="/exportar/exportar.xhtml">
					<ui:param name="id" value="form:tabela" />
					<ui:param name="nome" value="Emails" />
				</ui:include>

			</div>
		</div>

		<ui:include src="/administracao/email/filtro.xhtml" />

		<p:dataTable id="tabela" class="tableStatus" stripedRows="true"
			var="email" value="#{emailBean.emails}"
			reflow="true" rows="30" paginator="true" paginatorAlwaysVisible="false">

			<p:column headerText="Destinatário" responsivePriority="1">
				<h:outputText value="#{email.destinatario}" />
			</p:column>

			<p:column headerText="Assunto" responsivePriority="2">
				<h:outputText value="#{email.assunto}" />
			</p:column>

			<p:column headerText="Data Envio" responsivePriority="3">
				<h:outputText value="#{email.dataEnvio}">
					<f:convertDateTime pattern="dd/MM/yyyy HH:mm" type="localDateTime" />
				</h:outputText>
			</p:column>

			<p:column headerText="Tentativas" responsivePriority="4">
				<h:outputText value="#{email.tentativaEnvio}" />
			</p:column>

			<p:column headerText="Status" responsivePriority="5">
				<h:outputText value="#{email.status.nome}" />
			</p:column>

			<p:column headerText="Erro" responsivePriority="6" class="col-observacao">
				<h:outputText value="#{email.erro}" />
			</p:column>

		</p:dataTable>

	</h:form>

</ui:decorate>
