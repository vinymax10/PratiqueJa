<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

	<ui:define name="linkPage">
		<h:outputText class="linkPage" value="#{ctaBean.nome}" />
	</ui:define>

	<h:form id="form" class="form">

		<div class="content-button-right">

			<ui:include src="/exportar/exportar.xhtml">
				<ui:param name="id" value="form:tabela" />
				<ui:param name="nome" value="CTAs" />
			</ui:include>

			<p:commandButton value="Remover Todos" icon="pi pi-trash"
			styleClass="ui-button-raised ui-button-danger"
			action="#{ctaBean.removerTodosCTAs(false)}" update="@form, :growl"
			process="@this">
				<p:confirm header="Confirmação" icon="pi pi-info-circle"
					message="Você tem certeza que deseja remover todos os CTAs?" />
			</p:commandButton>

			<p:commandButton value="Adicionar" icon="pi pi-plus"
			styleClass="ui-button-raised ui-button-success"
			action="#{ctaBean.cadastrar}" update="@form, dialog-cadastro"
			process="@this"
			oncomplete="PF('dialogCadastro').show()" resetValues="true" />
		</div>

		<p:dataTable id="tabela" class="table" stripedRows="true" reflow="true"
			var="entidade" value="#{ctaBean.opcoes}" widgetVar="dtCta"
			selection="#{ctaBean.entidade}" selectionMode="single" rowKey="#{entidade.id}"
			draggableRows="true" rows="30" paginator="true" paginatorAlwaysVisible="false"
			rowSelector="td:not(.coluna-ativo)">

			<p:ajax event="rowSelect" update="form:tabela" process="@this"
				listener="#{ctaBean.onRowSelect}" />

			<p:ajax event="rowReorder" listener="#{ctaBean.onRowReorder}" update="@form" />

			<p:column headerText="Nome" responsivePriority="1"
			filterBy="#{entidade.nome}" exportValue="#{entidade.nome}"
			filterMatchMode="contains" filterPlaceholder="Filtro por Nome">
				<h:outputText value="#{entidade.nome}"
					rendered="#{entidade.id != ctaBean.entidade.id}" />
				<p:inputText id="inputNome" value="#{entidade.nome}"
					style="width:100%;margin-top:18px"
					required="true" requiredMessage="O nome é obrigatório"
					rendered="#{entidade.id == ctaBean.entidade.id}" />
				<p:message id="msgNome" for="inputNome" display="text" />
			</p:column>

			<p:column headerText="Finalidade" responsivePriority="2" style="width:14rem"
			filterBy="#{entidade.finalidadeCta}" filterMatchMode="contains"
			>
				<f:facet name="filter">
					<p:selectOneMenu onchange="PF('dtCta').filter()" styleClass="ui-custom-filter">
						<f:selectItem itemLabel="Todos" itemValue="#{null}" noSelectionOption="true" />
						<f:selectItems value="#{finalidadeCtaBean.opcoes}" var="f"
							itemLabel="#{f.nome}" itemValue="#{f}" />
					</p:selectOneMenu>
				</f:facet>
				<h:outputText value="#{entidade.finalidadeCta.nome}"
					rendered="#{entidade.id != ctaBean.entidade.id}" />
				<p:selectOneMenu value="#{entidade.finalidadeCta}"
					filter="true" filterMatchMode="contains" style="width:100%"
					rendered="#{entidade.id == ctaBean.entidade.id}">
					<f:selectItems value="#{finalidadeCtaBean.opcoes}" var="f"
						itemLabel="#{f.nome}" itemValue="#{f}" />
				</p:selectOneMenu>
			</p:column>

			<p:column headerText="Ativo" responsivePriority="3"
			filterBy="#{entidade.ativo}"
			exportFunction="#{exporterBean.exportBoolean(entidade.ativo)}"
			style="width:5rem" filterMatchMode="contains" styleClass="coluna-ativo">
				<f:facet name="filter">
					<p:selectOneMenu onchange="PF('dtCta').filter()" styleClass="ui-custom-filter">
						<f:selectItem itemLabel="Todos" itemValue="#{null}" noSelectionOption="true" />
						<f:selectItem itemLabel="Sim" itemValue="#{true}" />
						<f:selectItem itemLabel="Não" itemValue="#{false}" />
					</p:selectOneMenu>
				</f:facet>
				<p:toggleSwitch class="toggleSwitch-form" value="#{entidade.ativo}">
					<p:ajax event="change" process="@this"
						listener="#{ctaBean.salvar(entidade)}" />
				</p:toggleSwitch>
			</p:column>

			<p:column headerText="Ação" responsivePriority="4" style="width:6rem"
			exportable="false">

				<h:panelGroup style="width:100%;"
				rendered="#{entidade.id != ctaBean.entidade.id}">
					<div style="display: flex">
						<p:commandLink rendered="#{sessaoBean.podeVerAuditoria}"
							title="Carregar auditoria para o(a) #{ctaBean.nome} #{entidade.nome}"
							styleClass="rounded-button ui-button-flat mr-3"
							action="#{auditoriaBean.carregar(entidade, ctaBean.nome)}"
							update="@form, :growl dialog-auditoria" process="@this"
							oncomplete="PF('dialogAuditoria').show()">
							<div class="buttonIcon">
								<h:outputText><i class="fa-regular fa-eye"></i></h:outputText>
							</div>
						</p:commandLink>
						<p:commandLink title="Remover o(a) #{ctaBean.nome} #{entidade.nome}"
							action="#{ctaBean.remover(entidade)}" update="@form, :growl"
							process="@this">
							<div class="buttonIcon">
								<p:confirm header="Confirmação" icon="pi pi-info-circle"
									message="Você tem certeza que deseja remover o #{ctaBean.nome} #{entidade.nome}?" />
								<i class="pi pi-trash vermelho"></i>
							</div>
						</p:commandLink>
					</div>
				</h:panelGroup>

				<h:panelGroup style="width:100%;"
				rendered="#{entidade.id == ctaBean.entidade.id}">
					<div style="display: flex">
						<p:commandLink title="Cancelar edição do(a) #{ctaBean.nome}"
							styleClass="rounded-button ui-button-flat mr-3"
							action="#{ctaBean.cancelar}" update="form:tabela, :growl"
							process="@this">
							<div class="buttonIcon">
								<i class="fa-solid fa-xmark cinza"></i>
							</div>
						</p:commandLink>
						<p:commandLink id="salvar" title="Salvar o(a) #{ctaBean.nome}"
							action="#{ctaBean.salvar}" update="@form, :growl" process="@form">
							<div class="buttonIcon">
								<i class="fa-regular fa-floppy-disk azul"></i>
							</div>
							<p:defaultCommand target="salvar" />
						</p:commandLink>
					</div>
				</h:panelGroup>

			</p:column>

		</p:dataTable>

		<ui:include src="/configuracao/aviso.xhtml" />

	</h:form>

	<p:dialog id="dialog-cadastro"
	class="col-12 md:col-12 lg:col-10 lg:col-offset-1 xl:col-8 xl:col-offset-2"
	header="Adicionar CTAs em lote"
	showEffect="fade" hideEffect="fade" width="100%;" modal="true"
	widgetVar="dialogCadastro" responsive="true">
		<h:form id="formAdicionar" class="form">
			<div class="ui-fluid gride">

				<h:panelGroup styleClass="campoMsg col-12 md:col-6 lg:col-4 xl:col-3">
					<p:outputLabel for="finalidadeCta" value="Finalidade" />
					<p:selectOneMenu id="finalidadeCta" value="#{ctaBean.finalidadeCta}"
						filter="true" filterMatchMode="contains"
						required="true" requiredMessage="A finalidade da CTA é obrigatória">
						<f:selectItems value="#{finalidadeCtaBean.opcoes}" var="f"
							itemLabel="#{f.nome}" itemValue="#{f}" />
					</p:selectOneMenu>
					<p:message for="finalidadeCta" display="text" />
				</h:panelGroup>

				<h:panelGroup styleClass="campo col-12">
					<p:outputLabel for="ctas" value="CTAs (uma por linha)" />
					<p:inputTextarea id="ctas" rows="8" value="#{ctaBean.ctas}"
						style="width:100%" placeholder="Digite uma CTA por linha"
						required="true" requiredMessage="Informe pelo menos uma CTA" />
					<p:message for="ctas" display="text" />
				</h:panelGroup>

			</div>

			<div class="content-button-right">
				<div class="divisor"></div>
				<p:commandButton id="adicionarCadastro" value="Adicionar" icon="pi pi-plus"
					styleClass="ui-button-raised ui-button-success"
					action="#{ctaBean.adicionarCTAs(false)}"
					update="@form :form:tabela :growl" process="@form"
					oncomplete="if (args &amp;&amp; !args.validationFailed) PF('dialogCadastro').hide()">
					<p:defaultCommand target="adicionarCadastro" />
				</p:commandButton>
			</div>
		</h:form>
	</p:dialog>

</ui:decorate>
