<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">


	<f:metadata>
		<f:viewAction action="#{contatoBean.cadastrar()}" />
	</f:metadata>
	
<!-- HERO -->
<div class="card-hero">
	<p class="section-label">Contato</p>
	<h1 class="page-title">Fale <span class="accent">Conosco</span></h1>
	<p class="page-subtitle">
		Este canal pode ser utilizado para tirar dúvidas, fazer críticas ou elogios, ou tratar de qualquer assunto relacionado ao Pratique Já. O seu contato é muito importante para que possamos melhorar continuamente o nosso serviço.
	</p>
</div>

<!-- FORMULÁRIO -->
<h:form id="form">
<div class="card-lg">
	<h2 class="section-title">Enviar Mensagem</h2>

	<h:panelGroup rendered="#{!sessaoBean.logado}" layout="block">
		<div class="grid-3" style="margin-bottom:0;">
			
			<div class="form-field">
				<p:outputLabel for="nome" value="Nome" />
				<p:inputText id="nome" placeholder="Seu nome"
					value="#{contatoBean.entidade.nomeUsuario}"
					maxlength="255" required="true"
					requiredMessage="O nome é obrigatório" styleClass="w-full" />
				<p:message for="nome" display="text" />
			</div>
			
			<div class="form-field">
				<p:outputLabel for="email" value="Email" />
				<p:inputText id="email" placeholder="Seu e-mail"
					value="#{contatoBean.entidade.email}"
					maxlength="255" required="true"
					requiredMessage="O e-mail é obrigatório" styleClass="w-full" />
				<p:message for="email" display="text" />
			</div>
			
			<div class="form-field">
				<p:outputLabel for="telefone" value="Telefone (opcional)" />
				<p:inputMask id="telefone" placeholder="(00) 00000-0000"
					value="#{contatoBean.entidade.telefone}"
					mask="(99) 99999-9999" styleClass="w-full" />
			</div>
			
		</div>
		
	</h:panelGroup>

	<div class="form-field">
		<p:outputLabel for="assunto" value="Assunto" />
		<p:inputText id="assunto" placeholder="Assunto da mensagem"
			value="#{contatoBean.entidade.assunto}"
			maxlength="255" required="true"
			requiredMessage="O assunto é obrigatório" styleClass="w-full" />
		<p:message for="assunto" display="text" />
	</div>

	<div class="form-field">
		<p:outputLabel for="mensagem" value="Mensagem" />
		<p:inputTextarea id="mensagem" rows="6" placeholder="Escreva sua mensagem..."
			value="#{contatoBean.entidade.mensagem}"
			maxlength="1023" required="true"
			requiredMessage="A mensagem é obrigatória" styleClass="w-full" />
		<p:message for="mensagem" display="text" />
	</div>

	<div class="form-actions">
		<p:commandButton id="enviar" value="Enviar Mensagem"
			icon="pi pi-send"
			styleClass="ui-button-raised btn-primary"
			action="#{contatoBean.adicionar}"
			update="@form :growl"
			process="@form">
			<p:defaultCommand target="form:enviar" />
		</p:commandButton>
	</div>
</div>
</h:form>

</ui:decorate>
