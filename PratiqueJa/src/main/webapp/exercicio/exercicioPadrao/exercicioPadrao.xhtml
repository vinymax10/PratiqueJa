<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui" template="/template/template.xhtml">


	<h:form id="form" style="margin-bottom:0">
		<div class="p-d-flex">
			<div class="p-grid" style="margin: 0 15px; width: 100%;">

				<div class="p-col-12">
					<h2>Exercício Padrão</h2>
				</div>

				<h:panelGroup id="fomulario" style="width:100%;"
					rendered="#{!exercicioPadraoBean.lista}">

					<ui:include src="/exercicio/exercicioPadrao/cadastro.xhtml" />

				</h:panelGroup>

				<h:panelGroup id="filtro" rendered="#{exercicioPadraoBean.lista}">

					<p:commandButton value="Adicionar" icon="pi pi-plus"
						styleClass="ui-button-raised ui-button-success ui-button-flat"
						action="#{exercicioPadraoBean.cadastrar}" update="@form" process="@this"
						style="margin-bottom:1rem;" />

					<p:panel header="Filtro" toggleable="true" closable="true"
						toggleSpeed="500" closeSpeed="500" widgetVar="panel"
						style="margin-bottom:1rem;">

						<div class="ui-fluid formgrid grid">
							<div class="field col-12 lg:col-6 xl:col-3">
								<p:outputLabel for="@next" value="Assunto Curso" />
								<p:selectOneMenu
									value="#{exercicioPadraoBean.filtroExercicioPadrao.assuntoCurso}"
									converter="generic" filter="true" filterMatchMode="contains">
									<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
									<f:selectItems value="#{assuntoCursoBean.todosAssuntoCursos}"
										var="assuntoCurso" itemLabel="#{assuntoCurso.nome}"
										itemValue="#{assuntoCurso}" />
								</p:selectOneMenu>
							</div>

							<div class="field col-12 lg:col-6 xl:col-3">
								<p:outputLabel for="@next" value="Módulo" />
								<p:selectOneMenu value="#{exercicioPadraoBean.filtroExercicioPadrao.modulo}"
									filter="true" filterMatchMode="contains">
									<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
									<f:selectItems value="#{moduloBean.opcoes}" var="opcao"
										itemLabel="#{opcao.nome}" itemValue="#{opcao}" />
								</p:selectOneMenu>
							</div>

							<div class="field col-12 lg:col-6 xl:col-3">
								<p:outputLabel for="@next" value="Nível" />
								<p:selectOneMenu value="#{exercicioPadraoBean.filtroExercicioPadrao.nivel}"
									filter="true" filterMatchMode="contains">
									<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
									<f:selectItems value="#{nivelBean.opcoes}" var="opcao"
										itemLabel="#{opcao.nome}" itemValue="#{opcao}" />
								</p:selectOneMenu>
							</div>

							<div class="field col-12 lg:col-6 xl:col-3">
								<p:outputLabel for="@next" value="Tipo de Exercício" />
								<p:selectOneMenu
									value="#{exercicioPadraoBean.filtroExercicioPadrao.tipoExercicio}"
									filter="true" filterMatchMode="contains">
									<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
									<f:selectItems value="#{tipoExercicioBean.opcoes}" var="opcao"
										itemLabel="#{opcao.nome}" itemValue="#{opcao}" />
								</p:selectOneMenu>
							</div>
							
							<div class="field col-12 lg:col-6 xl:col-3">
								<p:outputLabel for="@next" value="Mostrar Resolução" />
								<p:selectOneMenu value="#{exercicioPadraoBean.filtroExercicioPadrao.mostrarResolucao}">
									<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
									<f:selectItem itemLabel="Sim" itemValue="#{true}" />
									<f:selectItem itemLabel="Não" itemValue="#{false}" />
								</p:selectOneMenu>
							</div>
							
							<div class="field col-12 lg:col-6 xl:col-3">
								<p:outputLabel for="@next" value="Quantidade"/>
								<p:inputText value="#{exercicioPadraoBean.filtroExercicioPadrao.quantidade}" />
							</div>
							
							<div class="field col-12 lg:col-6">
								<p:outputLabel for="@next" value="Enunciado" />
								<p:inputText value="#{exercicioPadraoBean.filtroExercicioPadrao.enunciado}" />
							</div>
							
							<div class="field col-12 md:col-6 lg:col-4">
								<p:outputLabel for="@next" value="Nome" />
								<p:inputText
									value="#{exercicioPadraoBean.filtroExercicioPadrao.nome}" />
							</div>

							<div class="field col-12 lg:col-8">
								<p:outputLabel for="@next" value="Descrição" />
								<p:inputText value="#{exercicioPadraoBean.filtroExercicioPadrao.descricao}" />
							</div>

						</div>

						<p:divider />

						<div class="p-grid" style="margin-top: 1rem">

							<div class="p-col-12 p-text-right">

								<p:commandButton value="Filtrar"
									styleClass="ui-button-raised ui-button-flat"
									icon="pi pi-search" action="#{exercicioPadraoBean.filtrar}"
									update="@form, :growl" process="@form" />
							</div>

						</div>

					</p:panel>

					<p:dataTable id="tabela" class="table table-striped" reflow="true"
						var="exercicioPadrao" value="#{exercicioPadraoBean.exerciciosPadrao}"
						selection="#{exercicioPadraoBean.exercicioPadrao}" selectionMode="single"
						rowKey="#{exercicioPadrao.id}" paginator="true" rows="20">
						<p:ajax event="rowSelect" update="@form"
							listener="#{exercicioPadraoBean.onSelected}" />

						<p:column headerText="Assunto Curso" responsivePriority="1">
							<h:outputText value="#{exercicioPadrao.assuntoCurso.nome}" />
						</p:column>

						<p:column headerText="Módulo" responsivePriority="1">
							<h:outputText value="#{exercicioPadrao.assuntoCurso.modulo.nome}" />
						</p:column>

						<p:column headerText="Nível" responsivePriority="1">
							<h:outputText value="#{exercicioPadrao.nivel.nome}" />
						</p:column>

						<p:column headerText="Tipo de Exercício" responsivePriority="2">
							<h:outputText value="#{exercicioPadrao.tipoExercicio.nome}" />
						</p:column>

						<p:column headerText="Quantidade" responsivePriority="2">
							<h:outputText value="#{exercicioPadrao.quantidade}" />
						</p:column>
						
						<p:column headerText="Mostrar na Resolução" responsivePriority="3">
							<h:outputText value="#{exercicioPadrao.mostrarResolucao}" converter="simNaoConverter"/>
						</p:column>
						
						<p:column headerText="Imagem Quadrada" responsivePriority="3">
							<h:outputText value="#{exercicioPadrao.imagemQuadrada}" converter="simNaoConverter"/>
						</p:column>
						
						<p:column headerText="Enunciado" responsivePriority="4">
							<h:outputText value="#{exercicioPadrao.enunciado}" />
						</p:column>
						
						<p:column headerText="Enunciado Singular" responsivePriority="4">
							<h:outputText value="#{exercicioPadrao.enunciadoSingular}" />
						</p:column>

						<p:column headerText="Descrição" responsivePriority="4" >
							<h:outputText value="#{exercicioPadrao.descricao}" />
						</p:column>

					</p:dataTable>

				</h:panelGroup>
			</div>
		</div>
	</h:form>


</ui:decorate>
