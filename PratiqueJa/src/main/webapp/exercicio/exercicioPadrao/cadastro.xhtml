<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

<h:body>
	<ui:composition>

		<div class="ui-fluid formgrid grid">

			<div class="field col-12 xl:col-6">
				<p:outputLabel for="@next" value="Assunto Curso" />
				<p:selectOneMenu value="#{exercicioPadraoBean.exercicioPadrao.assuntoCurso}"
					converter="generic" required="true">
					<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
					<f:selectItems value="#{assuntoCursoBean.listaAtivas}"
						var="assuntoCurso" itemLabel="#{assuntoCurso.nome}"
						itemValue="#{assuntoCurso}" />
				</p:selectOneMenu>
			</div>

			<div class="field col-12 xl:col-6">
				<p:outputLabel for="@next" value="Nível" />
				<p:selectOneMenu value="#{exercicioPadraoBean.exercicioPadrao.nivel}"
					required="true" filter="true" filterMatchMode="contains">
					<f:selectItems value="#{nivelBean.opcoes}" var="opcao"
						itemLabel="#{opcao.nome}" itemValue="#{opcao}" />
				</p:selectOneMenu>
			</div>

			<div class="field col-12 xl:col-6">
				<p:outputLabel for="@next" value="Nome" />
				<p:inputText value="#{exercicioPadraoBean.exercicioPadrao.nome}" required="true" />
			</div>

			<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
				<p:outputLabel for="@next" value="Tipo de Exercício" />
				<p:selectOneMenu value="#{exercicioPadraoBean.exercicioPadrao.tipoExercicio}"
					required="true" filter="true" filterMatchMode="contains">
					<f:selectItems value="#{tipoExercicioBean.opcoes}" var="opcao"
						itemLabel="#{opcao.nome}" itemValue="#{opcao}" />
				</p:selectOneMenu>
			</div>

			<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
				<p:outputLabel for="@next" value="Quantidade" />
				<p:inputNumber minValue="1" maxValue="10000" decimalPlaces="0"
					value="#{exercicioPadraoBean.exercicioPadrao.quantidade}" required="true" />
			</div>
			
			<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
				<p:outputLabel for="@next" value="Mostrar na Resolução" />
				<p:selectOneMenu value="#{exercicioPadraoBean.exercicioPadrao.mostrarResolucao}">
					<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
					<f:selectItem itemLabel="Sim" itemValue="#{true}" />
					<f:selectItem itemLabel="Não" itemValue="#{false}" />
				</p:selectOneMenu>
			</div>
			
			<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
				<p:outputLabel for="@next" value="Imagem Quadrada" />
				<p:selectOneMenu value="#{exercicioPadraoBean.exercicioPadrao.imagemQuadrada}">
					<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
					<f:selectItem itemLabel="Sim" itemValue="#{true}" />
					<f:selectItem itemLabel="Não" itemValue="#{false}" />
				</p:selectOneMenu>
			</div>

			<div class="p-field p-col-12 ">
				<p:outputLabel for="@next" value="Enunciado" />
				<p:inputText value="#{exercicioPadraoBean.exercicioPadrao.enunciado}"
					required="true" />
			</div>
			
			<div class="p-field p-col-12 ">
				<p:outputLabel for="@next" value="Enunciado Singular" />
				<p:inputText value="#{exercicioPadraoBean.exercicioPadrao.enunciadoSingular}"
					 />
			</div>

			<div class="p-field p-col-12 ">
				<p:outputLabel for="@next" value="Descrição" />
				<p:inputText value="#{exercicioPadraoBean.exercicioPadrao.descricao}" />
			</div>

		</div>

		<p:divider />

		<div class="p-grid" style="margin-top: 1rem">
			<div class="p-col-6">

				<p:commandButton value="Remover" icon="pi pi-trash"
					rendered="#{!exercicioPadraoBean.cadastro}"
					styleClass="ui-button-raised ui-button-danger ui-button-flat"
					action="#{exercicioPadraoBean.remover}" update="@form, :growl"
					process="@this">
					<p:confirm header="Confirmação" icon="pi pi-info-circle"
						message="Você tem certeza que deseja remover o exercício?" />
				</p:commandButton>

				<p:confirmDialog global="true" showEffect="fade" hideEffect="fade"
					responsive="true" >
					<p:commandButton value="Não" type="button"
						styleClass="ui-confirmdialog-no ui-button-flat" />
					<p:commandButton value="Sim" type="button"
						styleClass="ui-confirmdialog-yes" />
				</p:confirmDialog>
				
				<p:commandButton value="Voltar"
					action="#{exercicioPadraoBean.setLista(true)}" icon="pi pi-chevron-left"
					process="@this" update="@form" style="margin-bottom:15px;"
					rendered="#{exercicioPadraoBean.cadastro}"
					styleClass="ui-button-raised ui-button-secondary ui-button-flat" />
					
			</div>

			<div class="p-col-6 p-text-right">

				<p:commandButton value="Voltar"
					action="#{exercicioPadraoBean.setLista(true)}" icon="pi pi-chevron-left"
					process="@this" update="@form" style="margin-bottom:15px;"
					rendered="#{!exercicioPadraoBean.cadastro}"
					styleClass="ui-button-raised ui-button-secondary ui-button-flat" />

				<p:commandButton id="adicionarGerais" value="Adicionar"
					class="p-text-right" icon="pi pi-check"
					styleClass="ui-button-raised ui-button-success ui-button-flat"
					action="#{exercicioPadraoBean.adicionar}" update="@form, :growl"
					process="@form" rendered="#{exercicioPadraoBean.cadastro}">
					<p:defaultCommand target="form:adicionarGerais" />
				</p:commandButton>

				<p:commandButton id="salvarGerais" value="Salvar"
					styleClass="ui-button-raised ui-button-flat" icon="pi pi-check"
					rendered="#{!exercicioPadraoBean.cadastro}" style="margin-left:15px;" 
					action="#{exercicioPadraoBean.salvar}" update="@form, :growl"
					process="@form">
					<p:defaultCommand target="form:salvarGerais" />
				</p:commandButton>
			</div>

			<div class="p-col-12">
				<p:messages id="messages" redisplay="false" showDetail="false"
					closable="true" />
			</div>
		</div>

	</ui:composition>
</h:body>
</html>
