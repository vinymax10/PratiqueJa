<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">
	

	<h:form id="form" style="margin-bottom:0">
		<div class="p-d-flex">
	    	<div class="p-grid" style="margin:0 15px;width:100%;">
		
			    <div class="p-col-12" >	
					<h2>Exercicios</h2>	
				</div>
		
			    <h:panelGroup id="fomulario" rendered="#{!exercicioBean.lista}" style="margin:0 15px;width:100%;" >
				    <p:tabView activeIndex="#{exercicioBean.activeIndex}" id="exercicio" cache="false"  dynamic="true" 
					onTabShow="reloadMathJax();">
								
		            	<ui:include src="/exercicio/exercicio/gerais.xhtml" />
		            	
		            	<ui:include src="/exercicio/exercicio/conta.xhtml" />
						
			        </p:tabView>
			    </h:panelGroup>
				
				<h:panelGroup id="filtro" rendered="#{exercicioBean.lista}">
								
					<p:commandButton  value="Adicionar"  icon="pi pi-plus" 
					styleClass="ui-button-raised ui-button-success ui-button-flat" 
					action="#{exercicioBean.cadastrar}" update="@form"  process="@this" style="margin-bottom:1rem;"	/>
					
					<p:panel header="Filtro" toggleable="true" closable="true" toggleSpeed="500"
              		closeSpeed="500" widgetVar="panel" style="margin-bottom:1rem;">
						
						<div class="ui-fluid formgrid grid">
							<div class="field col-12 xl:col-6">
				                <p:outputLabel for="@next" value="Usuário" />
				                <p:selectOneMenu value="#{exercicioBean.filtroExercicio.usuario}" converter="generic"
				                filter="true" filterMatchMode="contains">
				                	 <f:selectItem itemLabel="Selecione uma opção" itemValue=""/>
				                    <f:selectItems value="#{usuarioBean.todosUsuarios}" var="usuario" 
				                    itemLabel="#{usuario.nome}" itemValue="#{usuario}"/>
				                </p:selectOneMenu>
				            </div>
				            
							<div class="field col-12 xl:col-6">
				                <p:outputLabel for="@next" value="Exercício Padrão"/>
				                <p:selectOneMenu value="#{exercicioBean.filtroExercicio.exercicioPadrao}" converter="generic"
				                filter="true" filterMatchMode="contains">
				                	 <f:selectItem itemLabel="Selecione uma opção" itemValue=""/>
				                    <f:selectItems value="#{exercicioPadraoBean.listaTudo}" var="exercicio" 
				                    itemLabel="#{exercicio.assuntoCurso.modulo.nome} - #{exercicio.assuntoCurso.nome} - #{exercicio.nivel.nome}" 
				                    itemValue="#{exercicio}"/>
				                </p:selectOneMenu>
				            </div>
				            
   							<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
			                    <p:outputLabel for="@next" value="Realizada"/>
								<p:selectOneMenu value="#{exercicioBean.filtroExercicio.realizada}" >
									<f:selectItem itemLabel="Selecione uma opção" itemValue=""/>
									<f:selectItem itemLabel="Sim" itemValue="#{true}"/>
									<f:selectItem itemLabel="Não" itemValue="#{false}"/>
								</p:selectOneMenu>		
							</div>	
							
   							<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
			                    <p:outputLabel for="@next" value="Início Prazo"/>
								<p:datePicker value="#{exercicioBean.filtroExercicio.inicioPrazo}" />		
							</div>
							
   							<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
			                    <p:outputLabel for="@next" value="Término Prazo"/>
								<p:datePicker value="#{exercicioBean.filtroExercicio.terminoPrazo}" />		
							</div>
							
   							<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
			                    <p:outputLabel for="@next" value="Início Realização"/>
								<p:datePicker value="#{exercicioBean.filtroExercicio.inicioRealizacao}" />		
							</div>
							
   							<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
			                    <p:outputLabel for="@next" value="Término Realização"/>
								<p:datePicker value="#{exercicioBean.filtroExercicio.terminoRealizacao}" />		
							</div>
				            
						</div>
						
						<p:divider />
				
						<div class="p-grid" style="margin-top:1rem">
							
							<div class="p-col-12 p-text-right" >
							
								<p:commandButton  value="Filtrar" styleClass="ui-button-raised ui-button-flat" icon="pi pi-search" 
								action="#{exercicioBean.filtrar}" update="@form, :growl"  process="@form"	/>
							</div>
							
						</div>
			       
			   		</p:panel>
			   		
				    <p:dataTable id="tabela" class="table table-striped" reflow="true"  
				    var="exercicio" value="#{exercicioBean.exercicios}" 
				    selection="#{exercicioBean.exercicio}" selectionMode="single" rowKey="#{exercicio.id}"
				    paginator="true" rows="20">
				    	<p:ajax event="rowSelect" update="@form" listener="#{exercicioBean.onSelected}"/>
				    
						<p:column headerText="Usuário" responsivePriority="1" >
							<h:outputText value="#{exercicio.usuario.nome}" style="display:inline-block;margin-right:.5rem;"/>
						</p:column>

				    	<p:column headerText="Módulo" responsivePriority="1" >
							<h:outputText value="#{exercicio.exercicioPadrao.assuntoCurso.modulo.nome} 
							- #{exercicio.exercicioPadrao.assuntoCurso.nome} - #{exercicio.exercicioPadrao.nivel.nome}" />
						</p:column>
						
						<p:column headerText="Prazo" responsivePriority="2">
							<h:outputText value="#{exercicio.prazo}" >
								<f:convertDateTime pattern="dd/MM/yyyy" type="localDate"/>
							</h:outputText>
						</p:column>
						
						<p:column headerText="Realizado" responsivePriority="2">
							<h:outputText value="#{exercicio.realizacao}" rendered="#{exercicio.realizado}">
								<f:convertDateTime pattern="dd/MM/yyyy" type="localDate"/>
							</h:outputText>
						</p:column>
						
						<p:column headerText="Nota" responsivePriority="1">
							<h:outputText value="#{exercicio.nota}" rendered="#{exercicio.realizado}">
								<f:convertNumber pattern="#,##0.00" />
							</h:outputText>
						</p:column>
						
						
						<p:column headerText="Visializar" responsivePriority="3">
							
							<p:button styleClass="ui-button-raised ui-button-flat ui-button-success" value="Visializar"
							icon="pi pi-caret-right" href="/exercicio/exercicio/verExercicio.xhtml?id=#{exercicio.id}" 
							update="@form, :growl" 
							oncomplete="reloadMathJax();" style="width: auto" >
							</p:button>
							
						</p:column>
						
					</p:dataTable>
					
				</h:panelGroup>
			</div>
		</div>
	</h:form>
	
	
</ui:decorate>
