<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:body >
		<ui:composition>
			
		    <div class="ui-fluid formgrid grid">
				<div  class="field col-12" style="text-align:center;margin-bottom:0">
					<h:panelGroup id="image" rendered="#{!contatoBean.lista}">
						<p:graphicImage class="circle" value="#{contatoBean.contato.usuario.imagem.getFotoStreamedContent()}" 
			    		rendered="#{not empty contatoBean.contato.usuario.imagem}" stream="false" />	
					</h:panelGroup>
				</div>
				
				<h:panelGroup rendered="#{contatoBean.contato.usuario == null}">
					<div class="field col-12 lg:col-6 xl:col-4">
			       		<p:outputLabel for="@next" value="Nome"/>
		                <p:inputText placeholder="Nome" value="#{contatoBean.contato.nomeUsuario}" />
					</div>
				</h:panelGroup>
	           
				<h:panelGroup rendered="#{contatoBean.contato.usuario != null}">
					<div class="field col-12 lg:col-6 xl:col-4">
			       		<p:outputLabel for="@next" value="Nome"/>
		                <p:inputText placeholder="Nome" value="#{contatoBean.contato.usuario.nome}" disabled="true"/>
					</div>
				</h:panelGroup>
				
	           <div class="field col-12 lg:col-6 xl:col-4">
	            	<p:outputLabel for="@next" value="Assunto"/>
	                <p:inputText placeholder="Assunto" value="#{contatoBean.contato.assunto}" 
	                required="true"/>
				</div>
          		
				<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
                    <p:outputLabel for="@next" value="Respondido" />
					<p:selectOneMenu  value="#{contatoBean.contato.respondido}"  >
						<f:selectItem itemLabel="Sim" itemValue="#{true}"/>
						<f:selectItem itemLabel="Não" itemValue="#{false}"/>
					</p:selectOneMenu>		
				</div>
				
				<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
          			<p:outputLabel for="@next" value="Data"/>
                	<p:datePicker value="#{contatoBean.contato.data}" locale="pt" required="true"/>
          		</div>
				
				<div class="field col-12">
	            	<p:outputLabel for="@next" value="Mensagem"/>
	                <p:inputTextarea rows="5"   value="#{contatoBean.contato.mensagem}" required="true"/> 
				</div>
				
			</div>	
			
			<p:divider />
			
			<div class="p-grid" style="margin-top:1rem">
				<div class="p-col-6" >
					
					<p:commandButton  value="Remover"    icon="pi pi-trash" rendered="#{!contatoBean.cadastro}"
					styleClass="ui-button-raised ui-button-danger ui-button-flat" 
					action="#{contatoBean.remover}" update="@form, :growl"  process="@this" >
						<p:confirm header="Confirmação" icon="pi pi-info-circle"
						message="Você tem certeza que deseja remover esse contato?" /> 
					</p:commandButton>
					
					<p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true" >
			            <p:commandButton value="Não" type="button" styleClass="ui-confirmdialog-no ui-button-flat" />
			            <p:commandButton value="Sim" type="button" styleClass="ui-confirmdialog-yes" />
			        </p:confirmDialog>
			        
			        <p:commandButton value="Voltar"  action="#{contatoBean.setLista(true)}" 
			        icon="pi pi-chevron-left" process="@this"
					update="@form" style="margin-right:15px;" 
					styleClass="ui-button-raised ui-button-secondary ui-button-flat" 
					rendered="#{contatoBean.cadastro}" />
					
				</div>
				
				<div class="p-col-6 p-text-right" >
				
					<p:commandButton value="Voltar"  action="#{contatoBean.setLista(true)}" icon="pi pi-chevron-left" 
					process="@this" rendered="#{!contatoBean.cadastro}"
					update="@form" style="margin-bottom:15px;" styleClass="ui-button-raised ui-button-secondary ui-button-flat" />
					
					<p:commandButton id="adicionarGerais" value="Adicionar"   class="p-text-right"  icon="pi pi-check" 
					styleClass="ui-button-raised ui-button-success ui-button-flat" 
					action="#{contatoBean.adicionar}" update="@form, :growl"  process="@form" rendered="#{contatoBean.cadastro}">
						<p:defaultCommand target="form:adicionarGerais"/>
					</p:commandButton>
					
					<p:commandButton id="salvarGerais" value="Salvar" styleClass="ui-button-raised ui-button-flat" icon="pi pi-check" 
					rendered="#{!contatoBean.cadastro}"	action="#{contatoBean.salvar}" 
					style="margin-left:15px;" 
					update="@form, :growl"  process="@form"	>
						<p:defaultCommand target="form:salvarGerais"/>
					</p:commandButton>
					
				</div>
				
				<div class="p-col-12" >
					<p:messages id="messages" redisplay="false" showDetail="false" closable="true"/>
				</div>
			</div>
				
		</ui:composition>		
	</h:body>
</html>
