<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">
	

    <h:form id="form" style="margin-bottom:0">
		<div class="p-d-flex">
	    	<div class="p-grid" style="margin:0 15px;width:100%;">
		
			    <div class="p-col-12" >	
					<h2>Contato</h2>	
				</div>
		    
			    <h:panelGroup id="fomulario" style="width:100%;" rendered="#{!contatoBean.lista}">
								
	            	<ui:include src="/usuario/contato/cadastro.xhtml" />
		            	
			    </h:panelGroup>
				
				<h:panelGroup id="filtro" rendered="#{contatoBean.lista}">
								
					<p:commandButton  value="Adicionar"  icon="pi pi-plus" 
					styleClass="ui-button-raised ui-button-success ui-button-flat" 
					action="#{contatoBean.cadastrar}" update="@form"  process="@this" 
					style="margin-bottom:1rem;"	/>
					
					<p:panel header="Filtro" toggleable="true" closable="true" toggleSpeed="500"
	             		closeSpeed="500" widgetVar="panel" style="margin-bottom:1rem;">
						
						<div class="ui-fluid formgrid grid">
							<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
					       		<p:outputLabel for="@next" value="ID"/>
				                <p:inputText placeholder="ID" value="#{contatoBean.filtroContato.id}" />
							</div>
							
							<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
					       		<p:outputLabel for="@next" value="Nome do Usuário"/>
				                <p:inputText placeholder="Nome do Usuário" value="#{contatoBean.filtroContato.nomeUsuario}" />
							</div>
							
							<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
					       		<p:outputLabel for="@next" value="Email"/>
				                <p:inputText placeholder="Email" value="#{contatoBean.filtroContato.email}" />
							</div>
							
							<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
					       		<p:outputLabel for="@next" value="Assunto"/>
				                <p:inputText placeholder="Assunto" value="#{contatoBean.filtroContato.assunto}" />
							</div>
							
							<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
					       		<p:outputLabel for="@next" value="Mensagem"/>
				                <p:inputText placeholder="Mensagem" value="#{contatoBean.filtroContato.mensagem}" />
							</div>
							
							<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
					       		<p:outputLabel for="@next" value="Data Inicial"/>
				                <p:datePicker placeholder="Data Inicial" value="#{contatoBean.filtroContato.dataInicio}" />
							</div>
							
							<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
					       		<p:outputLabel for="@next" value="Data Fim"/>
				                <p:datePicker placeholder="Data Fim" value="#{contatoBean.filtroContato.dataFim}" />
							</div>
							
							<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
			                    <p:outputLabel for="@next" value="Respondido"/>
								<p:selectOneMenu value="#{contatoBean.filtroContato.respondido}" >
									<f:selectItem itemLabel="Selecione uma opção" itemValue=""/>
									<f:selectItem itemLabel="Sim" itemValue="#{true}"/>
									<f:selectItem itemLabel="Não" itemValue="#{false}"/>
								</p:selectOneMenu>		
							</div>	
						</div>
						
						<p:divider />
				
						<div class="p-grid" style="margin-top:1rem">
							
							<div class="p-col-12 p-text-right" >
							
								<p:commandButton id="filtrar" value="Filtrar" styleClass="ui-button-raised ui-button-flat" icon="pi pi-search" 
								action="#{contatoBean.filtrar}" update="@form, :growl"  process="@form"	>
									<p:defaultCommand target="form:filtrar"/>
								</p:commandButton>
								
							</div>
						</div>
			       
			   		</p:panel>
			   		
				    <p:dataTable id="tabela" class="table table-striped" 
				    var="contato" value="#{contatoBean.contatos}" reflow="true" 
				    selection="#{contatoBean.contato}" selectionMode="single" rowKey="#{contato.id}"
				    paginator="true" rows="20">
				    	<p:ajax event="rowSelect" update="@form" listener="#{contatoBean.onSelected}"/>
				    
				    	<p:column headerText="Foto" width="4rem" responsivePriority="2">
				    		<p:graphicImage class="circleTable" value="#{contato.usuario.imagem.getFotoStreamedContent()}" 
				    		rendered="#{not empty contato.usuario.imagem}" stream="false" />
				    	</p:column>
				    	
				    	<p:column headerText="ID" responsivePriority="2" >
							<h:outputText value="#{contato.id}"  />
						</p:column>
				    	
						<p:column headerText="Usuário" responsivePriority="1" >
							<h:outputText value="#{contato.nomeUsuario}"  />
						</p:column>
						
						<p:column headerText="Email" responsivePriority="1" >
							<h:outputText value="#{contato.email}"  />
						</p:column>
						
						<p:column headerText="Mensagem" responsivePriority="4">
							<h:outputText value="#{contato.mensagem}" />
						</p:column>
						
						<p:column headerText="Assunto" responsivePriority="1">
							<h:outputText value="#{contato.assunto}" />
						</p:column>
						
						<p:column headerText="Data" responsivePriority="2">
							<h:outputText value="#{contato.data}" >
								<f:convertDateTime pattern="dd/MM/yyyy" type="localDate"/>
							</h:outputText>
						</p:column>
						
						<p:column headerText="Respondido" responsivePriority="3">
							<h:outputText value="#{contato.respondido}" converter="simNaoConverter"/>
						</p:column>
						
					</p:dataTable>
					
				</h:panelGroup>
			</div>
		</div>
	</h:form>
	
</ui:decorate>
