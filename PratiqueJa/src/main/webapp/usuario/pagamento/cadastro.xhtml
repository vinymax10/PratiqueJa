<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:body >
		<ui:composition>
			
		    <div class="ui-fluid formgrid grid">
				
				<div class="campoMsg col-12 xl:col-5">
	                <p:outputLabel for="@next" value="Usuário"/>
	                <p:selectOneMenu id="usuario" value="#{pagamentoBean.pagamento.usuario}" converter="generic" 
	                filter="true" filterMatchMode="contains"  required="true" 
	                requiredMessage="Selecione um usuário">
	                	<f:selectItem itemLabel="Selecione uma opção" itemValue=""/>
	                    <f:selectItems value="#{usuarioBean.todosUsuarios}" var="usuario" 
	                    itemLabel="#{usuario.nome}" itemValue="#{usuario}"/>
	                </p:selectOneMenu>
	                <p:message for="usuario" display="text"/>
	            </div>
			
				<div class="campoMsg col-12 md:col-6 lg:col-4 xl:col-2">
					<p:outputLabel for="@next" value="Valor" />
					<p:inputNumber id="valor" value="#{pagamentoBean.pagamento.valor}" required="true" 
						symbol="R$ " symbolPosition="p" decimalSeparator="," requiredMessage="O valor é obrigatório"
						thousandSeparator="." />
					<p:message for="valor" display="text"/>
				</div>
          		
				<div class="campoMsg col-12 md:col-6 lg:col-4 xl:col-2">
                    <p:outputLabel for="@next" value="Plano" />
					<p:selectOneMenu id="plano" value="#{pagamentoBean.pagamento.plano}"  >
						<f:selectItems value="#{perfilUsuarioBean.opcoes}" var="opcao" 
	                    itemLabel="#{opcao.nome}" itemValue="#{opcao}"/>
					</p:selectOneMenu>
					<p:message for="plano" display="text"/>		
				</div>
				
				<div class="campoMsg col-12 md:col-6 lg:col-4 xl:col-2">
          			<p:outputLabel for="@next" value="Data"/>
                	<p:datePicker id="data" value="#{pagamentoBean.pagamento.data}" locale="pt" 
                	required="true" requiredMessage="A data é obrigatória"/>
                	<p:message for="data" display="text"/>	
          		</div>
          		
				<div class="campoMsg col-12 md:col-6 lg:col-4 xl:col-2">
                    <p:outputLabel for="@next" value="Tipo de Pagamento" />
					<p:selectOneMenu  value="#{pagamentoBean.pagamento.tipoPagamento}"  >
						<f:selectItems value="#{tipoPagamentoBean.opcoes}" var="opcao" 
	                    itemLabel="#{opcao.nome}" itemValue="#{opcao}"/>
					</p:selectOneMenu>		
				</div>
				
				<div class="campo col-12 md:col-6 lg:col-4 xl:col-2">
					<p:outputLabel for="@next" value="Pago" />
					<p:selectBooleanButton
						value="#{pagamentoBean.pagamento.pago}"
						onIcon="pi pi-check" offIcon=""
						style="width-min:8rem;display:block;" />
				</div>
				
			</div>	
			
			<p:divider />
			
			<div class="p-grid" style="margin-top:1rem">
				<div class="p-col-6" >
					
					<p:commandButton  value="Remover"    icon="pi pi-trash" rendered="#{!pagamentoBean.cadastro}"
					styleClass="ui-button-raised ui-button-danger ui-button-flat" 
					action="#{pagamentoBean.remover}" update="@form, :growl"  process="@this" >
						<p:confirm header="Confirmação" icon="pi pi-info-circle"
						message="Você tem certeza que deseja remover esse pagamento?" /> 
					</p:commandButton>
					
					<p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true" >
			            <p:commandButton value="Não" type="button" styleClass="ui-confirmdialog-no ui-button-flat" />
			            <p:commandButton value="Sim" type="button" styleClass="ui-confirmdialog-yes" />
			        </p:confirmDialog>
			        
			        <p:commandButton value="Voltar"  action="#{pagamentoBean.setLista(true)}" 
			        icon="pi pi-chevron-left" process="@this"
					update="@form" style="margin-right:15px;" 
					styleClass="ui-button-raised ui-button-secondary ui-button-flat" 
					rendered="#{pagamentoBean.cadastro}" />
					
				</div>
				
				<div class="p-col-6 p-text-right" >
				
					<p:commandButton value="Voltar"  action="#{pagamentoBean.setLista(true)}" icon="pi pi-chevron-left" 
					process="@this" rendered="#{!pagamentoBean.cadastro}"
					update="@form" style="margin-bottom:15px;" styleClass="ui-button-raised ui-button-secondary ui-button-flat" />
					
					<p:commandButton id="adicionarGerais" value="Adicionar"   class="p-text-right"  icon="pi pi-check" 
					styleClass="ui-button-raised ui-button-success ui-button-flat" 
					action="#{pagamentoBean.adicionar}" update="@form, :growl"  process="@form" rendered="#{pagamentoBean.cadastro}">
						<p:defaultCommand target="form:adicionarGerais"/>
					</p:commandButton>
					
					<p:commandButton id="salvarGerais" value="Salvar" styleClass="ui-button-raised ui-button-flat" icon="pi pi-check" 
					rendered="#{!pagamentoBean.cadastro}"	action="#{pagamentoBean.salvar}" 
					style="margin-left:15px;" 
					update="@form, :growl"  process="@form"	>
						<p:defaultCommand target="form:salvarGerais"/>
					</p:commandButton>
					
				</div>
				
<!-- 				<div class="p-col-12" > -->
<!-- 					<p:messages id="messages" redisplay="false" showDetail="false" closable="true"/> -->
<!-- 				</div> -->
			</div>
				
		</ui:composition>		
	</h:body>
</html>
