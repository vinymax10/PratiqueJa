<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

<h:body>
	<ui:composition>

		<p:tab id="resultadoExercicio" title="Resultado dos Exercícios">


			<p:panel header="Filtro" toggleable="true" closable="true"
				toggleSpeed="500" closeSpeed="500" widgetVar="panel"
				style="margin-bottom:1rem;width:100%;">

				<div class="ui-fluid formgrid grid">

					<div class="field col-12 md:col-6 lg:col-4 xl:col-3">
						<p:outputLabel for="@next" value="Assunto Curso" />
						<p:selectOneMenu
							value="#{resultadoExercicioBean.filtroResultadoExercicio.assuntoCurso}"
							filter="true" filterMatchMode="contains" converter="generic">
							<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
							<f:selectItems value="#{assuntoCursoBean.todosAssuntoCursos}"
								var="assuntoCurso" itemLabel="#{assuntoCurso.nome}"
								itemValue="#{assuntoCurso}" />
						</p:selectOneMenu>
					</div>

					<div class="field col-12 md:col-6 lg:col-4 xl:col-3">
						<p:outputLabel for="@next" value="Módulo" />
						<p:selectOneMenu
							value="#{resultadoExercicioBean.filtroResultadoExercicio.modulo}"
							filter="true" filterMatchMode="contains">
							<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
							<f:selectItems value="#{moduloBean.opcoes}" var="opcao"
								itemLabel="#{opcao.nome}" itemValue="#{opcao}" />
						</p:selectOneMenu>
					</div>

					<div class="field col-12 md:col-6 lg:col-4 xl:col-3">
						<p:outputLabel for="@next" value="Nível" />
						<p:selectOneMenu
							value="#{resultadoExercicioBean.filtroResultadoExercicio.nivel}"
							filter="true" filterMatchMode="contains">
							<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
							<f:selectItems value="#{nivelBean.opcoes}" var="opcao"
								itemLabel="#{opcao.nome}" itemValue="#{opcao}" />
						</p:selectOneMenu>
					</div>

					<div class="field col-12 md:col-6 lg:col-4 xl:col-3">
						<p:outputLabel for="@next" value="Tipo de Exercício" />
						<p:selectOneMenu
							value="#{resultadoExercicioBean.filtroResultadoExercicio.tipoExercicio}"
							filter="true" filterMatchMode="contains">
							<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
							<f:selectItems value="#{tipoExercicioBean.opcoes}" var="opcao"
								itemLabel="#{opcao.nome}" itemValue="#{opcao}" />
						</p:selectOneMenu>
					</div>

					<div class="field col-12 md:col-6 lg:col-4 xl:col-3">
						<p:outputLabel for="@next" value="Nome do Exercício" />
						<p:inputText
							value="#{resultadoExercicioBean.filtroResultadoExercicio.nomeExercicio}" />
					</div>

					<div class="field col-12 md:col-6 lg:col-4 xl:col-3">
						<p:outputLabel for="@next" value="Enunciado do Exercício" />
						<p:inputText
							value="#{resultadoExercicioBean.filtroResultadoExercicio.enunciado}" />
					</div>

					<div class="field col-12 md:col-6 lg:col-4 xl:col-3">
						<p:outputLabel for="@next" value="Descrição do Exercício" />
						<p:inputText
							value="#{resultadoExercicioBean.filtroResultadoExercicio.descricao}" />
					</div>

					<div class="field col-12 md:col-6 lg:col-4 xl:col-3">
						<p:outputLabel for="@next" value="Nome do usuário" />
						<p:inputText
							value="#{resultadoExercicioBean.filtroResultadoExercicio.nomeUsuario}" />
					</div>

					<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
						<p:outputLabel for="@next" value="Início Realização" />
						<p:datePicker
							value="#{resultadoExercicioBean.filtroResultadoExercicio.inicioRealizacao}" />
					</div>

					<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
						<p:outputLabel for="@next" value="Término Realização" />
						<p:datePicker
							value="#{resultadoExercicioBean.filtroResultadoExercicio.terminoRealizacao}" />
					</div>

				</div>

				<p:divider />

				<div class="p-grid" style="margin-top: 1rem">

					<div class="p-col-12 p-text-right">

						<p:commandButton value="Filtrar"
							styleClass="ui-button-raised ui-button-flat" icon="pi pi-search"
							action="#{resultadoExercicioBean.filtrarUsuario}"
							update="@form, :growl" process="@form" />
					</div>

				</div>

			</p:panel>

			<p:dataTable class="table table-striped"
				var="resultadoExercicio"
				value="#{resultadoExercicioBean.resultadosExercicios}"
				paginator="true" rows="20">

				<p:column headerText="Assunto">
					<h:outputText
						value="#{resultadoExercicio.exercicioPadrao.assuntoCurso.nome}" />
				</p:column>

				<p:column headerText="Módulo">
					<h:outputText
						value="#{resultadoExercicio.exercicioPadrao.assuntoCurso.modulo.nome}" />
				</p:column>

				<p:column headerText="Nível">
					<h:outputText value="#{resultadoExercicio.exercicioPadrao.nivel.nome}" />
				</p:column>

				<p:column headerText="Realização">
					<h:outputText value="#{resultadoExercicio.realizacao}">
						<f:convertDateTime pattern="dd/MM/yyyy" type="localDate" />
					</h:outputText>
				</p:column>

<!-- 				<p:column headerText="Duração" responsivePriority="4"> -->
<!-- 					<h:outputText value="#{resultadoExercicio.duracao}"> -->
<!-- 						<f:convertNumber pattern="#,##0.00" /> -->
<!-- 					</h:outputText> -->
<!-- 					<h:outputText value=" s" /> -->

<!-- 				</p:column> -->

				<p:column headerText="Nota" responsivePriority="3">
					<h:outputText value="#{resultadoExercicio.notaPorcentagem}">
						<f:convertNumber pattern="#,##0.00" />
					</h:outputText>
					<h:outputText value=" \%" />
					<p:progressBar value="#{resultadoExercicio.notaPorcentagem}"
						displayOnly="true" style="height: .5rem" />
				</p:column>

			</p:dataTable>
		</p:tab>
	</ui:composition>
</h:body>
</html>
