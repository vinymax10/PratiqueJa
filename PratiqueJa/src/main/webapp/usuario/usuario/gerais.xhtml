<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:body >
		<ui:composition>
		
			<p:tab title="Gerais">
			
			    <div class="formgrid grid">
			    	
					<div  class="campo col-12 xl:col-6" style="text-align:center;margin-bottom:0">
						<h:panelGroup id="image" rendered="#{!usuarioBean.lista}">
					
				    		<p:graphicImage class="circle" value="#{usuarioBean.usuario.imagem.fotoStreamedContent}" 
				    		rendered="#{not empty usuarioBean.usuario.imagem}" cache="false"  />
						</h:panelGroup>
					</div>
					
		           	<div class="col-12 xl:col-6 p-text-right" >
						<p:button  value="ConfogPost" styleClass="ui-button-raised ui-button-flat" 
						icon="pi pi-instagram" rendered="#{usuarioBean.usuario.criador}"
						href="/post/configuracao.xhtml?configPost=#{usuarioBean.usuario.configPost.id}"					
						style="margin-left:15px;" target="_blank">
						</p:button>
					</div>
				</div>
				<div class="ui-fluid formgrid grid">
		           <div class="campo col-12 xl:col-6">
			       		<p:outputLabel for="@next" value="Nome"/>
		                <p:inputText placeholder="Nome" value="#{usuarioBean.usuario.nome}" required="true"/>
					</div>
					
		           <div class="campo col-12 xl:col-6">
		            	<p:outputLabel for="@next" value="Email"/>
		                <p:inputText placeholder="Email" value="#{usuarioBean.usuario.email}" 
		                validator="#{usuarioBean.validateEmail}" required="true"/>
					</div>
					
	           		<div class="campo col-12 lg:col-6 xl:col-3">
		                <p:outputLabel for="@next" value="Turma"/>
		                <p:selectOneMenu value="#{usuarioBean.usuario.turma}" 
		                converter="generic" filter="true" filterMatchMode="contains">
		                	<f:selectItem itemLabel="Selecione uma opção" itemValue=""/>
		                    <f:selectItems value="#{turmaBean.todasTurmas}" var="opcao" 
		                    itemLabel="#{opcao.nome}" itemValue="#{opcao}"/>
		                </p:selectOneMenu>
		            </div>
					
	           		<div class="campo col-12 lg:col-6 xl:col-2">
	           			<p:outputLabel for="@next" value="Nascimento"/>
		                <p:datePicker value="#{usuarioBean.usuario.nascimento}" locale="pt" required="true"/>
	           		</div>
	           		
	           		<div class="campo col-12 lg:col-6 xl:col-3">
		                <p:outputLabel for="@next" value="Perfil"/>
		                <p:selectOneMenu value="#{usuarioBean.usuario.perfil}" 
		                filter="true" filterMatchMode="contains">
		                	<f:selectItem itemLabel="Selecione uma opção" itemValue=""/>
		                    <f:selectItems value="#{perfilUsuarioBean.opcoes}" var="perfil" 
		                    itemLabel="#{perfil.nome}" itemValue="#{perfil}"/>
		                </p:selectOneMenu>
		            </div>
		            
		            <div class="campo col-12 lg:col-6 xl:col-2">
	           			<p:outputLabel for="@next" value="Validade do Plano"/>
		                <p:datePicker value="#{usuarioBean.usuario.validadePlano}" locale="pt" />
	           		</div>
	           		
	           		<div class="campo col-12 md:col-6 lg:col-4 xl:col-2">
						<p:outputLabel for="@next" value="Criador" />
						<p:selectBooleanButton 
							value="#{usuarioBean.usuario.criador}"
							onLabel="Sim" offLabel="Não" 
							onIcon="fa fa-solid fa-thumbs-up" offIcon="fa fa-solid fa-thumbs-down"
							style="width-min:8rem;display:block;">
						</p:selectBooleanButton>
					</div>
					
					<div class="campo col-12 md:col-6 lg:col-4 xl:col-2">
						<p:outputLabel for="@next" value="Receber Exercícios" title="Desejo receber exercícios por e-mail"/>
						<p:selectBooleanButton 
							value="#{usuarioBean.usuario.recebeSpam}"
							onLabel="Sim" offLabel="Não" 
							onIcon="fa fa-solid fa-thumbs-up" offIcon="fa fa-solid fa-thumbs-down"
							style="width-min:8rem;display:block;">
						</p:selectBooleanButton>
					</div>
	
					<div  class="field col-12" >
	           			<p:fileUpload listener="#{usuarioBean.uploadFile}" mode="advanced" skinSimple="true" auto="true"
	           			style="width: auto" required="true" update="image"
	           			invalidFileMessage="apenas gif | jpg | jpeg | png são permitidos" 
	           			invalidSizeMessage="Tamanho máximo de arquivo permitido é 5 MB">
							<p:validateFile  sizeLimit="5002400" virusScan="true"
							allowTypes="/(\.|\/)(gif|jpe?g|png)$/"/>
	           			</p:fileUpload>
	           			
	           		</div>
	           		
					<div class="p-grid" style="margin:0 15px;width:100%;">
					    <h:panelGroup style="width:100%;" rendered="#{!usuarioBean.cadastro}">
						
							<ui:include src="/usuario/usuario/graficos.xhtml" />
						</h:panelGroup>
					</div>
								
				</div>	
				
				<p:divider />
				
				<div class="p-grid" style="margin-top:1rem">
					<div class="p-col-6" >
						
						<p:commandButton  value="Remover"    icon="pi pi-trash" rendered="#{!usuarioBean.cadastro}"
						styleClass="ui-button-raised ui-button-danger ui-button-flat" 
						action="#{usuarioBean.remover}" update="@form, :growl"  process="@this" >
							<p:confirm header="Confirmação" icon="pi pi-info-circle"
							message="Você tem certeza que deseja remover esse usuário?" /> 
						</p:commandButton>
						
						<p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true" >
				            <p:commandButton value="Não" type="button" styleClass="ui-confirmdialog-no ui-button-flat" />
				            <p:commandButton value="Sim" type="button" styleClass="ui-confirmdialog-yes" />
				        </p:confirmDialog>
				        
				        <p:commandButton value="Voltar"  action="#{usuarioBean.setLista(true)}" 
				        icon="pi pi-chevron-left" process="@this"
						update="@form" style="margin-right:15px;" 
						styleClass="ui-button-raised ui-button-secondary ui-button-flat" 
						rendered="#{usuarioBean.cadastro}" />
						
					</div>
					
					<div class="p-col-6 p-text-right" >
					
						<p:commandButton value="Voltar"  action="#{usuarioBean.setLista(true)}" icon="pi pi-chevron-left" 
						process="@this" rendered="#{!usuarioBean.cadastro}"
						update="@form" style="margin-bottom:15px;" styleClass="ui-button-raised ui-button-secondary ui-button-flat" />
						
						<p:commandButton id="adicionarGerais" value="Adicionar"   class="p-text-right"  icon="pi pi-check" 
						styleClass="ui-button-raised ui-button-success ui-button-flat" 
						action="#{usuarioBean.adicionar(false)}" update="@form, :growl"  process="@form" rendered="#{usuarioBean.cadastro}">
							<p:defaultCommand target="form:usuario:adicionarGerais"/>
						</p:commandButton>
						
						<p:commandButton id="salvarGerais" value="Salvar" styleClass="ui-button-raised ui-button-flat" icon="pi pi-check" 
						rendered="#{!usuarioBean.cadastro}"	action="#{usuarioBean.salvar}"
						style="margin-left:15px;"  update="@form, :growl"  process="@form"	>
							<p:defaultCommand target="form:usuario:salvarGerais"/>
						</p:commandButton>
						
					</div>
					
					<div class="p-col-12" >
						<p:messages id="messages" redisplay="false" showDetail="false" closable="true"/>
					</div>
				</div>
			</p:tab>
		</ui:composition>		
	</h:body>
</html>
