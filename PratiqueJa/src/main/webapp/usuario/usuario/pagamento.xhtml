<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:body >
		<ui:composition>
		
			<p:tab title="Pagamentos">
			
			     <p:dataTable class="table table-striped" var="pagamento" value="#{usuarioBean.usuario.pagamentos}" 
				    paginator="true" rows="10">
				    
				    	<p:column headerText="ID" responsivePriority="3" >
							<h:outputText value="#{pagamento.id}"  />
						</p:column>
				    	
						<p:column headerText="Data" responsivePriority="2">
							<h:outputText value="#{pagamento.data}" >
								<f:convertDateTime pattern="dd/MM/yyyy" type="localDate"/>
							</h:outputText>
						</p:column>
						
						<p:column headerText="Valor"  responsivePriority="1">
						
							<h:outputText value="R$ " />
							<h:outputText value="#{pagamento.valor}" >
								<f:convertNumber pattern="#,##0.00" />
							</h:outputText>
							
						</p:column>
						
						<p:column headerText="Tipo Pagamento" responsivePriority="1">
							<h:outputText value="#{pagamento.tipoPagamento.nome}" />
						</p:column>
						
						<p:column headerText="Plano" responsivePriority="1">
							<h:outputText value="#{pagamento.plano.nome}" />
						</p:column>
						
					</p:dataTable>
			</p:tab>
		</ui:composition>		
	</h:body>
</html>
