<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

<h:body>
	<ui:composition>

		<p:tab id="anual" title="Anual">
			<div class="ui-fluid formgrid grid">
				<div class="field col-12 lg:col-6 xl:col-4">
					<p:chart value="#{estatisticaBean.graficoAcessoAnual()}" 
					style="width: 100%; height: 350px;"/>
				</div>
				
				<div class="field col-12 lg:col-6 xl:col-4">
					<p:chart value="#{estatisticaBean.grafico('anual','numDownloadExercicio','Nº Download Exercício')}" 
					style="width: 100%; height: 350px;"/>
				</div>
				
				<div class="field col-12 lg:col-6 xl:col-4">
					<p:chart value="#{estatisticaBean.grafico('anual','numDownloadQuestao','Nº Download Questão')}" 
					style="width: 100%; height: 350px;"/>
				</div>
				
				<div class="field col-12 lg:col-6 xl:col-4">
					<p:chart value="#{estatisticaBean.grafico('anual','numDownloadQuestaoMassa','Nº Download Questão Massa')}" 
					style="width: 100%; height: 350px;"/>
				</div>
				
				<div class="field col-12 lg:col-6 xl:col-4">
					<p:chart value="#{estatisticaBean.grafico('anual','numDownloadMassa','Nº Download Massa')}" 
					style="width: 100%; height: 350px;"/>
				</div>
				
				<div class="field col-12 lg:col-6 xl:col-4">
					<p:chart value="#{estatisticaBean.grafico('anual','numResolucaoExercicio','Nº Resolução Exercício')}" 
					style="width: 100%; height: 350px;"/>
				</div>
				
				<div class="field col-12 lg:col-6 xl:col-4">
					<p:chart value="#{estatisticaBean.grafico('anual','numResolucaoQuestao','Nº Resolução Questão')}" 
					style="width: 100%; height: 350px;"/>
				</div>
				
				<div class="field col-12 lg:col-6 xl:col-4">
					<p:chart value="#{estatisticaBean.grafico('anual','numQuestaoFeita','Nº Questões Feitas')}" 
					style="width: 100%; height: 350px;"/>
				</div>
			</div>
		</p:tab>
	</ui:composition>
</h:body>
</html>
