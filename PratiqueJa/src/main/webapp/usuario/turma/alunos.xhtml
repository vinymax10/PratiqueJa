<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">
	
	<h:body >
		<ui:composition>
			
			<p:panel header="Alunos" toggleable="true" closable="true" 
			toggleSpeed="500" rendered="#{!turmaBean.cadastro}"
       		closeSpeed="500" widgetVar="panel" style="margin:1rem 0;">
						
			    <p:dataTable  class="table table-striped" var="usuario" 
			    value="#{turmaBean.turma.alunos}" 
			    stripedRows="true" rowIndexVar="index" draggableRows="true"	    >
			    	
			    	<p:column headerText="Foto" width="4rem" responsivePriority="1" >
			    		<p:graphicImage class="circleTable" value="#{usuario.imagem.getFotoStreamedContent()}" 
			    		rendered="#{not empty usuario.imagem}" stream="false" />
			    	</p:column>
			    	
			    	<p:column headerText="Nome" >
						<h:outputText value="#{usuario.nome}"  responsivePriority="1" />
					</p:column>
					
					<p:column headerText="Email" responsivePriority="2" >
						<h:outputText value="#{usuario.email}" />
					</p:column>
					
					<p:column headerText="Nascimento" responsivePriority="3">
						<h:outputText value="#{usuario.nascimento}" >
							<f:convertDateTime pattern="dd/MM/yyyy" type="localDate"/>
						</h:outputText>
					</p:column>
					
				</p:dataTable>
					
			</p:panel>
			
		</ui:composition>		
	</h:body>
</html>
