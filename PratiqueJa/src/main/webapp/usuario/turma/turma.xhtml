<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui" template="/template/template.xhtml">


	<h:form id="form" style="margin-bottom:0">
		<div class="p-d-flex">
			<div class="p-grid" style="margin: 0 15px; width: 100%;">

				<div class="p-col-12">
					<h2>Turma</h2>
				</div>

				<h:panelGroup id="fomulario" style="width:100%;"
					rendered="#{!turmaBean.lista}">

					<ui:include src="/usuario/turma/gerais.xhtml" />

				</h:panelGroup>

				<h:panelGroup id="filtro" rendered="#{turmaBean.lista}">

					<p:commandButton value="Adicionar" icon="pi pi-plus"
						styleClass="ui-button-raised ui-button-success ui-button-flat"
						action="#{turmaBean.cadastrar}" update="@form"
						process="@this" style="margin-bottom:1rem;" />

					<p:panel header="Filtro" toggleable="true" closable="true"
						toggleSpeed="500" closeSpeed="500" widgetVar="panel"
						style="margin-bottom:1rem;">

						<div class="ui-fluid formgrid grid">
							<div class="field col-12 lg:col-6 xl:col-4">
								<p:outputLabel for="@next" value="Nome" />
								<p:inputText placeholder="Nome"
									value="#{turmaBean.filtroTurma.nome}" />
							</div>
							
							<div class="field col-12 xl:col-6">
								<p:outputLabel for="@next" value="Assunto Curso" />
								<p:selectOneMenu value="#{turmaBean.filtroTurma.assuntoAtual}"
									converter="generic" >
									<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
									<f:selectItems value="#{assuntoCursoBean.listaAtivas}"
										var="assuntoCurso" itemLabel="#{assuntoCurso.nome}"
										itemValue="#{assuntoCurso}" />
								</p:selectOneMenu>
							</div>
						</div>

						<p:divider />

						<div class="p-grid" style="margin-top: 1rem">

							<div class="p-col-12 p-text-right">

								<p:commandButton value="Filtrar"
									styleClass="ui-button-raised ui-button-flat"
									icon="pi pi-search" action="#{turmaBean.filtrar}"
									update="@form, :growl" process="@form" />
							</div>

						</div>

					</p:panel>

					<p:dataTable id="tabela" class="table table-striped"
						var="turma" value="#{turmaBean.turmas}"
						selection="#{turmaBean.turma}"
						selectionMode="single" rowKey="#{turma.id}"
						paginator="true" rows="20" reflow="true" >
						<p:ajax event="rowSelect" update="@form"
							listener="#{turmaBean.onSelected}" />

						<p:column headerText="Nome" responsivePriority="1">
							<h:outputText value="#{turma.nome}" />
						</p:column>

						<p:column headerText="Assunto Atual" responsivePriority="2">
							<h:outputText value="#{turma.assuntoAtual.nome}" />
						</p:column>

					</p:dataTable>

				</h:panelGroup>
			</div>
		</div>
	</h:form>


</ui:decorate>
