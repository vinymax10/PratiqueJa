<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

<h:body>
	<ui:composition>

		<p:tab title="Contas" rendered="#{!testeBean.cadastro}">

			<p:commandButton value="Adicionar" icon="pi pi-plus"
				styleClass="ui-button-raised ui-button-success ui-button-flat"
				action="#{paragrafoBean.cadastrar}" update="@form" process="@this"
				style="margin-bottom:1rem;" />

			<p:dataTable class="table table-striped" var="conta"
			value="#{testeBean.teste.contas}" stripedRows="true"	>
			
				<p:column headerText="Index">
					<h:outputText value="#{index + 1})  #{conta.index}" />
				</p:column>

				<p:column headerText="Respondida">
					<h:outputText value="#{conta.respondida}"
						converter="simNaoConverter" />
				</p:column>

				<p:column headerText="RespostaAluno">
					<h:outputText value="#{conta.respostaAluno}" />
				</p:column>

				<p:column headerText="Correta">
					<h:outputText value="#{conta.correta}" converter="simNaoConverter" />
				</p:column>

			</p:dataTable>

			<!-- 				</h:panelGroup> -->

			<div class="p-grid" style="margin-top: 1rem">
				<div class="p-col-12 p-text-right">

					<p:commandButton value="Voltar"
						action="#{testeBean.setLista(true)}" icon="pi pi-chevron-left"
						process="@this" update="@form"
						styleClass="ui-button-raised ui-button-secondary ui-button-flat" />

				</div>
			</div>

		</p:tab>

	</ui:composition>
</h:body>
</html>
