<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	xmlns:c="http://xmlns.jcp.org/jsp/jstl/core"
	template="/template/template.xhtml">
	
	<f:metadata>
	    <f:viewParam name="id" value="#{fazerTesteBean.id}" converter="jakarta.faces.Long" />
	    <f:viewAction action="#{fazerTesteBean.init()}" />
	</f:metadata>

	<f:websocket channel="cronometro">
		<f:ajax event="update" render="form:tempo" />
	</f:websocket>

	<f:websocket channel="cronometro">
		<f:ajax event="finalizar" onevent="finalizar"  />
	</f:websocket>
	
	<p:remoteCommand name="finalizar" action="#{fazerTesteBean.finalizar}" delay="1000"
   	process="@this" update="form, :growl" 
	 oncomplete="reloadMathJax();" /> 
	 
	<p:remoteCommand name="update" action="#{fazerTesteBean.update}" 
   	process="@this"  /> 

	<div class="p-d-flex">
			
	    <h:form id="form" style="margin-bottom:0;width:100%;">
	    
			<div class="p-grid" style="margin:15px;">
				<div class="p-col-6" >	
					<h:outputText style="font-weight: bold;font-size:1.5rem;" value="Teste: #{fazerTesteBean.teste.testePadrao.nome}" />
				</div>
	    		
	    	 	<div class="p-col-6" style="text-align:right;">
	    	 		<h:panelGroup rendered="#{fazerTesteBean.teste.realizado}">
	    	 		
		    	 		<h:outputText style="font-weight: bold;color:var(--iris);" value="Nota: " />
						<h:outputText style="font-weight: bold;" value="#{fazerTesteBean.teste.nota}" >
							<f:convertNumber pattern="#,##0.00" />
						</h:outputText>
						<h:outputText style="margin-right:15px; font-weight: bold;" value=" \%" />

	    	 		</h:panelGroup>
	    	 		<h:panelGroup id="tempo" rendered="#{!fazerTesteBean.teste.realizado}">
	    	 			<h:outputText style="font-weight: bold;color:var(--iris);" value="Tempo: #{fazerTesteBean.teste.tempoString}" />
	    	 		</h:panelGroup>
	    	 	</div>			
				
			</div> 
			 
			<div class="p-grid" style="margin:0; width:100%;">
				<div  class="ui-fluid p-formgrid p-grid" style="width:100%;margin:0 15px;" >
					<c:forEach items="#{fazerTesteBean.teste.etapasTeste}" var="etapaTeste" varStatus="status">
						
						<div class="p-col-12" style="margin-top:30px;margin-left:15px;">

							<h:outputText style="color: var(--iris);" value="#{etapaTeste.exercicioPadrao.assuntoCurso.modulo.nome}" />
					    	 - 
					    	<h:outputText style="color: var(--verde);" value="#{etapaTeste.exercicioPadrao.assuntoCurso.nome}" />
					    	- 
					    	<h:outputText style="color: var(--cinza);" value="#{etapaTeste.exercicioPadrao.nivel.nome}" />
						
						</div>
						
						<div class="p-col-12" style="margin-left:15px;">
							<h:outputText style="margin-bottom:10px;font-weight: bold;color:var(--laranja)" 
							value="Instrução: " />
						   <h:outputText style="margin-bottom:10px;" 
							value="#{etapaTeste.exercicioPadrao.enunciado}"/> 
				        </div>
				        
						<c:forEach items="#{etapaTeste.contas}" var="conta" varStatus="status2">
							<ui:insert >
				        		<ui:include src="#{conta.getFileTipoExercicio()}" />
			        		</ui:insert>
						</c:forEach>
					    
					</c:forEach>
			    </div>
			
			</div>
			<div class="p-grid" style="margin:0 15px;">
				<div class="p-col-6" >
<!-- 	      			<p:button value="Voltar" styleClass="ui-button-raised ui-button-secondary ui-button-flat"  -->
<!-- 					href="/Exercicio/Exercicio.xhtml" style="width: auto" icon="pi pi-chevron-left" /> -->
					
					<p:button value="Voltar" styleClass="ui-button-raised ui-button-secondary ui-button-flat" 
					onclick="window.history.go(-1); return false;" style="width: auto" icon="pi pi-chevron-left" />
	      		</div> 
	      		
	      		<div class="p-col-6" style="text-align:right;">
					<p:commandButton styleClass="ui-button-raised ui-button-flat ui-button-success" value="Finalizar"
					icon="pi pi-check" action="#{fazerTesteBean.finalizar}"  update="@form, :growl" 
					rendered="#{!fazerTesteBean.teste.realizado}"
					oncomplete="reloadMathJax();" style="width: auto" >
					</p:commandButton>
				</div>
	      		        
			</div>
		</h:form>
	</div>
	<br/>   <br/>
	
</ui:decorate>
