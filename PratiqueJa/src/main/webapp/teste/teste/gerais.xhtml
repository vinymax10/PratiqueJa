<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:body >
		<ui:composition>
			    
		    <p:tab title="Gerais">
			    
				<div class="ui-fluid formgrid grid">
					
		          <div class="campoMsg col-12 lg:col-6 xl:col-4">
		                <p:outputLabel for="@next" value="Teste Padrão"/>
		                <p:selectOneMenu value="#{testeBean.teste.testePadrao}" converter="generic"
		                required="true" disabled="#{!testeBean.cadastro}"
		                filter="true" filterMatchMode="contains">
		                	 <f:selectItem itemLabel="Selecione uma opção" itemValue=""/>
		                    <f:selectItems value="#{testePadraoBean.todosTestesPadroes}" var="testePadrao" 
		                    itemLabel="#{testePadrao.nome}" 
		                    itemValue="#{testePadrao}"/>
		                </p:selectOneMenu>
		            </div>
		            
		            <div class="campoMsg col-12 lg:col-6 xl:col-4">
		                <p:outputLabel for="@next" value="Usuário"/>
		                <p:selectOneMenu value="#{testeBean.teste.usuario}" converter="generic" 
		                filter="true" filterMatchMode="contains"  required="true">
		                	 <f:selectItem itemLabel="Selecione uma opção" itemValue=""/>
		                    <f:selectItems value="#{usuarioBean.todosUsuarios}" var="usuario" itemLabel="#{usuario.nome}" itemValue="#{usuario}"/>
		                </p:selectOneMenu>
		            </div>
		            
		            <div class="campoMsg col-12 lg:col-6 xl:col-4">
						<p:outputLabel for="@next" value="Assunto Curso" rendered="#{!testeBean.cadastro}"/>
						<p:selectOneMenu value="#{testeBean.teste.testePadrao.assuntoCurso}"
							converter="generic" disabled="true" rendered="#{!testeBean.cadastro}">
							<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
							<f:selectItems value="#{assuntoCursoBean.todosAssuntoCursos}"
								var="assuntoCurso" itemLabel="#{assuntoCurso.nome}"
								itemValue="#{assuntoCurso}" />
						</p:selectOneMenu>
					</div>
		            
		            <div class="campoMsg col-12 lg:col-6 xl:col-3">
						<p:outputLabel for="@next" value="Duração min" rendered="#{!testeBean.cadastro}" />
						<p:inputNumber id="tempo" symbolPosition="p" decimalSeparator=","
							thousandSeparator="." rendered="#{!testeBean.cadastro}"
							requiredMessage="O tempo é obrigatório"
							value="#{testeBean.teste.duracao}" required="true" />
						<p:message for="tempo" display="text" />
					</div>
		
					<div class="campoMsg col-12 lg:col-6 xl:col-3">
						<p:outputLabel for="@next" value="Nota Mínima" rendered="#{!testeBean.cadastro}"/>
						<p:inputNumber id="nota" rendered="#{!testeBean.cadastro}"
							value="#{testeBean.teste.notaMinima}" required="true"
							symbolPosition="p" decimalSeparator=","
							requiredMessage="A nota mínima é obrigatória" thousandSeparator="." />
						<p:message for="nota" display="text" />
					</div>
					
					<div class="campoMsg col-12 md:col-6 lg:col-4 xl:col-2">
	                    <p:outputLabel for="@next" value="Realizado" rendered="#{!testeBean.cadastro}"/>
						<p:selectOneMenu value="#{testeBean.teste.realizado}" rendered="#{!testeBean.cadastro}" >
							<f:selectItem itemLabel="Sim" itemValue="#{true}"/>
							<f:selectItem itemLabel="Não" itemValue="#{false}"/>
						</p:selectOneMenu>		
					</div>	
					
					<div class="campoMsg col-12 md:col-6 lg:col-4 xl:col-2">
	                    <p:outputLabel for="@next" value="Repetir até passar" rendered="#{!testeBean.cadastro}"/>
						<p:selectOneMenu value="#{testeBean.teste.repetirAtePassar}" rendered="#{!testeBean.cadastro}" >
							<f:selectItem itemLabel="Sim" itemValue="#{true}"/>
							<f:selectItem itemLabel="Não" itemValue="#{false}"/>
						</p:selectOneMenu>		
					</div>	
			            
				</div>
				
				<p:divider />
				
				<div class="p-grid" style="margin-top:1rem">
					<div class="p-col-6" >
						
						<p:commandButton  value="Remover"    icon="pi pi-trash" rendered="#{!testeBean.cadastro}"
						styleClass="ui-button-raised ui-button-danger ui-button-flat" 
						action="#{testeBean.remover}" update="@form, :growl"  process="@this" >
							<p:confirm header="Confirmação" icon="pi pi-info-circle"
							message="Você tem certeza que deseja remover a questão ?" /> 
						</p:commandButton>
						
						<p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true" >
				            <p:commandButton value="Não" type="button" styleClass="ui-confirmdialog-no ui-button-flat" />
				            <p:commandButton value="Sim" type="button" styleClass="ui-confirmdialog-yes" />
				        </p:confirmDialog>
				        
				        <p:commandButton value="Voltar"  action="#{testeBean.setLista(true)}" 
				        icon="pi pi-chevron-left" process="@this"
						update="@form" style="margin-right:15px;" 
						styleClass="ui-button-raised ui-button-secondary ui-button-flat" 
						rendered="#{testeBean.cadastro}" />
						
					</div>
					
					<div class="p-col-6 p-text-right" >
					
						<p:commandButton value="Voltar"  action="#{testeBean.setLista(true)}" icon="pi pi-chevron-left" 
						process="@this" rendered="#{!testeBean.cadastro}"
						update="@form" style="margin-bottom:15px;" styleClass="ui-button-raised ui-button-secondary ui-button-flat" />
						
						<p:commandButton id="adicionarGerais" value="Adicionar"   class="p-text-right"  icon="pi pi-check" 
						styleClass="ui-button-raised ui-button-success ui-button-flat" 
						action="#{testeBean.adicionar}" update="@form, :growl"  process="@form" rendered="#{testeBean.cadastro}">
							<p:defaultCommand target="form:teste:adicionarGerais"/>
						</p:commandButton>
						<p:commandButton id="salvarGerais" value="Salvar" styleClass="ui-button-raised ui-button-flat" icon="pi pi-check" 
						rendered="#{!testeBean.cadastro}"	style="margin-left:15px;" 
						action="#{testeBean.salvar}" update="@form, :growl"  process="@form"	>
						</p:commandButton>
							<p:defaultCommand target="form:teste:salvarGerais"/>
					</div>
					
					<div class="p-col-12" >
						<p:messages id="messages" redisplay="false" showDetail="false" closable="true"/>
					</div>
				</div>
							
       		</p:tab>
		</ui:composition>		
	</h:body>
</html>
