<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui" template="/template/template.xhtml">


	<h:form id="form" style="margin-bottom:0">
		<div class="p-d-flex">
			<div class="p-grid" style="margin: 0 15px; width: 100%;">

				<div class="p-col-12">
					<h2>Resultado dos Testes</h2>
				</div>

				<p:panel header="Filtro" toggleable="true" closable="true"
					toggleSpeed="500" closeSpeed="500" widgetVar="panel"
					style="margin-bottom:1rem;width:100%;">

					<div class="ui-fluid formgrid grid">

						<div class="field col-12 xl:col-6">
							<p:outputLabel for="@next" value="Teste Padrão" />
							<p:selectOneMenu
								value="#{resultadoTesteBean.filtroResultadoTeste.testePadrao}"
								converter="generic" filter="true" filterMatchMode="contains">
								<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
								<f:selectItems value="#{testePadraoBean.todosTestesPadroes}"
									var="testePadrao" itemLabel="#{testePadrao.nome}"
									itemValue="#{testePadrao}" />
							</p:selectOneMenu>
						</div>

						<div class="field col-12 md:col-6 lg:col-4 xl:col-3">
							<p:outputLabel for="@next" value="Assunto Curso" />
							<p:selectOneMenu
								value="#{resultadoTesteBean.filtroResultadoTeste.assuntoCurso}"
								filter="true" filterMatchMode="contains" converter="generic">
								<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
								<f:selectItems value="#{assuntoCursoBean.listaAtivas}"
									var="assuntoCurso" itemLabel="#{assuntoCurso.nome}"
									itemValue="#{assuntoCurso}" />
							</p:selectOneMenu>
						</div>

						<div class="field col-12 md:col-6 lg:col-4 xl:col-3">
							<p:outputLabel for="@next" value="Módulo" />
							<p:selectOneMenu
								value="#{resultadoTesteBean.filtroResultadoTeste.modulo}"
								filter="true" filterMatchMode="contains">
								<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
								<f:selectItems value="#{moduloBean.opcoes}" var="opcao"
									itemLabel="#{opcao.nome}" itemValue="#{opcao}" />
							</p:selectOneMenu>
						</div>

						<div class="field col-12 md:col-6 lg:col-4 xl:col-3">
							<p:outputLabel for="@next" value="Nome do usuário" />
							<p:inputText
								value="#{resultadoTesteBean.filtroResultadoTeste.nomeUsuario}" />
						</div>

						<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
							<p:outputLabel for="@next" value="Início Realização" />
							<p:datePicker
								value="#{resultadoTesteBean.filtroResultadoTeste.inicioRealizacao}" />
						</div>

						<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
							<p:outputLabel for="@next" value="Término Realização" />
							<p:datePicker
								value="#{resultadoTesteBean.filtroResultadoTeste.terminoRealizacao}" />
						</div>

					</div>

					<p:divider />

					<div class="p-grid" style="margin-top: 1rem">

						<div class="p-col-12 p-text-right">

							<p:commandButton value="Filtrar"
								styleClass="ui-button-raised ui-button-flat" icon="pi pi-search"
								action="#{resultadoTesteBean.filtrar}" update="@form, :growl"
								process="@form" />
						</div>

					</div>

				</p:panel>

				<p:dataTable id="tabela" class="table table-striped" reflow="true"
					var="resultadoTeste" value="#{resultadoTesteBean.resultadosTestes}"
					paginator="true" rows="20">

					<p:column headerText="Teste Padrão" responsivePriority="1">
						<h:outputText value="#{resultadoTeste.testePadrao.nome}" />
					</p:column>

					<p:column headerText="Nome do Usuário" responsivePriority="1">
						<h:outputText value="#{resultadoTeste.usuario.nome}" />
					</p:column>

					<p:column headerText="Assunto" responsivePriority="1">
						<h:outputText
							value="#{resultadoTeste.testePadrao.assuntoCurso.nome}" />
					</p:column>

					<p:column headerText="Módulo" responsivePriority="2">
						<h:outputText
							value="#{resultadoTeste.testePadrao.assuntoCurso.modulo.nome}" />
					</p:column>

					<p:column headerText="Realização" responsivePriority="3">
						<h:outputText value="#{resultadoTeste.realizacao}">
							<f:convertDateTime pattern="dd/MM/yyyy" type="localDate" />
						</h:outputText>
					</p:column>

					<p:column headerText="Nota" responsivePriority="1">
						<h:outputText value="#{resultadoTeste.nota}">
							<f:convertNumber pattern="#,##0.00" />
						</h:outputText>
						<h:outputText value=" \%" />
						<p:progressBar value="#{resultadoTeste.nota}" displayOnly="true"
							style="height: .5rem" />
					</p:column>

				</p:dataTable>

			</div>
		</div>
	</h:form>


</ui:decorate>
