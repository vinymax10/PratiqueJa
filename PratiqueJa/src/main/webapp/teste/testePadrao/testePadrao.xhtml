<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui" template="/template/template.xhtml">


	<h:form id="form" style="margin-bottom:0">
		<div class="p-d-flex">
			<div class="p-grid" style="margin: 0 30px; width: 100%;">

				<div class="p-col-12">
					<h2>Teste Padrão</h2>
				</div>

				<h:panelGroup id="fomulario" style="width:100%;"
					rendered="#{!testePadraoBean.lista}">

					<ui:include src="/teste/testePadrao/cadastro.xhtml" />

				</h:panelGroup>

				<h:panelGroup id="filtro" rendered="#{testePadraoBean.lista}">

					<p:commandButton value="Adicionar" icon="pi pi-plus"
						styleClass="ui-button-raised ui-button-success ui-button-flat"
						action="#{testePadraoBean.cadastrar}" update="@form"
						process="@this" style="margin-bottom:1rem;" />

					<p:panel header="Filtro" toggleable="true" closable="true"
						toggleSpeed="500" closeSpeed="500" widgetVar="panel"
						style="margin-bottom:1rem;">

						<div class="ui-fluid formgrid grid">
							<div class="field col-12 lg:col-6 xl:col-6">
								<p:outputLabel for="@next" value="Nome" />
								<p:inputText placeholder="Nome"
									value="#{testePadraoBean.filtroTestePadrao.nome}" />
							</div>
							
							<div class="field col-12 xl:col-6">
								<p:outputLabel for="@next" value="Assunto Curso" />
								<p:selectOneMenu value="#{testePadraoBean.filtroTestePadrao.assuntoCurso}"
									converter="generic" >
									<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
									<f:selectItems value="#{assuntoCursoBean.listaAtivas}"
										var="assuntoCurso" itemLabel="#{assuntoCurso.nome}"
										itemValue="#{assuntoCurso}" />
								</p:selectOneMenu>
							</div>

							<div class="field col-12 lg:col-6 xl:col-3">
								<p:outputLabel for="@next" value="Duração" />
								<p:inputNumber symbolPosition="p" decimalSeparator=","
									thousandSeparator="."
									value="#{testePadraoBean.filtroTestePadrao.duracao}" />
							</div>

							<div class="field col-12 lg:col-6 xl:col-3">
								<p:outputLabel for="@next" value="Nota Mínima" />
								<p:inputNumber
									value="#{testePadraoBean.filtroTestePadrao.notaMinima}"
									symbolPosition="p" decimalSeparator="," thousandSeparator="." />
							</div>

						</div>

						<p:divider />

						<div class="p-grid" style="margin-top: 1rem">

							<div class="p-col-12 p-text-right">
								<p:commandButton id="limpar" value="Limpar"
									styleClass="ui-button-raised ui-button-flat ui-button-secondary"
									icon="fa fa-solid fa-eraser"
									style="margin-right:1rem;"
									action="#{testePadraoBean.filtroTestePadrao.limpar()}"
									update="@form, :growl" process="@form">
								</p:commandButton>

								<p:commandButton id="filtrar" value="Filtrar"
									styleClass="ui-button-raised ui-button-flat"
									icon="pi pi-search" action="#{testePadraoBean.filtrar}"
									update="@form, :growl" process="@form">
									<p:defaultCommand target="form:filtrar" />
								</p:commandButton>

							</div>
						</div>

					</p:panel>

					<p:dataTable id="tabela" class="table table-striped"
						var="testePadrao" value="#{testePadraoBean.testesPadroes}"
						reflow="true" selection="#{testePadraoBean.testePadrao}"
						selectionMode="single" rowKey="#{testePadrao.id}" paginator="true"
						rows="20">

						<p:ajax event="rowSelect" update="@form"
							listener="#{testePadraoBean.onSelected}" />

						<p:column headerText="Nome" responsivePriority="1">
							<h:outputText value="#{testePadrao.nome}" />
						</p:column>
						
						<p:column headerText="Assunto Curso" responsivePriority="1">
							<h:outputText value="#{testePadrao.assuntoCurso.nome}" />
						</p:column>

						<p:column headerText="Duração min" responsivePriority="1">
							<h:outputText value="#{testePadrao.duracao}" />
						</p:column>

						<p:column headerText="Nota Mínima" responsivePriority="1">
							<h:outputText value="#{testePadrao.notaMinima}">
								<f:convertNumber pattern="#,##0.00" />
							</h:outputText>
						</p:column>

					</p:dataTable>

				</h:panelGroup>
			</div>
		</div>
	</h:form>


</ui:decorate>
