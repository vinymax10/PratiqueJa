<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">
	
	<h:body >
		<ui:composition>
			
			<p:panel header="Conteúdo do Teste" toggleable="true" closable="true" 
			toggleSpeed="500" rendered="#{!testePadraoBean.cadastro}"
       		closeSpeed="500" widgetVar="panel" style="margin:1rem 0;">
	
				<h:panelGroup  rendered="#{!conteudoTesteBean.lista}">
					
					<div class="ui-fluid p-formgrid p-grid">
						
						<div class="field col-12 xl:col-5">
			                <p:outputLabel for="@next" value="Exercício"/>
			                <p:selectOneMenu value="#{conteudoTesteBean.conteudoTeste.exercicioPadrao}" converter="generic"
			                required="true" 
			                filter="true" filterMatchMode="contains">
			                	 <f:selectItem itemLabel="Selecione uma opção" itemValue=""/>
			                    <f:selectItems value="#{exercicioPadraoBean.todosExerciciosPadrao}" var="exercicio" 
			                    itemLabel="#{exercicio.assuntoCurso.modulo.nome} - #{exercicio.assuntoCurso.nome} - #{exercicio.nivel.nome}" itemValue="#{exercicio}"/>
			                </p:selectOneMenu>
			            </div>
			            
			            <div class="field col-12 md:col-6 lg:col-4 xl:col-2">
							<p:outputLabel for="@next" value="Quantidade" />
							<p:spinner min="1" max="10000"
								value="#{conteudoTesteBean.conteudoTeste.quantidade}" required="true" />
						</div>
						
					</div>
					
					<p:divider />
					
					<div class="p-grid" style="margin-top:1rem">
					
						<div class="p-col-6" >
							
							<p:commandButton  value="Remover"    icon="pi pi-trash" process="@this"
							styleClass="ui-button-raised ui-button-danger ui-button-flat" 
							action="#{conteudoTesteBean.remover}" update="@form, :growl" rendered="#{!conteudoTesteBean.cadastro}" />
							
						</div>
						<div class="p-col-6 p-text-right" >
					
							<p:commandButton value="Voltar"  action="#{conteudoTesteBean.setLista(true)}" icon="pi pi-chevron-left" process="@this"
							update="@form" style="margin-right:15px;" styleClass="ui-button-raised ui-button-secondary ui-button-flat" />
							
							<p:commandButton id="adicionarParagrafo"  value="Adicionar"   class="p-text-right"  icon="pi pi-check" 
							styleClass="ui-button-raised ui-button-success ui-button-flat" 
							action="#{conteudoTesteBean.adicionar}" update="@form, :growl"  process="@form" rendered="#{conteudoTesteBean.cadastro}">
								
							</p:commandButton>
<!-- 							<p:defaultCommand target="form:questao:adicionarParagrafo"/> -->
							<p:commandButton id="salvarParagrafo" value="Salvar" styleClass="ui-button-raised ui-button-flat" icon="pi pi-check" 
							rendered="#{!conteudoTesteBean.cadastro}"	action="#{conteudoTesteBean.salvar}" update="@form, :growl"  process="@form">
								
							</p:commandButton>
<!-- 							<p:defaultCommand target="form:questao:salvarParagrafo"/> -->
						</div>
						
						<div class="p-col-12" >
							<p:messages redisplay="false" showDetail="false" closable="true"/>
						</div>
						
					</div>
					
				</h:panelGroup>
				
				<h:panelGroup rendered="#{conteudoTesteBean.lista}">
						
					<p:commandButton  value="Adicionar"  icon="pi pi-plus" styleClass="ui-button-raised ui-button-success ui-button-flat" 
					action="#{conteudoTesteBean.cadastrar}" update="@form"  process="@this" style="margin-bottom:1rem;"	/>
					
				    <p:dataTable  class="table table-striped" var="conteudoTeste" value="#{testePadraoBean.testePadrao.conteudosTeste}" 
				    stripedRows="true" rowIndexVar="index" draggableRows="true"
				    selection="#{conteudoTesteBean.conteudoTeste}" selectionMode="single" rowKey="#{conteudoTeste.id}">
				    	<p:ajax event="rowSelect" update="@form" listener="#{conteudoTesteBean.onSelected}"/>
				    	
<!-- 				    	<p:ajax event="rowReorder" listener="#{gestaoQuestaoBean.reorderParagrafo}" update="@form, :growl"/> -->
				    	
				    	<p:column headerText="Assunto Curso" responsivePriority="1">
							<h:outputText value="#{conteudoTeste.exercicioPadrao.assuntoCurso.nome}" />
						</p:column>

						<p:column headerText="Módulo" responsivePriority="1">
							<h:outputText value="#{conteudoTeste.exercicioPadrao.assuntoCurso.modulo.nome}" />
						</p:column>

						<p:column headerText="Nível" responsivePriority="1">
							<h:outputText value="#{conteudoTeste.exercicioPadrao.nivel.nome}" />
						</p:column>

						<p:column headerText="Quantidade" responsivePriority="2">
							<h:outputText value="#{conteudoTeste.quantidade}" />
						</p:column>
						
					</p:dataTable>
					
				</h:panelGroup>
				
			</p:panel>
			
		</ui:composition>		
	</h:body>
</html>
