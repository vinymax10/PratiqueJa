<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

<h:body>
	<ui:composition>

		<div class="ui-fluid formgrid grid">
			
			<div class="campoMsg col-12 xl:col-6">
				<p:outputLabel for="@next" value="Assunto Curso" />
				<p:selectOneMenu value="#{testePadraoBean.testePadrao.assuntoCurso}"
					converter="generic" disabled="true">
					<f:selectItem itemLabel="Selecione uma opção" itemValue="" />
					<f:selectItems value="#{assuntoCursoBean.todosAssuntoCursos}"
						var="assuntoCurso" itemLabel="#{assuntoCurso.nome}"
						itemValue="#{assuntoCurso}" />
				</p:selectOneMenu>
			</div>
			
			<div class="campoMsg col-12 xl:col-6">
				<p:outputLabel for="@next" value="Nome" />
				<p:inputText id="nome" placeholder="Nome"
					required="true"
					requiredMessage="O nome é obrigatório"
					value="#{testePadraoBean.testePadrao.nome}" />
				<p:message for="nome" display="text" />
			</div>

			<div class="campoMsg col-12 lg:col-6 xl:col-3">
				<p:outputLabel for="@next" value="Duração min" />
				<p:inputNumber id="tempo" symbolPosition="p" decimalSeparator=","
					thousandSeparator="."
					requiredMessage="O tempo é obrigatório"
					value="#{testePadraoBean.testePadrao.duracao}" required="true" />
				<p:message for="tempo" display="text" />
			</div>

			<div class="campoMsg col-12 lg:col-6 xl:col-3">
				<p:outputLabel for="@next" value="Nota Mínima" />
				<p:inputNumber id="nota"
					value="#{testePadraoBean.testePadrao.notaMinima}" required="true"
					symbolPosition="p" decimalSeparator=","
					requiredMessage="A nota mínima é obrigatória" thousandSeparator="." />
				<p:message for="nota" display="text" />
			</div>

		</div>
		
		<ui:include src="/teste/testePadrao/conteudoTeste.xhtml" />

		<p:divider />

		<h:panelGroup id="comandos" style="width:100%;"
			rendered="#{conteudoTesteBean.lista}">
			<div class="p-grid" style="margin-top: 1rem">
				<div class="p-col-6">

					<p:commandButton value="Remover" icon="pi pi-trash"
						rendered="#{!testePadraoBean.cadastro}"
						styleClass="ui-button-raised ui-button-danger ui-button-flat"
						action="#{testePadraoBean.remover}" update="@form, :growl"
						process="@this">
						<p:confirm header="Confirmação" icon="pi pi-info-circle"
							message="Você tem certeza que deseja remover esse testePadrao?" />
					</p:commandButton>

					<p:confirmDialog global="true" showEffect="fade" hideEffect="fade"
						responsive="true">
						<p:commandButton value="Não" type="button"
							styleClass="ui-confirmdialog-no ui-button-flat" />
						<p:commandButton value="Sim" type="button"
							styleClass="ui-confirmdialog-yes" />
					</p:confirmDialog>

					<p:commandButton value="Voltar"
						action="#{testePadraoBean.setLista(true)}"
						icon="pi pi-chevron-left" process="@this" update="@form"
						style="margin-right:15px;"
						styleClass="ui-button-raised ui-button-secondary ui-button-flat"
						rendered="#{testePadraoBean.cadastro}" />

				</div>

				<div class="p-col-6 p-text-right">

					<p:commandButton value="Voltar"
						action="#{testePadraoBean.setLista(true)}"
						icon="pi pi-chevron-left" process="@this"
						rendered="#{!testePadraoBean.cadastro}" update="@form"
						style="margin-bottom:15px;"
						styleClass="ui-button-raised ui-button-secondary ui-button-flat" />

					<p:commandButton id="adicionarGerais" value="Adicionar"
						class="p-text-right" icon="pi pi-check"
						styleClass="ui-button-raised ui-button-success ui-button-flat"
						action="#{testePadraoBean.adicionar}" update="@form, :growl"
						process="@form" rendered="#{testePadraoBean.cadastro}">
						<p:defaultCommand target="form:adicionarGerais" />
					</p:commandButton>

					<p:commandButton id="salvarGerais" value="Salvar"
						styleClass="ui-button-raised ui-button-flat" icon="pi pi-check"
						rendered="#{!testePadraoBean.cadastro}"
						action="#{testePadraoBean.salvar}" style="margin-left:15px;"
						update="@form, :growl" process="@form">
						<p:defaultCommand target="form:salvarGerais" />
					</p:commandButton>

				</div>

			</div>
		</h:panelGroup>
	</ui:composition>
</h:body>
</html>
