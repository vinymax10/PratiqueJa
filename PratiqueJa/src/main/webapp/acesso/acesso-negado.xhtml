<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

	<ui:define name="OpenGraph">
		<title>Acesso negado - Pratique Já</title>
	</ui:define>

	<h:form id="form"
		style="width:100%; display:flex; justify-content:center; margin-top:60px;">

		<p:panel
			style="
			max-width:500px;
			width:100%;
			text-align:center;
			padding:30px;
			border-radius:16px;
			box-shadow:0 10px 30px rgba(15, 23, 42, 0.08);">

			<i class="pi pi-lock"
				style="font-size: 60px; color: #f59e0b; margin-bottom: 20px;"></i>

			<h2 style="margin: 10px 0; color: #111827;">Acesso negado</h2>

			<p style="color: #6b7280; margin-bottom: 25px; line-height: 1.5;">
				Você não tem permissão para acessar esta página.<br />
				Caso acredite que isso é um erro, entre em contato com o suporte.
			</p>

			<div style="display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap;">

				<p:button value="Voltar" icon="pi pi-arrow-left"
					onclick="history.back(); return false;"
					styleClass="ui-button-outlined" />

				<p:button value="Ir para o início" icon="pi pi-home"
					href="#{sessaoBean.urlInicial}"
					styleClass="ui-button-raised btn-primary" />

			</div>

		</p:panel>

	</h:form>

</ui:decorate>
