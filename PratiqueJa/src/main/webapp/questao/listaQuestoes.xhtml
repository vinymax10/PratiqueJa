<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:body>
		<ui:composition>

			<ui:repeat id="laco" value="#{questaoBean.questoesOverview}" var="questao"
			varStatus="status">

				<div class="qz-card">

					<div class="qz-card-header">

						<div class="qz-card-num">#{status.index+1+questaoBean.inicio}</div>

						<div class="qz-card-id">Q#{questao.id}</div>

						<div class="qz-card-meta">
							<span class="qz-chip">
								<i class="pi pi-calendar" style="font-size:10px" />
								#{questao.ano.nome}
							</span>
							<span class="qz-chip">#{questao.banca.sigla}</span>
							<span class="qz-chip">#{questao.orgao.sigla}</span>
							<span class="qz-chip">#{questao.prova}</span>
							<span class="qz-chip qz-chip-assunto">
								<i class="pi pi-tag" style="font-size:10px" />
								#{questao.assuntosNomes}
							</span>
						</div>

					</div>

					<div class="qz-card-body">
						<ui:repeat value="#{questao.paragrafos}" var="paragrafo">
							<h:outputText
								style="display:block;margin-bottom:1rem"
								value="#{paragrafo.texto}" rendered="#{!paragrafo.tipoImagem}" />
							<p:graphicImage value="#{paragrafo.imagemFile.imagem()}"
								cache="false" stream="false" rendered="#{paragrafo.tipoImagem}"
								style="margin-bottom:1rem;max-width:100%;display:block">
							</p:graphicImage>
						</ui:repeat>
					</div>

					<h:panelGroup id="resposta">

						<p:selectOneRadio id="alternativas"
							value="#{questao.alternativaEscolhida}" converter="generic"
							layout="custom" columns="1" styleClass="grid-radio"
							style="color:#495057;font-weight:bold">
							<f:selectItems value="#{questao.alternativas}" var="alternativa"
								itemValue="#{alternativa}" />
						</p:selectOneRadio>

						<ui:repeat id="alt" value="#{questao.alternativas}"
							var="alternativa" varStatus="statusAlt">
							<h:panelGrid columns="3" cellpadding="5" style="color:#495057;">
								<p:radioButton id="opt"
									for="@this:@parent:@parent:@parent:alternativas"
									itemIndex="#{statusAlt.index}" />
								<h:outputLabel for="opt"
									value="#{alternativa.letra})" style="font-weight:bold;" />
								<h:outputLabel for="opt"
									value="#{alternativa.texto}" style="display:block;" />
							</h:panelGrid>
						</ui:repeat>

						<h:panelGroup id="feedbackResposta" layout="block">
							<h:panelGroup rendered="#{questao.feedbackAcertou != null and questao.feedbackAcertou}">
								<span class="qz-feedback qz-feedback-acerto">
									<i class="pi pi-check-circle" /> Resposta correta
								</span>
							</h:panelGroup>
							<h:panelGroup rendered="#{questao.feedbackAcertou != null and !questao.feedbackAcertou}">
								<span class="qz-feedback qz-feedback-erro">
									<i class="pi pi-times-circle" />
									Incorreta
									<h:panelGroup rendered="#{not empty questao.feedbackLetraCorreta}">
										— Correta: <strong>#{questao.feedbackLetraCorreta}</strong>
									</h:panelGroup>
								</span>
							</h:panelGroup>
							<h:panelGroup rendered="#{questao.feedbackSemSelecao}">
								<span class="qz-feedback qz-feedback-aviso">
									<i class="pi pi-exclamation-triangle" /> Selecione uma alternativa
								</span>
							</h:panelGroup>
						</h:panelGroup>

					</h:panelGroup>

					<div class="qz-card-actions">

						<p:commandButton value="Responder" process="@form"
							update="feedbackResposta, :growl, dialogUpgrade"
							action="#{questaoBean.estaCorreta(questao)}"
							styleClass="ui-button-raised btn-primary" />

						<p:commandButton value="Resposta Comentada" icon="pi pi-pencil"
							styleClass="ui-button-flat ui-button-plain"
							action="#{questaoBean.toogleResolucaoComentada(questao)}"
							process="@this" oncomplete="reloadMathJax();"
							update="resolucaoComentada, estatistica, :growl, dialogUpgrade" />

						<p:commandButton value="Resolução" icon="pi pi-video"
							styleClass="ui-button-flat ui-button-plain" />

						<p:commandButton value="Estatística" icon="pi pi-chart-bar"
							process="@this"
							update="resolucaoComentada, estatistica"
							action="#{questao.toogleEstatistica()}"
							styleClass="ui-button-flat ui-button-plain" />
							
						<p:button value="Editar" icon="pi pi-pencil"
						rendered="#{sessaoBean.podeVerAdministracao()}"
						styleClass="ui-button-flat ui-button-plain"
						target="_blank"
							href="#{questaoBean.getUrlEdicao(questao)}" />

					</div>

					<h:panelGroup id="estatistica" layout="block">
						<div class="ui-fluid p-grid" style="#{not questao.showEstatistica ? 'display:none' : ''}">
							<div class="field col-12 lg:col-6 xl:col-4">
								<p:chart value="#{questaoBean.createBarModel(questao)}"
									rendered="#{questao.showEstatistica}"
									style="width:100%;height:350px;" />
							</div>
						</div>
					</h:panelGroup>

					<h:panelGroup id="resolucaoComentada" layout="block">
						<h:panelGroup layout="block" rendered="#{questao.showResolucaoComentada}">
							<div class="qz-resolucao">
								<h:outputLabel value="#{questao.resolucaoHtml}" escape="false"
									style="display:block;margin-bottom:8px;color:#374151" />
								<h:outputLabel value="Alternativa correta: #{questao.correta().letra}"
									style="font-weight:800;color:#15803d;font-size:1rem" />
							</div>
						</h:panelGroup>
					</h:panelGroup>

				</div>

			</ui:repeat>

		</ui:composition>
	</h:body>
</html>
