<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

	<ui:define name="linkPage">
		<h:outputText class="linkPage" value="Questões" />
	</ui:define>

	<ui:define name="OpenGraph">
		<link rel="stylesheet" href="/css/questao-page.css" type="text/css" />
	</ui:define>

	<h:form id="form" class="form">

		<!-- ===== HERO ===== -->
		<div class="qz-hero">

			<!-- Camada decorativa (overflow:hidden isolado) -->
			<div class="qz-hero-bg"></div>

			<!-- Linha superior: conteúdo + arte -->
			<div class="qz-hero-top">

				<div class="qz-hero-content">

					<div class="qz-hero-label">
						<i class="fa-solid fa-book" />
						Banco de Questões
					</div>

					<h1 class="qz-hero-title">Questões de Concursos</h1>
					<p class="qz-hero-desc">
						Pratique com questões reais de concursos públicos.
						Filtre por assunto, banca, órgão, ano ou dificuldade.
					</p>

	
</div>

				<!-- Arte decorativa -->
				<div class="qz-hero-art">
					<div class="qz-hero-art-icon">
						<i class="fa-solid fa-square-root-variable" />
					</div>
					<div class="qz-hero-art-dots">
						<div class="qz-hero-art-dot"></div>
						<div class="qz-hero-art-dot"></div>
						<div class="qz-hero-art-dot"></div>
						<div class="qz-hero-art-dot"></div>
						<div class="qz-hero-art-dot"></div>
						<div class="qz-hero-art-dot"></div>
						<div class="qz-hero-art-dot"></div>
						<div class="qz-hero-art-dot"></div>
						<div class="qz-hero-art-dot"></div>
						<div class="qz-hero-art-dot"></div>
						<div class="qz-hero-art-dot"></div>
						<div class="qz-hero-art-dot"></div>
					</div>
				</div>

			</div>

			<!-- Filtro deslizante dentro do hero -->
			<ui:include src="/questao/filtro.xhtml" />

		</div>
		<!-- ===== FIM HERO ===== -->

		<h:panelGroup id="resultados" layout="block" style="width:100%">
			<ui:include src="/questao/barraNavegacao.xhtml" />
			<ui:include src="/questao/listaQuestoes.xhtml" />
			<ui:include src="/questao/barraNavegacao.xhtml" />
		</h:panelGroup>

		<p:dialog id="dialogDownloadQuestao" header="Download de Questões"
		showEffect="fade" hideEffect="fade" modal="true"
		widgetVar="downloadQuestaoWidget" responsive="true">

			<p:outputPanel id="downloadQuestaoContent">
				<div class="ui-fluid gride">

					<h:panelGroup styleClass="campoMsg col-12 md:col-4">
						<p:outputLabel for="@next" value="Identificação" />
						<p:toggleSwitch class="toggleSwitch-form" value="#{questaoBean.configDownload.identificacao}" />
					</h:panelGroup>

					<h:panelGroup styleClass="campoMsg col-12 md:col-4">
						<p:outputLabel for="@next" value="Respostas" />
						<p:toggleSwitch class="toggleSwitch-form" value="#{questaoBean.configDownload.respostas}" />
					</h:panelGroup>

					<h:panelGroup styleClass="campoMsg col-12 md:col-4">
						<p:outputLabel for="@next" value="Resolução" />
						<p:toggleSwitch class="toggleSwitch-form" value="#{questaoBean.configDownload.resolucao}" />
					</h:panelGroup>

				</div>
			</p:outputPanel>

			<f:facet name="footer">

				<p:commandButton value="Cancelar"
				styleClass="ui-button-raised ui-button-secondary ui-button-flat"
				onclick="PF('downloadQuestaoWidget').hide()" icon="pi pi-times" />

				<p:commandButton value="Download" icon="pi pi-download" ajax="false"
				onclick="PrimeFaces.monitorDownload('', PF('downloadQuestaoWidget').hide());"
				styleClass="ui-button-raised ui-button-primary">
					<p:fileDownload value="#{questaoBean.download(true)}" />
				</p:commandButton>

			</f:facet>

		</p:dialog>

	</h:form>

</ui:decorate>
