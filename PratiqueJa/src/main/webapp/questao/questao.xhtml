<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

	<ui:define name="linkPage">
		<h:outputText class="linkPage" value="Questões" />
	</ui:define>

	<h:form id="form" class="form">

		<div class="content-button flex-column lg:flex-row xl:flex-row">

			<div class="flex gap-3 align-items-center w-full md:w-full lg:w-6 xl:w-6">

				<div class="w-full">
					<span class="ui-input-icon-left" style="width:100%">
						<i class="pi pi-search" />
						<p:inputText value="#{questaoBean.filtro.conteudo}"
						placeholder="Conteúdo" styleClass="w-full">
							<p:ajax event="keyup" delay="500" update="@form" listener="#{questaoBean.filtrarEstudante}" />
						</p:inputText>
					</span>
				</div>

				<p:button value="Filtros" icon="fa-solid fa-filter"
				onclick="slideToggle('filtros'); return false;"
				styleClass="ui-button-outlined ui-button-secondary" />

			</div>

			<div class="flex gap-3 align-items-center justify-content-end">

				<p:commandButton value="Download"
				process="@this" action="#{questaoBean.podeFazerDownloadMassa()}"
				icon="pi pi-download" update=":growl, dialogUpgrade"
				styleClass="ui-button-raised ui-button-flat" />

			</div>

		</div>

		<ui:include src="/questao/filtro.xhtml" />

		<p:staticMessage severity="info" summary="Questões carregadas"
		detail="#{questaoBean.questoes.size()} questões"
		display="text"
		style="background: #ecf1ff !important;margin:0 0 1rem 0;width:100%" />

		<ui:include src="/questao/barraNavegacao.xhtml" />

		<ui:include src="/questao/listaQuestoes.xhtml" />

		<ui:include src="/questao/barraNavegacao.xhtml" />

		<p:dialog id="dialogDownloadQuestao" header="Download de Questões"
		showEffect="fade" hideEffect="fade" modal="true"
		widgetVar="downloadQuestaoWidget" responsive="true">

			<p:outputPanel id="downloadQuestaoContent">
				<div class="ui-fluid gride">

					<h:panelGroup styleClass="campoMsg col-12 md:col-4">
						<p:outputLabel for="@next" value="Identificação" />
						<p:toggleSwitch class="toggleSwitch-form" value="#{questaoBean.configDownload.identificacao}" />
					</h:panelGroup>

					<h:panelGroup styleClass="campoMsg col-12 md:col-4">
						<p:outputLabel for="@next" value="Respostas" />
						<p:toggleSwitch class="toggleSwitch-form" value="#{questaoBean.configDownload.respostas}" />
					</h:panelGroup>

					<h:panelGroup styleClass="campoMsg col-12 md:col-4">
						<p:outputLabel for="@next" value="Resolução" />
						<p:toggleSwitch class="toggleSwitch-form" value="#{questaoBean.configDownload.resolucao}" />
					</h:panelGroup>

				</div>
			</p:outputPanel>

			<f:facet name="footer">

				<p:commandButton value="Cancelar"
				styleClass="ui-button-raised ui-button-secondary ui-button-flat"
				onclick="PF('downloadQuestaoWidget').hide()" icon="pi pi-times" />

				<p:commandButton value="Download" icon="pi pi-download" ajax="false"
				onclick="PrimeFaces.monitorDownload('', PF('downloadQuestaoWidget').hide());"
				styleClass="ui-button-raised ui-button-primary">
					<p:fileDownload value="#{questaoBean.download(true)}" />
				</p:commandButton>

			</f:facet>

		</p:dialog>

	</h:form>

</ui:decorate>
