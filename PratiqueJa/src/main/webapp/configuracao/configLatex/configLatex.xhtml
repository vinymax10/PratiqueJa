<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="/template/template.xhtml">

    <h:form id="form" style="margin-bottom:0">
		<div class="p-d-flex">
	    	<div class="p-grid" style="margin:0 15px;width:100%;">
		
			    <div class="p-col-12" >	
					<h2>Config Latex</h2>	
				</div>
		    
				<p:panel header="Config Latex" toggleable="true" closable="true" toggleSpeed="500"
             		closeSpeed="500" widgetVar="panel" style="margin-bottom:1rem;width:100%;">
					
					 	<div class="ui-fluid formgrid grid">
							<div class="field col-12 lg:col-6">
								<p:outputLabel for="@next" value="Endereço" />
								<p:inputText placeholder="Endereço"
								value="#{configLatexBean.configLatex.endereco}" />
							</div>
							
							<div class="field col-12 lg:col-6">
								<p:outputLabel for="@next" value="Endereço Background" />
								<p:inputText placeholder="Endereço Background"
								value="#{configLatexBean.configLatex.endBackground}" />
							</div>
							
							<div class="field col-12 lg:col-6">
								<p:outputLabel for="@next" value="Endereço EBook" />
								<p:inputText placeholder="Endereço EBook"
								value="#{configLatexBean.configLatex.enderecoEBook}" />
							</div>
							
							<div class="field col-12 md:col-6 lg:col-3">
								<p:outputLabel for="@next" value="Sistema Operacional" />
								<p:selectOneMenu value="#{configLatexBean.configLatex.sistemaOperacional}"
									required="true" filter="true" filterMatchMode="contains">
									<f:selectItems value="#{sistemaOperacionalBean.opcoes}" var="opcao"
										itemLabel="#{opcao.nome}" itemValue="#{opcao}" />
								</p:selectOneMenu>
							</div>
							
							<div class="field col-12 md:col-6 lg:col-3">
								<p:outputLabel for="@next" value="Nome do Arquivo" />
								<p:inputText placeholder="Nome do Arquivo"
								value="#{configLatexBean.configLatex.nome}" />
							</div>
							
							<div class="field col-12 md:col-6 lg:col-3">
								<p:outputLabel for="@next" value="Imagens" />
								<p:inputText placeholder="Imagens"
								value="#{configLatexBean.configLatex.imagens}" />
							</div>
							
							<div class="field col-12 md:col-6 lg:col-3">
								<p:outputLabel for="@next" value="Imagens Resolução" />
								<p:inputText placeholder="Imagens Resolução"
								value="#{configLatexBean.configLatex.imagensResolucao}" />
							</div>
							
							<div class="field col-12 md:col-6 lg:col-4 xl:col-2">
								<p:outputLabel for="@next" value="Remove Diretorios" />
								<p:selectBooleanButton
									value="#{configLatexBean.configLatex.removeDiretorios}"
									onLabel="Sim" offLabel="Não"
									onIcon="pi pi-check" offIcon="pi pi-times" 
									style="display:block;" />
							</div>
							
						</div>
						
					<p:divider />
			
					<div class="p-grid" style="margin-top:1rem">
						
						<div class="p-col-12 p-text-right" >
						
							<p:commandButton id="salvarGerais" value="Salvar" styleClass="ui-button-raised ui-button-flat" icon="pi pi-check" 
							action="#{configLatexBean.salvar}" update="@form, :growl"  process="@form"	>
<!-- 								<p:defaultCommand target="form:salvarGerais"/> -->
							</p:commandButton>
							
						</div>
					</div>
					
		   		</p:panel>
			   		
					
			</div>
		</div>
	</h:form>
	
	
</ui:decorate>
