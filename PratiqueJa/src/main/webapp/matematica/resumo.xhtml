<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

<h:body >
	<ui:composition>

		<!-- HERO -->
		<div class="as-hero">
			<div class="as-hero-content">
				<span class="as-modulo as-modulo-#{assuntoBean.entidade.modulo.toString().toLowerCase()}">
					<h:outputText value="#{assuntoBean.entidade.modulo.nome}" />
				</span>
				<h1 class="as-title">
					<h:outputText value="#{assuntoBean.entidade.nome}" />
				</h1>
				<h:outputText styleClass="as-desc"
					rendered="#{not empty assuntoBean.entidade.descricao}"
					value="#{assuntoBean.entidade.descricao}" />

				<div class="as-stats">
					<div class="as-stat as-stat--blue">
						<span class="as-stat-label">Exercícios</span>
						<strong class="as-stat-value">#{assuntoBean.entidade.qtdExercicios}</strong>
					</div>
					<div class="as-stat as-stat--green">
						<span class="as-stat-label">Questões</span>
						<strong class="as-stat-value">#{assuntoBean.entidade.qtdQuestoes}</strong>
					</div>
					<h:panelGroup layout="block" styleClass="as-stat as-stat--purple">
						<span class="as-stat-label">Videoaulas</span>
						<strong class="as-stat-value">#{assuntoBean.entidade.qtdVideosAula}</strong>
					</h:panelGroup>
					<h:panelGroup layout="block" styleClass="as-stat as-stat--orange"
						rendered="#{assuntoBean.entidade.showAnotacao}">
						<span class="as-stat-label">PDF's</span>
						<strong class="as-stat-value">#{assuntoBean.entidade.qtdPdf}</strong>
					</h:panelGroup>
				</div>
				
				<div class="as-progress-inline">
					<div class="as-progress-inline-header">
						<span class="as-progress-inline-label">
							<i class="pi pi-chart-line"></i> Progresso
						</span>
						<span class="as-progress-inline-pct">0%</span>
					</div>
					<div class="as-progress-bar-sm">
						<div class="as-progress-fill" style="width: 0%"></div>
					</div>
					<div class="as-progress-inline-meta">
						<span>0 exercícios resolvidos</span>
						<span class="as-progress-dot">·</span>
						<span>0 questões respondidas</span>
					</div>
				</div>
			</div>

			<div class="as-hero-image">
				<img src="#{assuntoBean.entidade.endImageCapa()}" alt="#{assuntoBean.entidade.nome}" />
			</div>
		</div>

		<!-- PROGRESSO -->
		<div class="as-progress-section">
			

<!-- 			<div class="as-continue-card"> -->
<!-- 				<h3 class="as-continue-title">Continue de onde parou</h3> -->
<!-- 				<p class="as-continue-desc">Nenhuma atividade iniciada ainda. Comece pelos exercícios ou pelas anotações de teoria.</p> -->
<!-- 				<div class="as-continue-actions"> -->
<!-- 					<div class="as-tab as-continue-btn" onclick="asShowTab('exercicios', this)"> -->
<!-- 						<i class="pi pi-pencil"></i> Ir para Exercícios -->
<!-- 					</div> -->
<!-- 					<div class="as-tab as-continue-btn" onclick="navegarComScroll('#{assuntoBean.entidade.endTeoria()}')"> -->
<!-- 						<i class="pi pi-book"></i> Ver Teoria -->
<!-- 					</div> -->
<!-- 				</div> -->
<!-- 			</div> -->
		</div>

		<!-- BOTÕES DE NAVEGAÇÃO -->
		<div class="as-tabs" id="asTabs">
			<h:panelGroup layout="block"
				rendered="#{assuntoBean.entidade.showAnotacao}"
				styleClass="as-tab #{facesContext.viewRoot.viewId.contains('/teoria') ? 'as-tab-active' : ''}" 
				onclick="navegarComScroll('#{assuntoBean.entidade.endTeoria()}')">
				<i class="pi pi-book"></i> Teoria
			</h:panelGroup>

			<h:panelGroup layout="block"
				rendered="#{assuntoBean.entidade.showExercicio}"
				styleClass="as-tab" onclick="asShowTab('exercicios', this)">
				<i class="pi pi-pencil"></i> Exercícios
			</h:panelGroup>
			<h:panelGroup layout="block"
				rendered="#{assuntoBean.entidade.showAula}"
				styleClass="as-tab" onclick="asShowTab('videoaulas', this)">
				<i class="pi pi-video"></i> Videoaulas
			</h:panelGroup>
			<h:panelGroup layout="block"
				rendered="#{assuntoBean.entidade.showQuestao}"
				styleClass="as-tab #{facesContext.viewRoot.viewId.contains('/questoes') ? 'as-tab-active' : ''}" onclick="navegarComScroll('/matematica/questoes.xhtml?assunto=#{assuntoBean.assunto}')">
				<i class="pi pi-question-circle"></i> Questões
			</h:panelGroup>
			<div class="as-tab" onclick="asShowTab('pdfs', this)">
				<i class="pi pi-download"></i> PDFs
			</div>
		</div>

	</ui:composition>
</h:body>
</html>
