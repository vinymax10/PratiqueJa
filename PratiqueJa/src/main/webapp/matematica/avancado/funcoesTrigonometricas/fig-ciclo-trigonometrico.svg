<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" width="400" height="400"
     aria-label="Ciclo trigonométrico com ponto P em 60 graus mostrando projeções de seno e cosseno">

  <!-- eixo x (cosseno) -->
  <line x1="20"  y1="150" x2="280" y2="150" stroke="#f9a8d4" stroke-width="2"/>
  <polygon points="280,150 272,146 272,154" fill="#f9a8d4"/>
  <text x="282" y="154" font-size="12" fill="#9ca3af" font-family="sans-serif">cos</text>

  <!-- eixo y (seno) -->
  <line x1="150" y1="270" x2="150" y2="20"  stroke="#f9a8d4" stroke-width="2"/>
  <polygon points="150,20 146,28 154,28" fill="#f9a8d4"/>
  <text x="154" y="18"  font-size="12" fill="#9ca3af" font-family="sans-serif">sen</text>

  <!-- círculo unitário (raio 90) -->
  <circle cx="150" cy="150" r="90" stroke="#6ee7b7" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- ticks e labels dos eixos (raio = 90) -->
  <!-- x = +1 → (240,150) -->
  <line x1="240" y1="146" x2="240" y2="154" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="236" y="166" font-size="11" fill="#9ca3af" font-family="sans-serif">1</text>
  <!-- x = -1 → (60,150) -->
  <line x1="60" y1="146" x2="60" y2="154" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="48" y="166" font-size="11" fill="#9ca3af" font-family="sans-serif">−1</text>
  <!-- y = +1 → (150,60) -->
  <line x1="146" y1="60" x2="154" y2="60" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="157" y="64" font-size="11" fill="#9ca3af" font-family="sans-serif">1</text>
  <!-- y = -1 → (150,240) -->
  <line x1="146" y1="240" x2="154" y2="240" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="157" y="244" font-size="11" fill="#9ca3af" font-family="sans-serif">−1</text>

  <!-- quadrante labels -->
  <text x="192" y="110" font-size="11" fill="#9ca3af" font-family="sans-serif" opacity="0.7">I</text>
  <text x="104" y="110" font-size="11" fill="#9ca3af" font-family="sans-serif" opacity="0.7">II</text>
  <text x="100" y="198" font-size="11" fill="#9ca3af" font-family="sans-serif" opacity="0.7">III</text>
  <text x="192" y="198" font-size="11" fill="#9ca3af" font-family="sans-serif" opacity="0.7">IV</text>

  <!-- ponto P a 60° = (cos60°, sen60°) = (0.5, √3/2 ≈ 0.866) -->
  <!-- SVG: Px = 150 + 90*0.5 = 195, Py = 150 - 90*0.866 = 72.1 -->
  <!-- raio OP -->
  <line x1="150" y1="150" x2="195" y2="72" stroke="#a5b4fc" stroke-width="2"/>

  <!-- projeção vertical (seno): de P até eixo x = (195, 150) — sentido vertical -->
  <line x1="195" y1="72" x2="195" y2="150" stroke="#86efac" stroke-width="2" stroke-dasharray="5,4"/>
  <!-- seta pequena indicando sen -->
  <polygon points="195,150 191,140 199,140" fill="#86efac"/>

  <!-- projeção horizontal (cosseno): de P até eixo y = (150, 72) — sentido horizontal -->
  <line x1="150" y1="72" x2="195" y2="72" stroke="#fdba74" stroke-width="2" stroke-dasharray="5,4"/>
  <!-- seta pequena indicando cos -->
  <polygon points="150,72 160,68 160,76" fill="#fdba74"/>

  <!-- arco do ângulo θ = 60° (raio 25, de 0° a 60° no ciclo) -->
  <!-- start: (175, 150), end: (162.5, 128.3) — arc counterclockwise SVG = sweep=0 -->
  <path d="M 175,150 A 25,25 0 0,0 162.5,128.3" stroke="#c4b5fd" stroke-width="1.5" fill="none"/>
  <text x="178" y="143" font-size="11" fill="#c4b5fd" font-family="sans-serif">θ</text>

  <!-- ponto P -->
  <circle cx="195" cy="72" r="5" fill="#a5b4fc"/>
  <text x="199" y="70" font-size="12" fill="#a5b4fc" font-family="sans-serif" font-weight="600">P</text>

  <!-- labels das projeções -->
  <text x="198" y="115" font-size="11" fill="#86efac" font-family="sans-serif">sen θ</text>
  <text x="162" y="66"  font-size="11" fill="#fdba74" font-family="sans-serif">cos θ</text>

  <!-- origem -->
  <circle cx="150" cy="150" r="3" fill="#9ca3af"/>
  <text x="133" y="165" font-size="10" fill="#9ca3af" font-family="sans-serif">O(0,0)</text>

  <!-- exemplo: 60° label -->
  <text x="100" y="285" font-size="11" fill="#9ca3af" font-family="sans-serif">Exemplo: θ = 60°, P = (cos 60°, sen 60°) = (½, √3/2)</text>
</svg>
