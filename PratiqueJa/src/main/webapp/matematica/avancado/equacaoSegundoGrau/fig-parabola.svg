<svg viewBox="0 0 380 220" xmlns="http://www.w3.org/2000/svg" width="380" height="220"
     aria-label="Parábola com concavidade para cima mostrando vértice, raízes e eixo de simetria">

  <!-- eixos -->
  <line x1="20" y1="110" x2="360" y2="110" stroke="#f9a8d4" stroke-width="2"/>
  <line x1="190" y1="10"  x2="190" y2="210" stroke="#f9a8d4" stroke-width="2"/>
  <polygon points="360,110 352,106 352,114" fill="#f9a8d4"/>
  <polygon points="190,10 186,18 194,18"   fill="#f9a8d4"/>
  <text x="362" y="114" font-size="13" fill="#9ca3af" font-family="sans-serif">x</text>
  <text x="195" y="14"  font-size="13" fill="#9ca3af" font-family="sans-serif">y</text>

  <!-- parábola: SVG_y = 170 - 0.015*(SVG_x - 190)^2
       pontos calculados para garantir que x1, x2 e V fiquem sobre a curva -->
  <polyline
    points="87,11 95,35 105,62 120,97 127,110 140,133 155,152 170,164 180,169 190,170 200,169 210,164 225,152 240,133 253,110 265,86 280,49 293,11"
    stroke="#93c5fd" stroke-width="3" fill="none" stroke-linejoin="round"/>

  <!-- eixo de simetria -->
  <line x1="190" y1="25" x2="190" y2="172" stroke="#c4b5fd" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="196" y="26" font-size="11" fill="#c4b5fd" font-family="sans-serif">xᵥ = −b/2a</text>

  <!-- raízes: círculos exatamente na intersecção com o eixo x (SVG_y = 110) -->
  <circle cx="127" cy="110" r="6" fill="#fdba74"/>
  <circle cx="253" cy="110" r="6" fill="#fdba74"/>
  <text x="112" y="130" font-size="13" fill="#fdba74" font-family="sans-serif" font-weight="600">x₂</text>
  <text x="255" y="130" font-size="13" fill="#fdba74" font-family="sans-serif" font-weight="600">x₁</text>

  <!-- vértice: exatamente no ponto mínimo da curva -->
  <circle cx="190" cy="170" r="6" fill="#86efac"/>
  <text x="198" y="186" font-size="12" fill="#86efac" font-family="sans-serif">V(xᵥ, yᵥ)</text>

  <!-- label a>0 -->
  <text x="28" y="40" font-size="12" fill="#93c5fd" font-family="sans-serif" font-style="italic">a &gt; 0</text>
  <text x="28" y="54" font-size="11" fill="#9ca3af" font-family="sans-serif">(concavidade ↑)</text>
</svg>
