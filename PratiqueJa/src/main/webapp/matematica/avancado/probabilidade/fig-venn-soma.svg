<svg viewBox="0 0 380 200" xmlns="http://www.w3.org/2000/svg" width="380" height="200"
     aria-label="Diagrama de Venn com dois eventos A e B mostrando interseção A∩B e união A∪B">

  <defs>
    <clipPath id="clip-a">
      <circle cx="145" cy="100" r="75"/>
    </clipPath>
  </defs>

  <!-- fundo Ω -->
  <rect x="4" y="4" width="372" height="192" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- círculo A -->
  <circle cx="145" cy="100" r="75" fill="#bfdbfe" fill-opacity="0.6" stroke="#2563eb" stroke-width="2"/>

  <!-- círculo B -->
  <circle cx="235" cy="100" r="75" fill="#bbf7d0" fill-opacity="0.6" stroke="#059669" stroke-width="2"/>

  <!-- interseção A∩B (B clipado em A) -->
  <circle cx="235" cy="100" r="75" fill="#c4b5fd" fill-opacity="0.75"
          clip-path="url(#clip-a)" stroke="none"/>

  <!-- rótulos principais -->
  <text x="95"  y="108" font-size="30" font-weight="800" fill="#1d4ed8"
        font-family="sans-serif" text-anchor="middle">A</text>
  <text x="285" y="108" font-size="30" font-weight="800" fill="#059669"
        font-family="sans-serif" text-anchor="middle">B</text>

  <!-- rótulo interseção -->
  <text x="190" y="96"  font-size="12" font-weight="700" fill="#6d28d9"
        font-family="sans-serif" text-anchor="middle">A ∩ B</text>

  <!-- rótulos de zona -->
  <text x="95"  y="130" font-size="11" fill="#1d4ed8" font-family="sans-serif" text-anchor="middle">só A</text>
  <text x="285" y="130" font-size="11" fill="#059669" font-family="sans-serif" text-anchor="middle">só B</text>

  <!-- rótulo Ω -->
  <text x="357" y="22" font-size="16" font-weight="700" fill="#64748b"
        font-family="sans-serif" font-style="italic">Ω</text>
</svg>
