<svg viewBox="0 0 480 260" xmlns="http://www.w3.org/2000/svg" width="480" height="290"
     aria-label="Árvore de probabilidade: retirada de bolas vermelha e azul sem reposição">

  <!-- fundo -->
  <rect x="0" y="0" width="480" height="290" fill="#f8fafc"/>

  <!-- linhas nível 1 (embaixo dos nós) -->
  <line x1="30" y1="130" x2="160" y2="65"  stroke="#94a3b8" stroke-width="2"/>
  <line x1="30" y1="130" x2="160" y2="195" stroke="#94a3b8" stroke-width="2"/>

  <!-- linhas nível 2 -->
  <line x1="182" y1="65"  x2="308" y2="28"  stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="182" y1="65"  x2="308" y2="102" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="182" y1="195" x2="308" y2="158" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="182" y1="195" x2="308" y2="232" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- ponto raiz -->
  <circle cx="30" cy="130" r="5" fill="#475569"/>

  <!-- nó Vermelha (nível 1) -->
  <circle cx="160" cy="65" r="22" fill="#fecaca" stroke="#dc2626" stroke-width="2"/>
  <text x="160" y="62" font-size="11" font-weight="700" fill="#dc2626"
        font-family="sans-serif" text-anchor="middle">Verm.</text>
  <text x="160" y="75" font-size="10" fill="#dc2626"
        font-family="sans-serif" text-anchor="middle">5/8</text>

  <!-- nó Azul (nível 1) -->
  <circle cx="160" cy="195" r="22" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/>
  <text x="160" y="192" font-size="11" font-weight="700" fill="#1d4ed8"
        font-family="sans-serif" text-anchor="middle">Azul</text>
  <text x="160" y="205" font-size="10" fill="#1d4ed8"
        font-family="sans-serif" text-anchor="middle">3/8</text>

  <!-- nós nível 2 — de Vermelha -->
  <circle cx="318" cy="28"  r="18" fill="#fecaca" stroke="#dc2626" stroke-width="1.5"/>
  <text x="318" y="33"  font-size="12" font-weight="700" fill="#dc2626"
        font-family="sans-serif" text-anchor="middle">V</text>

  <circle cx="318" cy="102" r="18" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="318" y="107" font-size="12" font-weight="700" fill="#1d4ed8"
        font-family="sans-serif" text-anchor="middle">A</text>

  <!-- nós nível 2 — de Azul -->
  <circle cx="318" cy="158" r="18" fill="#fecaca" stroke="#dc2626" stroke-width="1.5"/>
  <text x="318" y="163" font-size="12" font-weight="700" fill="#dc2626"
        font-family="sans-serif" text-anchor="middle">V</text>

  <circle cx="318" cy="232" r="18" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="318" y="237" font-size="12" font-weight="700" fill="#1d4ed8"
        font-family="sans-serif" text-anchor="middle">A</text>

  <!-- probabilidades nas linhas nível 2 -->
  <text x="237" y="38"  font-size="11" fill="#475569" font-family="sans-serif" font-weight="600">4/7</text>
  <text x="237" y="94"  font-size="11" fill="#475569" font-family="sans-serif" font-weight="600">3/7</text>
  <text x="237" y="150" font-size="11" fill="#475569" font-family="sans-serif" font-weight="600">5/7</text>
  <text x="237" y="225" font-size="11" fill="#475569" font-family="sans-serif" font-weight="600">2/7</text>

  <!-- resultados finais -->
  <text x="344" y="24"  font-size="12" fill="#6b7280"  font-family="sans-serif" font-weight="600">= 20/56</text>
  <text x="344" y="98"  font-size="12" fill="#dc2626"   font-family="sans-serif" font-weight="700">= 15/56 ★</text>
  <text x="344" y="154" font-size="12" fill="#6b7280"  font-family="sans-serif" font-weight="600">= 15/56</text>
  <text x="344" y="228" font-size="12" fill="#6b7280"  font-family="sans-serif" font-weight="600">= 6/56</text>

  <!-- legenda -->
  <text x="240" y="273" font-size="10" fill="#9ca3af" font-family="sans-serif" text-anchor="middle">
    ★ P(vermelha e azul, sem reposição) = 15/56
  </text>
</svg>
