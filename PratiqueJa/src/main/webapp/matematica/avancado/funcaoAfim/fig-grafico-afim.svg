<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg"
     width="400" height="400"
     aria-label="Gráfico cartesiano da função afim passando por (-5,-4) e (5,6)">
    <!-- eixos -->
    <line x1="0"   y1="150" x2="300" y2="150" stroke="#f9a8d4" stroke-width="2"/>
    <line x1="150" y1="0"   x2="150" y2="300" stroke="#f9a8d4" stroke-width="2"/>
    <!-- setas dos eixos -->
    <polygon points="300,150 292,146 292,154" fill="#f9a8d4"/>
    <polygon points="150,0 146,8 154,8"       fill="#f9a8d4"/>
    <!-- reta f(x)=x+1: de (-6,-5) a (6,7) → SVG (60,225)-(240,45) -->
    <line x1="60" y1="225" x2="240" y2="45" stroke="#93c5fd" stroke-width="2.5"/>
    <!-- pontilhados ponto (-5,-4) → SVG (75,210) -->
    <line x1="75"  y1="210" x2="75"  y2="150" stroke="#c4b5fd" stroke-width="1.5" stroke-dasharray="5,4"/>
    <line x1="75"  y1="210" x2="150" y2="210" stroke="#c4b5fd" stroke-width="1.5" stroke-dasharray="5,4"/>
    <!-- pontilhados ponto (5,6) → SVG (225,60) -->
    <line x1="225" y1="60"  x2="225" y2="150" stroke="#c4b5fd" stroke-width="1.5" stroke-dasharray="5,4"/>
    <line x1="225" y1="60"  x2="150" y2="60"  stroke="#c4b5fd" stroke-width="1.5" stroke-dasharray="5,4"/>
    <!-- ponto de interseção com eixo y: f(0)=1 → SVG (150,135) -->
    <circle cx="150" cy="135" r="5" fill="#86efac"/>
    <!-- pontos principais -->
    <circle cx="75"  cy="210" r="6" fill="#fdba74"/>
    <circle cx="225" cy="60"  r="6" fill="#fdba74"/>
    <!-- labels eixos -->
    <text x="288" y="143" font-size="14" fill="#9ca3af" font-family="sans-serif">x</text>
    <text x="156" y="12"  font-size="14" fill="#9ca3af" font-family="sans-serif">y</text>
    <!-- labels coordenadas -->
    <text x="68"  y="143" font-size="12" fill="#9ca3af" font-family="sans-serif" text-anchor="middle">−5</text>
    <text x="225" y="163" font-size="12" fill="#9ca3af" font-family="sans-serif" text-anchor="middle">5</text>
    <text x="158" y="214" font-size="12" fill="#9ca3af" font-family="sans-serif">−4</text>
    <text x="136" y="64"  font-size="12" fill="#9ca3af" font-family="sans-serif">6</text>
    <!-- label b=1 no eixo y -->
    <text x="160" y="142" font-size="11" fill="#86efac" font-family="sans-serif">b=1</text>
    <!-- label da reta -->
    <text x="196" y="38"  font-size="13" fill="#93c5fd" font-family="sans-serif" font-style="italic">f(x)=x+1</text>
</svg>
