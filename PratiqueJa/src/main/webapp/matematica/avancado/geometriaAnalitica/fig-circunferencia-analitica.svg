<svg viewBox="0 0 320 230" xmlns="http://www.w3.org/2000/svg" width="320" height="230"
     aria-label="Circunferência (x-2)²+(y-1)²=4 de centro C(2,1) e raio 2 no plano cartesiano">

  <!-- eixo x -->
  <line x1="15"  y1="190" x2="305" y2="190" stroke="#f9a8d4" stroke-width="2"/>
  <polygon points="305,190 297,186 297,194" fill="#f9a8d4"/>
  <text x="308" y="194" font-size="14" fill="#9ca3af" font-family="sans-serif">x</text>

  <!-- eixo y -->
  <line x1="90" y1="225" x2="90" y2="12" stroke="#f9a8d4" stroke-width="2"/>
  <polygon points="90,12 86,20 94,20" fill="#f9a8d4"/>
  <text x="94" y="16"  font-size="14" fill="#9ca3af" font-family="sans-serif">y</text>

  <!-- circunferência (x-2)²+(y-1)²=4 -->
  <circle cx="160" cy="155" r="70" stroke="#6ee7b7" stroke-width="2.2" fill="none" opacity="0.85"/>

  <!-- centro C(2,1) = SVG(160,155) -->
  <circle cx="160" cy="155" r="4" fill="#a5b4fc"/>
  <text x="153" y="170" font-size="14" fill="#a5b4fc" font-family="sans-serif">C(2, 1)</text>

  <!-- raio: de C(160,155) até ponto (4,1) = SVG(230,155) -->
  <line x1="160" y1="155" x2="230" y2="155" stroke="#a5b4fc" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="188" y="148" font-size="14" fill="#a5b4fc" font-family="sans-serif">r = 2</text>

  <!-- ponto na circunferência: (4,1)=SVG(230,155) -->
  <circle cx="230" cy="155" r="4" fill="#86efac"/>
  <text x="234" y="152" font-size="14" fill="#86efac" font-family="sans-serif">(4, 1)</text>

  <!-- ponto na circunferência: (2,3)=SVG(160,85) -->
  <circle cx="160" cy="85" r="4" fill="#86efac"/>
  <text x="163" y="83" font-size="14" fill="#86efac" font-family="sans-serif">(2, 3)</text>

  <!-- equação -->
  <text x="115" y="30" font-size="14" fill="#6ee7b7" font-family="sans-serif" font-style="italic">(x − 2)² + (y − 1)² = 4</text>
  <text x="115" y="48" font-size="14" fill="#9ca3af" font-family="sans-serif">Centro: C(2, 1) · Raio: r = 2</text>

  <!-- origem -->
  <circle cx="90" cy="190" r="2.5" fill="#9ca3af"/>
  <text x="73" y="207" font-size="14" fill="#9ca3af" font-family="sans-serif">O</text>

  <!-- ticks eixo x -->
  <line x1="125" y1="186" x2="125" y2="194" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="119" y="207" font-size="14" fill="#9ca3af" font-family="sans-serif">1</text>
  <line x1="160" y1="186" x2="160" y2="194" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="154" y="207" font-size="14" fill="#9ca3af" font-family="sans-serif">2</text>
  <line x1="195" y1="186" x2="195" y2="194" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="189" y="207" font-size="14" fill="#9ca3af" font-family="sans-serif">3</text>
  <line x1="230" y1="186" x2="230" y2="194" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="224" y="207" font-size="14" fill="#9ca3af" font-family="sans-serif">4</text>

  <!-- ticks eixo y -->
  <line x1="86" y1="155" x2="94" y2="155" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="70" y="159" font-size="14" fill="#9ca3af" font-family="sans-serif">1</text>
  <line x1="86" y1="120" x2="94" y2="120" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="70" y="124" font-size="14" fill="#9ca3af" font-family="sans-serif">2</text>
  <line x1="86" y1="85"  x2="94" y2="85"  stroke="#9ca3af" stroke-width="1.5"/>
  <text x="70" y="89"  font-size="14" fill="#9ca3af" font-family="sans-serif">3</text>
</svg>
