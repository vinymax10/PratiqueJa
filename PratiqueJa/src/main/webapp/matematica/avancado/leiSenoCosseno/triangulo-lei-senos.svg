<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 340 260" width="300" height="225"
     xmlns="http://www.w3.org/2000/svg"
     aria-label="Triângulo ABC com ângulo A igual a 30 graus, lado a igual a 7 e lado b igual a 10">
    <polygon points="30,210 280,210 80,60"
             fill="none" stroke="#5b8dd9" stroke-width="2.5"/>
    <!-- Arco em A=(280,210): L ao ponto horizontal primeiro, arc ao ponto superior -->
    <path d="M 280,210 L 245,210 A 35,35 0 0,1 251,191 Z"
