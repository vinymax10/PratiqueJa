<svg viewBox="0 0 300 260" xmlns="http://www.w3.org/2000/svg" width="300" height="260"
     aria-label="Plano de Argand-Gauss mostrando o número complexo z=3+4i">

  <!-- eixos -->
  <line x1="20"  y1="150" x2="280" y2="150" stroke="#f9a8d4" stroke-width="2"/>
  <line x1="150" y1="20"  x2="150" y2="250" stroke="#f9a8d4" stroke-width="2"/>
  <polygon points="280,150 272,146 272,154" fill="#f9a8d4"/>
  <polygon points="150,20 146,28 154,28"   fill="#f9a8d4"/>
  <text x="283" y="154" font-size="13" fill="#9ca3af" font-family="sans-serif">Re</text>
  <text x="155" y="18"  font-size="13" fill="#9ca3af" font-family="sans-serif">Im</text>

  <!-- vetor z = 3+4i → SVG (210, 70): Re=3 → +60px, Im=4 → -80px -->
  <line x1="150" y1="150" x2="210" y2="70" stroke="#93c5fd" stroke-width="2.5"/>

  <!-- projeções pontilhadas -->
  <line x1="210" y1="70"  x2="210" y2="150" stroke="#c4b5fd" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="210" y1="70"  x2="150" y2="70"  stroke="#c4b5fd" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- ponto z -->
  <circle cx="210" cy="70" r="6" fill="#60a5fa"/>

  <!-- labels do ponto e coordenadas -->
  <text x="215" y="66"  font-size="13" fill="#60a5fa" font-family="sans-serif" font-weight="600">z = 3+4i</text>
  <text x="205" y="164" font-size="12" fill="#fdba74" font-family="sans-serif">3</text>
  <text x="133" y="74"  font-size="12" fill="#fdba74" font-family="sans-serif">4</text>

  <!-- módulo -->
  <text x="163" y="118" font-size="11" fill="#93c5fd" font-family="sans-serif" font-style="italic">|z|=5</text>

  <!-- origem -->
  <text x="134" y="165" font-size="12" fill="#9ca3af" font-family="sans-serif">O</text>
</svg>
