<svg viewBox="0 0 360 240" xmlns="http://www.w3.org/2000/svg" width="360" height="240"
     aria-label="Gráficos de log_2(x) crescente e log_{1/2}(x) decrescente com assíntota vertical em x=0">

  <!-- assíntota vertical x=0 (eixo y = barreira) -->
  <line x1="80" y1="10" x2="80" y2="230" stroke="#c4b5fd" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="84" y="22" font-size="10" fill="#c4b5fd" font-family="sans-serif" font-style="italic">x = 0 (assíntota)</text>

  <!-- eixo x -->
  <line x1="80"  y1="120" x2="350" y2="120" stroke="#f9a8d4" stroke-width="2"/>
  <polygon points="350,120 342,116 342,124" fill="#f9a8d4"/>
  <text x="352" y="124" font-size="13" fill="#9ca3af" font-family="sans-serif">x</text>

  <!-- eixo y (apenas parte positiva, acima de x=0) — curto, para referência -->
  <line x1="80" y1="10" x2="80" y2="230" stroke="#f9a8d4" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- SVG_x = 80 + x*50 ; SVG_y = 120 - log2(x)*28 -->
  <!-- Pontos densos perto de x=0 (curva íngreme) e espaçados onde é plana -->

  <!-- f(x) = log_2(x) — curva azul (crescente) -->
  <polyline
    points="85.0,213.0 86.0,205.6 87.5,196.6 90.0,185.0 92.5,176.0 95.0,168.6 97.5,162.4 100.0,157.0 105.0,148.0 110.0,140.6 115.0,134.4 120.0,129.0 125.0,124.3 130.0,120.0 140.0,112.6 150.0,106.4 160.0,101.0 170.0,96.3 180.0,92.0 205.0,83.0 230.0,75.6 255.0,69.4 280.0,64.0 305.0,59.2 330.0,55.0 350.0,51.9"
    stroke="#93c5fd" stroke-width="2.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- f(x) = log_{1/2}(x) = -log_2(x) — curva laranja (decrescente) -->
  <polyline
    points="85.0,27.0 86.0,34.4 87.5,43.4 90.0,55.0 92.5,64.0 95.0,71.4 97.5,77.6 100.0,83.0 105.0,92.0 110.0,99.4 115.0,105.6 120.0,111.0 125.0,115.7 130.0,120.0 140.0,127.4 150.0,133.6 160.0,139.0 170.0,143.7 180.0,148.0 205.0,157.0 230.0,164.4 255.0,170.6 280.0,176.0 305.0,180.8 330.0,185.0 350.0,188.1"
    stroke="#fdba74" stroke-width="2.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- zero: ponto (1, 0) = SVG (130, 120) -->
  <circle cx="130" cy="120" r="5" fill="#86efac"/>
  <text x="134" y="117" font-size="11" fill="#86efac" font-family="sans-serif">(1, 0)</text>

  <!-- ticks eixo x -->
  <line x1="130" y1="116" x2="130" y2="124" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="127" y="134" font-size="11" fill="#9ca3af" font-family="sans-serif">1</text>
  <line x1="180" y1="116" x2="180" y2="124" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="177" y="134" font-size="11" fill="#9ca3af" font-family="sans-serif">2</text>
  <line x1="280" y1="116" x2="280" y2="124" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="277" y="134" font-size="11" fill="#9ca3af" font-family="sans-serif">4</text>

  <!-- ticks eixo y (valores) -->
  <line x1="76" y1="92"  x2="84" y2="92"  stroke="#9ca3af" stroke-width="1.5"/>
  <text x="58" y="96"  font-size="11" fill="#9ca3af" font-family="sans-serif">1</text>
  <line x1="76" y1="148" x2="84" y2="148" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="55" y="152" font-size="11" fill="#9ca3af" font-family="sans-serif">−1</text>
  <line x1="76" y1="64"  x2="84" y2="64"  stroke="#9ca3af" stroke-width="1.5"/>
  <text x="58" y="68"  font-size="11" fill="#9ca3af" font-family="sans-serif">2</text>
  <line x1="76" y1="176" x2="84" y2="176" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="55" y="180" font-size="11" fill="#9ca3af" font-family="sans-serif">−2</text>

  <!-- labels das curvas -->
  <text x="333" y="45"  font-size="12" fill="#93c5fd" font-family="sans-serif" font-style="italic">log₂x</text>
  <text x="333" y="178" font-size="12" fill="#fdba74" font-family="sans-serif" font-style="italic">log½x</text>

  <!-- anotações -->
  <text x="284" y="52" font-size="10" fill="#93c5fd"  font-family="sans-serif">a &gt; 1</text>
  <text x="284" y="198" font-size="10" fill="#fdba74" font-family="sans-serif">0 &lt; a &lt; 1</text>
</svg>
