<svg viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg" width="260" height="260"
     aria-label="Esfera com raio r, equador (elipse horizontal) e meridiano (arco vertical) indicados">

  <!-- esfera — círculo externo -->
  <circle cx="130" cy="130" r="95" stroke="#6ee7b7" stroke-width="2.5" fill="#0c1a2e" opacity="0.95"/>

  <!-- equador traseiro tracejado -->
  <path d="M 35,130 A 95,26 0 0,0 225,130" stroke="#9ca3af" stroke-width="1.5"
        stroke-dasharray="6,4" fill="none"/>
  <!-- equador frontal -->
  <path d="M 35,130 A 95,26 0 0,1 225,130" stroke="#fdba74" stroke-width="2" fill="none"/>
  <text x="148" y="172" font-size="14" fill="#fdba74" font-family="sans-serif">equador</text>

  <!-- meridiano traseiro tracejado -->
  <path d="M 130,35 A 95,95 0 0,0 130,225" stroke="#9ca3af" stroke-width="1.5"
        stroke-dasharray="6,4" fill="none"/>
  <!-- meridiano frontal -->
  <path d="M 130,35 A 95,95 0 0,1 130,225" stroke="#a5b4fc" stroke-width="1.5" fill="none"/>

  <!-- centro -->
  <circle cx="130" cy="130" r="4" fill="#f9a8d4"/>
  <text x="134" y="128" font-size="14" fill="#f9a8d4" font-family="sans-serif">O</text>

  <!-- raio r -->
  <line x1="130" y1="130" x2="225" y2="130" stroke="#86efac" stroke-width="2"/>
  <circle cx="225" cy="130" r="4" fill="#86efac"/>
  <text x="171" y="124" font-size="14" fill="#86efac" font-family="sans-serif" font-style="italic">r</text>

  <!-- fórmulas -->
  <text x="0" y="22"  font-size="14" fill="#6ee7b7" font-family="sans-serif" font-weight="600">Esfera</text>
  <text x="0" y="42"  font-size="14" fill="#9ca3af" font-family="sans-serif">A<tspan font-size="10" dy="3">sup</tspan><tspan dy="-3"> = 4πr²</tspan></text>
  <text x="150" y="22"  font-size="14" fill="#c4b5fd" font-family="sans-serif" font-weight="600">V = 4πr³/3</text>
</svg>
