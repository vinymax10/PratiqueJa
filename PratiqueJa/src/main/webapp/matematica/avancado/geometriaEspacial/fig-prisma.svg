<svg viewBox="0 0 310 215" xmlns="http://www.w3.org/2000/svg" width="310" height="215"
     aria-label="Prisma retangular com arestas visíveis e indicação de altura h e largura b">

  <!-- arestas ocultas (tracejadas) -->
  <line x1="40"  y1="160" x2="75"  y2="138" stroke="#4b5563" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="75"  y1="138" x2="205" y2="138" stroke="#4b5563" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="75"  y1="138" x2="75"  y2="58"  stroke="#4b5563" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- face superior (topo) -->
  <polygon points="40,80 170,80 205,58 75,58"
           fill="#1e3a5f" stroke="#93c5fd" stroke-width="2" opacity="0.55"/>

  <!-- face direita -->
  <polygon points="170,160 205,138 205,58 170,80"
           fill="#172554" stroke="#93c5fd" stroke-width="2" opacity="0.45"/>

  <!-- face frontal -->
  <polygon points="40,160 170,160 170,80 40,80"
           fill="#1e3a5f" stroke="#93c5fd" stroke-width="2" opacity="0.65"/>

  <!-- seta de altura h -->
  <line x1="218" y1="58"  x2="218" y2="138" stroke="#fca5a5" stroke-width="1.5"/>
  <polygon points="218,58  214,68  222,68"  fill="#fca5a5"/>
  <polygon points="218,138 214,128 222,128" fill="#fca5a5"/>
  <text x="223" y="103" font-size="14" fill="#fca5a5" font-family="sans-serif" font-style="italic">h</text>

  <!-- seta de largura b -->
  <line x1="40"  y1="175" x2="170" y2="175" stroke="#86efac" stroke-width="1.5"/>
  <polygon points="40,175  50,171  50,179"  fill="#86efac"/>
  <polygon points="170,175 160,171 160,179" fill="#86efac"/>
  <text x="99"  y="192" font-size="14" fill="#86efac" font-family="sans-serif" font-style="italic" text-anchor="middle">b</text>

  <!-- seta de profundidade d -->
  <line x1="183" y1="160" x2="215" y2="141" stroke="#c4b5fd" stroke-width="1.5"/>
  <polygon points="183,160 186,148 193,154" fill="#c4b5fd"/>
  <text x="200" y="158" font-size="14" fill="#c4b5fd" font-family="sans-serif" font-style="italic">d</text>

  <!-- fórmulas -->
  <text x="10" y="18"  font-size="14" fill="#9ca3af" font-family="sans-serif">A<tspan font-size="10" dy="3">base</tspan><tspan dy="-3"> = b × d</tspan></text>
  <text x="10" y="38"  font-size="14" fill="#9ca3af" font-family="sans-serif">A<tspan font-size="10" dy="3">lat</tspan><tspan dy="-3"> = P<tspan font-size="10" dy="3">base</tspan><tspan dy="-3"> × h</tspan></tspan></text>
  <text x="160" y="38"  font-size="14" fill="#c4b5fd" font-family="sans-serif" font-weight="600">V = A<tspan font-size="10" dy="3">base</tspan><tspan dy="-3"> × h</tspan></text>
</svg>
