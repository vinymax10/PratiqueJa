<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 260" width="340" height="260" font-family="sans-serif">

  <!-- Background -->
  <rect width="340" height="260" fill="#f9f9fc" rx="6"/>

  <!-- Grid lines -->
  <g stroke="#ddd" stroke-width="0.8">
    <!-- verticals -->
    <line x1="50"  y1="20" x2="50"  y2="240"/>
    <line x1="90"  y1="20" x2="90"  y2="240"/>
    <line x1="130" y1="20" x2="130" y2="240"/>
    <line x1="210" y1="20" x2="210" y2="240"/>
    <line x1="250" y1="20" x2="250" y2="240"/>
    <line x1="290" y1="20" x2="290" y2="240"/>
    <!-- horizontals -->
    <line x1="20" y1="60"  x2="320" y2="60"/>
    <line x1="20" y1="100" x2="320" y2="100"/>
    <line x1="20" y1="180" x2="320" y2="180"/>
    <line x1="20" y1="220" x2="320" y2="220"/>
  </g>

  <!-- Axes -->
  <line x1="20"  y1="140" x2="325" y2="140" stroke="#444" stroke-width="2" marker-end="url(#arrowX)"/>
  <line x1="170" y1="250" x2="170" y2="15"  stroke="#444" stroke-width="2" marker-end="url(#arrowY)"/>

  <defs>
    <marker id="arrowX" markerWidth="7" markerHeight="7" refX="4" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#444"/>
    </marker>
    <marker id="arrowY" markerWidth="7" markerHeight="7" refX="3.5" refY="4" orient="auto">
      <path d="M0,7 L3.5,0 L7,7 Z" fill="#444"/>
    </marker>
  </defs>

  <!-- Axis labels -->
  <text x="328" y="144" font-size="13" fill="#444" font-weight="bold">x</text>
  <text x="174" y="12"  font-size="13" fill="#444" font-weight="bold">y</text>
  <text x="162" y="155" font-size="11" fill="#444">0</text>

  <!-- Tick values — x axis -->
  <text x="46"  y="155" font-size="10" fill="#666" text-anchor="middle">-3</text>
  <text x="86"  y="155" font-size="10" fill="#666" text-anchor="middle">-2</text>
  <text x="126" y="155" font-size="10" fill="#666" text-anchor="middle">-1</text>
  <text x="210" y="155" font-size="10" fill="#666" text-anchor="middle">1</text>
  <text x="250" y="155" font-size="10" fill="#666" text-anchor="middle">2</text>
  <text x="290" y="155" font-size="10" fill="#666" text-anchor="middle">3</text>

  <!-- Tick values — y axis -->
  <text x="158" y="64"  font-size="10" fill="#666" text-anchor="end">3</text>
  <text x="158" y="104" font-size="10" fill="#666" text-anchor="end">2</text>
  <text x="158" y="184" font-size="10" fill="#666" text-anchor="end">-1</text>
  <text x="158" y="224" font-size="10" fill="#666" text-anchor="end">-2</text>

  <!-- Quadrant labels (light) -->
  <text x="252" y="115" font-size="11" fill="#bbb" text-anchor="middle">I</text>
  <text x="88"  y="115" font-size="11" fill="#bbb" text-anchor="middle">II</text>
  <text x="88"  y="190" font-size="11" fill="#bbb" text-anchor="middle">III</text>
  <text x="252" y="190" font-size="11" fill="#bbb" text-anchor="middle">IV</text>

  <!-- Point A(2,2) — 1st quadrant -->
  <!-- pixel: x=170+2*40=250, y=140-2*40=60 -->
  <circle cx="250" cy="60" r="5" fill="#3b6fd4"/>
  <line x1="250" y1="60" x2="250" y2="140" stroke="#3b6fd4" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="170" y1="60" x2="250" y2="60"  stroke="#3b6fd4" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="256" y="57" font-size="11" fill="#3b6fd4" font-weight="bold">A(2, 2)</text>

  <!-- Point B(-1,1) — 2nd quadrant -->
  <!-- pixel: x=170-1*40=130, y=140-1*40=100 -->
  <circle cx="130" cy="100" r="5" fill="#27ae60"/>
  <line x1="130" y1="100" x2="130" y2="140" stroke="#27ae60" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="170" y1="100" x2="130" y2="100" stroke="#27ae60" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="56" y="97" font-size="11" fill="#27ae60" font-weight="bold">B(-1, 1)</text>

  <!-- Point C(-2,-1) — 3rd quadrant -->
  <!-- pixel: x=170-2*40=90, y=140+1*40=180 -->
  <circle cx="90" cy="180" r="5" fill="#e67e22"/>
  <line x1="90" y1="140" x2="90" y2="180" stroke="#e67e22" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="90" y1="180" x2="170" y2="180" stroke="#e67e22" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="96" y="195" font-size="11" fill="#e67e22" font-weight="bold">C(-2,-1)</text>

  <!-- Point D(3,-2) — 4th quadrant -->
  <!-- pixel: x=170+3*40=290, y=140+2*40=220 -->
  <circle cx="290" cy="220" r="5" fill="#c0392b"/>
  <line x1="290" y1="140" x2="290" y2="220" stroke="#c0392b" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="170" y1="220" x2="290" y2="220" stroke="#c0392b" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="235" y="235" font-size="11" fill="#c0392b" font-weight="bold">D(3,-2)</text>

</svg>
