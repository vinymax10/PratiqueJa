<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

<h:body>
	<ui:composition>
		<div class="col-12 md:col-6 xl:col-4">
			<p:card style="margin:10px;width: auto;">
			
				<h:outputText value=" #{conta.index}) "
				class="numberExercise"
					style="color: var(--iris);font-weight: bold;font-size: 1.1rem;display:inline;vertical-align: top;" />
				<p:graphicImage value="#{conta.getImageStream()}" width="300px"
					cache="false" stream="false"
					style="display:inline-block;padding-top:5px;">
				</p:graphicImage>

				<h:outputText value="#{conta.pergunta}"
					rendered="#{conta.pergunta!=''}"
					style="padding:15px 0;display:block;" />
					
				<h:panelGroup id="resultado_#{conta.index}" style="display:block;margin-top:1rem;" >
					<h:panelGroup rendered="#{conta.respondida}">
						<h:outputText value="Resposta: "
							style="color:var(--cinza);font-weight: bold;" />
						<h:outputText value="\\( #{conta.respostaAluno} \\)"
							style="font-weight: bold;" />
						<h:outputText rendered="#{conta.correta}">
							<i class="pi pi-check"
								style="color: var(--iris); vertical-align: middle; margin-bottom: 3px; font-weight: bold;" />
						</h:outputText>
						<h:outputText rendered="#{!conta.correta}">
							<i class="pi pi-times"
								style="color: #F06060; vertical-align: middle; margin-bottom: 3px; font-weight: bold;" />
							<h:outputText value=" Correto: \\( #{conta.resultadoCorreto} \\)"
								style="color: var(--verde);font-weight: bold;" />
						</h:outputText>
					</h:panelGroup>
	
					<p:commandButton action="#{exercicioBean.toogleResolucao(conta)}"
						styleClass="ui-button-flat ui-button-plain" ajax="true"
						icon="pi pi-pencil"
						rendered="#{conta.respondida and conta.possuiResolucao()}"
						style="margin-top:1rem;display:block;width: auto;"
						oncomplete="reloadMathJax();" process="@this" value="Ver Resolução"
						update="form:exercicio_#{conta.index}" />
	
					<h:panelGroup id="exercicio_#{conta.index}"
						style="display:block;margin-top:1rem;">
						<p:graphicImage value="#{conta.getImageResolucaoStream()}"
							cache="false" stream="false" width="300px"
							style="display:inline-block;padding-top:5px;"
							rendered="#{conta.showResolucao and conta.temImageResolucao()}">
						</p:graphicImage>
	
						<h:outputText value="\\( #{conta.resolucaoLatex}~ \\)"
							class="exercise" rendered="#{conta.showResolucao}" />
	
					</h:panelGroup>

					<h:panelGroup style="display:block; margin-top:1rem;"
						rendered="#{!conta.respondida}">
						<div class="ui-inputgroup">
							<p:inputText id="input_#{conta.index}" value="#{conta.respostaAluno}"
							required="true" style="text-align: center;"
							requiredMessage="Informe uma resposta" placeholder="Resposta" >
								<f:ajax event="change" process="@this" onevent="update"  />
							</p:inputText>
							
							<p:commandButton id="responder_#{conta.index}" 
							action="#{exercicioBean.responder(conta)}"
							styleClass="ui-button-outlined  ui-button-secondary" ajax="true"
							icon="fa-solid fa-reply"
							process="@parent"
							update="form:resultado_#{conta.index} form:nota" 
							oncomplete="reloadMathJax(); enableEnterSubmit('form');">
								<p:defaultCommand target="form:responder_#{conta.index}"/>
							</p:commandButton>
						</div>
						<p:message for="input_#{conta.index}" display="text"/>
					</h:panelGroup>
				</h:panelGroup>
			</p:card>
		</div>
	</ui:composition>
</h:body>
</html>
