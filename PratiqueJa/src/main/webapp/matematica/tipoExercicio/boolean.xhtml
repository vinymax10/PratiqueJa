<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

<h:body>
	<ui:composition>
			<div  class="col-12 md:col-6 xl:col-4">
			<p:card class="newBorder p-3 card-fill" style="margin:10px;width: auto;">

				<div style="display: flex; flex-direction: column;">
					<div style="display: flex; flex-direction: row;">
						<h:outputText value=" #{conta.index})" class="numberExercise" />
						<div style="display: flex; flex-direction: column;">
							
							<h:outputText value="#{conta.pergunta}"  
							style="margin-bottom:15px;" rendered="#{conta.pergunta != null}" />
							
							<h:outputText value="\\(#{conta.textLatex}\\)" 
							style="margin-bottom:25px;display: flex; flex-direction: row;"
							rendered="#{conta.textLatex != null}" />
							
						</div>
					</div>
       				
					<div class="result">

						<h:panelGroup style="display:block;"
							rendered="#{conta.respondida}">
							<h:outputText value="Resposta: "
								style="color:AAA195;font-weight: bold;" />
							<h:outputText value="#{conta.respostaAlunoBolTexto()}"
								style="font-weight: bold;" />
							<h:outputText rendered="#{conta.correta}">
								<i class="pi pi-check"
									style="color: var(--iris); vertical-align: middle; margin-bottom: 3px; font-weight: bold;" />
							</h:outputText>
							<h:outputText rendered="#{!conta.correta}">
								<i class="pi pi-times"
									style="color: #F06060; vertical-align: middle; margin-bottom: 3px;" />
								<h:outputText
									value=" Correto: #{conta.resultadoCorretoBolTexto()}"
									style="color: var(--verde);font-weight: bold;" />
							</h:outputText>

							<p:commandButton action="#{exercicioBean.toogleResolucao(conta)}"
								styleClass="ui-button-flat ui-button-plain" ajax="true"
								icon="pi pi-pencil"
								rendered="#{conta.respondida and conta.resolucaoLatex!=null}"
								style="margin-top:1rem;display:block;width: auto;"
								oncomplete="reloadMathJax();" process="@this"
								value="Ver Resolução"
								update="form:exercicio_#{conta.index}" />

							<h:panelGroup id="exercicio_#{conta.index}" style="display:block;">

								<h:outputText value="\\( #{conta.resolucaoLatex}~ \\)"
									style="margin-top:1rem;" class="exercise"
									rendered="#{conta.showResolucao}" />

							</h:panelGroup>
						</h:panelGroup>

						<h:panelGroup style="display:block; "
							rendered="#{!conta.respondida}">
							<div class="ui-fluid p-formgrid p-grid" style="padding: 0 15px;">
								<p:selectBooleanButton value="#{conta.respostaAlunoBol}" 
								onLabel="Sim" offLabel="Não"
                             		onIcon="pi pi-check" offIcon="pi pi-times" style="width:6rem;margin-right:1rem;" />

								<p:commandButton id="responder_#{conta.index}" action="#{exercicioBean.responder(conta)}"
								styleClass="ui-button-outlined  ui-button-secondary" ajax="true"
								icon="fa-regular fa-eye"
								oncomplete="reloadMathJax();" process="@parent"
								update="@form" >
									<p:defaultCommand target="form:responder_#{conta.index}"/>
								</p:commandButton>
							</div>
							
						</h:panelGroup>

					</div>

				</div>

			</p:card>
		</div>
	</ui:composition>
</h:body>
</html>
