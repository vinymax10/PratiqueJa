<svg xmlns="http://www.w3.org/2000/svg" width="220" height="220" viewBox="0 0 110 110">
  <!-- Círculo -->
  <circle cx="55" cy="55" r="44" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <!-- Diâmetro (horizontal) -->
  <line x1="11" y1="55" x2="99" y2="55" stroke="#1d4ed8" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- Raio (vertical superior) -->
  <line x1="55" y1="55" x2="55" y2="11" stroke="#dc2626" stroke-width="2"/>
  <!-- Corda (oblíqua) -->
  <line x1="18" y1="30" x2="85" y2="85" stroke="#059669" stroke-width="1.5"/>
  <!-- Arco destacado (superior direito, de 0° a 90°) -->
  <path d="M 99 55 A 44 44 0 0 0 55 11" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round"/>
  <!-- Centro -->
  <circle cx="55" cy="55" r="2.5" fill="#1e293b"/>
  <!-- Labels -->
  <text x="57" y="34" font-size="10" font-weight="bold" fill="#dc2626" font-family="sans-serif">r</text>
  <text x="28" y="52" font-size="9" font-weight="bold" fill="#1d4ed8" font-family="sans-serif">d</text>
  <text x="40" y="72" font-size="9" fill="#059669" font-family="sans-serif">corda</text>
  <text x="78" y="28" font-size="9" fill="#7c3aed" font-family="sans-serif">arco</text>
  <text x="57" y="58" font-size="8" fill="#1e293b" font-family="sans-serif">O</text>
</svg>
