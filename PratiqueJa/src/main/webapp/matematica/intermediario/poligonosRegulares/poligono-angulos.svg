<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 110 110">
  <!-- Pentágono regular, centro (55,57), raio 44 -->
  <!-- Vértices: V0(55,13) V1(97,44) V2(80,94) V3(30,94) V4(13,44) -->
  <polygon points="55,13 97,44 80,94 30,94 13,44"
           fill="#f0fdf4" stroke="#15803d" stroke-width="2"/>
  <!-- Extensão do lado V3-V4 para mostrar ângulo externo (em V4=13,44) -->
  <!-- Direção V3→V4: (13-30, 44-94) = (-17,-50), normalizado e prolongado -->
  <!-- Prolongando além de V4: aprox até (-4, 12) -->
  <line x1="30" y1="94" x2="13" y2="44" stroke="#15803d" stroke-width="2"/>
  <line x1="13" y1="44" x2="3" y2="10" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Lado V4-V0 (13,44)→(55,13) -->
  <!-- Ângulo interno em V4 (entre lado V3V4 e lado V4V0) — arco verde -->
  <path d="M 22 20 A 18 18 0 0 1 29 53" fill="none" stroke="#15803d" stroke-width="1.8"/>
  <!-- Ângulo externo em V4 (entre extensão e lado V4V0) — arco vermelho -->
  <path d="M 8 20 A 10 10 0 0 0 22 20" fill="none" stroke="#dc2626" stroke-width="1.8"/>
  <!-- Labels -->
  <text x="27" y="36" font-size="9" font-weight="bold" fill="#15803d" font-family="sans-serif">αᵢ</text>
  <text x="5" y="32" font-size="9" font-weight="bold" fill="#dc2626" font-family="sans-serif">αₑ</text>
  <text x="30" y="107" font-size="8" fill="#15803d" font-family="sans-serif">ângulo interno</text>
  <text x="2" y="107" font-size="8" fill="#dc2626" font-family="sans-serif" transform="translate(0,0)"></text>
  <!-- Legenda -->
  <rect x="2" y="98" width="7" height="7" fill="none" stroke="#15803d" stroke-width="1"/>
  <text x="11" y="105" font-size="7" fill="#15803d" font-family="sans-serif">αᵢ = interno</text>
  <rect x="2" y="107" width="7" height="7" fill="none" stroke="#dc2626" stroke-width="1"/>
  <text x="11" y="114" font-size="7" fill="#dc2626" font-family="sans-serif">αₑ = externo</text>
</svg>
