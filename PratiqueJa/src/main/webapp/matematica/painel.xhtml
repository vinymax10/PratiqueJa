<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	xmlns:c="http://xmlns.jcp.org/jsp/jstl/core"
	template="/template/template.xhtml">
	

	<div class="p-d-flex">
	    <h:form id="form" style="margin-bottom:0">
<!-- 	    	<div class="p-grid" style="margin:0 1rem;"> -->
		
				<div class="p-col-12" style="padding:0;">	
					<h2 style="margin:24px 0 0 24px">Básico</h2>	
				</div>
				<nav class="painel">
					<ul class="listAssunto">
						<ui:repeat  value="#{assuntoCursoBean.getTodosAssuntoCursos('Basico')}" var="assunto" >
		                   	<li class="assunto">
		                    	<a  href="/matematica/assunto.xhtml?assunto=#{assunto.chave}&amp;tab=1"  >
				                    <div class="image" >
					                    <img class="imageAssunto" 
					                    src="/image/matematica/#{assunto.getModuloImage()}/#{assunto.getChaveImage()}/#{assunto.getChaveImage()}.png" />
							         </div>
							         
							         <div class="text" >
							         
								        <span class="titleAssunto" >
									    	#{assunto.nome}
									    </span>
									    <span class="titleAssunto" >
										    <i class="star #{assunto.numStar>0 ? 'fa-solid fa-star' : 'fa-regular fa-star'}" ></i>
										    <i class="star #{assunto.numStar>1 ? 'fa-solid fa-star' : 'fa-regular fa-star'}" ></i>
										    <i class="star #{assunto.numStar>2 ? 'fa-solid fa-star' : 'fa-regular fa-star'}" ></i>
										    <i class="star #{assunto.numStar>3 ? 'fa-solid fa-star' : 'fa-regular fa-star'}" ></i>
										    <i class="star #{assunto.numStar>4 ? 'fa-solid fa-star' : 'fa-regular fa-star'}" ></i>
									    </span>
									    
									    <span class="descriptionAssunto" >
										    #{assunto.descricao}
									    </span>
									    
								    </div>
			                    </a>	
		                   	</li>
		                   
	                	</ui:repeat>
	                	
	                </ul>
				</nav>
				
					
				<div class="p-col-12" style="padding:0;">	
					<h2 style="margin:24px 0 0 24px">Intermediário</h2>	
				</div>
				<nav class="painel">
					<ul class="listAssunto">
						<ui:repeat  value="#{assuntoCursoBean.getTodosAssuntoCursos('Intermediario')}" var="assunto" >
		                   	<li class="assunto">
		                    	<a  href="/matematica/assunto.xhtml?assunto=#{assunto.chave}&amp;tab=1"  >
				                    <div class="image" >
					                    <img class="imageAssunto" 
					                    src="/image/matematica/#{assunto.getModuloImage()}/#{assunto.getChaveImage()}/#{assunto.getChaveImage()}.png" />
							         </div>
							         
							         <div class="text" >
							         
								        <span class="titleAssunto" >
									    	#{assunto.nome}  
									    </span>
									    <span class="titleAssunto" >
									    	<i class="star #{assunto.numStar>0 ? 'fa-solid fa-star' : 'fa-regular fa-star'}" ></i>
										    <i class="star #{assunto.numStar>1 ? 'fa-solid fa-star' : 'fa-regular fa-star'}" ></i>
										    <i class="star #{assunto.numStar>2 ? 'fa-solid fa-star' : 'fa-regular fa-star'}" ></i>
										    <i class="star #{assunto.numStar>3 ? 'fa-solid fa-star' : 'fa-regular fa-star'}" ></i>
										    <i class="star #{assunto.numStar>4 ? 'fa-solid fa-star' : 'fa-regular fa-star'}" ></i>
									    </span>
									    
									    <span class="descriptionAssunto" >
										    #{assunto.descricao} 	
									    </span>
									    
								    </div>
			                    </a>	
		                   	</li>
		                   
	                	</ui:repeat>
	                	
	                </ul>
				</nav>	
				
				<div class="p-col-12" style="padding:0;">	
					<h2 style="margin:24px 0 0 24px">Avançado</h2>	
				</div>
				<nav class="painel">
					<ul class="listAssunto">
						<ui:repeat  value="#{assuntoCursoBean.getTodosAssuntoCursos('Avancado')}" var="assunto" >
		                   	<li class="assunto">
		                    	<a  href="/matematica/assunto.xhtml?assunto=#{assunto.chave}&amp;tab=1"  >
				                    <div class="image" >
					                    <img class="imageAssunto" 
					                    src="/image/matematica/#{assunto.getModuloImage()}/#{assunto.getChaveImage()}/#{assunto.getChaveImage()}.png" />
							         </div>
							         
							         <div class="text" >
							         
								        <span class="titleAssunto" >
									    	#{assunto.nome}
									    </span>
									    <span class="titleAssunto" >
										    <i class="star #{assunto.numStar>0 ? 'fa-solid fa-star' : 'fa-regular fa-star'}" ></i>
										    <i class="star #{assunto.numStar>1 ? 'fa-solid fa-star' : 'fa-regular fa-star'}" ></i>
										    <i class="star #{assunto.numStar>2 ? 'fa-solid fa-star' : 'fa-regular fa-star'}" ></i>
										    <i class="star #{assunto.numStar>3 ? 'fa-solid fa-star' : 'fa-regular fa-star'}" ></i>
										    <i class="star #{assunto.numStar>4 ? 'fa-solid fa-star' : 'fa-regular fa-star'}" ></i>
									    </span>
									    
									    <span class="descriptionAssunto" >
										    #{assunto.descricao}
									    </span>
									    
								    </div>
			                    </a>	
		                   	</li>
		                   
	                	</ui:repeat>
	                	
	                </ul>
				</nav>
		    	
			<br/>
			<br/>
		</h:form>
	</div>
	
</ui:decorate>
