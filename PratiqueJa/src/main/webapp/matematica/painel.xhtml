<ui:decorate xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	xmlns:c="http://xmlns.jcp.org/jsp/jstl/core"
	template="/template/template.xhtml">

	<ui:define name="OpenGraph">
		<link rel="stylesheet" href="/css/assunto.css" type="text/css" />
	</ui:define>

	<div class="p-d-flex">
	    <h:form id="form" style="margin-bottom:0">

				<nav class="painel">
					<ul class="listAssunto">
						<ui:repeat value="#{assuntoBean.listaAtivas}" var="assunto">
		                   	<li class="assunto">
		                    	<a href="#{assunto.endTeoria()}">
				                    <div class="image">
					                    <img class="imageAssunto"
					                    	src="#{assunto.endImageThumb()}"
					                    	onerror="this.onerror=null;this.src='#{assunto.endImageCapa()}';" />
							         </div>
							         <div class="text">
								        <span class="titleAssunto">#{assunto.nome}</span>
									    <span class="descriptionAssunto">#{assunto.descricao}</span>
									    <span class="assunto-badges">
									    	<span class="assunto-badge assunto-badge--blue">
									    		<i class="fa-solid fa-pencil"></i> #{assunto.qtdExercicios} exercícios
									    	</span>
									    	<span class="assunto-badge assunto-badge--green">
									    		<i class="fa-solid fa-circle-question"></i> #{assunto.qtdQuestoes} questões
									    	</span>
									    	<span class="assunto-badge assunto-badge--orange">
									    		<i class="fa-solid fa-file-pdf"></i> #{assunto.qtdPdf} PDFs
									    	</span>
									    </span>
								    </div>
			                    </a>
		                   	</li>
	                	</ui:repeat>
	                </ul>
				</nav>

			<br/>
			<br/>
		</h:form>
	</div>

</ui:decorate>
